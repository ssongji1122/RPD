name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RPD_TEST_ARTIFACT_DIR: test-artifacts/playwright
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest
          python3 -m pip install playwright
          python3 -m pip install -e ./tools/lessonforge[dev]

      - name: Install Chromium for Playwright
        run: |
          python3 -m playwright install --with-deps chromium

      - name: Validate canonical curriculum
        run: |
          python3 tools/content_pipeline.py check
          python3 tools/content_pipeline.py sync-from-markdown
          python3 tools/content_pipeline.py build
          python3 tools/content_pipeline.py build-public --output dist/public-site

      - name: Run public page smoke checks
        run: |
          bash tools/run-public-page-checks.sh

      - name: Run repository tests
        run: |
          python3 -m pytest \
            tools/tests/test_content_pipeline.py \
            tools/tests/test_markdown_import.py \
            tools/tests/test_admin_server.py \
            tools/tests/test_showme_widget_e2e.py \
            tools/tests/test_admin_e2e.py \
            -q \
            -k 'not sidebar_section_active_link_uses_text_priority_state'
          python3 -m pytest tools/lessonforge/tests -q

      - name: Compile critical Python entrypoints
        run: |
          python3 -m py_compile \
            tools/admin-server.py \
            tools/content_pipeline.py \
            tools/curriculum-push.py \
            tools/notion_api.py \
            tools/notion-sync.py \
            tools/playwright_test_support.py \
            tools/runtime_paths.py \
            tools/lecture_notes_sync.py

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: test-artifacts/playwright
          if-no-files-found: ignore
          retention-days: 7

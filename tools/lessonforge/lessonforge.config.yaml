    text: "#eaeaea"
    text_muted: "#aaaaaa"
    font_body: "Pretendard, -apple-system, sans-serif"
    font_code: "JetBrains Mono, SF Mono, monospace"

youtube:
  playlist: "RPD 2026 Spring"
  category: "27"
  language: "ko"
  privacy: "unlisted"
  tags_base:

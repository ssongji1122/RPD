## LessonForge Configuration
## RPD (Robot Product Design) 2026 Spring

project:
  name: "로봇프러덕트 디자인 (RPD)"
  professor: "송지희"
  university: "인하대학교"
  semester: "2026 Spring"
  lectures_root: "../../weeks"
  output_root: "./output"

video:
  resolution: [1920, 1080]
  fps: 30
  target_segment_minutes: [20, 30]
  segments_per_week: [2, 3]

tts:
  engine: "edge_tts"
  voice: "ko-KR-SunHiNeural"
  rate: "+5%"
  pitch: "+0Hz"

  ## ElevenLabs (유료 업그레이드 시 engine: "elevenlabs"로 변경)

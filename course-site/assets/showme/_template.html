<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Show Me — [위젯 제목]</title>
<style>
/* ══════════════════════════════════════════════════
   Show Me Widget — Standalone Dark Theme
   tokens.css 변수명과 동일하게 유지 (iframe 독립 동작)
   ══════════════════════════════════════════════════ */
:root {
  --bg:            #0a0a0a;
  --bg-soft:       #111214;
  --surface:       #17181a;
  --surface-strong:#1c1d20;
  --line:          rgba(255,255,255,.08);
  --line-strong:   rgba(255,255,255,.14);
  --key:           #0a84ff;
  --key-strong:    #0071e3;
  --key-soft:      #8ec5ff;
  --success:       #10b981;
  --success-soft:  #6ee7b7;
  --warn:          #f59e0b;
  --danger:        #ef4444;
  --text:          #f5f5f7;
  --muted:         #a1a1aa;
  --muted-strong:  #d4d4d8;
  --radius-sm:     12px;
  --radius-md:     18px;
  --radius-lg:     24px;
  --font: "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; }
body {
  margin: 0; padding: 0;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Tab Navigation ── */
.tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--line);
  padding: 0 16px;
  background: var(--bg-soft);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 12px 16px;
  font-size: .84rem; font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border: none; border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color .14s, border-color .14s;
  background: none;
  font-family: inherit;
}
.tab:hover { color: var(--muted-strong); }
.tab.is-active {
  color: var(--key-soft);
  border-bottom-color: var(--key);
}

/* ── Tab Panels ── */
.panel { display: none; padding: 20px 16px; }
.panel.is-active { display: block; }

/* ── Concept Cards ── */
.concept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
}
.concept-card {
  border-radius: var(--radius-md);
  border: 1px solid var(--line);
  background: var(--surface);
  padding: 18px;
}
.concept-card h3 {
  margin: 0 0 8px; font-size: 1rem;
  display: flex; align-items: center; gap: 8px;
}
.concept-card p {
  margin: 0; color: var(--muted-strong);
  font-size: .88rem; line-height: 1.7;
}
.concept-card ul {
  margin: 8px 0 0; padding-left: 16px;
  color: var(--muted-strong); font-size: .85rem; line-height: 1.8;
}

/* ── Badge ── */
.badge {
  display: inline-block;
  padding: 3px 9px; border-radius: 999px;
  font-size: .72rem; font-weight: 600;
}
.badge-blue  { background: rgba(10,132,255,.15);  color: var(--key-soft); }
.badge-green { background: rgba(16,185,129,.15);  color: var(--success-soft); }
.badge-amber { background: rgba(245,158,11,.15);  color: #fbbf24; }

/* ── Keyboard Shortcut ── */
.kbd {
  display: inline-block;
  padding: 3px 8px; border-radius: 6px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.14);
  color: var(--key-soft);
  font-size: .82rem; font-weight: 600;
  font-family: var(--font);
}

/* ── Canvas / Demo ── */
.demo-wrap {
  border-radius: var(--radius-md);
  border: 1px solid var(--line);
  background: var(--surface);
  overflow: hidden;
  margin: 14px 0;
}
.demo-wrap canvas {
  display: block; width: 100%;
}
.demo-controls {
  display: flex; gap: 8px; padding: 12px;
  border-top: 1px solid var(--line);
  flex-wrap: wrap;
}
.demo-hint {
  font-size: .78rem; color: var(--muted);
  text-align: center; padding: 6px 0 0;
}
.demo-btn {
  padding: 7px 14px; border-radius: 999px;
  border: 1px solid var(--line-strong);
  background: rgba(255,255,255,.04);
  color: var(--muted-strong);
  font: inherit; font-size: .82rem;
  cursor: pointer;
  transition: background .14s, color .14s;
}
.demo-btn:hover { background: rgba(255,255,255,.09); color: var(--text); }
.demo-btn.is-active {
  background: rgba(10,132,255,.14);
  color: var(--key-soft);
  border-color: rgba(10,132,255,.3);
}
.modifier-panel {
  border-radius: var(--radius-md);
  border: 1px solid var(--line);
  background: rgba(255,255,255,.03);
  padding: 14px;
}
.control-group + .control-group { margin-top: 12px; }
.control-row {
  display: grid;
  grid-template-columns: 1fr 72px;
  gap: 8px;
  align-items: center;
}
.control-row input[type="range"] {
  width: 100%;
  accent-color: var(--key);
}
.control-row input[type="number"] {
  width: 100%;
  border-radius: 10px;
  border: 1px solid var(--line-strong);
  background: rgba(255,255,255,.04);
  color: var(--text);
  padding: 7px 10px;
  font: inherit;
  font-size: .82rem;
}
.modifier-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.03);
}
.mini-note-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-top: 12px;
}
.mini-note-card {
  border-radius: 12px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.03);
  padding: 12px;
}
.mini-note-label {
  display: block;
  margin-bottom: 6px;
  font-size: .7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .04em;
}
.mini-note-value {
  font-size: .86rem;
  color: var(--muted-strong);
  font-weight: 600;
}
.concept-more {
  margin-top: 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--line);
  background: rgba(255,255,255,.03);
  padding: 14px 16px;
}
.concept-more summary {
  cursor: pointer;
  color: var(--key-soft);
  font-weight: 600;
  list-style: none;
}
.concept-more summary::-webkit-details-marker { display: none; }
.concept-more-body {
  margin-top: 10px;
  color: var(--muted-strong);
  font-size: .84rem;
  line-height: 1.7;
}

/* ── Usage Grid ── */
.usage-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.usage-card {
  border-radius: var(--radius-md);
  border: 1px solid var(--line);
  background: var(--surface);
  padding: 16px;
}
.usage-card h4 {
  margin: 0 0 8px; font-size: .92rem;
  color: var(--key-soft);
}
.usage-card ul {
  margin: 0; padding-left: 16px;
  color: var(--muted-strong); font-size: .85rem;
  line-height: 1.8;
}

/* ── Tip Box ── */
.tip-box {
  border-radius: var(--radius-md);
  border: 1px solid rgba(10,132,255,.2);
  background: rgba(10,132,255,.06);
  padding: 14px 16px;
  margin-top: 14px;
  font-size: .86rem;
  color: var(--muted-strong);
}
.tip-box strong { color: var(--key-soft); }

/* ── Quiz ── */
.quiz-progress {
  font-size: .78rem; color: var(--muted);
  margin-bottom: 12px;
}
.quiz-question {
  margin-bottom: 20px;
  padding: 16px;
  border-radius: var(--radius-md);
  border: 1px solid var(--line);
  background: var(--surface);
}
.quiz-question h4 {
  margin: 0 0 12px; font-size: .94rem;
}
.quiz-option {
  display: block; width: 100%;
  padding: 10px 14px;
  margin-bottom: 6px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  background: rgba(255,255,255,.025);
  color: var(--text);
  font: inherit; font-size: .86rem;
  cursor: pointer;
  text-align: left;
  transition: background .14s, border-color .14s;
}
.quiz-option:hover {
  background: rgba(255,255,255,.06);
  border-color: var(--line-strong);
}
.quiz-option.correct {
  background: rgba(16,185,129,.12);
  border-color: rgba(16,185,129,.4);
  color: var(--success-soft);
}
.quiz-option.wrong {
  background: rgba(239,68,68,.1);
  border-color: rgba(239,68,68,.3);
  color: #fca5a5;
}
.quiz-option:disabled { cursor: default; opacity: .85; }
.quiz-feedback {
  margin-top: 8px; padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: .84rem;
  display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct-fb { background: rgba(16,185,129,.08); color: var(--success-soft); }
.quiz-feedback.wrong-fb   { background: rgba(239,68,68,.06);  color: #fca5a5; }

.quiz-score {
  text-align: center; padding: 20px;
  font-size: 1.1rem; font-weight: 600;
}
.quiz-retry {
  display: block; margin: 12px auto;
  padding: 10px 24px;
  border-radius: 999px;
  border: 1px solid var(--key);
  background: rgba(10,132,255,.12);
  color: var(--key-soft);
  font: inherit; font-size: .88rem;
  cursor: pointer;
  transition: background .14s;
}
.quiz-retry:hover { background: rgba(10,132,255,.22); }

/* ── Official Doc Reference ── */
.doc-ref {
  margin-top: 16px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(10,132,255,.15);
  background: rgba(10,132,255,.04);
  display: flex;
  align-items: center;
  gap: 8px;
}
.doc-ref a {
  color: var(--key-soft);
  font-size: .84rem;
  text-decoration: none;
  line-height: 1.5;
}
.doc-ref a:hover { text-decoration: underline; }
.doc-ref-list {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.doc-ref-list .doc-ref { margin-top: 0; }

/* ── Comparison Table ── */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 14px;
  font-size: .84rem;
}
.compare-table thead { background: rgba(10,132,255,.06); }
.compare-table th {
  padding: 10px 14px; text-align: left;
  color: var(--muted-strong); font-weight: 600;
  font-size: .78rem; letter-spacing: .03em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--line-strong);
}
.compare-table td {
  padding: 8px 14px;
  border-bottom: 1px solid var(--line);
  color: var(--muted-strong); line-height: 1.6;
}
.compare-table tr:last-child td { border-bottom: none; }
.compare-table tr:hover td { background: rgba(255,255,255,.02); }

/* ── Section Divider ── */
.section-divider {
  margin: 20px 0 16px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--line);
  font-size: .92rem;
  font-weight: 600;
  color: var(--text);
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .concept-grid, .usage-grid { grid-template-columns: 1fr; }
  .tabs { padding: 0 8px; }
  .tab { padding: 10px 12px; font-size: .8rem; }
  .panel { padding: 16px 12px; }
  .compare-table { font-size: .78rem; }
  .compare-table th, .compare-table td { padding: 6px 10px; }
}
</style>
</head>
<body>

<!-- Tab Bar -->
<nav class="tabs" role="tablist">
  <button class="tab is-active" data-tab="concept" role="tab">개념 이해</button>
  <button class="tab" data-tab="visual" role="tab">interaction</button>
  <button class="tab" data-tab="when" role="tab">언제 쓰나요?</button>
  <button class="tab" data-tab="quiz" role="tab">퀴즈</button>
</nav>

<!-- TAB 1: 개념 이해 -->
<section class="panel is-active" id="panel-concept" role="tabpanel">
  <p style="font-size:.9rem; color:var(--muted-strong); margin:0 0 14px;">
    <!-- 한 줄 소개 -->
  </p>
  <div class="concept-grid">
    <div class="concept-card">
      <h3><!-- 개념 A 제목 --></h3>
      <p><!-- 설명 --></p>
    </div>
    <div class="concept-card">
      <h3><!-- 개념 B 제목 --></h3>
      <p><!-- 설명 --></p>
    </div>
  </div>
  <details class="concept-more">
    <summary>더보기</summary>
    <div class="concept-more-body">
      <!-- 기본 화면에 안 보여도 되는 보조 설명. 공홈 이동이 아니라 내부 펼침으로 유지 -->
    </div>
  </details>
  <!-- 필요하면 개념 시각화(before/after, cause-effect 요약)를 이 탭 하단에 함께 배치 -->
</section>

<!-- TAB 2: interaction -->
<section class="panel" id="panel-visual" role="tabpanel">
  <!-- 긴 설명 문장은 줄이고, 꼭 필요한 안내만 남기기 -->
  <!-- 파라미터형 카드는 modifier-panel + range + number + checkbox 조합을 우선 사용 -->
  <div class="demo-wrap">
    <canvas id="demoCanvas" width="680" height="300"></canvas>
    <div class="demo-controls">
      <!-- 필요 시 토글 버튼 또는 Reset 버튼 -->
    </div>
  </div>
  <div class="mini-note-grid">
    <div class="mini-note-card">
      <span class="mini-note-label">핵심 1</span>
      <strong class="mini-note-value"><!-- 학생이 꼭 알아야 하는 상태 --></strong>
    </div>
    <div class="mini-note-card">
      <span class="mini-note-label">핵심 2</span>
      <strong class="mini-note-value"><!-- 파라미터 의미 --></strong>
    </div>
    <div class="mini-note-card">
      <span class="mini-note-label">핵심 3</span>
      <strong class="mini-note-value"><!-- 바로 써먹는 주의 포인트 --></strong>
    </div>
  </div>
  <p class="demo-hint"><!-- 조작 힌트는 한 줄만. 개념 설명은 concept 탭으로 이동 --></p>
</section>

<!-- TAB 3: 언제 쓰나요? -->
<section class="panel" id="panel-when" role="tabpanel">
  <div class="usage-grid">
    <div class="usage-card">
      <h4><!-- 사용 사례 A --></h4>
      <ul>
        <li><!-- 항목 --></li>
      </ul>
    </div>
    <div class="usage-card">
      <h4><!-- 사용 사례 B --></h4>
      <ul>
        <li><!-- 항목 --></li>
      </ul>
    </div>
  </div>
  <div class="tip-box">
    <strong>팁:</strong> <!-- 팁 내용 -->
  </div>
</section>

<!-- TAB 4: 퀴즈 -->
<section class="panel" id="panel-quiz" role="tabpanel">
  <div id="quizArea"></div>
</section>

<script>
// ── Tab Switching ──────────────────────────────
document.querySelectorAll(".tab").forEach(function(tab) {
  tab.addEventListener("click", function() {
    document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("is-active"); });
    document.querySelectorAll(".panel").forEach(function(p) { p.classList.remove("is-active"); });
    tab.classList.add("is-active");
    document.getElementById("panel-" + tab.dataset.tab).classList.add("is-active");
  });
});

// ── Quiz Engine (Safe DOM methods) ────────────
function initQuiz(questions) {
  var container = document.getElementById("quizArea");
  var score = 0, answered = 0;
  var scoreDiv = null; // track score section for updates

  // Progress indicator
  var progress = document.createElement("div");
  progress.className = "quiz-progress";
  progress.textContent = "문제 0 / " + questions.length + " \u00b7 점수 0점";
  container.appendChild(progress);

  questions.forEach(function(q, qi) {
    var div = document.createElement("div");
    div.className = "quiz-question";

    var heading = document.createElement("h4");
    heading.textContent = "Q" + (qi + 1) + ". " + q.question;
    div.appendChild(heading);

    var fb = document.createElement("div");
    fb.className = "quiz-feedback";

    q.options.forEach(function(opt, oi) {
      var btn = document.createElement("button");
      btn.className = "quiz-option";
      btn.textContent = opt;
      btn.addEventListener("click", function() {
        if (btn.disabled) return;
        div.querySelectorAll(".quiz-option").forEach(function(b) { b.disabled = true; });
        answered++;
        if (oi === q.answer) {
          btn.classList.add("correct");
          fb.className = "quiz-feedback show correct-fb";
          fb.textContent = "\u2705 " + q.explanation;
          score++;
        } else {
          btn.classList.add("wrong");
          div.querySelectorAll(".quiz-option")[q.answer].classList.add("correct");
          fb.className = "quiz-feedback show wrong-fb";
          fb.textContent = "\u274c " + q.explanation;

          // Add retry button for wrong answers
          var retryBtn = document.createElement("button");
          retryBtn.className = "quiz-retry";
          retryBtn.style.cssText = "margin-top:10px;font-size:.82rem;padding:7px 18px";
          retryBtn.textContent = "다시 풀기";
          retryBtn.addEventListener("click", function() {
            // Reset this question
            answered--;
            div.querySelectorAll(".quiz-option").forEach(function(b) {
              b.disabled = false;
              b.classList.remove("wrong", "correct");
            });
            fb.className = "quiz-feedback";
            fb.textContent = "";
            retryBtn.remove();
            // Remove score section if it was shown
            if (scoreDiv) { scoreDiv.remove(); scoreDiv = null; }
            progress.textContent = "문제 " + answered + " / " + questions.length + " \u00b7 점수 " + score + "점";
          });
          fb.appendChild(retryBtn);
        }
        progress.textContent = "문제 " + answered + " / " + questions.length + " \u00b7 점수 " + score + "점";
        if (answered === questions.length) showScore();
      });
      div.appendChild(btn);
    });

    div.appendChild(fb);
    container.appendChild(div);
  });

  function showScore() {
    // Remove previous score section if exists (e.g. after retry)
    if (scoreDiv) { scoreDiv.remove(); scoreDiv = null; }

    scoreDiv = document.createElement("div");
    scoreDiv.className = "quiz-score";

    var emoji = document.createElement("div");
    emoji.style.cssText = "font-size:36px;margin-bottom:8px";
    emoji.textContent = score === questions.length ? "\ud83c\udf89" : score >= Math.ceil(questions.length / 2) ? "\ud83d\udc4d" : "\ud83d\udcda";
    scoreDiv.appendChild(emoji);

    var result = document.createElement("div");
    result.style.cssText = "font-size:18px;font-weight:500;margin-bottom:6px";
    result.textContent = score + " / " + questions.length + " 정답";
    scoreDiv.appendChild(result);

    var msg = document.createElement("div");
    msg.style.cssText = "font-size:14px;color:var(--muted-strong);margin-bottom:16px";
    msg.textContent = score === questions.length ? "완벽합니다!" : "조금 더 연습하면 완벽해질 거예요!";
    scoreDiv.appendChild(msg);

    // Save button — sends result to parent for Notion sync
    var saveBtn = document.createElement("button");
    saveBtn.className = "quiz-retry";
    saveBtn.style.cssText = "background:rgba(10,132,255,.18);border-color:var(--key);margin-bottom:8px";
    saveBtn.textContent = "기록 저장하기";
    saveBtn.addEventListener("click", function() {
      try {
        var wid = new URLSearchParams(location.search).get("wid")
               || location.pathname.split("/").pop().replace(".html", "");
        window.parent.postMessage({
          type: "showme-quiz-complete",
          widgetId: wid,
          score: score,
          total: questions.length,
          pass: score >= Math.ceil(questions.length * 0.75)
        }, "*");
      } catch(e) {}
      saveBtn.textContent = "저장 완료!";
      saveBtn.disabled = true;
      saveBtn.style.opacity = ".5";
    });
    scoreDiv.appendChild(saveBtn);

    var retry = document.createElement("button");
    retry.className = "quiz-retry";
    retry.textContent = "처음부터 다시";
    retry.addEventListener("click", function() { location.reload(); });
    scoreDiv.appendChild(retry);

    container.appendChild(scoreDiv);
  }
}

// ── Widget-specific code below ────────────────
// Canvas 데모, 퀴즈 데이터 등을 여기에 작성

// 예시: 퀴즈 초기화
// initQuiz([
//   {
//     question: "질문 내용?",
//     options: ["보기 A", "보기 B", "보기 C", "보기 D"],
//     answer: 1,
//     explanation: "정답 설명"
//   }
// ]);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week — Blender Archive</title>
  <meta name="description" content="Blender Archive 기반 RPD 주차 페이지" />
  <link rel="stylesheet" href="assets/tokens.css" />
  <script>/* FOUC prevention */ (function(){var t=localStorage.getItem('rpd-theme');if(t)document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('rpd-lang');if(l){document.documentElement.lang=l;document.documentElement.setAttribute('data-lang',l);}})()</script>
  <style>
    /* ── Week-page specific styles ── */
    .hero {
      padding: 28px 0 8px;
      text-align: left;
    }
    .hero-card {
      display: grid;
      gap: 10px;
      justify-items: start;
      width: 100%;
    }
    .hero h1 {
      margin: 0; font-family: var(--font-display);
      font-size: clamp(1.42rem, 2.2vw, 1.9rem);
      font-weight: 620; letter-spacing: -.03em; line-height: 1.16;
    }
    .hero p {
      max-width: 720px; margin: 0;
      color: var(--muted); font-size: clamp(.9rem, 1.2vw, .96rem);
      line-height: 1.8; white-space: normal;
    }
    .hero-support {
      font-size: .78rem;
      color: var(--muted);
    }
    .learning-panel {
      display: grid;
      gap: 18px;
      padding: 18px 0 22px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .learning-panel-copy {
      display: grid;
      gap: 10px;
      max-width: 720px;
    }
    .learning-panel-title {
      margin: 0;
      font-size: clamp(1rem, 1.5vw, 1.18rem);
      font-weight: 620;
      letter-spacing: -.02em;
      line-height: 1.3;
    }
    .learning-panel-text {
      margin: 0;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.7;
    }
    .learning-panel-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .learning-panel-stat {
      display: grid;
      gap: 4px;
      padding: 12px 0;
      border-right: 1px solid var(--line);
    }
    .learning-panel-stat:last-child { border-right: none; }
    .learning-panel-stat strong {
      font-size: .96rem;
      font-weight: 620;
      letter-spacing: -.02em;
    }
    .learning-panel-stat span {
      font-size: .74rem;
      color: var(--muted);
    }


    /* Nav between weeks */
    .week-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 0 0;
      border-top: 1px solid var(--line);
      margin-bottom: 12px;
    }
    .week-nav a {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted-strong); font-size: .88rem;
      transition: color .14s;
    }
    .week-nav a:hover { color: var(--text); }

    /* Lab section */
    .lab { display: grid; gap: 16px; }
    .lab-note {
      display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px;
      padding: 12px 0;
      border-radius: 0;
      border: none;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: none;
      color: var(--muted-strong); font-size: .88rem;
    }
    .bundle-card {
      display: grid;
      gap: 18px;
      padding: 0 0 22px;
      border-radius: 0;
      border: none;
      border-bottom: 1px solid var(--line);
      background: none;
      box-shadow: none;
    }
    .bundle-copy {
      display: grid;
      gap: 10px;
      max-width: 760px;
    }
    .bundle-copy strong {
      font-size: .98rem;
      line-height: 1.42;
    }
    .bundle-copy p {
      margin: 0;
      color: var(--muted);
      line-height: 1.72;
      font-size: .92rem;
    }
    .bundle-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }
    .bundle-stat {
      display: grid;
      gap: 4px;
      padding: 14px 0;
      border-right: 1px solid var(--line);
      background: none;
    }
    .bundle-stat:last-child { border-right: none; }
    .bundle-stat strong {
      font-size: 1rem;
      font-weight: 620;
      letter-spacing: -.02em;
    }
    .bundle-stat span {
      font-size: .73rem;
      color: var(--muted);
    }
    .bundle-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .bundle-link {
      display: inline-flex;
      align-items: center;
      padding: 0;
      border-radius: 0;
      border: none;
      background: none;
      color: var(--muted);
      text-decoration: none;
      font-size: .78rem;
      transition: color .14s;
    }
    .bundle-link:hover {
      color: var(--text);
    }
    .section-head p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: .86rem;
    }

    /* Progress sticky */
    .progress-widget { min-width: min(380px, 44vw); }

    /* Text accent */
    .text-key { color: var(--key-soft); }

    /* Responsive */
    /* ── Content layout ── */
    .content-layout {
      width: min(calc(var(--max-width) + 120px), calc(100% - 32px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 36px;
      position: relative;
      align-items: start;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: sticky;
      top: 76px;
      width: 100%;
      height: calc(100vh - 88px);
      background: none;
      border-right: 1px solid var(--line);
      z-index: 20;
      padding: 12px 18px 32px 0;
      overflow-y: auto;
      transform: none;
      transition: none;
    }
    .sidebar.is-open { transform: none; }

    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 49;
    }
    .sidebar-overlay.is-visible { display: block; }

    .sidebar-nav { list-style: none; margin: 0; padding: 8px 0; }
    .sidebar-nav li a {
      display: block; padding: 7px 0 7px 14px;
      font-size: .84rem; color: var(--muted);
      border-left: 2px solid transparent;
      transition: color .14s, border-color .14s;
    }
    .sidebar-nav li a:hover {
      color: var(--text);
    }
    .sidebar-nav li.is-active a {
      color: var(--text); border-left-color: var(--key-soft);
    }
    .sidebar-nav .nav-section-label {
      display: block; padding: 14px 0 4px 14px;
      font-size: .72rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; font-weight: 600;
    }

    /* ── Sidebar toggle button ── */
    .sidebar-toggle {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--overlay-white);
      color: var(--muted-strong); cursor: pointer;
      transition: background .14s, color .14s; flex-shrink: 0;
    }
    .sidebar-toggle:hover { background: var(--overlay-white-hover); color: var(--text); }

    .brand-left { display: flex; align-items: center; gap: 10px; }
    .main-content { flex: 1; min-width: 0; }

    /* ── Show Me buttons ── */
    .showme-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 14px;
    }
    .btn-showme {
      position: relative;
      isolation: isolate;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 14px;
      border: 1px solid rgba(147,197,253,.22);
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.02)),
        linear-gradient(135deg, rgba(59,130,246,.18), rgba(14,165,233,.1));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 10px 28px rgba(4, 10, 24, .26),
        0 0 0 1px rgba(147,197,253,.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: var(--text); font: inherit; font-size: .81rem; font-weight: 600;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease, color .18s ease;
    }
    .btn-showme::after {
      content: "";
      position: absolute;
      inset: 1px 1px auto 1px;
      height: 48%;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.2), rgba(255,255,255,0));
      opacity: .75;
      pointer-events: none;
    }
    .btn-showme:hover {
      transform: translateY(-1px);
      border-color: rgba(147,197,253,.34);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        0 14px 32px rgba(4, 10, 24, .3),
        0 0 0 1px rgba(147,197,253,.1);
      color: #f8fbff;
    }
    .btn-showme.is-complete {
      border-color: rgba(52,211,153,.26);
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.02)),
        linear-gradient(135deg, rgba(16,185,129,.18), rgba(5,150,105,.1));
      color: #d1fae5;
    }
    .btn-showme.is-complete:hover {
      border-color: rgba(52,211,153,.34);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.2),
        0 14px 32px rgba(4, 10, 24, .28),
        0 0 0 1px rgba(52,211,153,.12);
    }
    .btn-showme.is-complete::before {
      content: "✓";
      display: inline-grid;
      place-items: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(16,185,129,.18);
      color: #a7f3d0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
      font-size: .72rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    /* ── Step accordion ── */
    .step-header { margin-bottom: 0; }
    .step-toggle {
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 0;
      border: none;
      background: none;
      color: inherit;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }
    .step-title-group { min-width: 0; }
    .step-title-text { line-height: 1.35; }
    .step-header-right {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .step-toggle-indicator {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      transition: transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease;
    }
    .step-toggle-indicator::before {
      content: "⌄";
      font-size: 1rem;
      line-height: 1;
      transform: translateY(-1px);
    }
    .step-toggle:hover .step-toggle-indicator {
      border-color: rgba(147,197,253,.22);
      background: rgba(10,132,255,.08);
      color: var(--key-soft);
    }
    .lab-step.is-expanded .step-toggle-indicator {
      transform: rotate(180deg);
      border-color: rgba(147,197,253,.22);
      background: rgba(10,132,255,.08);
      color: var(--key-soft);
    }
    .step-body {
      display: grid;
      gap: 0;
      margin-top: 14px;
    }
    .step-body[hidden] { display: none; }
    .lab-step.is-collapsed {
      padding-bottom: 18px;
    }

    /* ── Clip Player ── */
    .clip-player {
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--surface);
      overflow: hidden;
      margin-bottom: 14px;
    }
    .clip-player video {
      display: block; width: 100%;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      cursor: pointer;
    }
    .clip-tabs {
      display: flex; gap: 0;
      border-top: 1px solid var(--line);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .clip-tabs::-webkit-scrollbar { display: none; }
    .clip-tab {
      flex: 1; min-width: 0;
      padding: 9px 14px;
      font: inherit; font-size: .78rem; font-weight: 500;
      color: var(--muted);
      background: none; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      text-align: center;
      transition: color .14s, border-color .14s, background .14s;
    }
    .clip-tab:hover { color: var(--muted-strong); background: rgba(255,255,255,.03); }
    .clip-tab.is-active {
      color: var(--key-soft);
      border-bottom-color: var(--key);
      background: rgba(10,132,255,.04);
    }
    .clip-player-hint {
      font-size: .72rem; color: var(--muted);
      text-align: center; padding: 4px 0 6px;
    }

    /* ── Show Me Modal ── */
    .showme-overlay {
      display: none; position: fixed; inset: 0;
      z-index: 100;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(8px);
      justify-content: center; align-items: center;
      padding: 20px;
      overscroll-behavior: contain;
    }
    .showme-overlay.is-open { display: flex; }

    .showme-modal {
      width: min(1360px, 96vw);
      height: min(92vh, 920px);
      max-width: 100%;
      max-height: 100%;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line-strong);
      background: var(--surface);
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
      display: flex; flex-direction: column;
      overflow: hidden;
      animation: showme-in .22s ease;
      transition: width .25s ease, height .25s ease, border-radius .25s ease;
    }
    .showme-modal.is-maximized {
      width: 100vw; height: 100vh;
      border-radius: 0; border: none;
    }
    @keyframes showme-in {
      from { opacity: 0; transform: scale(.97) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .showme-modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      background: var(--surface);
    }
    .showme-modal-title {
      font-size: .9rem; font-weight: 600; color: var(--text);
      line-height: 1.35;
      min-width: 0;
    }
    .showme-header-actions {
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .showme-browse-toggle,
    .showme-resize,
    .showme-close {
      display: grid; place-items: center;
      width: 44px; height: 44px; border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--overlay-white);
      color: var(--muted-strong); cursor: pointer;
      transition: background .14s, color .14s, border-color .14s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .showme-browse-toggle:hover,
    .showme-resize:hover,
    .showme-close:hover {
      background: var(--overlay-white-hover); color: var(--text);
    }
    .showme-browse-toggle.is-active {
      border-color: rgba(10,132,255,.34);
      background: rgba(10,132,255,.1);
      color: var(--key-soft);
    }
    .showme-resize .icon-restore { display: none; }
    .is-maximized .showme-resize .icon-maximize { display: none; }
    .is-maximized .showme-resize .icon-restore { display: block; }
    .showme-modal-body {
      display: grid;
      grid-template-columns: 0 minmax(0, 1fr);
      flex: 1;
      min-height: 0;
      position: relative;
      transition: grid-template-columns .24s ease;
    }
    .showme-modal.is-browser-open .showme-modal-body {
      grid-template-columns: minmax(300px, 332px) minmax(0, 1fr);
    }
    .showme-browser {
      min-width: 0;
      border-right: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        radial-gradient(circle at top left, rgba(10,132,255,.09), transparent 42%);
      overflow: hidden auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }
    .showme-modal.is-browser-open .showme-browser {
      opacity: 1;
      pointer-events: auto;
    }
    .showme-browser-header {
      display: grid;
      gap: 10px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,.08);
      position: sticky;
      top: 0;
      z-index: 1;
      backdrop-filter: blur(10px);
    }
    .showme-browser-search {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line-strong);
      background: rgba(255,255,255,.04);
      color: var(--text);
      font: inherit;
      font-size: .86rem;
      outline: none;
    }
    .showme-browser-search:focus {
      border-color: rgba(10,132,255,.42);
    }
    .showme-browser-search::placeholder {
      color: var(--muted);
    }
    .showme-browser-library-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      color: var(--key-soft);
      font-size: .8rem;
      text-decoration: none;
    }
    .showme-browser-library-link:hover {
      color: #cbe4ff;
    }
    .showme-browser-content {
      display: grid;
      gap: 16px;
      padding: 16px;
    }
    .showme-browser-section {
      display: grid;
      gap: 8px;
    }
    .showme-browser-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .showme-browser-section-title {
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .showme-browser-section-count {
      font-size: .74rem;
      color: var(--muted);
    }
    .showme-browser-list {
      display: grid;
      gap: 8px;
    }
    .showme-browser-item {
      display: grid;
      gap: 4px;
      width: 100%;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color .14s ease, background .14s ease, transform .14s ease;
      font: inherit;
    }
    .showme-browser-item:hover {
      border-color: rgba(10,132,255,.34);
      background: rgba(10,132,255,.08);
      transform: translateY(-1px);
    }
    .showme-browser-item.is-active {
      border-color: rgba(10,132,255,.46);
      background: rgba(10,132,255,.12);
      box-shadow: inset 0 0 0 1px rgba(10,132,255,.12);
    }
    .showme-browser-item-label {
      font-size: .85rem;
      font-weight: 590;
      line-height: 1.45;
    }
    .showme-browser-item-meta {
      font-size: .74rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .showme-browser-empty {
      padding: 12px 2px 4px;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.6;
    }
    .showme-browser-backdrop {
      display: none;
    }
    .showme-viewer {
      min-width: 0;
      min-height: 0;
      display: flex;
    }
    .showme-iframe {
      flex: 1; width: 100%; border: none;
      background: var(--bg);
      min-height: 0;
    }

    @media (max-width: 768px) {
      .showme-overlay { padding: 0; }
      .showme-modal {
        width: 100%;
        height: 100dvh;
        min-height: 100dvh;
        border-radius: 0; border: none;
      }
      .showme-modal.is-maximized {
        width: 100%;
        height: 100dvh;
      }
      .showme-modal-header {
        padding-top: calc(14px + env(safe-area-inset-top, 0px));
        padding-right: calc(18px + env(safe-area-inset-right, 0px));
        padding-left: calc(18px + env(safe-area-inset-left, 0px));
      }
      .showme-resize { display: none; }
    }
    @media (max-width: 980px) {
      .showme-modal-body {
        display: block;
      }
      .showme-browser {
        position: absolute;
        inset: 0 auto 0 0;
        width: min(86vw, 340px);
        max-width: 100%;
        border-right: 1px solid var(--line);
        box-shadow: 18px 0 42px rgba(0,0,0,.32);
        transform: translateX(-100%);
        transition: transform .24s ease, opacity .18s ease;
        z-index: 2;
      }
      .showme-modal.is-browser-open .showme-browser {
        transform: translateX(0);
      }
      .showme-browser-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,.4);
        z-index: 1;
      }
      .showme-modal.is-browser-open .showme-browser-backdrop {
        display: block;
      }
      .showme-viewer {
        height: 100%;
      }
    }

    /* ── Student Login Overlay ───────────────────── */
    .student-login-overlay {
      position: fixed; inset: 0; z-index: 120;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .student-login-overlay.is-hidden { display: none; }
    .student-login-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      width: min(380px, 90vw);
      text-align: center;
    }
    .student-login-card h2 { margin: 0 0 6px; font-size: 1.2rem; }
    .student-login-card .login-subtitle {
      margin: 0 0 22px; font-size: .88rem; color: var(--muted-strong);
    }
    .student-login-input {
      width: 100%; padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--bg); color: var(--text);
      font-size: 1.1rem; text-align: center;
      letter-spacing: .1em; box-sizing: border-box;
      font-variant-numeric: tabular-nums;
    }
    .student-login-input:focus { outline: none; border-color: var(--key); }
    .student-login-preview {
      margin: 14px 0 0; min-height: 44px; padding: 10px;
      border-radius: var(--radius); font-size: .9rem;
    }
    .student-login-preview.is-match {
      background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.25); color: #34d399;
    }
    .student-login-preview.is-nomatch {
      background: rgba(239,68,68,.06); border: 1px solid rgba(239,68,68,.15); color: #f87171;
      font-size: .82rem;
    }
    .student-login-preview .login-btn {
      display: inline-block; margin-top: 10px; padding: 9px 28px;
      border-radius: var(--radius-sm); border: none;
      background: var(--key); color: #fff;
      font-size: .88rem; font-weight: 600; cursor: pointer;
    }
    .student-login-preview .login-btn:hover { filter: brightness(1.1); }
    /* ── Student badge (topbar) ──────────────────── */
    .student-badge {
      display: none; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: var(--radius-sm);
      background: var(--surface-strong); border: 1px solid var(--line);
      font-size: .76rem; color: var(--muted-strong); cursor: pointer;
      white-space: nowrap; transition: background .14s;
    }
    .student-badge.is-active { display: inline-flex; }
    .student-badge:hover { background: var(--overlay-white-hover); }
    /* ── Guest button ── */
    .guest-btn {
      display: block; width: 100%; margin-top: 14px;
      padding: 9px 0; border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--surface-strong); color: var(--muted);
      font-size: .82rem; cursor: pointer;
      transition: color .14s, border-color .14s;
    }
    .guest-btn:hover { color: var(--text); border-color: var(--line-strong); }
    /* ── Reference tabs (topbar) ──────────────────── */
    .ref-tabs {
      display: flex; align-items: center; gap: 12px;
    }
    .ref-tab {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 0;
      border-radius: 0;
      background: none;
      border: none;
      font-size: .78rem; color: var(--muted);
      text-decoration: none; white-space: nowrap;
      transition: color .14s;
    }
    .ref-tab:hover {
      color: var(--text);
    }
    @media (max-width: 600px) { .ref-tabs { display: none; } }

    @media (max-width: 980px) {
      .content-layout {
        width: calc(100% - 20px);
        grid-template-columns: 1fr;
        gap: 0;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 80vw;
        max-width: 300px;
        height: 100vh;
        background: var(--surface);
        padding: 72px 0 24px;
        border-right: 1px solid var(--line);
        transform: translateX(-100%);
        transition: transform .26s cubic-bezier(.4,0,.2,1);
        z-index: 50;
      }
      .sidebar.is-open { transform: translateX(0); }
      .sidebar-nav li a {
        padding: 8px 20px;
      }
      .sidebar-nav .nav-section-label {
        padding: 14px 20px 4px;
      }
      .sidebar-toggle {
        display: flex;
      }
      .bundle-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .learning-panel-stats {
        grid-template-columns: 1fr;
      }
      .learning-panel-stat {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }
      .learning-panel-stat:last-child { border-bottom: none; }
    }
    @media (min-width: 981px) {
      .sidebar-toggle {
        display: none;
      }
      .main-content {
        padding-bottom: 40px;
      }
    }
    @media (max-width: 720px) {
      .hero {
        padding-top: 72px;
      }
    }
  </style>
</head>

               type="text" placeholder="이름 없이 사용 가능" maxlength="32" inputmode="text"
               autocomplete="off">

  <script src="data/i18n-content.js?v=20260318e"></script>
  <script src="assets/i18n.js?v=20260318d"></script>
  <script src="assets/showme/_registry.js?v=20260318c"></script>
  <script src="assets/showme/_catalog.js?v=20260318c"></script>
  <script src="assets/showme/_supplements.js?v=20260318c"></script>
  <script src="assets/showme/_helpers.js?v=20260318c"></script>
  <script src="data/curriculum.js?v=20260318c"></script>
  <script>
    // ════════════════════════════════════════════════
    //  Week page template engine
    //  URL: week.html?week=2  →  renders Week 02 data
    // ════════════════════════════════════════════════

    const params = new URLSearchParams(location.search);
    const weekNum = parseInt(params.get("week") || "1", 10);
    const requestedShowMeId = params.get("showme") || "";
    const weekData = CURRICULUM.find(w => w.week === weekNum);
    const storageKey = `blender2026-week${weekNum}-v1`;
    var pendingShowMeFromUrl = !!requestedShowMeId;

    function getWeekText() {
      return window.RPDI18n.getStrings("week");
    }

    function getShowMeMeta(widgetId) {
      var meta = getShowMeEntry(widgetId);
      return Object.assign({}, meta, {
        label: window.RPDI18n.getShowMeLabel(widgetId, meta)
      });
    }

    function buildWeekBundle(w) {
      var showMeIds = {};
      var taskCount = 0;

      (w.steps || []).forEach(function(step) {
        taskCount += (step.tasks || []).length;
        collectShowMeIdsFromStep(step).forEach(function(id) {
          showMeIds[id] = true;
        });
      });

      return {
        practiceCount: (w.steps || []).length,
        showMeCount: Object.keys(showMeIds).length,
        taskCount: taskCount,
        referenceCount: (w.docs || []).length + (w.videos || []).length + (w.shortcuts || []).length
      };
    }

    function applyWeekChrome() {
      var text = getWeekText();
      document.getElementById("sidebarToggle").setAttribute("aria-label", text.sidebarToggleAria);
      document.getElementById("brandMeta").textContent = text.brandMeta;
      document.getElementById("refShortcutsLink").textContent = text.shortcutsLink;
      document.getElementById("refAiLink").textContent = text.aiRefsLink;
      document.getElementById("refBlenderLink").textContent = text.blenderRefsLink;
      document.getElementById("themeToggle").setAttribute("aria-label", text.themeToggleAria);
      document.getElementById("progressLabel").textContent = text.progressLabel;
      document.getElementById("resetBtn").textContent = text.resetButton;
      document.getElementById("footerHomeLink").textContent = text.footerHome;
      document.getElementById("footerLibraryLink").textContent = text.footerLibrary;
      document.getElementById("showmeBrowseToggle").setAttribute("aria-label", text.modalBrowseToggleAria);
      document.getElementById("showmeResize").setAttribute("aria-label", text.modalResizeAria);
      document.getElementById("showmeClose").setAttribute("aria-label", text.modalCloseAria);
      document.getElementById("showmeIframe").setAttribute("title", text.showmeFrameTitle);
      document.getElementById("showmeBrowserSearch").setAttribute("aria-label", text.modalBrowseSearchAria);
      document.getElementById("showmeBrowserSearch").setAttribute("placeholder", text.modalBrowseSearchPlaceholder);
      document.getElementById("showmeBrowserLibraryLink").textContent = text.modalBrowseLibraryLink;
      document.getElementById("studentLoginTitle").textContent = text.loginTitle;
      document.getElementById("studentLoginSubtitle").textContent = text.loginSubtitle;
      document.getElementById("studentLoginInput").setAttribute("placeholder", text.loginPlaceholder);
      document.getElementById("guestBrowseBtn").textContent = text.guestBrowse;
      var meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute("content", text.metaDescription);
    }

    function renderMissingWeek() {
      var text = getWeekText();
      document.title = text.pageTitlePrefix + " - RPD";
      document.getElementById("brandBadge").textContent = "—";
      document.getElementById("brandTitle").textContent = text.brandLoading;
      document.getElementById("pageContent").innerHTML = `
        <section style="padding:80px 0;text-align:center;color:var(--muted)">
          <p>${text.notFound} <a href="index.html" style="color:var(--key-soft)">${text.notFoundBack}</a></p>
        </section>`;
    }

    function renderWeekPage() {
      applyWeekChrome();
      if (!weekData) {
        renderMissingWeek();
        return;
      }
      buildPage(window.RPDI18n.localizeWeekData(weekData));
      renderShowMeBrowser();
      updateShowMeBadges();
      maybeOpenRequestedShowMe();
    }

    if (weekData) initStudentLogin();
    window.RPDI18n.mountLanguageSwitcher(document.getElementById("langSwitcher"));
    window.RPDI18n.onLanguageChange(function() {
      renderWeekPage();
      refreshOpenShowMe();
    });

    function buildPage(w) {
      var text = getWeekText();
      var bundle = buildWeekBundle(w);
      document.title = `Week ${w.week} — ${w.title} | Blender Archive`;
      document.getElementById("brandBadge").textContent = String(w.week).padStart(2, "0");
      document.getElementById("brandTitle").textContent = `Week ${String(w.week).padStart(2, "0")} · ${w.title}`;

      var prev = CURRICULUM.find(function(item) { return item.week === w.week - 1; });
      var next = CURRICULUM.find(function(item) { return item.week === w.week + 1; });
      var prevLink = prev
        ? `<a href="week.html?week=${prev.week}">← Week ${prev.week}</a>`
        : `<a href="index.html">${text.homeLabel}</a>`;
      var nextLink = next
        ? `<a href="week.html?week=${next.week}">Week ${next.week} →</a>`
        : `<span style="opacity:.4">${text.lastWeek}</span>`;

      var videos = w.videos || [];
      var docs = w.docs || [];

      var stepsHtml = w.steps.map(function(step, idx) {
        var initiallyExpanded = idx === 0;
        var tasks = Array.isArray(step.tasks) ? step.tasks : [];
        var taskItems = tasks.map(function(task) {
          return `
            <div class="task-item">
              <input id="${task.id}" type="checkbox" data-task-id="${task.id}" />
              <label for="${task.id}">
                <strong>${task.label}</strong>
                ${task.detail ? `<small>${task.detail}</small>` : ""}
              </label>
            </div>`;
        }).join("");

        var showmeHtml = (function() {
          var ids = collectShowMeIdsFromStep(step);
          if (!ids.length) return "";
          return `<div class="showme-buttons">${ids.map(function(id) {
            var meta = getShowMeMeta(id);
            return `<button class="btn btn-showme" type="button" data-widget-id="${id}" onclick="openShowMe('${id}')">${meta.icon} ${meta.label}</button>`;
          }).join("")}</div>`;
        }());

        var sectionDivider = step.sectionTitle
          ? `<div class="step-section-divider"><span>${step.sectionTitle}</span></div>` : "";

        return `
          ${sectionDivider}
          <article class="lab-step ${initiallyExpanded ? "is-expanded" : "is-collapsed"}" id="step-${idx}" data-step-index="${idx}">
            <div class="step-header">
              <button
                class="step-toggle"
                type="button"
                data-step-toggle
                aria-expanded="${initiallyExpanded ? "true" : "false"}"
                aria-label="${initiallyExpanded ? text.stepToggleCollapse : text.stepToggleExpand}"
                aria-controls="step-body-${idx}">
                <div class="step-title-group">
                  <div class="step-number">${idx + 1}</div>
                  <strong class="step-title-text">${step.title}</strong>
                </div>
                <div class="step-header-right">
                  <div class="status-pill active" data-step-status>${text.stepStatusActive}</div>
                  <span class="step-toggle-indicator" aria-hidden="true"></span>
                </div>
              </button>
            </div>
            <div class="step-body" id="step-body-${idx}" data-step-body ${initiallyExpanded ? "" : "hidden"}>
              ${step.images && step.images.length
                ? `<div class="step-images">${step.images.map(function(img, imageIndex) {
                    return `<img src="${img}" alt="${step.title} ${imageIndex + 1}" class="step-image" loading="lazy" />`;
                  }).join("")}</div>`
                : step.image ? `<figure class="step-image-wrap">
                    <img src="${step.image}" alt="${step.title}" class="step-image" loading="lazy" />
                    ${step.link ? `<figcaption><a href="${step.link}" target="_blank" rel="noopener noreferrer" class="doc-link">${text.sectionDocs} →</a></figcaption>` : ""}
                  </figure>` : ""}
              ${step.video ? `<video class="step-video" controls preload="metadata"><source src="${step.video}" type="video/mp4" /><source src="${step.video}" type="video/quicktime" /></video>` : ""}
              ${step.clips && step.clips.length ? `
                <div class="clip-player" data-step-clips>
                  <video src="${step.clips[0].src}" autoplay loop muted playsinline
                         onclick="this.paused ? this.play() : this.pause()"
                         title="${text.clipTitle}"></video>
                  ${step.clips.length > 1 ? `
                    <div class="clip-tabs">${step.clips.map(function(clip, clipIndex) {
                      return `<button class="clip-tab${clipIndex === 0 ? " is-active" : ""}" type="button"
                               data-clip-src="${clip.src}" data-clip-idx="${clipIndex}">${clip.label}</button>`;
                    }).join("")}</div>` : ""}
                  <div class="clip-player-hint">${text.clipHint}</div>
                </div>` : ""}
              ${step.downloads && step.downloads.length ? `<div class="step-downloads">${step.downloads.map(function(download) {
                return `<a class="step-dl-btn" href="${download.url}" download="${download.url.split("/").pop()}" target="_blank" rel="noopener">⬇ ${download.label}</a>`;
              }).join("")}</div>` : ""}
              <p class="step-copy">${step.copy}</p>
              ${showmeHtml}
              ${taskItems ? `<div class="task-list">${taskItems}</div>` : ""}
            </div>
          </article>`;
      }).join("");

      var mistakesHtml = w.mistakes.length > 0 ? `
        <section class="content-block" id="section-mistakes">
          <div class="section-head"><h3>${text.sectionMistakes}</h3></div>
          <details class="card mistakes-section" open>
            <summary>${text.sectionMistakesSummary}</summary>
            <ul>${w.mistakes.map(function(mistake) { return `<li>${mistake}</li>`; }).join("")}</ul>
          </details>
        </section>` : "";

      function renderResourceSection(title, icon, items) {
        return items.length > 0 ? `
          <section class="content-block">
            <div class="section-head"><h3>${title}</h3></div>
            <div class="doc-links-row">
              ${items.map(function(item) {
                return `
                  <a class="doc-link" href="${item.url}" target="_blank" rel="noopener noreferrer">
                    ${icon} ${item.title} ↗
                  </a>`;
              }).join("")}
            </div>
          </section>` : "";
      }

      var videosHtml = renderResourceSection(text.sectionVideos, "▶", videos);
      var docsHtml = renderResourceSection(text.sectionDocs, "📄", docs);
      var assignmentChecklist = w.assignment.checklist.map(function(item) { return `<li>${item}</li>`; }).join("");
      var assignmentHtml = `
        <section class="content-block" id="section-assignment">
          <div class="section-head"><h3>${text.sectionAssignment}</h3></div>
          <div class="card assignment-card">
            <div class="card-chip">${text.assignmentChip}</div>
            <strong>${w.assignment.title}</strong>
            <p style="color:var(--muted);line-height:1.72;margin:0">${w.assignment.description}</p>
            <ul>${assignmentChecklist}</ul>
          </div>
        </section>`;

      var shortcutsHtml = (w.shortcuts && w.shortcuts.length > 0) ? `
        <section class="content-block" id="section-shortcuts">
          <div class="section-head">
            <h3>${text.sectionShortcuts}</h3>
            <p>${text.sectionShortcutsDesc}</p>
          </div>
          <div class="card shortcut-table-wrap">
            <table class="shortcut-table">
              <thead><tr><th>${text.shortcutsHeaderKeys}</th><th>${text.shortcutsHeaderAction}</th></tr></thead>
              <tbody>
                ${w.shortcuts.map(function(shortcut) {

    function setStepExpanded(step, expanded) {
      var text = getWeekText();
      var toggle = step.querySelector("[data-step-toggle]");
      var body = step.querySelector("[data-step-body]");
      if (!toggle || !body) return;
      var nextExpanded = Boolean(expanded);

      step.classList.toggle("is-collapsed", !nextExpanded);
      toggle.setAttribute("aria-expanded", nextExpanded ? "true" : "false");

      body.hidden = !nextExpanded;

    function initStepAccordion() {
      var steps = Array.from(document.querySelectorAll(".lab-step"));
      if (!steps.length) return;

      var firstIncompleteIndex = steps.findIndex(function(step) {
        return !step.classList.contains("is-complete");
      });
      var defaultOpenIndex = firstIncompleteIndex === -1 ? 0 : firstIncompleteIndex;

      steps.forEach(function(step, idx) {
        var toggle = step.querySelector("[data-step-toggle]");
        if (!toggle) return;
        setStepExpanded(step, idx === defaultOpenIndex);
        toggle.addEventListener("click", function() {
          setStepExpanded(step, step.classList.contains("is-collapsed"));
        });
      });

      document.querySelectorAll('a[href^="#step-"]').forEach(function(link) {
        link.addEventListener("click", function() {

        });

    function initProgress() {
      var text = getWeekText();
      var steps = Array.from(document.querySelectorAll(".lab-step"));
      var progressFill = document.getElementById("progressFill");
      var progressCount = document.getElementById("progressCount");
      var resetBtn = document.getElementById("resetBtn");

      function readState() {
        try { return JSON.parse(localStorage.getItem(storageKey) || "{}"); }
        catch (error) { return {}; }
      }

      function writeState(state) {
        localStorage.setItem(storageKey, JSON.stringify(state));
      }

      function getTasks(step) {
        return Array.from(step.querySelectorAll("input[type='checkbox'][data-task-id]"));
      }

      function isComplete(step) {
        return getTasks(step).every(function(task) { return task.checked; });
      }

      function updateStep(step) {
        var pill = step.querySelector("[data-step-status]");
        var complete = isComplete(step);
        step.classList.toggle("is-complete", complete);
        if (complete) {
          pill.textContent = text.stepStatusComplete;
          pill.className = "status-pill complete";
        } else {
          pill.textContent = text.stepStatusActive;
          pill.className = "status-pill active";
        }
      }

      function sync() {
        var completed = steps.filter(isComplete).length;
        var pct = steps.length ? (completed / steps.length) * 100 : 0;
        progressFill.style.width = `${pct}%`;
        progressCount.textContent = `${completed} / ${steps.length}`;
        steps.forEach(updateStep);
      }

      var state = readState();
      steps.forEach(function(step) {
        getTasks(step).forEach(function(task) {
          task.checked = Boolean(state[task.dataset.taskId]);
          task.addEventListener("change", function() {
            var nextState = readState();
            nextState[task.dataset.taskId] = task.checked;
            writeState(nextState);
            sync();
          });
        });
      });

      resetBtn.onclick = function() {
        localStorage.removeItem(storageKey);
        steps.forEach(function(step) {
          getTasks(step).forEach(function(task) { task.checked = false; });
        });
        sync();
      };

      sync();
    }

    var showMeLastTrigger = null;

    function getWeekShowMeIds() {
      var ids = [];
      var seen = {};
      if (!weekData || !Array.isArray(weekData.steps)) return ids;
      weekData.steps.forEach(function(step) {
        collectShowMeIdsFromStep(step).forEach(function(id) {
          if (!id || seen[id]) return;
          seen[id] = true;
          ids.push(id);
        });
      });
      return ids;
    }

    function buildShowMeBrowserCard(id) {
      var meta = getShowMeMeta(id);
      var keywords = Array.isArray(meta.keywords) ? meta.keywords : [];
      var prerequisites = Array.isArray(meta.prerequisites) ? meta.prerequisites : [];
      var manualSectionMap = window.SHOWME_CATALOG && window.SHOWME_CATALOG.manualSectionMap
        ? window.SHOWME_CATALOG.manualSectionMap
        : {};
      return {
        id: id,
        icon: meta.icon || "📖",
        label: meta.label || id,
        canonicalLabel: meta.label || id,
        category: meta.category || "",
        stageLabel: meta.stageLabel || "",
        keywords: keywords,
        prerequisites: prerequisites,
        manualSection: manualSectionMap[id] || "",
        searchText: [
          id,
          meta.label,
          meta.category,
          meta.stageLabel,
          meta.confusionLabel,
          meta.audienceNeed,
          keywords.join(" "),
          prerequisites.join(" ")
        ].join(" ").toLowerCase()
      };
    }

    function sortShowMeBrowserCards(cards) {
      return cards.slice().sort(function(a, b) {
        return a.label.localeCompare(b.label, window.RPDI18n.getLanguage(), { sensitivity: "base" });
      });
    }

    function getAllShowMeBrowserCards() {
      return sortShowMeBrowserCards(Object.keys(SHOWME_REGISTRY || {}).map(buildShowMeBrowserCard));
    }

    function getSharedShowMeTermScore(baseCard, candidateCard) {
      var score = 0;
      var baseTerms = {};
      []
        .concat(baseCard.keywords || [])
        .concat(baseCard.prerequisites || [])
        .concat((baseCard.canonicalLabel || "").split(/[\s/,-]+/))
        .forEach(function(term) {
          var normalized = String(term || "").trim().toLowerCase();
          if (normalized.length >= 3) baseTerms[normalized] = true;
        });

      []
        .concat(candidateCard.keywords || [])
        .concat(candidateCard.prerequisites || [])
        .concat((candidateCard.canonicalLabel || "").split(/[\s/,-]+/))
        .forEach(function(term) {
          var normalized = String(term || "").trim().toLowerCase();
          if (baseTerms[normalized]) score += 1;
        });

      return score;
    }

    function getRelatedShowMeCards(widgetId, weekIdSet, limit) {
      var current = buildShowMeBrowserCard(widgetId);
      return getAllShowMeBrowserCards()
        .filter(function(card) {
          return card.id !== widgetId && !weekIdSet[card.id];
        })
        .map(function(card) {
          var score = 0;
          if (card.category && current.category && card.category === current.category) score += 5;
          if (card.manualSection && current.manualSection && card.manualSection === current.manualSection) score += 3;
          if (card.stageLabel && current.stageLabel && card.stageLabel === current.stageLabel) score += 1;
          score += getSharedShowMeTermScore(current, card);
          return { card: card, score: score };
        })
        .filter(function(item) { return item.score > 0; })
        .sort(function(a, b) {
          if (b.score !== a.score) return b.score - a.score;
          return a.card.label.localeCompare(b.card.label, window.RPDI18n.getLanguage(), { sensitivity: "base" });
        })
        .slice(0, limit || 8)
        .map(function(item) { return item.card; });
    }

    function matchesShowMeBrowserQuery(card, query) {
      return !query || card.searchText.indexOf(query) !== -1;
    }

    function createShowMeBrowserItem(card) {
      var button = document.createElement("button");
      button.type = "button";
      button.className = "showme-browser-item" + (card.id === activeShowMeWidgetId ? " is-active" : "");

      var label = document.createElement("span");
      label.className = "showme-browser-item-label";
      label.textContent = card.icon + " " + card.label;
      button.appendChild(label);

      var meta = document.createElement("span");
      meta.className = "showme-browser-item-meta";
      meta.textContent = [card.category, card.stageLabel].filter(Boolean).join(" · ");
      button.appendChild(meta);

      button.addEventListener("click", function() {
        openShowMe(card.id);
      });
      return button;
    }

    function appendShowMeBrowserSection(container, title, cards) {
      if (!cards.length) return false;

      var section = document.createElement("section");
      section.className = "showme-browser-section";

      var head = document.createElement("div");
      head.className = "showme-browser-section-head";

      var heading = document.createElement("div");
      heading.className = "showme-browser-section-title";
      heading.textContent = title;
      head.appendChild(heading);

      var count = document.createElement("span");
      count.className = "showme-browser-section-count";
      count.textContent = cards.length;
      head.appendChild(count);

      section.appendChild(head);

      var list = document.createElement("div");
      list.className = "showme-browser-list";
      cards.forEach(function(card) {
        list.appendChild(createShowMeBrowserItem(card));
      });
      section.appendChild(list);

      container.appendChild(section);
      return true;
    }

    function setShowMeBrowserOpen(nextOpen) {
      var modal = document.querySelector(".showme-modal");
      var browser = document.getElementById("showmeBrowser");
      var toggle = document.getElementById("showmeBrowseToggle");
      if (!modal || !browser || !toggle) return;
      showMeBrowserOpen = Boolean(nextOpen);
      modal.classList.toggle("is-browser-open", showMeBrowserOpen);
      browser.setAttribute("aria-hidden", showMeBrowserOpen ? "false" : "true");
      toggle.classList.toggle("is-active", showMeBrowserOpen);
      toggle.setAttribute("aria-pressed", showMeBrowserOpen ? "true" : "false");

    function renderShowMeBrowser() {
      var text = getWeekText();
      var container = document.getElementById("showmeBrowserContent");
      var link = document.getElementById("showmeBrowserLibraryLink");
      if (!container || !link) return;

      link.textContent = text.modalBrowseLibraryLink;
      link.href = activeShowMeWidgetId
        ? "library.html?showme=" + encodeURIComponent(activeShowMeWidgetId)
        : "library.html";

      container.textContent = "";
      if (!weekData) return;

      var query = showMeBrowserQuery.trim().toLowerCase();
      var weekIds = getWeekShowMeIds();
      var weekIdSet = {};
      weekIds.forEach(function(id) { weekIdSet[id] = true; });

      if (query) {
        var results = getAllShowMeBrowserCards()
          .filter(function(card) { return matchesShowMeBrowserQuery(card, query); })
          .sort(function(a, b) {
            if (weekIdSet[a.id] !== weekIdSet[b.id]) return weekIdSet[a.id] ? -1 : 1;
            return a.label.localeCompare(b.label, window.RPDI18n.getLanguage(), { sensitivity: "base" });
          })
          .slice(0, 24);

        if (!appendShowMeBrowserSection(container, text.modalBrowseResults, results)) {
          var empty = document.createElement("div");
          empty.className = "showme-browser-empty";
          empty.textContent = text.modalBrowseEmpty;
          container.appendChild(empty);
        }
        return;
      }

      var weekCards = sortShowMeBrowserCards(weekIds.map(buildShowMeBrowserCard));
      var relatedCards = activeShowMeWidgetId
        ? getRelatedShowMeCards(activeShowMeWidgetId, weekIdSet, 8)
        : [];
      var hasContent = false;
      hasContent = appendShowMeBrowserSection(container, text.modalBrowseCurrent, weekCards) || hasContent;
      hasContent = appendShowMeBrowserSection(container, text.modalBrowseRelated, relatedCards) || hasContent;

      if (!hasContent) {
        var fallback = document.createElement("div");
        fallback.className = "showme-browser-empty";
        fallback.textContent = text.modalBrowseEmpty;
        container.appendChild(fallback);
      }
    }

    function openShowMe(widgetId) {
      var overlay = document.getElementById("showmeOverlay");
      var iframe = document.getElementById("showmeIframe");
      var title = document.getElementById("showmeTitle");
      var closeBtn = document.getElementById("showmeClose");
      var meta = getShowMeMeta(widgetId);
      var cacheBust = String(Date.now());
      var active = document.activeElement;
      var wasOpen = overlay.classList.contains("is-open");
      showMeLastTrigger = active && active !== document.body ? active : null;
      activeShowMeWidgetId = widgetId;
      syncShowMeQuery(widgetId);

      title.textContent = meta.icon + " " + meta.label;
      renderShowMeBrowser();
      setShowMeBrowserOpen(showMeBrowserOpen);
      iframe.onload = function() {
        normalizeShowMeLayout(iframe);
        injectShowMeSupplement(iframe, widgetId);
        window.RPDI18n.localizeShowMeIframe(iframe, widgetId);
      };
      iframe.src = "assets/showme/" + widgetId + ".html?wid=" + encodeURIComponent(widgetId) + "&v=" + cacheBust;
      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden", "false");
      if (wasOpen && window.innerWidth < 980) {
        setShowMeBrowserOpen(false);
      }
      document.body.style.overflow = "hidden";
      if (!wasOpen) {
        window.setTimeout(function() {
          closeBtn.focus({ preventScroll: true });
        }, 50);
      }
    }

    function closeShowMe() {
      var overlay = document.getElementById("showmeOverlay");
      var iframe  = document.getElementById("showmeIframe");
      var modal   = overlay.querySelector(".showme-modal");
      if (!overlay.classList.contains("is-open")) return;
      overlay.classList.remove("is-open");
      overlay.setAttribute("aria-hidden", "true");
      modal.classList.remove("is-maximized");
      iframe.onload = null;
      iframe.src = "about:blank";
      syncShowMeQuery("");
      document.body.style.overflow = "";
      if (showMeLastTrigger && document.contains(showMeLastTrigger)) {
        showMeLastTrigger.focus({ preventScroll: true });
      }
      showMeLastTrigger = null;
      activeShowMeWidgetId = null;
    }

    function refreshOpenShowMe() {
      var overlay = document.getElementById("showmeOverlay");
      if (!overlay.classList.contains("is-open") || !activeShowMeWidgetId) return;
      openShowMe(activeShowMeWidgetId);
    }

    function syncShowMeQuery(widgetId) {
      if (!window.history || typeof window.history.replaceState !== "function") return;
      var url = new URL(window.location.href);
      if (widgetId) url.searchParams.set("showme", widgetId);
      else url.searchParams.delete("showme");
      window.history.replaceState({}, "", url.pathname + url.search + url.hash);
    }

    function maybeOpenRequestedShowMe() {
      if (!pendingShowMeFromUrl || !weekData || !requestedShowMeId) return;
      var matchesWeek = weekData.steps.some(function(step) {
        return collectShowMeIdsFromStep(step).indexOf(requestedShowMeId) !== -1;
      });
      pendingShowMeFromUrl = false;
      if (!matchesWeek) return;
      window.setTimeout(function() {

      }, 0);

      });

      if (!e.data || e.data.type !== "showme-quiz-complete") return;
      var d = e.data;
      var key = getQuizKey();
      var quizzes = JSON.parse(localStorage.getItem(key) || "{}");
      quizzes[d.widgetId] = {
        score: d.score,
        total: d.total,
        pass: d.pass,
        completedAt: new Date().toISOString()
      };
      localStorage.setItem(key, JSON.stringify(quizzes));
      updateShowMeBadges();
    });

    function initSidebar(w) {
      var text = getWeekText();
      var sidebar   = document.getElementById("sidebar");
      var overlay   = document.getElementById("sidebarOverlay");
      var toggleBtn = document.getElementById("sidebarToggle");
      var navList   = document.getElementById("sidebarNav");

      if (!sidebar || !overlay || !toggleBtn || !navList) return;

      var sections = [
        { id: "hero-section", label: text.sidebarOverview, group: null },
        { id: "section-bundle", label: text.sidebarBundle, group: null }
      ];
      w.steps.forEach(function(step, idx) {
        sections.push({ id: "step-" + idx, label: step.title, group: idx === 0 ? text.sidebarPracticeGroup : null });
      });
      if (w.shortcuts && w.shortcuts.length) sections.push({ id: "section-shortcuts", label: text.sidebarShortcuts, group: text.sidebarReferenceGroup });
      if (w.explore && w.explore.length) sections.push({ id: "section-explore", label: text.sidebarExplore, group: null });
      if (w.mistakes && w.mistakes.length) sections.push({ id: "section-mistakes", label: text.sidebarMistakes, group: null });
      if (w.assignment) sections.push({ id: "section-assignment", label: text.sidebarAssignment, group: null });

      var showmeSet = {};
      w.steps.forEach(function(step) {
        var ids = collectShowMeIdsFromStep(step);
        ids.forEach(function(id) { showmeSet[id] = true; });
      });
      var showmeIds = Object.keys(showmeSet);

      var navHtml = sections.map(function(s) {
        var g = s.group ? "<li><span class=\"nav-section-label\">" + s.group + "</span></li>" : "";
        return g + "<li data-nav-id=\"" + s.id + "\"><a href=\"#" + s.id + "\">" + s.label + "</a></li>";
      }).join("");

      if (showmeIds.length > 0) {
        navHtml += "<li><span class=\"nav-section-label\">" + text.sidebarShowMe + "</span></li>";
        showmeIds.forEach(function(id) {
          var meta = getShowMeMeta(id);
          navHtml += "<li><a href=\"#\" onclick=\"openShowMe('" + id + "');return false;\">" +
            meta.icon + " " + meta.label + "</a></li>";
        });
      }

      navList.innerHTML = navHtml;

      if (!sidebarBindingsReady) {
        toggleBtn.addEventListener("click", function() {
          sidebar.classList.contains("is-open") ? closeSidebar() : openSidebar();
        });
        overlay.addEventListener("click", closeSidebar);
        document.addEventListener("keydown", function(e) {
          if (e.key === "Escape") closeSidebar();
        });
        sidebarBindingsReady = true;
      }

      if (isDesktopSidebar()) {
        sidebar.classList.add("is-open");
        sidebar.removeAttribute("aria-hidden");
        overlay.classList.remove("is-visible");
      } else {
        sidebar.classList.remove("is-open");
        sidebar.setAttribute("aria-hidden", "true");
        overlay.classList.remove("is-visible");
      }

      if (sidebarObserver) sidebarObserver.disconnect();
      sidebarObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          navList.querySelectorAll("li[data-nav-id]").forEach(function(li) {
            li.classList.remove("is-active");
          });
          var active = navList.querySelector("li[data-nav-id=\"" + entry.target.id + "\"]");
          if (active) active.classList.add("is-active");
        });
      }, { rootMargin: "-20% 0px -70% 0px", threshold: 0 });

      sections.forEach(function(s) {
        var el = document.getElementById(s.id);
        if (el) sidebarObserver.observe(el);
      });
    }

    window.addEventListener("resize", function() {
      if (!document.getElementById("sidebar")) return;
      if (isDesktopSidebar()) {
        openSidebar();
      } else {
        closeSidebar();
      }
    });

    // ─── Theme toggle ─────────────────────────────────
    document.getElementById("themeToggle").addEventListener("click", function() {
      var current = document.documentElement.getAttribute("data-theme");
      var next = current === "light" ? "" : "light";
      if (next) {
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("rpd-theme", next);
      } else {
        document.documentElement.removeAttribute("data-theme");
        localStorage.removeItem("rpd-theme");
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week — Blender Archive</title>
  <meta name="description" content="Blender Archive 기반 RPD 주차 페이지" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="assets/tokens.css" />
  <script>/* FOUC prevention */ (function(){var t=localStorage.getItem('rpd-theme');if(t)document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('rpd-lang');if(l){document.documentElement.lang=l;document.documentElement.setAttribute('data-lang',l);}})()</script>
  <style>
    /* ── Week-page specific styles ── */
    #pageContent > .content-block {
      padding: 0;
    }
    .hero + .content-block {
      margin-top: 22px;
    }
    #pageContent > .content-block + .content-block {
      margin-top: 24px;
    }
    #pageContent > #section-reference.content-block,
    #pageContent > #section-assignment.content-block,
    #pageContent > .content-block:last-of-type {
      margin-top: 32px;
    }
    .section-head {
      gap: 14px;
      margin-bottom: 14px;
    }
    .hero {
      padding: 24px 0 0;
      text-align: left;
    }
    .hero-card {
      display: grid;
      gap: 12px;
      justify-items: stretch;
      width: 100%;
    }
    .hero-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
    }
    .hero-week-well {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(122,162,247,.16);
      background:
        linear-gradient(145deg, rgba(10,132,255,.14), rgba(255,255,255,.03)),
        rgba(255,255,255,.02);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      color: #eaf3ff;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: -.03em;
    }
    .hero-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }
    .hero-kicker {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .hero h1 {
      margin: 0; font-family: var(--font-display);
      font-size: clamp(1.42rem, 2.2vw, 1.9rem);
      font-weight: 620; letter-spacing: -.03em; line-height: 1.16;
    }
    .hero p {
      max-width: 720px; margin: 0;
      color: var(--muted); font-size: clamp(.9rem, 1.2vw, .96rem);
      line-height: 1.8; white-space: normal;
    }
    .hero-support {
      font-size: .78rem;
      color: var(--muted);
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .hero-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.4;
      white-space: nowrap;
    }
    .hero-meta-item strong {
      color: var(--muted-strong);
      font-weight: 620;
      letter-spacing: -.01em;
    }
    .topic-list {
      --topic-desktop-columns: 2;
      --topic-mobile-columns: 1;
      display: grid;
      gap: 10px;
      padding: 14px 16px;
    }
    .topic-list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .topic-list-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .topic-list-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
      color: var(--muted-strong);
      font-size: .74rem;
      font-weight: 620;
      letter-spacing: -.01em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .topic-progress {
      position: relative;
      height: 4px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,.07);
    }
    .topic-progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(147,197,253,.4), rgba(147,197,253,.72));
      transition: width .24s ease;
    }
    .topic-check-list {
      display: grid;
      grid-template-columns: repeat(var(--topic-desktop-columns), minmax(0, 1fr));
      gap: 4px 14px;
    }
    .topic-check-item {
      position: relative;
      min-width: 0;
    }
    .topic-check-item input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .topic-check-item label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 4px 0;
      color: var(--muted-strong);
      font-size: .8rem;
      line-height: 1.42;
      cursor: pointer;
      transition: color .14s;
      user-select: none;
    }
    .topic-check-item label::before {
      content: "";
      width: 7px;
      height: 7px;
      margin-top: .38rem;
      flex-shrink: 0;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      transition: background .14s, box-shadow .14s;
    }
    .topic-check-item input:checked + label {
      color: var(--key-soft);
    }
    .topic-check-item input:checked + label::before {
      background: var(--key-soft);
      box-shadow: 0 0 0 3px rgba(147,197,253,.12);
    }
    .topic-check-item-more {
      display: flex;
      align-items: center;
      min-height: 100%;
    }
    .topic-check-more {
      display: inline-flex;
      align-items: center;
      padding: 4px 0;
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.4;
    }
    .learning-panel {
      display: grid;
      gap: 14px;
      padding: 0;
      border: none;
    }
    .learning-panel-copy {
      display: grid;
      gap: 10px;
      max-width: 720px;
    }
    .learning-panel-title {
      margin: 0;
      font-size: clamp(1rem, 1.5vw, 1.18rem);
      font-weight: 620;
      letter-spacing: -.02em;
      line-height: 1.3;
    }
    .learning-panel-text {
      margin: 0;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.7;
    }
    .learning-panel-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      border: none;
    }
    .learning-panel-stat {
      display: grid;
      gap: 4px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
    }
    .learning-panel-stat:last-child { border-right: none; }
    .learning-panel-stat strong {
      font-size: .96rem;
      font-weight: 620;
      letter-spacing: -.02em;
    }
    .learning-panel-stat span {
      font-size: .74rem;
      color: var(--muted);
    }
    .assignment-card {
      display: grid;
      gap: 14px;
      padding: 0;
      border: none;
    }
    .assignment-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .assignment-copy {
      display: grid;
      gap: 10px;
      max-width: 720px;
    }
    .assignment-copy strong {
      font-size: 1rem;
      line-height: 1.42;
    }
    .assignment-copy p {
      margin: 0;
      color: var(--muted);
      line-height: 1.72;
    }
    .assignment-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
      color: var(--muted);
      font-size: .76rem;
      font-weight: 600;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    .assignment-status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--muted);
      flex-shrink: 0;
    }
    .assignment-status.is-ready {
      border-color: rgba(52,211,153,.26);
      color: #d1fae5;
      background: rgba(16,185,129,.08);
    }
    .assignment-status.is-ready::before {
      background: #34d399;
    }
    .assignment-checklist {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
      color: var(--muted-strong);
      line-height: 1.7;
    }
    .assignment-meta {
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .assignment-actions {
      align-items: center;
      gap: 10px;
    }
    .assignment-actions .btn {
      min-height: 42px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
      font-size: .82rem;
    }
    .assignment-actions .btn-primary {
      border-color: rgba(96,165,250,.34);
      background: var(--modal-nav-active-bg);
      box-shadow: var(--modal-active-shadow);
      color: #eaf3ff;
    }
    .assignment-actions .btn-primary:hover {
      border-color: rgba(96,165,250,.42);
      background: var(--modal-accent-bg);
      box-shadow: var(--modal-hover-shadow);
    }
    .assignment-actions .btn-ghost {
      color: var(--muted-strong);
    }
    .assignment-actions .btn-ghost:hover {
      border-color: rgba(96,165,250,.24);
      background: var(--modal-hover-bg);
    }
    .assignment-note {
      margin: 0;
      font-size: .76rem;
      color: var(--muted);
      line-height: 1.65;
    }
    .hero-card,
    .topic-list,
    .assignment-card,
    .bundle-card,
    .learning-panel {
      position: relative;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-bg);
      box-shadow: var(--modal-card-shadow);
      overflow: hidden;
      isolation: isolate;
    }
    .hero-card,
    .topic-list,
    .assignment-card,
    .bundle-card,
    .learning-panel {
      padding: 18px 20px;
    }
    .topic-list {
      background: var(--modal-panel-bg);
      box-shadow: var(--modal-panel-shadow);
      padding: 14px 16px;
    }
    .hero-card {
      background:
        linear-gradient(180deg, rgba(255,255,255,.028), rgba(255,255,255,.01)),
        var(--surface);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }
    .hero-card::before,
    .topic-list::before,
    .assignment-card::before,
    .ref-accordion::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: var(--modal-top-line);
      pointer-events: none;
    }
    .assignment-card {
      border-top: none;
    }
    .ref-accordion {
      position: relative;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-bg);
      box-shadow: var(--modal-card-shadow);
      isolation: isolate;
    }
    .ref-accordion[open] {
      border-color: rgba(96,165,250,.2);
    }


    /* Nav between weeks */
    .week-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0 0;
      border-top: 1px solid var(--line);
      margin-bottom: 0;
    }
    .week-nav a {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted-strong); font-size: .88rem;
      transition: color .14s;
    }
    .week-nav a:hover { color: var(--text); }

    /* Lab section */
    .lab { display: grid; gap: 12px; }
    .lab-note {
      display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px;
      padding: 12px 0;
      border-radius: 0;
      border: none;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: none;
      color: var(--muted-strong); font-size: .88rem;
    }
    .bundle-card {
      display: grid;
      gap: 14px;
    }
    .bundle-copy {
      display: grid;
      gap: 10px;
      max-width: 760px;
    }
    .bundle-copy strong {
      font-size: .98rem;
      line-height: 1.42;
    }
    .bundle-copy p {
      margin: 0;
      color: var(--muted);
      line-height: 1.72;
      font-size: .92rem;
    }
    .bundle-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      border: none;
    }
    .bundle-stat {
      display: grid;
      gap: 4px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
    }
    .bundle-stat:last-child { border-right: none; }
    .bundle-stat strong {
      font-size: 1rem;
      font-weight: 620;
      letter-spacing: -.02em;
    }
    .bundle-stat span {
      font-size: .73rem;
      color: var(--muted);
    }
    .bundle-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .bundle-link {
      display: inline-flex;
      align-items: center;
      padding: 0;
      border-radius: 0;
      border: none;
      background: none;
      color: var(--muted);
      text-decoration: none;
      font-size: .78rem;
      transition: color .14s;
    }
    .bundle-link:hover {
      color: var(--text);
    }
    .section-head p {
      margin: 4px 0 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: .86rem;
    }
    /* Text accent */
    .text-key { color: var(--key-soft); }

    /* Responsive */
    /* ── Content layout ── */
    .content-layout {
      width: min(calc(var(--max-width) + 120px), calc(100% - 32px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 36px;
      position: relative;
      align-items: start;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: sticky;
      top: 76px;
      width: 100%;
      height: calc(100vh - 88px);
      background: none;
      border-right: 1px solid var(--line);
      z-index: 20;
      padding: 12px 18px 32px 0;
      overflow-y: auto;
      transform: none;
      transition: none;
    }
    .sidebar.is-open { transform: none; }

    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 49;
    }
    .sidebar-overlay.is-visible { display: block; }

    .sidebar-nav { list-style: none; margin: 0; padding: 8px 0; }
    .sidebar-nav li a {
      display: block; padding: 7px 0 7px 14px;
      font-size: .84rem; color: var(--muted);
      border-left: 2px solid transparent;
      transition: color .14s, border-color .14s;
    }
    .sidebar-nav li a:hover {
      color: var(--text);
    }
    .sidebar-nav li.is-active a {
      color: var(--text); border-left-color: var(--key-soft);
    }
    .sidebar-nav .nav-section-label {
      display: block; padding: 14px 0 4px 14px;
      font-size: .72rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; font-weight: 600;
    }
    .sidebar-nav .nav-section-label.nav-section-label-global {
      font-size: .68rem;
      color: color-mix(in srgb, var(--muted) 82%, transparent);
      letter-spacing: .12em;
    }
    .sidebar-nav li a.sidebar-link-global {
      padding-top: 6px;
      padding-bottom: 6px;
      font-size: .8rem;
      color: color-mix(in srgb, var(--muted-strong) 72%, var(--muted) 28%);
    }
    .sidebar-nav li a.sidebar-link-global:hover {
      color: var(--muted-strong);
    }
    .sidebar-nav li.sidebar-group-end {
      margin-bottom: 10px;
    }

    /* ── Sidebar toggle button ── */
    .sidebar-toggle {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--overlay-white);
      color: var(--muted-strong); cursor: pointer;
      transition: background .14s, color .14s; flex-shrink: 0;
    }
    .sidebar-toggle:hover { background: var(--overlay-white-hover); color: var(--text); }

    .brand-left { display: flex; align-items: center; gap: 10px; }
    .topbar-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex: 1;
      min-width: 0;
      margin-left: auto;
    }
    .topbar-right .topbar-actions {
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .main-content { flex: 1; min-width: 0; }

    /* ── Show Me buttons ── */
    .showme-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin: 4px 0 16px;
    }
    .btn-showme {
      width: 100%;
      min-height: 72px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font: inherit;
      transition: transform .14s ease, border-color .14s ease, background .14s ease;
    }
    .btn-showme::before,
    .btn-showme::after {
      display: none;
    }
    .btn-showme:hover,
    .btn-showme:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(96,165,250,.28);
      background: var(--modal-hover-bg);
      box-shadow: var(--modal-hover-shadow);
    }
    .btn-showme:focus-visible {
      outline: none;
    }
    .btn-showme-main {
      min-width: 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .btn-showme-icon {
      color: rgba(241,245,249,.96);
    }
    .showme-icon-badge {
      display: grid;
      place-items: center;
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--modal-icon-bg);
      box-shadow: var(--modal-card-shadow);
      color: var(--muted-strong);
    }
    .showme-icon-image {
      display: block;
      max-width: none;
      object-fit: contain;
      image-rendering: auto;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,.18));
    }
    .showme-icon-image-fallback {
      display: none;
      width: 100%;
      height: 100%;
      place-items: center;
    }
    .showme-icon-badge svg {
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.85;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .showme-icon-badge .showme-icon-base {
      stroke: rgba(241,245,249,.96);
    }
    .showme-icon-badge .showme-icon-base-fill {
      fill: rgba(241,245,249,.2);
      stroke: none;
    }
    .showme-icon-badge .showme-icon-accent {
      stroke: #f59e0b;
    }
    .showme-icon-badge .showme-icon-accent-fill {
      fill: #f59e0b;
      stroke: none;
    }
    .showme-icon-badge .showme-icon-soft {
      stroke: #7dd3fc;
    }
    .showme-icon-badge .showme-icon-soft-fill {
      fill: #7dd3fc;
      stroke: none;
    }
    .showme-icon-badge--card {
      width: 46px;
      height: 46px;
      border-radius: 12px;
    }
    .showme-icon-badge--card .showme-icon-image {
      width: 34px;
      height: 34px;
    }
    .showme-icon-badge--card svg {
      width: 22px;
      height: 22px;
    }
    .showme-icon-badge--browser {
      width: 38px;
      height: 38px;
      border-radius: 10px;
    }
    .showme-icon-badge--browser .showme-icon-image {
      width: 28px;
      height: 28px;
    }
    .showme-icon-badge--browser svg {
      width: 18px;
      height: 18px;
    }
    .showme-icon-badge--pill {
      width: 28px;
      height: 28px;
      border-radius: 8px;
    }
    .showme-icon-badge--pill .showme-icon-image {
      width: 19px;
      height: 19px;
    }
    .showme-icon-badge--pill svg {
      width: 13px;
      height: 13px;
    }
    .showme-icon-badge--title {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(255,255,255,.03);
    }
    .showme-icon-badge--title .showme-icon-image {
      width: 20px;
      height: 20px;
    }
    .showme-icon-badge--title svg {
      width: 14px;
      height: 14px;
    }
    .showme-icon-badge.is-fallback {
      font-size: 1rem;
      line-height: 1;
    }
    .showme-icon-badge--browser.is-fallback {
      font-size: .88rem;
    }
    .showme-icon-badge--pill.is-fallback {
      font-size: .76rem;
    }
    .btn-showme-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }
    .btn-showme-kicker {
      font-size: .64rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .btn-showme-label {
      font-size: .9rem;
      font-weight: 600;
      line-height: 1.42;
      color: var(--text);
    }
    .btn-showme-meta {
      font-size: .74rem;
      line-height: 1.45;
      color: var(--muted);
    }
    .btn-showme-arrow {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex-shrink: 0;
      transition: transform .14s ease, color .14s ease;
    }
    .btn-showme:hover .btn-showme-arrow,
    .btn-showme:focus-visible .btn-showme-arrow {
      transform: translateX(2px);
      color: var(--key-soft);
    }
    .btn-showme.is-complete {
      border-color: rgba(52,211,153,.24);
      background:
        linear-gradient(145deg, rgba(16,185,129,.12), rgba(255,255,255,.02)),
        rgba(255,255,255,.02);
    }
    .btn-showme.is-complete .showme-icon-badge {
      border-color: rgba(52,211,153,.2);
      background: rgba(16,185,129,.12);
      color: #d1fae5;
    }
    .btn-showme.is-complete .btn-showme-kicker,
    .btn-showme.is-complete .btn-showme-meta {
      color: rgba(209,250,229,.78);
    }
    .btn-showme.is-complete .btn-showme-arrow {
      color: #d1fae5;
    }
    @media (max-width: 640px) {
      .showme-buttons { grid-template-columns: 1fr; }
      .btn-showme { min-height: 68px; }
    }

    /* ── Step accordion ── */
    .lab-step {
      border-radius: 16px;
      border-color: var(--line);
      background: var(--modal-panel-soft-bg);
      box-shadow: var(--modal-card-shadow);
    }
    .step-number {
      border-color: var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
    }
    .step-header { margin-bottom: 0; }
    .step-toggle {
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 0;
      border: none;
      background: none;
      color: inherit;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }
    .step-toggle:focus-visible {
      outline: none;
    }
    .step-title-group {
      min-width: 0;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .step-title-block {
      min-width: 0;
      display: grid;
      gap: 5px;
      padding-top: 2px;
    }
    .step-title-text {
      display: block;
      line-height: 1.35;
    }
    .step-meta-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 3px 0;
      color: var(--muted);
      font-size: .76rem;
      line-height: 1.45;
      letter-spacing: .01em;
    }
    .step-meta-token {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
    }
    .step-meta-token.is-showme {
      color: rgba(191,219,254,.78);
    }
    .step-meta-token.is-showme strong {
      color: #dbeafe;
    }
    .step-meta-token.is-reference,
    .step-meta-token.is-download {
      color: rgba(255,255,255,.46);
    }
    .step-meta-token.is-reference strong,
    .step-meta-token.is-download strong {
      color: rgba(255,255,255,.72);
    }
    .step-meta-token + .step-meta-token::before {
      content: "·";
      color: rgba(255,255,255,.22);
      margin: 0 6px;
    }
    .step-meta-line strong {
      color: var(--muted-strong);
      font-weight: 600;
    }
    .step-header-right {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .step-header-right .status-pill {
      padding: 3px 7px;
      border-radius: 999px;
      font-size: .67rem;
      font-weight: 650;
      letter-spacing: .035em;
    }
    .step-header-right .status-pill.active {
      background: var(--modal-panel-soft-strong-bg);
      border-color: var(--line);
      color: rgba(255,255,255,.58);
    }
    .step-header-right .status-pill.complete {
      background: rgba(16,185,129,.05);
      border-color: rgba(16,185,129,.14);
      color: rgba(167,243,208,.82);
    }
    .step-toggle-indicator {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
      color: var(--muted);
      transition: transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease;
    }
    .step-toggle-indicator::before {
      content: "⌄";
      font-size: 1rem;
      line-height: 1;
      transform: translateY(-1px);
    }
    .step-toggle:hover .step-toggle-indicator {
      border-color: rgba(96,165,250,.26);
      background: var(--modal-hover-bg);
      color: var(--key-soft);
    }
    .lab-step.is-expanded .step-toggle-indicator {
      transform: rotate(180deg);
      border-color: rgba(96,165,250,.3);
      background: var(--modal-nav-active-bg);
      color: var(--key-soft);
    }
    .step-body {
      display: grid;
      gap: 0;
      margin-top: 12px;
    }
    .step-body[hidden] { display: none; }
    .lab-step.is-expanded {
      border-color: rgba(96,165,250,.24);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        inset 0 0 0 1px rgba(96,165,250,.08);
    }
    .lab-step.is-collapsed {
      padding-bottom: 18px;
    }
    .step-video-figure {
      margin: 0 0 14px;
      display: grid;
      gap: 8px;
    }
    .step-video-caption {
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.6;
    }
    .step-video-yt {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: var(--radius-md);
      background: #000;
    }
    .task-accordion {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }
    .task-accordion-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      list-style: none;
      color: var(--muted-strong);
      font-size: .84rem;
      font-weight: 600;
    }
    .task-accordion-summary::-webkit-details-marker {
      display: none;
    }
    .task-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--overlay-white);
      color: var(--muted);
      font-size: .72rem;
      font-weight: 600;
    }
    .ref-accordion {
      padding: 0;
      overflow: hidden;
    }
    .ref-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      cursor: pointer;
      list-style: none;
      background: transparent;
    }
    .ref-summary::-webkit-details-marker {
      display: none;
    }
    .ref-summary-title {
      font-size: .94rem;
      font-weight: 620;
      color: var(--text);
    }
    .ref-summary-meta {
      font-size: .76rem;
      color: var(--muted);
      text-align: right;
    }
    .ref-body {
      display: grid;
      gap: 14px;
      padding: 0 18px 18px;
      border-top: 1px solid var(--line);
    }
    .ref-group {
      display: grid;
      gap: 10px;
    }
    .step-section-divider {
      margin: 20px 0 6px;
    }
    .ref-group-title {
      margin: 0;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .ref-video-list,
    .shortcuts-compact {
      display: grid;
      gap: 10px;
    }
    .ref-video-item {
      display: grid;
      gap: 4px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
      color: inherit;
      text-decoration: none;
      transition: border-color .15s ease, background .15s ease, box-shadow .15s ease, transform .15s ease;
    }
    .ref-video-item:hover {
      border-color: rgba(96,165,250,.24);
      background: var(--modal-hover-bg);
      box-shadow: var(--modal-hover-shadow);
      transform: translateY(-1px);
    }
    .ref-video-title {
      font-size: .84rem;
      font-weight: 600;
      color: var(--text);
    }
    .ref-video-desc {
      font-size: .76rem;
      color: var(--muted);
      line-height: 1.55;
    }
    .sc-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
    }
    .sc-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 9px;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      background: var(--overlay-white);
      color: var(--key-soft);
      font-size: .77rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .sc-action {
      color: var(--muted-strong);
      font-size: .82rem;
      line-height: 1.55;
    }
    .ref-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
      color: var(--muted-strong);
      font-size: .84rem;
      line-height: 1.7;
    }
    .ref-list li {
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
    }
    .ref-body .doc-link {
      width: 100%;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
      color: var(--muted-strong);
    }
    .ref-body .doc-link:hover {
      border-color: rgba(96,165,250,.24);
      background: var(--modal-hover-bg);
      box-shadow: var(--modal-hover-shadow);
      color: var(--text);
    }
    .ref-hint {
      color: var(--muted);
    }

    /* ── Clip Player ── */
    .clip-player {
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: var(--surface);
      overflow: hidden;
      margin-bottom: 14px;
    }
    .clip-player video {
      display: block; width: 100%;
      border-radius: var(--radius-md) var(--radius-md) 0 0;
      cursor: pointer;
    }
    .clip-tabs {
      display: flex; gap: 0;
      border-top: 1px solid var(--line);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .clip-tabs::-webkit-scrollbar { display: none; }
    .clip-tab {
      flex: 1; min-width: 0;
      padding: 9px 14px;
      font: inherit; font-size: .78rem; font-weight: 500;
      color: var(--muted);
      background: none; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      text-align: center;
      transition: color .14s, border-color .14s, background .14s;
    }
    .clip-tab:hover { color: var(--muted-strong); background: rgba(255,255,255,.03); }
    .clip-tab.is-active {
      color: var(--key-soft);
      border-bottom-color: var(--key);
      background: rgba(10,132,255,.04);
    }
    .clip-player-hint {
      font-size: .72rem; color: var(--muted);
      text-align: center; padding: 4px 0 6px;
    }

    /* ── Show Me Modal ── */
    .showme-overlay {
      display: none; position: fixed; inset: 0;
      z-index: 100;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(8px);
      justify-content: center; align-items: center;
      padding: 20px;
      overscroll-behavior: contain;
    }
    .showme-overlay.is-open { display: flex; }

    .showme-modal {
      width: min(1360px, 96vw);
      height: min(92vh, 920px);
      max-width: 100%;
      max-height: 100%;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line-strong);
      background: var(--surface);
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
      display: flex; flex-direction: column;
      overflow: hidden;
      animation: showme-in .22s ease;
      transition: width .25s ease, height .25s ease, border-radius .25s ease;
    }
    .showme-modal.is-maximized {
      width: 100vw; height: 100vh;
      border-radius: 0; border: none;
    }
    @keyframes showme-in {
      from { opacity: 0; transform: scale(.97) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .showme-modal-header {
      display: flex; justify-content: space-between; align-items: center;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      background: var(--surface);
    }
    .showme-modal-header-copy {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .showme-modal-card-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(122,162,247,.2);
      background:
        linear-gradient(145deg, rgba(10,132,255,.18), rgba(255,255,255,.04)),
        rgba(255,255,255,.03);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 14px 32px rgba(0,0,0,.22);
      backdrop-filter: blur(18px);
      display: grid;
      place-items: center;
      color: #eaf3ff;
      flex-shrink: 0;
    }
    .showme-modal-card-icon .showme-icon-badge {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: inherit;
      background: transparent;
      color: inherit;
    }
    .showme-modal-card-icon .showme-icon-badge svg {
      width: 20px;
      height: 20px;
    }
    .showme-modal-title-block {
      min-width: 0;
      display: grid;
      gap: 3px;
    }
    .showme-modal-title {
      font-size: 1.12rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      min-width: 0;
      letter-spacing: -.02em;
    }
    .showme-modal-title-label,
    .showme-modal-title-meta {
      min-width: 0;
    }
    .showme-modal-title-meta {
      font-size: .8rem;
      line-height: 1.45;
      color: var(--muted);
    }
    .showme-header-actions {
      display: flex; align-items: center; gap: 6px;
      flex-shrink: 0;
    }
    .showme-browse-toggle,
    .showme-resize,
    .showme-close {
      display: grid; place-items: center;
      width: 44px; height: 44px; border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--overlay-white);
      color: var(--muted-strong); cursor: pointer;
      transition: background .14s, color .14s, border-color .14s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .showme-browse-toggle:hover,
    .showme-resize:hover,
    .showme-close:hover {
      background: var(--overlay-white-hover); color: var(--text);
    }
    .showme-browse-toggle.is-active {
      border-color: rgba(10,132,255,.34);
      background: rgba(10,132,255,.1);
      color: var(--key-soft);
    }
    .showme-resize .icon-restore { display: none; }
    .is-maximized .showme-resize .icon-maximize { display: none; }
    .is-maximized .showme-resize .icon-restore { display: block; }
    .showme-modal-body {
      display: grid;
      grid-template-columns: 0 minmax(0, 1fr);
      flex: 1;
      min-height: 0;
      position: relative;
      transition: grid-template-columns .24s ease;
    }
    .showme-modal.is-browser-open .showme-modal-body {
      grid-template-columns: minmax(300px, 332px) minmax(0, 1fr);
    }
    .showme-browser {
      min-width: 0;
      border-right: 1px solid var(--line);
      background: var(--surface-strong);
      overflow: hidden auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }
    .showme-modal.is-browser-open .showme-browser {
      opacity: 1;
      pointer-events: auto;
    }
    .showme-browser-header {
      display: grid;
      gap: 8px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .showme-browser-search {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line-strong);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-size: .86rem;
      outline: none;
    }
    .showme-browser-search:focus {
      border-color: rgba(10,132,255,.42);
    }
    .showme-browser-search::placeholder {
      color: var(--muted);
    }
    .showme-browser-hint {
      margin: -2px 0 0;
      font-size: .76rem;
      line-height: 1.55;
      color: var(--muted);
    }
    .showme-browser-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px 12px;
    }
    .showme-browser-reset {
      font-size: .78rem;
    }
    .showme-browser-library-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      color: var(--key-soft);
      font-size: .78rem;
      text-decoration: none;
    }
    .showme-browser-library-link:hover {
      color: #cbe4ff;
    }
    .showme-browser-content {
      display: grid;
      gap: 16px;
      padding: 16px;
    }
    .showme-browser-section {
      display: grid;
      gap: 8px;
    }
    .showme-browser-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .showme-browser-section-title {
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .showme-browser-section-count {
      font-size: .74rem;
      color: var(--muted);
    }
    .showme-browser-list {
      display: grid;
      gap: 8px;
    }
    .showme-browser-item {
      position: relative;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color .14s ease, background .14s ease, transform .14s ease;
      font: inherit;
      overflow: hidden;
    }
    .showme-browser-item-copy {
      min-width: 0;
      display: grid;
      gap: 2px;
    }
    .showme-browser-item-kicker-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .showme-browser-item-kicker {
      font-size: .62rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(191,219,254,.82);
    }
    .showme-browser-item-state {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(122,162,247,.22);
      background: rgba(255,255,255,.05);
      color: #d7e8ff;
      font-size: .61rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
      backdrop-filter: blur(16px);
    }
    .showme-browser-item:hover {
      border-color: rgba(10,132,255,.34);
      background: rgba(255,255,255,.04);
      transform: translateY(-1px);
    }
    .showme-browser-item.is-active {
      border-color: rgba(96,165,250,.44);
      background:
        linear-gradient(135deg, rgba(15,23,42,.94), rgba(18,34,58,.82)),
        rgba(255,255,255,.04);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        inset 0 0 0 1px rgba(96,165,250,.16),
        0 18px 36px rgba(0,0,0,.24);
      backdrop-filter: blur(22px);
    }
    .showme-browser-item.is-active::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(10,132,255,.14), transparent 42%);
      pointer-events: none;
    }
    .showme-browser-item.is-active .showme-icon-badge {
      border-color: rgba(122,162,247,.32);
      background: rgba(10,132,255,.12);
      color: #eef6ff;
      box-shadow: inset 0 0 0 1px rgba(122,162,247,.12);
    }
    .showme-browser-item.is-active .showme-browser-item-kicker,
    .showme-browser-item.is-active .showme-browser-item-label {
      color: #f8fbff;
    }
    .showme-browser-item.is-active .showme-browser-item-meta {
      color: rgba(220,234,255,.8);
    }
    .showme-browser-item-label {
      font-size: .85rem;
      font-weight: 590;
      line-height: 1.45;
    }
    .showme-browser-item-meta {
      font-size: .74rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .showme-browser-empty {
      padding: 12px 2px 4px;

      content: "";

      left: 0;

  <script>
    // ════════════════════════════════════════════════
    //  Week page template engine
    //  URL: week.html?week=2  →  renders Week 02 data
    // ════════════════════════════════════════════════

    const params = new URLSearchParams(location.search);
    const weekNum = parseInt(params.get("week") || "1", 10);
    const requestedShowMeId = params.get("showme") || "";
    const weekData = CURRICULUM.find(w => w.week === weekNum);
    const storageKey = `blender2026-week${weekNum}-v1`;
    var pendingShowMeFromUrl = !!requestedShowMeId;
    var activeWeekView = null;
    var currentWeekHasReference = false;

    function getWeekText() {
      return window.RPDI18n.getStrings("week");
    }

    function getWeekUiPreset() {
      return window.RPDWeekUI ? window.RPDWeekUI.getPreset() : {};
    }

    function getWeekUiPresetName() {
      return window.RPDWeekUI ? window.RPDWeekUI.getPresetName() : "inha-rpd";
    }

    function formatStepMeta(step, text) {
      var taskCount = Array.isArray(step.tasks) ? step.tasks.length : 0;
      var clipCount = (Array.isArray(step.clips) ? step.clips.length : 0) + (step.video ? 1 : 0);
      var showMeCount = collectShowMeIdsFromStep(step).length;
      var referenceCount = 0;
      if (step.image) referenceCount += 1;
      if (Array.isArray(step.images) && step.images.length) referenceCount += 1;
      if (step.link) referenceCount += 1;
      var downloadCount = Array.isArray(step.downloads) ? step.downloads.length : 0;
      var lang = window.RPDI18n.getLanguage();
      var parts = [];

      function metaToken(html, variant) {
        return '<span class="step-meta-token' + (variant ? ' is-' + variant : '') + '">' + html + '</span>';
      }

      if (lang === "ko") {
        if (taskCount > 0) parts.push(metaToken(text.stepMetaTasks + " <strong>" + taskCount + "</strong>", "task"));
        if (showMeCount > 0) parts.push(metaToken(text.stepMetaShowMe + " <strong>" + showMeCount + "</strong>", "showme"));
        if (downloadCount > 0) parts.push(metaToken(text.stepMetaDownloads + " <strong>" + downloadCount + "</strong>", "download"));
        else if (referenceCount > 0) parts.push(metaToken(text.stepMetaReferences + " <strong>" + referenceCount + "</strong>", "reference"));
        if (clipCount > 0) parts.push(metaToken(text.stepMetaClips + " <strong>" + clipCount + "</strong>", "clip"));
        return parts.join("");
      }

      function pluralize(count, singular, plural, variant) {
        return metaToken("<strong>" + count + "</strong> " + (count === 1 ? singular : plural), variant);
      }

      if (taskCount > 0) parts.push(pluralize(taskCount, text.stepMetaTaskSingular, text.stepMetaTaskPlural, "task"));
      if (showMeCount > 0) parts.push(pluralize(showMeCount, text.stepMetaShowMeSingular, text.stepMetaShowMePlural, "showme"));
      if (downloadCount > 0) parts.push(pluralize(downloadCount, text.stepMetaDownloadSingular, text.stepMetaDownloadPlural, "download"));
      else if (referenceCount > 0) parts.push(pluralize(referenceCount, text.stepMetaReferenceSingular, text.stepMetaReferencePlural, "reference"));
      if (clipCount > 0) parts.push(pluralize(clipCount, text.stepMetaClipSingular, text.stepMetaClipPlural, "clip"));
      return parts.join("");
    }

    function getLearningState(w) {
      var progressState = {};
      var quizState = {};
      try { progressState = JSON.parse(localStorage.getItem(storageKey) || "{}"); } catch (error) {}
      try { quizState = JSON.parse(localStorage.getItem(getQuizKey()) || "{}"); } catch (error) {}

      var completedSteps = 0;
      var nextStepIndex = -1;
      var nextShowMeId = "";
      var totalSteps = (w.steps || []).length;
      var allShowMeIds = {};

      (w.steps || []).forEach(function(step, idx) {
        var tasks = step.tasks || [];
        var stepComplete = tasks.length > 0 && tasks.every(function(task) { return !!progressState[task.id]; });
        if (stepComplete) {
          completedSteps += 1;
        } else if (nextStepIndex === -1) {
          nextStepIndex = idx;
        }

        collectShowMeIdsFromStep(step).forEach(function(id) {
          allShowMeIds[id] = true;
          if (!nextShowMeId && (!quizState[id] || !quizState[id].pass)) nextShowMeId = id;
        });
      });

      var allShowMeList = Object.keys(allShowMeIds);
      var passedShowMe = allShowMeList.filter(function(id) {
        return quizState[id] && quizState[id].pass;
      }).length;

      if (!nextShowMeId && allShowMeList.length) nextShowMeId = allShowMeList[0];

      return {
        totalSteps: totalSteps,
        completedSteps: completedSteps,
        nextStepIndex: totalSteps ? (nextStepIndex === -1 ? 0 : Math.min(nextStepIndex, totalSteps - 1)) : 0,
        totalShowMe: allShowMeList.length,
        passedShowMe: passedShowMe,
        nextShowMeId: nextShowMeId,
        isComplete: totalSteps > 0 && completedSteps === totalSteps
      };
    }

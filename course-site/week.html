<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week — RPD</title>
  <meta name="description" content="Robot Product Design 실습 페이지" />
  <link rel="stylesheet" href="assets/tokens.css" />
  <script>/* FOUC prevention */ (function(){var t=localStorage.getItem('rpd-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
  <style>
    /* ── Week-page specific styles ── */
    .hero {
      padding: 80px 0 16px; text-align: center;
    }
    .hero-card { display: grid; gap: 12px; justify-items: center; width: 100%; }
    .hero h1 {
      margin: 0; font-family: var(--font-display);
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 650; letter-spacing: -.026em; line-height: 1.15;
    }
    .hero p {
      max-width: 720px; margin: 0;
      color: var(--muted-strong); font-size: clamp(.98rem, 1.6vw, 1.06rem);
      line-height: 1.8;
    }
    .hero-meta { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
    .meta-chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 13px; border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface); color: var(--muted-strong);
      font-size: .82rem;
    }

    /* Topic checklist */
    .topic-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .topic-progress-bar { flex: 1; height: 4px; border-radius: 2px; background: var(--line); }
    .topic-progress-fill { height: 100%; border-radius: 2px; background: var(--key-soft); transition: width .35s ease; width: 0%; }
    .topic-progress-label { font-size: .78rem; color: var(--muted); white-space: nowrap; }

    .topic-check-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
    @media (max-width: 720px) { .topic-check-list { grid-template-columns: 1fr; } }
    .topic-check-item { position: relative; }
    .topic-check-item input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .topic-check-item label {
      display: flex; align-items: center; gap: 11px;
      padding: 7px 12px; border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--overlay-white);
      color: var(--muted-strong); font-size: .82rem;
      cursor: pointer;
      transition: background .22s, border-color .22s, color .22s;
      user-select: none;
    }
    .topic-check-item label::before {
      content: ""; flex-shrink: 0;
      width: 14px; height: 14px; border-radius: 50%;
      border: 1.5px solid var(--line-strong);
      transition: background .22s, border-color .22s;
    }
    .topic-check-item input:checked + label {
      background: rgba(10,132,255,.14);
      border-color: rgba(10,132,255,.4);
      color: var(--key-soft);
    }
    .topic-check-item input:checked + label::before {
      background: var(--key-soft);
      border-color: var(--key-soft);
      background-image: url("data:image/svg+xml,%3Csvg width='9' height='7' viewBox='0 0 9 7' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3.5L3.2 5.8L8 1' stroke='white' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: center;
    }

    /* Nav between weeks */
    .week-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; border-bottom: 1px solid var(--line); margin-bottom: 48px;
    }
    .week-nav a {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted-strong); font-size: .88rem;
      transition: color .14s;
    }
    .week-nav a:hover { color: var(--text); }

    /* Lab section */
    .lab { display: grid; gap: 16px; }
    .lab-note {
      display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px;
      padding: 14px 18px; border-radius: var(--radius-md);
      border: 1px solid var(--line); background: var(--surface);
      color: var(--muted-strong); font-size: .88rem;
    }

    /* Progress sticky */
    .progress-widget { min-width: min(380px, 44vw); }

    /* Text accent */
    .text-key { color: var(--key-soft); }

    /* Responsive */
    @media (max-width: 720px) {
      .hero { padding-top: 72px; }
      .sidebar { width: 80vw; max-width: 300px; }
    }

    /* ── Content layout ── */
    .content-layout {
      display: flex; position: relative;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 240px; height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(20px);
      z-index: 50;
      padding: 72px 0 24px;
      overflow-y: auto;
      transform: translateX(-100%);
      transition: transform .26s cubic-bezier(.4,0,.2,1);
    }
    .sidebar.is-open { transform: translateX(0); }

    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 49;
    }
    .sidebar-overlay.is-visible { display: block; }

    .sidebar-nav { list-style: none; margin: 0; padding: 8px 0; }
    .sidebar-nav li a {
      display: block; padding: 8px 20px;
      font-size: .84rem; color: var(--muted);
      border-left: 2px solid transparent;
      transition: color .14s, border-color .14s, background .14s;
    }
    .sidebar-nav li a:hover {
      color: var(--text); background: var(--overlay-white);
    }
    .sidebar-nav li.is-active a {
      color: var(--key-soft); border-left-color: var(--key-soft);
      background: rgba(10,132,255,.08);
    }
    .sidebar-nav .nav-section-label {
      display: block; padding: 14px 20px 4px;
      font-size: .72rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; font-weight: 600;
    }

    /* ── Sidebar toggle button ── */
    .sidebar-toggle {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--overlay-white);
      color: var(--muted-strong); cursor: pointer;
      transition: background .14s, color .14s; flex-shrink: 0;
    }
    .sidebar-toggle:hover { background: var(--overlay-white-hover); color: var(--text); }

    .brand-left { display: flex; align-items: center; gap: 10px; }
    .main-content { flex: 1; min-width: 0; }

    /* ── Show Me buttons ── */
    .showme-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .btn-showme {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 999px;
      border: 1px solid rgba(10,132,255,.3);
      background: rgba(10,132,255,.08);
      color: var(--key-soft); font: inherit; font-size: .82rem; font-weight: 500;
      cursor: pointer;
      transition: background .18s, border-color .18s, color .18s;
    }
    .btn-showme:hover {
      background: rgba(10,132,255,.16);
      border-color: rgba(10,132,255,.5);
      color: #fff;
    }
    .btn-showme.is-complete {
      border-color: rgba(16,185,129,.4);
      background: rgba(16,185,129,.08);
      color: #34d399;
    }
    .btn-showme.is-complete:hover {
      background: rgba(16,185,129,.16);
      border-color: rgba(16,185,129,.6);
    }
    .btn-showme.is-complete::before { content: "✅ "; }

    /* ── Show Me Modal ── */
    .showme-overlay {
      display: none; position: fixed; inset: 0;
      z-index: 100;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(8px);
      justify-content: center; align-items: center;
      padding: 20px;
    }
    .showme-overlay.is-open { display: flex; }

    .showme-modal {
      width: min(720px, 100%);
      height: min(85vh, 640px);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line-strong);
      background: var(--surface);
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
      display: flex; flex-direction: column;
      overflow: hidden;
      animation: showme-in .22s ease;
    }
    @keyframes showme-in {
      from { opacity: 0; transform: scale(.97) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .showme-modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .showme-modal-title {
      font-size: .9rem; font-weight: 600; color: var(--text);
    }
    .showme-close {
      display: grid; place-items: center;
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--overlay-white);
      color: var(--muted-strong); cursor: pointer;
      transition: background .14s, color .14s;
    }
    .showme-close:hover {
      background: var(--overlay-white-hover); color: var(--text);
    }
    .showme-iframe {
      flex: 1; width: 100%; border: none;
      background: var(--bg);
    }

    @media (max-width: 720px) {
      .showme-overlay { padding: 0; }
      .showme-modal {
        width: 100%; height: 100%;
        border-radius: 0; border: none;
      }
    }

    /* ── Student Login Overlay ───────────────────── */
    .student-login-overlay {
      position: fixed; inset: 0; z-index: 120;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .student-login-overlay.is-hidden { display: none; }
    .student-login-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      width: min(380px, 90vw);
      text-align: center;
    }
    .student-login-card h2 { margin: 0 0 6px; font-size: 1.2rem; }
    .student-login-card .login-subtitle {
      margin: 0 0 22px; font-size: .88rem; color: var(--muted-strong);
    }
    .student-login-input {
      width: 100%; padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--bg); color: var(--text);
      font-size: 1.1rem; text-align: center;
      letter-spacing: .1em; box-sizing: border-box;
      font-variant-numeric: tabular-nums;
    }
    .student-login-input:focus { outline: none; border-color: var(--key); }
    .student-login-preview {
      margin: 14px 0 0; min-height: 44px; padding: 10px;
      border-radius: var(--radius); font-size: .9rem;
    }
    .student-login-preview.is-match {
      background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.25); color: #34d399;
    }
    .student-login-preview.is-nomatch {
      background: rgba(239,68,68,.06); border: 1px solid rgba(239,68,68,.15); color: #f87171;
      font-size: .82rem;
    }
    .student-login-preview .login-btn {
      display: inline-block; margin-top: 10px; padding: 9px 28px;
      border-radius: 999px; border: none;
      background: var(--key); color: #fff;
      font-size: .88rem; font-weight: 600; cursor: pointer;
    }
    .student-login-preview .login-btn:hover { filter: brightness(1.1); }
    /* ── Student badge (topbar) ──────────────────── */
    .student-badge {
      display: none; align-items: center; gap: 6px;
      padding: 4px 10px 4px 8px; border-radius: 999px;
      background: rgba(10,132,255,.08); border: 1px solid rgba(10,132,255,.2);
      font-size: .76rem; color: var(--key-soft); cursor: pointer;
      white-space: nowrap; transition: background .14s;
    }
    .student-badge.is-active { display: inline-flex; }
    .student-badge:hover { background: rgba(10,132,255,.15); }
    /* ── Guest button ── */
    .guest-btn {
      display: block; width: 100%; margin-top: 14px;
      padding: 9px 0; border-radius: 999px;
      border: 1px solid var(--line);
      background: transparent; color: var(--muted);
      font-size: .82rem; cursor: pointer;
      transition: color .14s, border-color .14s;
    }
    .guest-btn:hover { color: var(--text); border-color: var(--line-strong); }
    /* ── Reference tabs (topbar) ──────────────────── */
    .ref-tabs {
      display: flex; align-items: center; gap: 6px;
    }
    .ref-tab {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 999px;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      font-size: .76rem; color: var(--muted-strong);
      text-decoration: none; white-space: nowrap;
      transition: background .14s, border-color .14s, color .14s;
    }
    .ref-tab:hover {
      background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.2);
      color: var(--text);
    }
    @media (max-width: 600px) { .ref-tabs { display: none; } }
  </style>
</head>
<body>
  <div class="page-shell" id="pageShell">

    <!-- Topbar (populated by JS) -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-left">
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="목차 열기" type="button">
            <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect y="0"  width="18" height="1.6" rx="0.8" fill="currentColor"/>
              <rect y="6"  width="12" height="1.6" rx="0.8" fill="currentColor"/>
              <rect y="12" width="18" height="1.6" rx="0.8" fill="currentColor"/>
            </svg>
          </button>
          <a class="brand" href="index.html" style="text-decoration:none;color:inherit;">
            <div class="brand-badge" id="brandBadge">—</div>
            <div class="brand-copy">
              <strong id="brandTitle">불러오는 중...</strong>
              <span>Robot Product Design · 2026</span>
            </div>
          </a>
        </div>
        <div class="ref-tabs">
          <a class="ref-tab" href="https://www.notion.so/31e54d654971812e9c38f85124b45e3f" target="_blank" rel="noopener">🤖 AI 참고자료</a>
          <a class="ref-tab" href="https://www.notion.so/31e54d65497181c89e8bfa97bb5efaa7" target="_blank" rel="noopener">🔧 블렌더 참고자료</a>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="student-badge" id="studentBadge" title="학생 변경" onclick="switchStudent()">👤 <span id="studentBadgeName"></span></span>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="테마 전환">
            <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
        </div>
        <div class="progress-widget">
          <div class="progress-label">진도</div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-count" id="progressCount">0 / 0</div>
          <button class="btn btn-ghost" id="resetBtn" type="button">초기화</button>
        </div>
      </div>
    </header>

    <!-- Page content = populated by JS -->
    <div class="content-layout">
      <nav class="sidebar" id="sidebar" aria-hidden="true">
        <ul class="sidebar-nav" id="sidebarNav"></ul>
      </nav>
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <main class="main-content" id="pageContent"></main>
    </div>

    <footer class="page-footer">
      <div>Robot Product Design 2026 · <a href="index.html" style="color:var(--key-soft)">← 전체 목록</a></div>
    </footer>

    <!-- Show Me Modal -->
    <div class="showme-overlay" id="showmeOverlay" aria-hidden="true">
      <div class="showme-modal">
        <div class="showme-modal-header">
          <span class="showme-modal-title" id="showmeTitle"></span>
          <button class="showme-close" id="showmeClose" aria-label="닫기" type="button">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <iframe class="showme-iframe" id="showmeIframe" sandbox="allow-scripts allow-same-origin" title="Show Me Widget"></iframe>
      </div>
    </div>

    <!-- Student Login (full-page, shown when ?sid= is missing) -->
    <div class="student-login-overlay" id="studentLoginOverlay">
      <div class="student-login-card">
        <h2>👋 학번을 입력하세요</h2>
        <p class="login-subtitle">퀴즈 기록이 자동으로 저장됩니다</p>
        <input class="student-login-input" id="studentLoginInput"
               type="text" placeholder="학번 8자리" maxlength="8" inputmode="numeric"
               autocomplete="off">
        <div class="student-login-preview" id="studentLoginPreview"></div>
        <button class="guest-btn" type="button" onclick="loginAsGuest()">학번 없이 둘러보기</button>
      </div>
    </div>
  </div>

  <script src="data/students.js"></script>
  <script src="assets/showme/_registry.js"></script>
  <script src="data/curriculum.js"></script>
  <script>
    // ════════════════════════════════════════════════
    //  Week page template engine
    //  URL: week.html?week=2  →  renders Week 02 data
    // ════════════════════════════════════════════════

    const params   = new URLSearchParams(location.search);
    const weekNum  = parseInt(params.get("week") || "1", 10);
    const weekData = CURRICULUM.find(w => w.week === weekNum);
    const storageKey = `blender2026-week${weekNum}-v1`;

    // ─── Guard ───────────────────────────────────────
    if (!weekData) {
      document.getElementById("pageContent").innerHTML = `
        <section style="padding:80px 0;text-align:center;color:var(--muted)">
          <p>해당 주차 데이터를 찾을 수 없습니다. <a href="index.html" style="color:var(--key-soft)">← 돌아가기</a></p>
        </section>`;
    } else {
      initStudentLogin();    // check ?sid= or show login overlay
      buildPage(weekData);
      updateShowMeBadges();  // restore completion badges from localStorage
    }

    // ─── Build page ─────────────────────────────────
    function buildPage(w) {
      document.title = `Week ${w.week} — ${w.title}`;

      // Topbar
      document.getElementById("brandBadge").textContent = String(w.week).padStart(2, "0");
      document.getElementById("brandTitle").textContent = `Week ${String(w.week).padStart(2, "0")} · ${w.title}`;

      // Prev/Next
      const prev = CURRICULUM.find(x => x.week === w.week - 1);
      const next = CURRICULUM.find(x => x.week === w.week + 1);
      const prevLink = prev
        ? `<a href="week.html?week=${prev.week}">← Week ${prev.week}</a>`
        : `<a href="index.html">← 홈</a>`;
      const nextLink = next
        ? `<a href="week.html?week=${next.week}">Week ${next.week} →</a>`
        : `<span style="opacity:.4">마지막 주차</span>`;

      const videos = w.videos || [];
      const docs = w.docs || [];

      // Topics (checkable pills with localStorage persistence)
      const topicStorageKey = storageKey + "-topics";
      const savedTopics = JSON.parse(localStorage.getItem(topicStorageKey) || "{}");
      const topicTotal = w.topics.length;
      const topicCheckedInit = w.topics.filter((_, i) => savedTopics["t" + i]).length;

      const topicPills =
        "<div class=\"topic-progress\">" +
          "<div class=\"topic-progress-bar\"><div class=\"topic-progress-fill\" id=\"topicFill\" style=\"width:" + Math.round(topicCheckedInit / topicTotal * 100) + "%\"></div></div>" +
          "<div class=\"topic-progress-label\" id=\"topicCount\">" + topicCheckedInit + " / " + topicTotal + "</div>" +
        "</div>" +
        "<div class=\"topic-check-list\">" +
        w.topics.map((t, i) => {
          const id = "tc-" + weekNum + "-" + i;
          const chk = savedTopics["t" + i] ? " checked" : "";
          return "<div class=\"topic-check-item\"><input type=\"checkbox\" id=\"" + id + "\"" + chk + " data-ti=\"" + i + "\" /><label for=\"" + id + "\">" + t + "</label></div>";
        }).join("") +
        "</div>";

      // Steps HTML
      const stepsHtml = w.steps.map((step, idx) => {
        const taskItems = step.tasks.map(t => `
          <div class="task-item">
            <input id="${t.id}" type="checkbox" data-task-id="${t.id}" />
            <label for="${t.id}">
              <strong>${t.label}</strong>
              ${t.detail ? `<small>${t.detail}</small>` : ""}
            </label>
          </div>`).join("");

        // Show Me buttons (only if step has showme field)
        const showmeHtml = (() => {
          if (!step.showme) return "";
          const ids = Array.isArray(step.showme) ? step.showme : [step.showme];
          return `<div class="showme-buttons">${ids.map(id => {
            const meta = (typeof SHOWME_REGISTRY !== "undefined" && SHOWME_REGISTRY[id])
              ? SHOWME_REGISTRY[id] : { label: id, icon: "\ud83d\udcd6" };
            return `<button class="btn btn-showme" type="button" data-widget-id="${id}" onclick="openShowMe('${id}')">${meta.icon} ${meta.label}</button>`;
          }).join("")}</div>`;
        })();

        return `
          <article class="lab-step" id="step-${idx}" data-step-index="${idx}">
            <div class="step-header">
              <div class="step-title-group">
                <div class="step-number">${idx + 1}</div>
                <strong class="step-title-text">${step.title}</strong>
              </div>
              <div class="status-pill" data-step-status>진행 중</div>
            </div>
            ${step.image ? (step.link
              ? `<a href="${step.link}" target="_blank" rel="noopener noreferrer"><img src="${step.image}" alt="${step.title}" class="step-image" loading="lazy" /></a>`
              : `<img src="${step.image}" alt="${step.title}" class="step-image" loading="lazy" />`) : ""}
            <p class="step-copy">${step.copy}</p>
            ${showmeHtml}
            <div class="task-list">${taskItems}</div>
          </article>`;
      }).join("");

      // Mistakes
      const mistakesHtml = w.mistakes.length > 0 ? `
        <section class="content-block" id="section-mistakes">
          <div class="section-head"><h3>막히는 지점</h3></div>
          <details class="card mistakes-section" open>
            <summary>막혔을 때</summary>
            <ul>${w.mistakes.map(m => `<li>${m}</li>`).join("")}</ul>
          </details>
        </section>` : "";

      const renderResourceSection = (title, icon, items) => items.length > 0 ? `
        <section class="content-block">
          <div class="section-head"><h3>${title}</h3></div>
          <div class="doc-links-row">
            ${items.map(d => `
              <a class="doc-link" href="${d.url}" target="_blank" rel="noopener noreferrer">
                ${icon} ${d.title} ↗
              </a>`).join("")}
          </div>
        </section>` : "";

      // Videos / Docs
      const videosHtml = renderResourceSection("공식 영상 튜토리얼", "▶", videos);
      const docsHtml = renderResourceSection("공식 문서", "📄", docs);

      // Assignment
      const assignmentCheckli = w.assignment.checklist.map(c => `<li>${c}</li>`).join("");
      const assignmentHtml = `
        <section class="content-block" id="section-assignment">
          <div class="section-head"><h3>과제</h3></div>
          <div class="card assignment-card">
            <div class="card-chip">과제</div>
            <strong>${w.assignment.title}</strong>
            <p style="color:var(--muted);line-height:1.72;margin:0">${w.assignment.description}</p>
            <ul>${assignmentCheckli}</ul>
          </div>
        </section>`;

      // Shortcuts cheatsheet
      const shortcutsHtml = (w.shortcuts && w.shortcuts.length > 0) ? `
        <section class="content-block" id="section-shortcuts">
          <div class="section-head">
            <h3>단축키 치트시트</h3>
            <p>이번 주에 쓰는 핵심 단축키입니다. 외우지 말고 반복하세요.</p>
          </div>
          <div class="card shortcut-table-wrap">
            <table class="shortcut-table">
              <thead><tr><th>단축키</th><th>기능</th></tr></thead>
              <tbody>
                ${w.shortcuts.map(s => `<tr><td><kbd class="shortcut-key">${s.keys}</kbd></td><td>${s.action}</td></tr>`).join("")}
              </tbody>
            </table>
          </div>
        </section>` : "";

      // Explore (더 해보기)
      const exploreHtml = (w.explore && w.explore.length > 0) ? `
        <section class="content-block" id="section-explore">
          <div class="section-head">
            <h3>더 해보기</h3>
            <p>필수는 아니지만, 도전하면 실력이 빠르게 늡니다.</p>
          </div>
          <div class="explore-grid">
            ${w.explore.map(e => `
              <div class="explore-card">
                <strong>${e.title}</strong>
                <p>${e.hint}</p>
              </div>`).join("")}
          </div>
        </section>` : "";

      // Full page — all data sourced from curriculum.js (trusted, no user input)
      document.getElementById("pageContent").innerHTML = `
        <!-- Hero -->
        <section class="hero" id="hero-section">
          <div class="hero-card">
            <div class="eyebrow">Week ${String(w.week).padStart(2,"0")} · RPD</div>
            <h1>${w.title}</h1>
            <div class="hero-meta">
              <span class="meta-chip">⏱ ${w.duration}</span>
              <span class="meta-chip">📋 ${w.steps.length}단계 실습</span>
              ${videos.length ? `<span class="meta-chip">▶ ${videos.length}개 공식 영상</span>` : ""}
              ${docs.length ? `<span class="meta-chip">📄 ${docs.length}개 공식 문서</span>` : ""}
            </div>
          </div>
        </section>

        <!-- Topics -->
        <section class="content-block">
          <div class="section-head"><h3>이번 주</h3></div>
          <div class="topic-list">${topicPills}</div>
        </section>

        <!-- Lab (Steps) -->
        <section class="content-block" id="practice">
          <div class="section-head"><h3>실습</h3></div>
          <div class="lab">
            ${stepsHtml}
          </div>
        </section>

        ${shortcutsHtml}
        ${exploreHtml}
        ${mistakesHtml}
        ${videosHtml}
        ${docsHtml}
        ${assignmentHtml}

        <!-- Week nav -->
        <section class="content-block">
          <div class="week-nav">
            ${prevLink}
            <a href="index.html" style="color:var(--muted)">목록</a>
            ${nextLink}
          </div>
        </section>

        <div style="height:60px"></div>
      `;

      // Init progress engine
      initProgress(w.steps.length);
      initTopicChecks(w.topics.length, topicStorageKey);
      initSidebar(w);
    }

    // ─── Topic check engine ──────────────────────────
    function initTopicChecks(total, key) {
      const fill  = document.getElementById("topicFill");
      const count = document.getElementById("topicCount");
      if (!fill || !count) return;

      function updateTopicProgress() {
        const all     = [...document.querySelectorAll(".topic-check-list input[type='checkbox']")];
        const checked = all.filter(c => c.checked).length;
        const pct     = total > 0 ? Math.round(checked / total * 100) : 0;
        fill.style.width  = pct + "%";
        count.textContent = checked + " / " + total;
        const state = {};
        all.forEach((c, i) => { state["t" + i] = c.checked; });
        localStorage.setItem(key, JSON.stringify(state));
      }

      document.querySelectorAll(".topic-check-list input[type='checkbox']").forEach(cb => {
        cb.addEventListener("change", updateTopicProgress);
      });
    }

    // ─── Progress engine ─────────────────────────────
    function initProgress(totalSteps) {
      const steps       = [...document.querySelectorAll(".lab-step")];
      const progressFill  = document.getElementById("progressFill");
      const progressCount = document.getElementById("progressCount");
      const resetBtn      = document.getElementById("resetBtn");

      function readState() {
        try { return JSON.parse(localStorage.getItem(storageKey) || "{}"); }
        catch { return {}; }
      }
      function writeState(state) {
        localStorage.setItem(storageKey, JSON.stringify(state));
      }
      function getTasks(step) {
        return [...step.querySelectorAll("input[type='checkbox'][data-task-id]")];
      }
      function isComplete(step) {
        return getTasks(step).every(t => t.checked);
      }

      function updateStep(step) {
        const pill     = step.querySelector("[data-step-status]");
        const complete = isComplete(step);
        step.classList.toggle("is-complete", complete);
        if (complete) { pill.textContent = "완료"; pill.className = "status-pill complete"; }
        else          { pill.textContent = "진행 중"; pill.className = "status-pill active"; }
      }

      function sync() {
        const completed = steps.filter(isComplete).length;
        const pct = steps.length ? (completed / steps.length) * 100 : 0;
        progressFill.style.width  = `${pct}%`;
        progressCount.textContent = `${completed} / ${steps.length}`;

        steps.forEach(step => updateStep(step));
      }

      function loadState() {
        const state = readState();
        steps.forEach(step => {
          getTasks(step).forEach(task => {
            task.checked = Boolean(state[task.dataset.taskId]);
            task.addEventListener("change", () => {
              const s = readState();
              s[task.dataset.taskId] = task.checked;
              writeState(s);
              sync();
            });
          });
        });
        sync();
      }

      resetBtn.addEventListener("click", () => {
        localStorage.removeItem(storageKey);
        steps.forEach(step => getTasks(step).forEach(t => { t.checked = false; }));
        sync();
      });

      loadState();
    }

    // ─── Show Me Modal ──────────────────────────────
    function openShowMe(widgetId) {
      var overlay = document.getElementById("showmeOverlay");
      var iframe  = document.getElementById("showmeIframe");
      var title   = document.getElementById("showmeTitle");

      var meta = (typeof SHOWME_REGISTRY !== "undefined" && SHOWME_REGISTRY[widgetId])
        ? SHOWME_REGISTRY[widgetId]
        : { label: widgetId, icon: "\ud83d\udcd6" };

      title.textContent = meta.icon + " " + meta.label;
      iframe.src = "assets/showme/" + widgetId + ".html?wid=" + widgetId;
      overlay.classList.add("is-open");
      overlay.removeAttribute("aria-hidden");
      document.body.style.overflow = "hidden";
    }

    function closeShowMe() {
      var overlay = document.getElementById("showmeOverlay");
      var iframe  = document.getElementById("showmeIframe");
      overlay.classList.remove("is-open");
      overlay.setAttribute("aria-hidden", "true");
      iframe.src = "about:blank";
      document.body.style.overflow = "";
    }

    document.getElementById("showmeClose").addEventListener("click", closeShowMe);
    document.getElementById("showmeOverlay").addEventListener("click", function(e) {
      if (e.target === this) closeShowMe();
    });
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        var overlay = document.getElementById("showmeOverlay");
        if (overlay.classList.contains("is-open")) closeShowMe();
      }
    });

    // ─── Student Identification & Quiz Tracking ────────
    // URL: week.html?week=3&sid=12243798
    // localStorage keys are partitioned per student:
    //   rpd_quizzes_12243798  →  { "mirror-modifier": { score, total, pass, completedAt } }

    function getCurrentSid() {
      return new URLSearchParams(location.search).get("sid") || "";
    }

    function getCurrentStudent() {
      var sid = getCurrentSid();
      if (!sid || typeof STUDENTS === "undefined" || !STUDENTS[sid]) return null;
      return { studentId: sid, name: STUDENTS[sid].name, "class": STUDENTS[sid]["class"] };
    }

    function getQuizKey(sid) { return "rpd_quizzes_" + sid; }

    // ─── Student Login Flow ─────────────────────────
    function initStudentLogin() {
      // TODO: 학번 로그인 기능 비활성화 중 (학생 명단 준비 전)
      document.getElementById("studentLoginOverlay").classList.add("is-hidden");
      return;

      var sid = getCurrentSid();
      var overlay = document.getElementById("studentLoginOverlay");
      var badge   = document.getElementById("studentBadge");
      var nameEl  = document.getElementById("studentBadgeName");

      if (sid && typeof STUDENTS !== "undefined" && STUDENTS[sid]) {
        // Logged in → hide overlay, show badge
        overlay.classList.add("is-hidden");
        badge.classList.add("is-active");
        nameEl.textContent = STUDENTS[sid].name + " (" + sid + ")";
        return;
      }

      // Not logged in → show login overlay
      overlay.classList.remove("is-hidden");
      badge.classList.remove("is-active");

      var input   = document.getElementById("studentLoginInput");
      var preview = document.getElementById("studentLoginPreview");

      input.addEventListener("input", function() {
        var val = input.value.trim();
        if (val.length < 8) { preview.className = "student-login-preview"; preview.innerHTML = ""; return; }
        if (typeof STUDENTS !== "undefined" && STUDENTS[val]) {
          var s = STUDENTS[val];
          preview.className = "student-login-preview is-match";
          preview.innerHTML = "<strong>" + s.name + "</strong> · " + s["class"]
            + '<br><button class="login-btn" type="button" onclick="loginAsStudent(\'' + val + '\')">시작하기</button>';
        } else {
          preview.className = "student-login-preview is-nomatch";
          preview.innerHTML = "등록되지 않은 학번입니다";
        }
      });

      // Enter key = submit if match
      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
          var val = input.value.trim();
          if (typeof STUDENTS !== "undefined" && STUDENTS[val]) loginAsStudent(val);
        }
      });

      input.focus();
    }

    function loginAsStudent(sid) {
      // Redirect with sid parameter (preserves week param)
      var params = new URLSearchParams(location.search);
      params.set("sid", sid);
      location.search = params.toString();
    }

    function loginAsGuest() {
      document.getElementById("studentLoginOverlay").classList.add("is-hidden");
    }

    function switchStudent() {
      // Remove sid and reload → shows login overlay
      var params = new URLSearchParams(location.search);
      params.delete("sid");
      location.search = params.toString();
    }

    // ─── Quiz Badge System ──────────────────────────
    function updateShowMeBadges() {
      var sid = getCurrentSid();
      if (!sid) return;
      var quizzes = JSON.parse(localStorage.getItem(getQuizKey(sid)) || "{}");
      document.querySelectorAll(".btn-showme").forEach(function(btn) {
        var wid = btn.dataset.widgetId;
        if (wid && quizzes[wid] && quizzes[wid].pass) {
          btn.classList.add("is-complete");
        }
      });
    }

    // ─── Quiz Completion Listener ───────────────────
    window.addEventListener("message", function(e) {
      if (!e.data || e.data.type !== "showme-quiz-complete") return;
      var d = e.data;
      var sid = getCurrentSid();
      if (!sid) return;  // not logged in = no tracking

      // 1. Save to student-specific localStorage
      var key = getQuizKey(sid);
      var quizzes = JSON.parse(localStorage.getItem(key) || "{}");
      quizzes[d.widgetId] = {
        score: d.score, total: d.total, pass: d.pass,
        completedAt: new Date().toISOString()
      };
      localStorage.setItem(key, JSON.stringify(quizzes));

      // 2. Update badges
      updateShowMeBadges();

      // 3. Sync to Notion
      syncQuizToNotion(d.widgetId, d.score, d.total);
    });

    // ─── Notion Sync ────────────────────────────────
    async function syncQuizToNotion(widgetId, score, total) {
      var student = getCurrentStudent();
      if (!student) return;
      var meta = (typeof SHOWME_REGISTRY !== "undefined" && SHOWME_REGISTRY[widgetId])
        ? SHOWME_REGISTRY[widgetId] : { label: widgetId };
      var weekNum = String(new URLSearchParams(location.search).get("week") || "").padStart(2, "0");
      try {
        await fetch("/api/notion-quiz", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            parent: { database_id: "d27c5dfdac27433284a4a6be1b6d8801" },
            properties: {
              "\ud56d\ubaa9\uba85": { title:     [{ text: { content: "Show Me \ud034\uc988: " + meta.label } }] },
              "\ud559\ubc88":       { rich_text: [{ text: { content: student.studentId } }] },
              "\ud559\uc0dd\uba85": { rich_text: [{ text: { content: student.name } }] },
              "\ubc18":             { select:    { name: student["class"] } },
              "\uc8fc\ucc28":       { select:    { name: "Week " + weekNum } },
              "\uc81c\ucd9c\uc0c1\ud0dc": { select: { name: "\uc81c\ucd9c\uc644\ub8cc" } },
              "\uacf5\uac1c\ud53c\ub4dc\ubc31": { rich_text: [{ text: { content: "\ud034\uc988 \uc810\uc218: " + score + "/" + total } }] },
              "\uc81c\ucd9c\uac10\uc9c0\uc77c": { date: { start: new Date().toISOString().split("T")[0] } }
            }
          })
        });
      } catch(e) { console.warn("Notion sync failed:", e); }
    }

    // ─── Sidebar ────────────────────────────────────
    function initSidebar(w) {
      var sidebar   = document.getElementById("sidebar");
      var overlay   = document.getElementById("sidebarOverlay");
      var toggleBtn = document.getElementById("sidebarToggle");
      var navList   = document.getElementById("sidebarNav");

      if (!sidebar || !overlay || !toggleBtn || !navList) return;

      // Build section list
      var sections = [{ id: "hero-section", label: "개요", group: null }];
      w.steps.forEach(function(step, idx) {
        sections.push({ id: "step-" + idx, label: step.title, group: idx === 0 ? "실습" : null });
      });
      if (w.shortcuts && w.shortcuts.length)  sections.push({ id: "section-shortcuts",  label: "단축키",      group: "참고" });
      if (w.explore   && w.explore.length)    sections.push({ id: "section-explore",    label: "더 해보기",   group: null });
      if (w.mistakes  && w.mistakes.length)   sections.push({ id: "section-mistakes",   label: "막히는 지점", group: null });
      if (w.assignment)                        sections.push({ id: "section-assignment", label: "과제",        group: null });

      // Collect unique Show Me widgets for this week
      var showmeSet = {};
      w.steps.forEach(function(step) {
        if (!step.showme) return;
        var ids = Array.isArray(step.showme) ? step.showme : [step.showme];
        ids.forEach(function(id) { showmeSet[id] = true; });
      });
      var showmeIds = Object.keys(showmeSet);

      // Render nav (curriculum.js = trusted developer data, not user input)
      var navHtml = sections.map(function(s) {
        var g = s.group ? "<li><span class=\"nav-section-label\">" + s.group + "</span></li>" : "";
        return g + "<li data-nav-id=\"" + s.id + "\"><a href=\"#" + s.id + "\">" + s.label + "</a></li>";
      }).join("");

      // Add Show Me section to sidebar (data from _registry.js, developer-controlled)
      if (showmeIds.length > 0) {
        navHtml += "<li><span class=\"nav-section-label\">Show Me</span></li>";
        showmeIds.forEach(function(id) {
          var meta = (typeof SHOWME_REGISTRY !== "undefined" && SHOWME_REGISTRY[id])
            ? SHOWME_REGISTRY[id] : { label: id, icon: "\ud83d\udcd6" };
          navHtml += "<li><a href=\"#\" onclick=\"openShowMe('" + id + "');return false;\">" +
            meta.icon + " " + meta.label + "</a></li>";
        });
      }

      navList.innerHTML = navHtml; // trusted static curriculum + registry data

      // Open / close
      function openSidebar() {
        sidebar.classList.add("is-open");
        overlay.classList.add("is-visible");
        sidebar.removeAttribute("aria-hidden");
      }
      function closeSidebar() {
        sidebar.classList.remove("is-open");
        overlay.classList.remove("is-visible");
        sidebar.setAttribute("aria-hidden", "true");
      }

      toggleBtn.addEventListener("click", function() {
        sidebar.classList.contains("is-open") ? closeSidebar() : openSidebar();
      });
      overlay.addEventListener("click", closeSidebar);
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") closeSidebar();
      });

      // IntersectionObserver: highlight current section
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          navList.querySelectorAll("li[data-nav-id]").forEach(function(li) {
            li.classList.remove("is-active");
          });
          var active = navList.querySelector("li[data-nav-id=\"" + entry.target.id + "\"]");
          if (active) active.classList.add("is-active");
        });
      }, { rootMargin: "-20% 0px -70% 0px", threshold: 0 });

      sections.forEach(function(s) {
        var el = document.getElementById(s.id);
        if (el) observer.observe(el);
      });
    }

    // ─── Theme toggle ─────────────────────────────────
    document.getElementById("themeToggle").addEventListener("click", function() {
      var current = document.documentElement.getAttribute("data-theme");
      var next = current === "light" ? "" : "light";
      if (next) {
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("rpd-theme", next);
      } else {
        document.documentElement.removeAttribute("data-theme");
        localStorage.removeItem("rpd-theme");
      }
    });
  </script>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week — RPD</title>
  <meta name="description" content="Robot Product Design 실습 페이지" />
  <link rel="stylesheet" href="assets/tokens.css" />
  <style>
    /* ── Week-page specific styles ── */
    .hero {
      padding: 100px 0 28px; text-align: center;
    }
    .hero-card { display: grid; gap: 18px; justify-items: center; width: 100%; }
    .hero h1 {
      margin: 0; font-family: var(--font-display);
      font-size: clamp(2.2rem, 5vw, 4.2rem);
      font-weight: 650; letter-spacing: -.026em; line-height: 1.1;
    }
    .hero p {
      max-width: 720px; margin: 0;
      color: var(--muted-strong); font-size: clamp(.98rem, 1.6vw, 1.06rem);
      line-height: 1.8;
    }
    .hero-meta { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
    .meta-chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 13px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(23,24,26,.88); color: var(--muted-strong);
      font-size: .82rem;
    }

    /* Topic checklist */
    .topic-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .topic-progress-bar { flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,.08); }
    .topic-progress-fill { height: 100%; border-radius: 2px; background: var(--key-soft); transition: width .35s ease; width: 0%; }
    .topic-progress-label { font-size: .78rem; color: var(--muted); white-space: nowrap; }

    .topic-check-list { display: flex; flex-direction: column; gap: 7px; }
    .topic-check-item { position: relative; }
    .topic-check-item input[type="checkbox"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .topic-check-item label {
      display: flex; align-items: center; gap: 11px;
      padding: 9px 16px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      color: var(--muted-strong); font-size: .87rem;
      cursor: pointer;
      transition: background .22s, border-color .22s, color .22s;
      user-select: none;
    }
    .topic-check-item label::before {
      content: ""; flex-shrink: 0;
      width: 14px; height: 14px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.22);
      transition: background .22s, border-color .22s;
    }
    .topic-check-item input:checked + label {
      background: rgba(10,132,255,.14);
      border-color: rgba(10,132,255,.4);
      color: #dbeafe;
    }
    .topic-check-item input:checked + label::before {
      background: var(--key-soft);
      border-color: var(--key-soft);
      background-image: url("data:image/svg+xml,%3Csvg width='9' height='7' viewBox='0 0 9 7' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 3.5L3.2 5.8L8 1' stroke='white' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: center;
    }

    /* Nav between weeks */
    .week-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; border-bottom: 1px solid var(--line); margin-bottom: 48px;
    }
    .week-nav a {
      display: flex; align-items: center; gap: 8px;
      color: var(--muted-strong); font-size: .88rem;
      transition: color .14s;
    }
    .week-nav a:hover { color: var(--text); }

    /* Lab section */
    .lab { display: grid; gap: 16px; }
    .lab-note {
      display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px;
      padding: 14px 18px; border-radius: var(--radius-md);
      border: 1px solid var(--line); background: rgba(23,24,26,.7);
      color: var(--muted-strong); font-size: .88rem;
    }

    /* Progress sticky */
    .progress-widget { min-width: min(380px, 44vw); }

    /* Text accent */
    .text-key { color: var(--key-soft); }

    /* Responsive */
    @media (max-width: 720px) {
      .hero { padding-top: 108px; }
    }

    /* ── Content layout ── */
    .content-layout {
      display: flex; position: relative;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 240px; height: 100vh;
      background: rgba(10,10,12,.96);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(20px);
      z-index: 50;
      padding: 72px 0 24px;
      overflow-y: auto;
      transform: translateX(-100%);
      transition: transform .26s cubic-bezier(.4,0,.2,1);
    }
    .sidebar.is-open { transform: translateX(0); }

    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 49;
    }
    .sidebar-overlay.is-visible { display: block; }

    .sidebar-nav { list-style: none; margin: 0; padding: 8px 0; }
    .sidebar-nav li a {
      display: block; padding: 8px 20px;
      font-size: .84rem; color: var(--muted);
      border-left: 2px solid transparent;
      transition: color .14s, border-color .14s, background .14s;
    }
    .sidebar-nav li a:hover {
      color: var(--text); background: rgba(255,255,255,.04);
    }
    .sidebar-nav li.is-active a {
      color: var(--key-soft); border-left-color: var(--key-soft);
      background: rgba(10,132,255,.08);
    }
    .sidebar-nav .nav-section-label {
      display: block; padding: 14px 20px 4px;
      font-size: .72rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; font-weight: 600;
    }

    /* ── Sidebar toggle button ── */
    .sidebar-toggle {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--muted-strong); cursor: pointer;
      transition: background .14s, color .14s; flex-shrink: 0;
    }
    .sidebar-toggle:hover { background: rgba(255,255,255,.09); color: var(--text); }

    .brand-left { display: flex; align-items: center; gap: 10px; }
    .main-content { flex: 1; min-width: 0; }
  </style>
</head>
<body>
  <div class="page-shell" id="pageShell">

    <!-- Topbar (populated by JS) -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-left">
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="목차 열기" type="button">
            <svg width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect y="0"  width="18" height="1.6" rx="0.8" fill="currentColor"/>
              <rect y="6"  width="12" height="1.6" rx="0.8" fill="currentColor"/>
              <rect y="12" width="18" height="1.6" rx="0.8" fill="currentColor"/>
            </svg>
          </button>
          <div class="brand">
            <div class="brand-badge" id="brandBadge">—</div>
            <div class="brand-copy">
              <strong id="brandTitle">불러오는 중...</strong>
              <span>Robot Product Design · 2026</span>
            </div>
          </div>
        </div>
        <div class="progress-widget">
          <div class="progress-label">진도</div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-count" id="progressCount">0 / 0</div>
          <button class="btn btn-ghost" id="resetBtn" type="button">초기화</button>
        </div>
      </div>
    </header>

    <!-- Page content = populated by JS -->
    <div class="content-layout">
      <nav class="sidebar" id="sidebar" aria-hidden="true">
        <ul class="sidebar-nav" id="sidebarNav"></ul>
      </nav>
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <main class="main-content" id="pageContent"></main>
    </div>

    <footer class="page-footer">
      <div>Robot Product Design 2026 · <a href="index.html" style="color:var(--key-soft)">← 전체 목록</a></div>
    </footer>
  </div>

  <script src="data/curriculum.js"></script>
  <script>
    // ════════════════════════════════════════════════
    //  Week page template engine
    //  URL: week.html?week=2  →  renders Week 02 data
    // ════════════════════════════════════════════════

    const params   = new URLSearchParams(location.search);
    const weekNum  = parseInt(params.get("week") || "1", 10);
    const weekData = CURRICULUM.find(w => w.week === weekNum);
    const storageKey = `blender2026-week${weekNum}-v1`;

    // ─── Guard ───────────────────────────────────────
    if (!weekData) {
      document.getElementById("pageContent").innerHTML = `
        <section style="padding:80px 0;text-align:center;color:var(--muted)">
          <p>해당 주차 데이터를 찾을 수 없습니다. <a href="index.html" style="color:var(--key-soft)">← 돌아가기</a></p>
        </section>`;
    } else {
      buildPage(weekData);
    }

    // ─── Build page ─────────────────────────────────
    function buildPage(w) {
      document.title = `Week ${w.week} — ${w.title}`;

      // Topbar
      document.getElementById("brandBadge").textContent = String(w.week).padStart(2, "0");
      document.getElementById("brandTitle").textContent = `Week ${String(w.week).padStart(2, "0")} · ${w.title}`;

      // Prev/Next
      const prev = CURRICULUM.find(x => x.week === w.week - 1);
      const next = CURRICULUM.find(x => x.week === w.week + 1);
      const prevLink = prev
        ? `<a href="week.html?week=${prev.week}">← Week ${prev.week}</a>`
        : `<a href="index.html">← 홈</a>`;
      const nextLink = next
        ? `<a href="week.html?week=${next.week}">Week ${next.week} →</a>`
        : `<span style="opacity:.4">마지막 주차</span>`;

      const videos = w.videos || [];
      const docs = w.docs || [];

      // Topics (checkable pills with localStorage persistence)
      const topicStorageKey = storageKey + "-topics";
      const savedTopics = JSON.parse(localStorage.getItem(topicStorageKey) || "{}");
      const topicTotal = w.topics.length;
      const topicCheckedInit = w.topics.filter((_, i) => savedTopics["t" + i]).length;

      const topicPills =
        "<div class=\"topic-progress\">" +
          "<div class=\"topic-progress-bar\"><div class=\"topic-progress-fill\" id=\"topicFill\" style=\"width:" + Math.round(topicCheckedInit / topicTotal * 100) + "%\"></div></div>" +
          "<div class=\"topic-progress-label\" id=\"topicCount\">" + topicCheckedInit + " / " + topicTotal + "</div>" +
        "</div>" +
        "<div class=\"topic-check-list\">" +
        w.topics.map((t, i) => {
          const id = "tc-" + weekNum + "-" + i;
          const chk = savedTopics["t" + i] ? " checked" : "";
          return "<div class=\"topic-check-item\"><input type=\"checkbox\" id=\"" + id + "\"" + chk + " data-ti=\"" + i + "\" /><label for=\"" + id + "\">" + t + "</label></div>";
        }).join("") +
        "</div>";

      // Steps HTML
      const stepsHtml = w.steps.map((step, idx) => {
        const taskItems = step.tasks.map(t => `
          <div class="task-item">
            <input id="${t.id}" type="checkbox" data-task-id="${t.id}" />
            <label for="${t.id}">
              <strong>${t.label}</strong>
              ${t.detail ? `<small>${t.detail}</small>` : ""}
            </label>
          </div>`).join("");

        return `
          <article class="lab-step" id="step-${idx}" data-step-index="${idx}">
            <div class="step-header">
              <div class="step-title-group">
                <div class="step-number">${idx + 1}</div>
                <strong class="step-title-text">${step.title}</strong>
              </div>
              <div class="status-pill" data-step-status>진행 중</div>
            </div>
            ${step.image ? (step.link
              ? `<a href="${step.link}" target="_blank" rel="noopener noreferrer"><img src="${step.image}" alt="${step.title}" class="step-image" loading="lazy" /></a>`
              : `<img src="${step.image}" alt="${step.title}" class="step-image" loading="lazy" />`) : ""}
            <p class="step-copy">${step.copy}</p>
            <div class="task-list">${taskItems}</div>
          </article>`;
      }).join("");

      // Mistakes
      const mistakesHtml = w.mistakes.length > 0 ? `
        <section class="content-block" id="section-mistakes">
          <div class="section-head"><h3>막히는 지점</h3></div>
          <details class="card mistakes-section" open>
            <summary>막혔을 때</summary>
            <ul>${w.mistakes.map(m => `<li>${m}</li>`).join("")}</ul>
          </details>
        </section>` : "";

      const renderResourceSection = (title, icon, items) => items.length > 0 ? `
        <section class="content-block">
          <div class="section-head"><h3>${title}</h3></div>
          <div class="doc-links-row">
            ${items.map(d => `
              <a class="doc-link" href="${d.url}" target="_blank" rel="noopener noreferrer">
                ${icon} ${d.title} ↗
              </a>`).join("")}
          </div>
        </section>` : "";

      // Videos / Docs
      const videosHtml = renderResourceSection("공식 영상 튜토리얼", "▶", videos);
      const docsHtml = renderResourceSection("공식 문서", "📄", docs);

      // Assignment
      const assignmentCheckli = w.assignment.checklist.map(c => `<li>${c}</li>`).join("");
      const assignmentHtml = `
        <section class="content-block" id="section-assignment">
          <div class="section-head"><h3>과제</h3></div>
          <div class="card assignment-card">
            <div class="card-chip">과제</div>
            <strong>${w.assignment.title}</strong>
            <p style="color:var(--muted);line-height:1.72;margin:0">${w.assignment.description}</p>
            <ul>${assignmentCheckli}</ul>
          </div>
        </section>`;

      // Shortcuts cheatsheet
      const shortcutsHtml = (w.shortcuts && w.shortcuts.length > 0) ? `
        <section class="content-block" id="section-shortcuts">
          <div class="section-head">
            <h3>단축키 치트시트</h3>
            <p>이번 주에 쓰는 핵심 단축키입니다. 외우지 말고 반복하세요.</p>
          </div>
          <div class="card shortcut-table-wrap">
            <table class="shortcut-table">
              <thead><tr><th>단축키</th><th>기능</th></tr></thead>
              <tbody>
                ${w.shortcuts.map(s => `<tr><td><kbd class="shortcut-key">${s.keys}</kbd></td><td>${s.action}</td></tr>`).join("")}
              </tbody>
            </table>
          </div>
        </section>` : "";

      // Explore (더 해보기)
      const exploreHtml = (w.explore && w.explore.length > 0) ? `
        <section class="content-block" id="section-explore">
          <div class="section-head">
            <h3>더 해보기</h3>
            <p>필수는 아니지만, 도전하면 실력이 빠르게 늡니다.</p>
          </div>
          <div class="explore-grid">
            ${w.explore.map(e => `
              <div class="explore-card">
                <strong>${e.title}</strong>
                <p>${e.hint}</p>
              </div>`).join("")}
          </div>
        </section>` : "";

      // Full page — all data sourced from curriculum.js (trusted, no user input)
      document.getElementById("pageContent").innerHTML = `
        <!-- Hero -->
        <section class="hero" id="hero-section">
          <div class="hero-card">
            <div class="eyebrow">Week ${String(w.week).padStart(2,"0")} · RPD</div>
            <h1>${w.title}</h1>
            <div class="hero-meta">
              <span class="meta-chip">⏱ ${w.duration}</span>
              <span class="meta-chip">📋 ${w.steps.length}단계 실습</span>
              ${videos.length ? `<span class="meta-chip">▶ ${videos.length}개 공식 영상</span>` : ""}
              ${docs.length ? `<span class="meta-chip">📄 ${docs.length}개 공식 문서</span>` : ""}
            </div>
          </div>
        </section>

        <!-- Topics -->
        <section class="content-block">
          <div class="section-head"><h3>이번 주</h3></div>
          <div class="topic-list">${topicPills}</div>
        </section>

        <!-- Lab (Steps) -->
        <section class="content-block" id="practice">
          <div class="section-head"><h3>실습</h3></div>
          <div class="lab">
            ${stepsHtml}
          </div>
        </section>

        ${shortcutsHtml}
        ${exploreHtml}
        ${mistakesHtml}
        ${videosHtml}
        ${docsHtml}
        ${assignmentHtml}

        <!-- Week nav -->
        <section class="content-block">
          <div class="week-nav">
            ${prevLink}
            <a href="index.html" style="color:var(--muted)">목록</a>
            ${nextLink}
          </div>
        </section>

        <div style="height:60px"></div>
      `;

      // Init progress engine
      initProgress(w.steps.length);
      initTopicChecks(w.topics.length, topicStorageKey);
      initSidebar(w);
    }

    // ─── Topic check engine ──────────────────────────
    function initTopicChecks(total, key) {
      const fill  = document.getElementById("topicFill");
      const count = document.getElementById("topicCount");
      if (!fill || !count) return;

      function updateTopicProgress() {
        const all     = [...document.querySelectorAll(".topic-check-list input[type='checkbox']")];
        const checked = all.filter(c => c.checked).length;
        const pct     = total > 0 ? Math.round(checked / total * 100) : 0;
        fill.style.width  = pct + "%";
        count.textContent = checked + " / " + total;
        const state = {};
        all.forEach((c, i) => { state["t" + i] = c.checked; });
        localStorage.setItem(key, JSON.stringify(state));
      }

      document.querySelectorAll(".topic-check-list input[type='checkbox']").forEach(cb => {
        cb.addEventListener("change", updateTopicProgress);
      });
    }

    // ─── Progress engine ─────────────────────────────
    function initProgress(totalSteps) {
      const steps       = [...document.querySelectorAll(".lab-step")];
      const progressFill  = document.getElementById("progressFill");
      const progressCount = document.getElementById("progressCount");
      const resetBtn      = document.getElementById("resetBtn");

      function readState() {
        try { return JSON.parse(localStorage.getItem(storageKey) || "{}"); }
        catch { return {}; }
      }
      function writeState(state) {
        localStorage.setItem(storageKey, JSON.stringify(state));
      }
      function getTasks(step) {
        return [...step.querySelectorAll("input[type='checkbox'][data-task-id]")];
      }
      function isComplete(step) {
        return getTasks(step).every(t => t.checked);
      }

      function updateStep(step) {
        const pill     = step.querySelector("[data-step-status]");
        const complete = isComplete(step);
        step.classList.toggle("is-complete", complete);
        if (complete) { pill.textContent = "완료"; pill.className = "status-pill complete"; }
        else          { pill.textContent = "진행 중"; pill.className = "status-pill active"; }
      }

      function sync() {
        const completed = steps.filter(isComplete).length;
        const pct = steps.length ? (completed / steps.length) * 100 : 0;
        progressFill.style.width  = `${pct}%`;
        progressCount.textContent = `${completed} / ${steps.length}`;

        steps.forEach(step => updateStep(step));
      }

      function loadState() {
        const state = readState();
        steps.forEach(step => {
          getTasks(step).forEach(task => {
            task.checked = Boolean(state[task.dataset.taskId]);
            task.addEventListener("change", () => {
              const s = readState();
              s[task.dataset.taskId] = task.checked;
              writeState(s);
              sync();
            });
          });
        });
        sync();
      }

      resetBtn.addEventListener("click", () => {
        localStorage.removeItem(storageKey);
        steps.forEach(step => getTasks(step).forEach(t => { t.checked = false; }));
        sync();
      });

      loadState();
    }

    // ─── Sidebar ────────────────────────────────────
    function initSidebar(w) {
      var sidebar   = document.getElementById("sidebar");
      var overlay   = document.getElementById("sidebarOverlay");
      var toggleBtn = document.getElementById("sidebarToggle");
      var navList   = document.getElementById("sidebarNav");

      if (!sidebar || !overlay || !toggleBtn || !navList) return;

      // Build section list
      var sections = [{ id: "hero-section", label: "개요", group: null }];
      w.steps.forEach(function(step, idx) {
        sections.push({ id: "step-" + idx, label: step.title, group: idx === 0 ? "실습" : null });
      });
      if (w.shortcuts && w.shortcuts.length)  sections.push({ id: "section-shortcuts",  label: "단축키",      group: "참고" });
      if (w.explore   && w.explore.length)    sections.push({ id: "section-explore",    label: "더 해보기",   group: null });
      if (w.mistakes  && w.mistakes.length)   sections.push({ id: "section-mistakes",   label: "막히는 지점", group: null });
      if (w.assignment)                        sections.push({ id: "section-assignment", label: "과제",        group: null });

      // Render nav (curriculum.js = trusted developer data, not user input)
      var navHtml = sections.map(function(s) {
        var g = s.group ? "<li><span class=\"nav-section-label\">" + s.group + "</span></li>" : "";
        return g + "<li data-nav-id=\"" + s.id + "\"><a href=\"#" + s.id + "\">" + s.label + "</a></li>";
      }).join("");
      navList.innerHTML = navHtml; // trusted static curriculum data

      // Open / close
      function openSidebar() {
        sidebar.classList.add("is-open");
        overlay.classList.add("is-visible");
        sidebar.removeAttribute("aria-hidden");
      }
      function closeSidebar() {
        sidebar.classList.remove("is-open");
        overlay.classList.remove("is-visible");
        sidebar.setAttribute("aria-hidden", "true");
      }

      toggleBtn.addEventListener("click", function() {
        sidebar.classList.contains("is-open") ? closeSidebar() : openSidebar();
      });
      overlay.addEventListener("click", closeSidebar);
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") closeSidebar();
      });

      // IntersectionObserver: highlight current section
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          navList.querySelectorAll("li[data-nav-id]").forEach(function(li) {
            li.classList.remove("is-active");
          });
          var active = navList.querySelector("li[data-nav-id=\"" + entry.target.id + "\"]");
          if (active) active.classList.add("is-active");
        });
      }, { rootMargin: "-20% 0px -70% 0px", threshold: 0 });

      sections.forEach(function(s) {
        var el = document.getElementById(s.id);
        if (el) observer.observe(el);
      });
    }
  </script>
</body>
</html>

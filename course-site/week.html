    function setStepExpanded(step, expanded) {
      var text = getWeekText();
      var toggle = step.querySelector("[data-step-toggle]");
      var body = step.querySelector("[data-step-body]");
      if (!toggle || !body) return;
      var nextExpanded = Boolean(expanded);
      step.classList.toggle("is-expanded", nextExpanded);
      step.classList.toggle("is-collapsed", !nextExpanded);
      toggle.setAttribute("aria-expanded", nextExpanded ? "true" : "false");
      toggle.setAttribute("aria-label", nextExpanded ? text.stepToggleCollapse : text.stepToggleExpand);
      body.hidden = !nextExpanded;
    }

    function initStepAccordion() {
      var steps = Array.from(document.querySelectorAll(".lab-step"));
      if (!steps.length) return;

      var firstIncompleteIndex = steps.findIndex(function(step) {
        return !step.classList.contains("is-complete");
      });
      var defaultOpenIndex = firstIncompleteIndex === -1 ? 0 : firstIncompleteIndex;
      var hashTargetId = window.location.hash ? window.location.hash.slice(1) : "";
      var hashStep = hashTargetId ? document.getElementById(hashTargetId) : null;

      steps.forEach(function(step, idx) {
        var toggle = step.querySelector("[data-step-toggle]");
        if (!toggle) return;
        setStepExpanded(step, hashStep && hashStep.classList.contains("lab-step")
          ? step === hashStep
          : idx === defaultOpenIndex);
        toggle.addEventListener("click", function() {
          var shouldExpand = step.classList.contains("is-collapsed");
          if (shouldExpand) {
            steps.forEach(function(item) {
              if (item !== step) setStepExpanded(item, false);
            });
          }
          setStepExpanded(step, shouldExpand);
        });
      });

      document.querySelectorAll('a[href^="#step-"]').forEach(function(link) {
        link.addEventListener("click", function() {
          var targetId = link.getAttribute("href").slice(1);
          var step = document.getElementById(targetId);
          if (!step) return;
          steps.forEach(function(item) {
            setStepExpanded(item, item === step);
          });
        });
      });
    }

    function setTaskExpanded(taskItem, expanded) {
      var toggle = taskItem.querySelector("[data-task-toggle]");
      var detail = taskItem.querySelector(".task-detail");
      if (!toggle || !detail) return;
      var nextExpanded = Boolean(expanded);
      taskItem.classList.toggle("is-expanded", nextExpanded);
      taskItem.classList.toggle("is-collapsed", !nextExpanded);
      toggle.setAttribute("aria-expanded", nextExpanded ? "true" : "false");
      detail.hidden = !nextExpanded;
    }

    function initTaskAccordion() {
      var taskItems = Array.from(document.querySelectorAll("[data-task-item]"));
      if (!taskItems.length) return;

      taskItems.forEach(function(taskItem) {
        var toggle = taskItem.querySelector("[data-task-toggle]");
        if (!toggle) return;
        setTaskExpanded(taskItem, false);
        toggle.addEventListener("click", function() {
          var shouldExpand = taskItem.classList.contains("is-collapsed");
          var taskList = taskItem.closest(".task-list");
          if (taskList) {
            Array.from(taskList.querySelectorAll("[data-task-item]")).forEach(function(otherItem) {
              if (otherItem !== taskItem) setTaskExpanded(otherItem, false);
            });
          }
          setTaskExpanded(taskItem, shouldExpand);
        });
      });
    }

    function initTopicChecks(key) {
      function updateTopicProgress() {
        var all = Array.from(document.querySelectorAll(".topic-check-list input[type='checkbox']"));
        var state = {};
        all.forEach(function(input, idx) {
          state["t" + idx] = input.checked;
        });
        localStorage.setItem(key, JSON.stringify(state));

        var checkedCount = all.filter(function(input) { return input.checked; }).length;
        var countEl = document.getElementById("topicCount");
        var fillEl = document.getElementById("topicFill");
        if (countEl) countEl.textContent = checkedCount + " / " + all.length;
        if (fillEl) fillEl.style.width = all.length ? Math.round(checkedCount / all.length * 100) + "%" : "0%";
      }

      document.querySelectorAll(".topic-check-list input[type='checkbox']").forEach(function(input) {
        input.addEventListener("change", updateTopicProgress);
      });
      updateTopicProgress();
    }

    function initProgress() {
      var text = getWeekText();
      var steps = Array.from(document.querySelectorAll(".lab-step"));

      function readState() {
        try { return JSON.parse(localStorage.getItem(storageKey) || "{}"); }
        catch (error) { return {}; }
      }

      function writeState(state) {
        localStorage.setItem(storageKey, JSON.stringify(state));
      }

      function getTasks(step) {
        return Array.from(step.querySelectorAll("input[type='checkbox'][data-task-id]"));
      }

      function isComplete(step) {
        return getTasks(step).every(function(task) { return task.checked; });
      }

      function updateStep(step) {
        var pill = step.querySelector("[data-step-status]");
        var complete = isComplete(step);
        step.classList.toggle("is-complete", complete);
        if (complete) {
          pill.textContent = text.stepStatusComplete;
          pill.className = "status-pill complete";
        } else {
          pill.textContent = text.stepStatusActive;
          pill.className = "status-pill active";
        }
      }

      function sync() {
        steps.forEach(updateStep);
        refreshWeekActionPanels();
      }

      var state = readState();
      steps.forEach(function(step) {
        getTasks(step).forEach(function(task) {
          task.checked = Boolean(state[task.dataset.taskId]);
          task.addEventListener("change", function() {
            var nextState = readState();
            nextState[task.dataset.taskId] = task.checked;
            writeState(nextState);
            sync();
          });
        });
      });

      sync();
    }

    var showMeLastTrigger = null;
    var activeShowMeWidgetId = null;
    var showMeBrowserOpen = window.innerWidth >= 1100;
    var showMeBrowserQuery = "";

    function getWeekShowMeIds() {
      var ids = [];
      var seen = {};
      if (!weekData || !Array.isArray(weekData.steps)) return ids;
      weekData.steps.forEach(function(step) {
        collectShowMeIdsFromStep(step).forEach(function(id) {
          if (!id || seen[id]) return;
          seen[id] = true;
          ids.push(id);
        });
      });
      return ids;
    }

    function buildShowMeBrowserCard(id) {
      var meta = getShowMeMeta(id);
      var keywords = Array.isArray(meta.keywords) ? meta.keywords : [];
      var prerequisites = Array.isArray(meta.prerequisites) ? meta.prerequisites : [];
      return {
        id: id,
        icon: meta.icon || "📖",
        iconKey: meta.iconKey || "",
        label: meta.label || id,
        canonicalLabel: meta.label || id,
        toolName: meta.toolName || "",
        category: meta.category || "",
        stageLabel: meta.stageLabel || "",
        keywords: keywords,
        prerequisites: prerequisites,
        manualSection: typeof getShowMeManualSectionId === "function" ? getShowMeManualSectionId(id) : "",
        searchText: [
          id,
          meta.label,
          meta.category,
          meta.stageLabel,
          meta.confusionLabel,
          meta.audienceNeed,
          keywords.join(" "),
          prerequisites.join(" ")
        ].join(" ").toLowerCase()
      };
    }

    function sortShowMeBrowserCards(cards) {
      return cards.slice().sort(function(a, b) {
        return a.label.localeCompare(b.label, window.RPDI18n.getLanguage(), { sensitivity: "base" });
      });
    }

    function prioritizeActiveShowMeBrowserCard(cards) {
      if (!activeShowMeWidgetId) return cards.slice();
      var activeCards = [];
      var otherCards = [];
      cards.forEach(function(card) {
        if (card.id === activeShowMeWidgetId) activeCards.push(card);
        else otherCards.push(card);
      });
      return activeCards.concat(otherCards);
    }

    function getAllShowMeBrowserCards() {
      return sortShowMeBrowserCards(Object.keys(SHOWME_REGISTRY || {}).map(buildShowMeBrowserCard));
    }

    function getSharedShowMeTermScore(baseCard, candidateCard) {
      var score = 0;
      var baseTerms = {};
      []
        .concat(baseCard.keywords || [])
        .concat(baseCard.prerequisites || [])
        .concat((baseCard.canonicalLabel || "").split(/[\s/,-]+/))
        .forEach(function(term) {
          var normalized = String(term || "").trim().toLowerCase();
          if (normalized.length >= 3) baseTerms[normalized] = true;
        });

      []
        .concat(candidateCard.keywords || [])
        .concat(candidateCard.prerequisites || [])
        .concat((candidateCard.canonicalLabel || "").split(/[\s/,-]+/))
        .forEach(function(term) {
          var normalized = String(term || "").trim().toLowerCase();
          if (baseTerms[normalized]) score += 1;
        });

      return score;
    }

    function getTunedShowMeRelationScore(current, card) {
      var sharesCategory = card.category && current.category && card.category === current.category;
      var sharesManualSection = card.manualSection && current.manualSection && card.manualSection === current.manualSection;
      var sharesStage = card.stageLabel && current.stageLabel && card.stageLabel === current.stageLabel;
      var sharedTermScore = Math.min(getSharedShowMeTermScore(current, card), 3);
      var score = 0;

      if (sharesCategory) score += 7;
      if (sharesManualSection) score += 4;
      if (sharesStage) score += 2;
      if (sharesCategory && sharesManualSection) score += 2;
      if (sharesManualSection && sharesStage) score += 1;
      score += sharedTermScore;

      return score;
    }

    function getRelatedShowMeCards(widgetId, weekIdSet, limit) {
      var current = buildShowMeBrowserCard(widgetId);
      return getAllShowMeBrowserCards()
        .filter(function(card) {
          return card.id !== widgetId && !weekIdSet[card.id];
        })
        .map(function(card) {
          return { card: card, score: getTunedShowMeRelationScore(current, card) };
        })
        .filter(function(item) { return item.score > 0; })
        .sort(function(a, b) {
          if (b.score !== a.score) return b.score - a.score;
          return a.card.label.localeCompare(b.card.label, window.RPDI18n.getLanguage(), { sensitivity: "base" });
        })
        .slice(0, limit || 8)
        .map(function(item) { return item.card; });
    }

    function matchesShowMeBrowserQuery(card, query) {
      return !query || card.searchText.indexOf(query) !== -1;
    }

    function createShowMeBrowserItem(card) {
      var text = getWeekText();
      var isActive = card.id === activeShowMeWidgetId;
      var button = document.createElement("button");
      button.type = "button";
      button.className = "showme-browser-item" + (isActive ? " is-active" : "");
      button.setAttribute("aria-current", isActive ? "true" : "false");

      var iconWrap = document.createElement("span");
      iconWrap.innerHTML = renderShowMeIcon(card, "browser");
      button.appendChild(iconWrap.firstChild);

      var copy = document.createElement("span");
      copy.className = "showme-browser-item-copy";

      var kickerRow = document.createElement("span");
      kickerRow.className = "showme-browser-item-kicker-row";
      var hasKickerRow = false;

      var kickerText = getShowMeKickerText(card);
      if (kickerText) {
        var kicker = document.createElement("span");
        kicker.className = "showme-browser-item-kicker";
        kicker.textContent = kickerText;
        kickerRow.appendChild(kicker);
        hasKickerRow = true;
      }

      if (isActive) {
        var state = document.createElement("span");
        state.className = "showme-browser-item-state";
        state.textContent = text.modalBrowserViewing;
        kickerRow.appendChild(state);
        hasKickerRow = true;
      }

      if (hasKickerRow) {
        copy.appendChild(kickerRow);
      }

      var label = document.createElement("span");
      label.className = "showme-browser-item-label";
      label.textContent = card.label;
      copy.appendChild(label);

      var meta = document.createElement("span");
      meta.className = "showme-browser-item-meta";
      meta.textContent = getShowMeMetaLine(card);
      copy.appendChild(meta);
      button.appendChild(copy);

      button.addEventListener("click", function() {
        openShowMe(card.id);
      });
      return button;
    }

    function appendShowMeBrowserSection(container, title, cards) {
      if (!cards.length) return false;

      var section = document.createElement("section");
      section.className = "showme-browser-section";

      var head = document.createElement("div");
      head.className = "showme-browser-section-head";

      var heading = document.createElement("div");
      heading.className = "showme-browser-section-title";
      heading.textContent = title;
      head.appendChild(heading);

      var count = document.createElement("span");
      count.className = "showme-browser-section-count";
      count.textContent = cards.length;
      head.appendChild(count);

      section.appendChild(head);

      var list = document.createElement("div");
      list.className = "showme-browser-list";
      cards.forEach(function(card) {
        list.appendChild(createShowMeBrowserItem(card));
      });
      section.appendChild(list);

      container.appendChild(section);
      return true;
    }

    function setShowMeBrowserOpen(nextOpen) {
      var modal = document.querySelector(".showme-modal");
      var browser = document.getElementById("showmeBrowser");
      var toggle = document.getElementById("showmeBrowseToggle");
      if (!modal || !browser || !toggle) return;
      showMeBrowserOpen = Boolean(nextOpen);
      modal.classList.toggle("is-browser-open", showMeBrowserOpen);
      browser.setAttribute("aria-hidden", showMeBrowserOpen ? "false" : "true");
      toggle.classList.toggle("is-active", showMeBrowserOpen);
      toggle.setAttribute("aria-pressed", showMeBrowserOpen ? "true" : "false");
    }

    function renderShowMeBrowser() {
      var text = getWeekText();
      var container = document.getElementById("showmeBrowserContent");
      var link = document.getElementById("showmeBrowserLibraryLink");
      if (!container || !link) return;

      link.textContent = text.modalBrowseLibraryLink;
      link.href = activeShowMeWidgetId
        ? "library.html?showme=" + encodeURIComponent(activeShowMeWidgetId)
        : "library.html";

      container.textContent = "";
      if (!weekData) return;

      var query = String(showMeBrowserQuery || "").trim().toLowerCase();
      var weekIds = getWeekShowMeIds();
      var weekIdSet = {};
      weekIds.forEach(function(id) { weekIdSet[id] = true; });

      if (query) {
        var results = prioritizeActiveShowMeBrowserCard(
          getAllShowMeBrowserCards()
            .filter(function(card) { return matchesShowMeBrowserQuery(card, query); })
            .sort(function(a, b) {
              if (weekIdSet[a.id] !== weekIdSet[b.id]) return weekIdSet[a.id] ? -1 : 1;
              return a.label.localeCompare(b.label, window.RPDI18n.getLanguage(), { sensitivity: "base" });
            })
        ).slice(0, 24);

        if (!appendShowMeBrowserSection(container, text.modalBrowseResults, results)) {
          var empty = document.createElement("div");
          empty.className = "showme-browser-empty";
          empty.textContent = text.modalBrowseEmpty;
          container.appendChild(empty);
        }
        return;
      }

      var weekCards = prioritizeActiveShowMeBrowserCard(
        sortShowMeBrowserCards(weekIds.map(buildShowMeBrowserCard))
      );
      var relatedCards = activeShowMeWidgetId
        ? getRelatedShowMeCards(activeShowMeWidgetId, weekIdSet, 8)
        : [];
      var hasContent = false;
      hasContent = appendShowMeBrowserSection(container, text.modalBrowseCurrent, weekCards) || hasContent;
      hasContent = appendShowMeBrowserSection(container, text.modalBrowseRelated, relatedCards) || hasContent;

      if (!hasContent) {
        var fallback = document.createElement("div");
        fallback.className = "showme-browser-empty";
        fallback.textContent = text.modalBrowseEmpty;
        container.appendChild(fallback);
      }

      var activeItem = container.querySelector(".showme-browser-item.is-active");
      if (activeItem) {
        window.requestAnimationFrame(function() {
          activeItem.scrollIntoView({ block: "nearest", inline: "nearest" });
        });
      }
    }

    function renderShowMeRelatedPrompt(widgetId) {
      var text = getWeekText();
      var prompt = document.getElementById("showmeRelatedPrompt");
      var label = document.getElementById("showmeRelatedLabel");
      var actions = document.getElementById("showmeRelatedActions");
      if (!prompt || !label || !actions) return;

      actions.textContent = "";
      if (!widgetId || !weekData) {
        prompt.hidden = true;
        prompt.classList.remove("is-visible");
        return;
      }

      var weekIds = getWeekShowMeIds();
      var weekIdSet = {};
      weekIds.forEach(function(id) { weekIdSet[id] = true; });

      var relatedCards = getRelatedShowMeCards(widgetId, weekIdSet, 3);
      if (!relatedCards.length) {
        prompt.hidden = true;
        prompt.classList.remove("is-visible");
        return;
      }

      label.textContent = text.showMeRelatedPrompt;

      relatedCards.forEach(function(card) {
        var button = document.createElement("button");
        button.type = "button";
        button.className = "showme-related-btn";
        button.innerHTML = renderShowMeIcon(card, "pill") + '<span class="showme-related-btn-label">' + escapeHtml(card.label) + '</span>';
        button.addEventListener("click", function() {
          openShowMe(card.id);
        });
        actions.appendChild(button);
      });

      var moreButton = document.createElement("button");
      moreButton.type = "button";
      moreButton.className = "showme-related-btn";
      moreButton.textContent = text.showMeRelatedMore;
      moreButton.addEventListener("click", function() {
        setShowMeBrowserOpen(true);
        renderShowMeBrowser();
      });
      actions.appendChild(moreButton);

      prompt.hidden = false;
      prompt.classList.add("is-visible");
    }

    function openShowMe(widgetId) {
      var overlay = document.getElementById("showmeOverlay");
      var iframe = document.getElementById("showmeIframe");
      var title = document.getElementById("showmeTitle");
      var titleIcon = document.getElementById("showmeTitleIcon");
      var titleMeta = document.getElementById("showmeTitleMeta");
      var closeBtn = document.getElementById("showmeClose");
      var text = getWeekText();
      var meta = getShowMeMeta(widgetId);
      var cacheBust = String(Date.now());
      var active = document.activeElement;
      var wasOpen = overlay.classList.contains("is-open");
      showMeLastTrigger = active && active !== document.body ? active : null;
      activeShowMeWidgetId = widgetId;
      syncShowMeQuery(widgetId);

      title.textContent = meta.label;
      titleMeta.textContent = getShowMeMetaLine(meta) || text.modalCurrentCardFallbackMeta;
      titleIcon.innerHTML = renderShowMeIcon(meta, "browser");
      renderShowMeBrowser();
      renderShowMeRelatedPrompt(widgetId);
      setShowMeBrowserOpen(showMeBrowserOpen);
      iframe.onload = function() {
        normalizeShowMeLayout(iframe);
        injectShowMeSupplement(iframe, widgetId);
        window.RPDI18n.localizeShowMeIframe(iframe, widgetId);
      };
      iframe.src = "assets/showme/" + widgetId + ".html?wid=" + encodeURIComponent(widgetId) + "&v=" + cacheBust;
      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden", "false");
      if (wasOpen && window.innerWidth < 980) {
        setShowMeBrowserOpen(false);
      }
      document.body.style.overflow = "hidden";
      if (!wasOpen) {
        window.setTimeout(function() {
          closeBtn.focus({ preventScroll: true });
        }, 50);
      }
    }

    function closeShowMe() {
      var overlay = document.getElementById("showmeOverlay");
      var iframe  = document.getElementById("showmeIframe");
      var modal   = overlay.querySelector(".showme-modal");
      if (!overlay.classList.contains("is-open")) return;
      overlay.classList.remove("is-open");
      overlay.setAttribute("aria-hidden", "true");
      modal.classList.remove("is-maximized");
      iframe.onload = null;
      iframe.src = "about:blank";
      syncShowMeQuery("");
      renderShowMeRelatedPrompt("");
      document.body.style.overflow = "";
      if (showMeLastTrigger && document.contains(showMeLastTrigger)) {
        showMeLastTrigger.focus({ preventScroll: true });
      }
      showMeLastTrigger = null;
      activeShowMeWidgetId = null;
    }

    function refreshOpenShowMe() {
      var overlay = document.getElementById("showmeOverlay");
      if (!overlay.classList.contains("is-open") || !activeShowMeWidgetId) return;
      openShowMe(activeShowMeWidgetId);
    }

    function syncShowMeQuery(widgetId) {
      if (!window.history || typeof window.history.replaceState !== "function") return;
      var url = new URL(window.location.href);
      if (widgetId) url.searchParams.set("showme", widgetId);
      else url.searchParams.delete("showme");
      window.history.replaceState({}, "", url.pathname + url.search + url.hash);
    }

    function maybeOpenRequestedShowMe() {
      if (!pendingShowMeFromUrl || !weekData || !requestedShowMeId) return;
      var matchesWeek = weekData.steps.some(function(step) {
        return collectShowMeIdsFromStep(step).indexOf(requestedShowMeId) !== -1;
      });
      pendingShowMeFromUrl = false;
      if (!matchesWeek) return;
      window.setTimeout(function() {
        openShowMe(requestedShowMeId);
      }, 0);
    }

    function toggleShowMeSize() {
      var modal = document.querySelector(".showme-modal");
      modal.classList.toggle("is-maximized");
    }

    document.getElementById("showmeBrowseToggle").addEventListener("click", function() {
      setShowMeBrowserOpen(!showMeBrowserOpen);
      if (showMeBrowserOpen) {
        var searchInput = document.getElementById("showmeBrowserSearch");
        if (searchInput) searchInput.focus({ preventScroll: true });
      }
    });
    document.getElementById("showmeResize").addEventListener("click", toggleShowMeSize);
    document.getElementById("showmeClose").addEventListener("click", closeShowMe);
    document.getElementById("showmeBrowserBackdrop").addEventListener("click", function() {
      setShowMeBrowserOpen(false);
    });
    document.getElementById("showmeBrowserSearch").addEventListener("input", function(e) {
      showMeBrowserQuery = e.target.value || "";
      renderShowMeBrowser();
      if (e.target.value && !showMeBrowserOpen) setShowMeBrowserOpen(true);
    });
    document.getElementById("showmeBrowserReset").addEventListener("click", function() {
      var search = document.getElementById("showmeBrowserSearch");
      showMeBrowserQuery = "";
      if (search) search.value = "";
      renderShowMeBrowser();
    });
    document.getElementById("showmeOverlay").addEventListener("click", function(e) {
      if (e.target === this) closeShowMe();
    });
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        var overlay = document.getElementById("showmeOverlay");
        if (overlay.classList.contains("is-open")) closeShowMe();
      }
    });

    // ─── Anonymous Quiz Tracking ─────────────────────
    // Public pages stay read-only. Quiz completion is stored locally per browser.

    function getQuizKey() {
      return `blender2026-showme-week${String(weekNum).padStart(2, "0")}-v1`;
    }

    function initStudentLogin() {
      var overlay = document.getElementById("studentLoginOverlay");
      var badge = document.getElementById("studentBadge");
      if (overlay) overlay.classList.add("is-hidden");
      if (badge) badge.classList.remove("is-active");
    }

    function loginAsStudent() {
      initStudentLogin();
    }

    function loginAsGuest() {
      initStudentLogin();
    }

    function switchStudent() {
      initStudentLogin();
    }

    function showToast(message, type) {
      var stack = document.getElementById("toastStack");
      if (!stack || !message) return;

      var toast = document.createElement("div");
      toast.className = "toast-card toast-card--" + (type || "info");
      toast.setAttribute("role", "status");

      var body = document.createElement("div");
      body.className = "toast-body";
      body.textContent = message;
      toast.appendChild(body);
      stack.appendChild(toast);

      window.requestAnimationFrame(function() {
        toast.classList.add("is-visible");
      });

      function dismiss() {
        if (!toast.parentNode) return;
        toast.classList.remove("is-visible");
        toast.classList.add("is-exiting");
        window.setTimeout(function() {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 200);
      }

      window.setTimeout(dismiss, 2400);
    }

    function updateShowMeBadges() {
      var quizzes = JSON.parse(localStorage.getItem(getQuizKey()) || "{}");
      document.querySelectorAll(".btn-showme").forEach(function(btn) {
        var wid = btn.dataset.widgetId;
        if (wid && quizzes[wid] && quizzes[wid].pass) {
          btn.classList.add("is-complete");
        } else {
          btn.classList.remove("is-complete");
        }
      });
      refreshWeekActionPanels();
    }

    window.addEventListener("message", function(e) {
      if (!e.data || e.data.type !== "showme-quiz-complete") return;
      var d = e.data;
      var key = getQuizKey();
      var quizzes = JSON.parse(localStorage.getItem(key) || "{}");
      quizzes[d.widgetId] = {
        score: d.score,
        total: d.total,
        pass: d.pass,
        completedAt: new Date().toISOString()
      };
      localStorage.setItem(key, JSON.stringify(quizzes));
      updateShowMeBadges();
      showToast(getWeekText().toastQuizSaved, d.pass ? "success" : "info");
    });

    var sidebarObserver = null;
    var sidebarBindingsReady = false;

    function isDesktopSidebar() {
      return window.matchMedia("(min-width: 981px)").matches;
    }

    function openSidebar() {
      var sidebar = document.getElementById("sidebar");
      var overlay = document.getElementById("sidebarOverlay");
      if (!sidebar || !overlay) return;
      if (isDesktopSidebar()) {
        sidebar.classList.add("is-open");
        overlay.classList.remove("is-visible");
        sidebar.removeAttribute("aria-hidden");
        return;
      }
      sidebar.classList.add("is-open");
      overlay.classList.add("is-visible");
      sidebar.removeAttribute("aria-hidden");
    }

    function closeSidebar() {
      var sidebar = document.getElementById("sidebar");
      var overlay = document.getElementById("sidebarOverlay");
      if (!sidebar || !overlay) return;
      if (isDesktopSidebar()) {
        sidebar.classList.add("is-open");
        overlay.classList.remove("is-visible");
        sidebar.removeAttribute("aria-hidden");
        return;
      }
      sidebar.classList.remove("is-open");
      overlay.classList.remove("is-visible");
      sidebar.setAttribute("aria-hidden", "true");
    }

    function initSidebar(w) {
      var text = getWeekText();
      var isKo = window.RPDI18n.getLanguage() === "ko";
      var sidebar   = document.getElementById("sidebar");
      var overlay   = document.getElementById("sidebarOverlay");
      var toggleBtn = document.getElementById("sidebarToggle");
      var navList   = document.getElementById("sidebarNav");

      if (!sidebar || !overlay || !toggleBtn || !navList) return;

      function stripNavGlyph(label) {
        return String(label || "").replace(/^[^A-Za-z0-9가-힣]+/, "").trim();
      }

      var globalMenuLabel = isKo ? "전체 메뉴" : "Site";
      var globalLinks = [
        { href: withPresetHref("index.html"), label: text.homeLabel.replace(/^←\s*/, "") },
        { href: withPresetHref("library.html"), label: text.footerLibrary },
        { href: withPresetHref("shortcuts.html"), label: stripNavGlyph(text.shortcutsLink) },
        { href: "https://www.notion.so/31e54d654971812e9c38f85124b45e3f", label: stripNavGlyph(text.aiRefsLink), external: true },
        { href: "https://www.notion.so/31e54d65497181c89e8bfa97bb5efaa7", label: stripNavGlyph(text.blenderRefsLink), external: true }
      ];

      var sections = [
        { id: "hero-section", label: text.sidebarOverview, group: null }
      ];
      if (w.topics && w.topics.length) {
        sections.push({ id: "section-topics", label: isKo ? "이번 주" : "This week", group: null });
      }
      w.steps.forEach(function(step, idx) {
        sections.push({ id: "step-" + idx, label: step.title, group: idx === 0 ? text.sidebarPracticeGroup : null });
      });
      if (currentWeekHasReference) {
        sections.push({ id: "section-reference", label: isKo ? "참고자료" : "References", group: text.sidebarReferenceGroup });
      }
      if (w.assignment) sections.push({ id: "section-assignment", label: text.sidebarAssignment, group: null });

      var showmeSet = {};
      w.steps.forEach(function(step) {
        var ids = collectShowMeIdsFromStep(step);
        ids.forEach(function(id) { showmeSet[id] = true; });
      });
      var showmeIds = Object.keys(showmeSet);

      var navHtml = "<li><span class=\"nav-section-label nav-section-label-global\">" + globalMenuLabel + "</span></li>";
      navHtml += globalLinks.map(function(link, idx) {
        return "<li" + (idx === globalLinks.length - 1 ? " class=\"sidebar-group-end\"" : "") + "><a class=\"sidebar-link-global\" href=\"" + link.href + "\"" +
          (link.external ? " target=\"_blank\" rel=\"noopener noreferrer\"" : "") +
          ">" + link.label + "</a></li>";
      }).join("");

      navHtml += sections.map(function(s) {
        var g = s.group ? "<li><span class=\"nav-section-label\">" + s.group + "</span></li>" : "";
        return g + "<li data-nav-id=\"" + s.id + "\"><a href=\"#" + s.id + "\">" + s.label + "</a></li>";
      }).join("");

      if (showmeIds.length > 0) {
        navHtml += "<li><span class=\"nav-section-label\">" + text.sidebarShowMe + "</span></li>";
        showmeIds.forEach(function(id) {
          var meta = getShowMeMeta(id);
          navHtml += "<li><a href=\"#\" onclick=\"openShowMe('" + id + "');return false;\">" +
            meta.icon + " " + meta.label + "</a></li>";
        });
      }

      navList.innerHTML = navHtml;

      if (!sidebarBindingsReady) {
        toggleBtn.addEventListener("click", function() {
          sidebar.classList.contains("is-open") ? closeSidebar() : openSidebar();
        });
        overlay.addEventListener("click", closeSidebar);
        document.addEventListener("keydown", function(e) {
          if (e.key === "Escape") closeSidebar();
        });
        sidebarBindingsReady = true;
      }

      if (isDesktopSidebar()) {
        sidebar.classList.add("is-open");
        sidebar.removeAttribute("aria-hidden");
        overlay.classList.remove("is-visible");
      } else {
        sidebar.classList.remove("is-open");
        sidebar.setAttribute("aria-hidden", "true");
        overlay.classList.remove("is-visible");
      }

      if (sidebarObserver) sidebarObserver.disconnect();
      sidebarObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          navList.querySelectorAll("li[data-nav-id]").forEach(function(li) {
            li.classList.remove("is-active");
          });
          var active = navList.querySelector("li[data-nav-id=\"" + entry.target.id + "\"]");
          if (active) active.classList.add("is-active");
        });
      }, { rootMargin: "-20% 0px -70% 0px", threshold: 0 });

      sections.forEach(function(s) {
        var el = document.getElementById(s.id);
        if (el) sidebarObserver.observe(el);
      });
    }

    window.addEventListener("resize", function() {
      if (!document.getElementById("sidebar")) return;
      if (isDesktopSidebar()) {
        openSidebar();
      } else {
        closeSidebar();
      }
    });

    // ─── Theme toggle ─────────────────────────────────
    document.getElementById("themeToggle").addEventListener("click", function() {
      var current = document.documentElement.getAttribute("data-theme");
      var next = current === "light" ? "" : "light";
      if (next) {
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("rpd-theme", next);
      } else {
        document.documentElement.removeAttribute("data-theme");
        localStorage.removeItem("rpd-theme");
      }
    });
  </script>
</body>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Studio — Blender Archive</title>
  <script>document.documentElement.dataset.theme=localStorage.getItem('rpd-theme')||'dark'</script>
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/components.css">
  <link rel="stylesheet" href="assets/layout.css">
  <link rel="stylesheet" href="assets/chrome.css">
  <link rel="stylesheet" href="assets/page-studio.css">
  <script>/* FOUC prevention */ (function(){var t=localStorage.getItem('rpd-theme');if(t)document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('rpd-lang');if(l){document.documentElement.lang=l;document.documentElement.setAttribute('data-lang',l);}})()</script>
</head>
<body data-tab="studio">
  <a href="#my-decks" class="skip-link">본문으로 건너뛰기</a>
  <div class="app" data-shell>
    <main class="main">
      <div class="main-inner">
        <div class="studio-header">
          <h1 class="studio-title">My Studio</h1>
          <p class="studio-desc">내가 보고 싶은 카드만 모아서 나만의 덱을 만들어 보세요.</p>
        </div>

        <section class="studio-section" id="my-decks">
          <h2 class="studio-section-title">내 덱</h2>
          <div class="studio-empty-state">
            <div class="studio-empty-icon">📦</div>
            <p class="studio-empty-text">아직 만든 덱이 없어요.</p>
            <p class="studio-empty-hint">프리셋 덱을 복제하거나 새로 만들어 보세요.</p>
            <button class="btn btn-primary studio-create-btn">+ 첫 번째 덱 만들기</button>
          </div>
        </section>

        <section class="studio-section" id="progress">
          <h2 class="studio-section-title">진도 현황</h2>
          <div class="studio-progress-placeholder">
            <p>로그인하면 진도를 확인할 수 있어요.</p>
          </div>
        </section>

        <section class="studio-section" id="settings">
          <h2 class="studio-section-title">설정</h2>
          <div class="studio-settings-placeholder">
            <p>테마, 언어, 알림을 설정할 수 있어요.</p>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="assets/shell.js"></script>
  <script src="assets/tab-system.js"></script>
  <script src="assets/user-profile.js"></script>
  <script src="assets/site-shell.js"></script>
  <script src="assets/layout.js"></script>
  <script>
    window.RPDAppShell.bindThemeToggle(document.getElementById("themeToggle"));
  </script>
</body>
</html>

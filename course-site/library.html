<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Show Me 카드 라이브러리 — Blender Archive</title>
  <meta name="description" content="Blender Archive 안의 Show Me 카드를 Blender 공식 문서 흐름에 맞춰 찾는 라이브러리" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="assets/tokens.css" />
  <style>
/* ── Layout ── */
.lib-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--topbar-bg);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 0 20px;
}
.lib-header-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 18px 0;
  display: flex; flex-direction: column; gap: 14px;
}
.lib-back {
  color: var(--muted); font-size: .84rem;
  transition: color .14s;
}
.lib-back:hover { color: var(--text); }
.lib-title {
  margin: 0; font-size: clamp(1.28rem, 2.2vw, 1.8rem);
  font-family: var(--font-display); font-weight: 620;
  letter-spacing: -.028em;
}
.lib-subtitle {
  margin: 4px 0 0; color: var(--muted-strong); font-size: .84rem;
}
.lib-search-wrap {
  display: flex; align-items: center; gap: 12px;
}
.lib-search {
  flex: 1; padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  background: var(--surface-strong);
  color: var(--text); font: inherit; font-size: .9rem;
  outline: none; transition: border-color .14s;
}
.lib-search:focus { border-color: var(--key); }
.lib-search::placeholder { color: var(--muted); }
.lib-count {
  font-size: .8rem; color: var(--muted); white-space: nowrap;
}
.lib-week-filter {
  max-width: calc(var(--max-width) + 120px);
  margin: 0 auto;
  padding: 12px 20px 0;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.lib-week-chip {
  padding: 4px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: none;
  color: var(--muted);
  font-size: .78rem;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color .14s, color .14s, background .14s;
}
.lib-week-chip:hover { color: var(--muted-strong); border-color: var(--line-strong); }
.lib-week-chip.is-active {
  border-color: var(--key);
  color: var(--key-soft);
  background: rgba(10,132,255,.08);
}
.lib-card-week {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  margin-top: 6px;
  padding: 1px 7px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--overlay-white);
  font-size: .68rem;
  color: var(--muted);
}
.lib-shell {
  max-width: calc(var(--max-width) + 120px);
  margin: 0 auto;
  padding: 24px 20px 80px;
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  gap: 32px;
  align-items: start;
}
.lib-main {
  min-width: 0;
  padding: 0;
}
.lib-nav-shell {
  position: sticky;
  top: 96px;
  z-index: 9;
  background: none;
  backdrop-filter: none;
  border-bottom: none;
}
.lib-nav-inner {
  margin: 0;
  padding: 0;
  display: grid;
  gap: 18px;
}
.lib-nav-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  align-items: start;
}
.lib-nav-label {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
}
.lib-nav-scroller {
  display: grid;
  gap: 4px;
  overflow: visible;
}
.lib-chip {
  display: inline-flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  width: 100%;
  padding: 6px 0 6px 12px;
  border-radius: 0;
  border: none;
  border-left: 2px solid transparent;
  background: none;
  color: var(--muted);
  cursor: pointer;
  transition: border-color .14s, color .14s;
  white-space: normal;
  font: inherit;
  font-size: .8rem;
  text-align: left;
}
.lib-chip:hover {
  color: var(--text);
}
.lib-chip.is-active {
  border-left-color: var(--key-soft);
  color: var(--text);
}
.lib-chip.is-disabled {
  opacity: .45;
  cursor: default;
}
.lib-chip strong {
  font-size: .74rem;
  color: inherit;
}
.lib-back:focus-visible,
.lib-search:focus-visible,
.lib-chip:focus-visible,
.lib-card:focus-visible,
.showme-close:focus-visible,
#langSwitcher .lang-switcher-btn:focus-visible {
  outline: 2px solid var(--key-soft);
  outline-offset: 2px;
}
.lib-search:focus-visible,
.lib-chip:focus-visible,
.lib-card:focus-visible,
.showme-close:focus-visible,
#langSwitcher .lang-switcher-btn:focus-visible {
  border-color: rgba(10,132,255,.42);
}
.lib-section {
  display: grid;
  gap: 18px;
  margin-top: 40px;
  padding-top: 0;
  scroll-margin-top: 96px;
}
.lib-section:first-child {
  margin-top: 0;
}
.lib-section-head {
  display: grid;
  gap: 8px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--line);
}
.lib-section-eyebrow {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
}
.lib-section-title-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.lib-section-title {
  margin: 0;
  font-size: clamp(1.1rem, 2vw, 1.4rem);
  font-weight: 650;
  letter-spacing: -.02em;
}
.lib-section-count {
  flex-shrink: 0;
  font-size: .8rem;
  color: var(--muted);
}
.lib-section-copy {
  margin: 0;
  max-width: 860px;
  color: var(--muted-strong);
  line-height: 1.7;
  font-size: .9rem;
}
.lib-section-body {
  display: grid;
  gap: 18px;
}
.lib-subsection {
  display: grid;
  gap: 12px;
}
.lib-subsection-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.lib-subsection-title {
  margin: 0;
  font-size: .92rem;
  font-weight: 620;
  color: var(--muted-strong);
}
.lib-subsection-meta {
  font-size: .76rem;
  color: var(--muted);
}
.lib-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 0 20px;
}
.lib-card {
  display: flex; align-items: flex-start;
  min-height: 0;
  padding: 12px 0;
  border-radius: 0;
  border: none;
  border-bottom: 1px solid var(--line);
  background: none;
  cursor: pointer;
  transition: border-color .14s, color .14s;
  text-align: left;
  font-family: inherit;
}
.lib-card:hover {
  border-bottom-color: var(--line-strong);
}
.lib-card.is-active {
  border-bottom-color: rgba(10,132,255,.42);
}
.lib-card.is-active .lib-card-label {
  color: var(--key-soft);
}
.lib-card.is-active .lib-card-week {
  border-color: rgba(10,132,255,.34);
  color: var(--key-soft);
  background: rgba(10,132,255,.08);
}
.lib-card-label {
  font-size: .88rem;
  font-weight: 560;
  color: var(--text);
  line-height: 1.45;
  word-break: keep-all;
}
.lib-empty {
  grid-column: 1 / -1;
  padding: 60px 0; text-align: center; color: var(--muted);
  font-size: .9rem;
}
.showme-overlay {
  display: none; position: fixed; inset: 0;
  z-index: 100;
  background: rgba(0,0,0,.72);
  backdrop-filter: blur(8px);
  justify-content: center; align-items: center;
  padding: 20px;
  overscroll-behavior: contain;
}
.showme-overlay.is-open { display: flex; }
.showme-modal {
  width: min(1280px, 96vw);
  height: min(92vh, 900px);
  max-width: 100%;
  max-height: 100%;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(255,255,255,.12);
  background: var(--surface);
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: showme-in .22s ease;
}
@keyframes showme-in {
  from { opacity: 0; transform: scale(.97) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.showme-modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  background: var(--surface);
}
.showme-modal-title {
  font-size: .9rem; font-weight: 600; color: var(--text);
  line-height: 1.35;
  min-width: 0;
}
.showme-close {
  display: grid; place-items: center;
  width: 44px; height: 44px; border-radius: 12px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.04);
  color: var(--muted-strong); cursor: pointer;
  transition: background .14s, color .14s;
  flex-shrink: 0;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.showme-close:hover { background: rgba(255,255,255,.09); color: var(--text); }
.showme-iframe { flex: 1; width: 100%; border: none; background: var(--bg); min-height: 0; }
@media (max-width: 980px) {
  .lib-shell {
    width: calc(100% - 24px);
    padding: 20px 0 72px;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  .lib-nav-shell {
    top: 88px;
  }
  .lib-nav-scroller {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .lib-nav-scroller::-webkit-scrollbar { display: none; }
  .lib-chip {
    width: fit-content;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--line);
    background: var(--surface-strong);
    white-space: nowrap;
  }
  .lib-chip.is-active {
    border-left-color: transparent;
    border-color: var(--line-strong);
    background: var(--overlay-white-hover);
  }
  .lib-grid {
    grid-template-columns: 1fr;
    gap: 0;
  }
}
@media (max-width: 720px) {
  .showme-overlay { padding: 0; }
  .showme-modal {
    width: 100%;
    height: 100dvh;
    min-height: 100dvh;
    border-radius: 0;
    border: none;
  }
  .showme-modal-header {
    padding-top: calc(14px + env(safe-area-inset-top, 0px));
    padding-right: calc(18px + env(safe-area-inset-right, 0px));
    padding-left: calc(18px + env(safe-area-inset-left, 0px));
  }
}
@media (max-width: 600px) {
  .lib-card { min-height: 0; padding: 12px 0; }
  .lib-card-label { font-size: .84rem; }
  .lib-main { padding: 0; }
  .lib-shell { padding: 16px 0 60px; }
  .lib-nav-inner {
    padding: 0;
  }
  .lib-nav-row {
    grid-template-columns: 1fr;
    gap: 6px;
  }
  .lib-nav-label {
    font-size: .68rem;
  }
  .lib-section {
    scroll-margin-top: 156px;
  }
  .lib-section-title-row,
  .lib-subsection-head {
    display: grid;
    gap: 4px;
  }
}
  </style>
</head>
<body>

    <header class="lib-header">

        </div>

            id="libSearch"

          />
          <span class="lib-count" id="libCount" role="status" aria-live="polite"></span>

    </header>
    <nav class="lib-week-filter" id="libWeekFilter" aria-label="주차 필터"></nav>
    <div class="lib-shell">
      <aside class="lib-nav-shell">
        <div class="lib-nav-inner">
          <div class="lib-nav-row">
            <span class="lib-nav-label" id="libTocLabel">목차</span>
            <nav class="lib-nav-scroller" id="libToc" aria-label="라이브러리 목차"></nav>
          </div>
          <div class="lib-nav-row">
            <span class="lib-nav-label" id="libAlphaLabel">ABC</span>
            <nav class="lib-nav-scroller" id="libAlphabet" aria-label="ABC 필터"></nav>
          </div>
        </div>
      </aside>
      <main class="lib-main" id="libMain"></main>
    </div>

    <!-- Show Me Modal -->
    <div class="showme-overlay" id="showmeOverlay" aria-hidden="true">
      <div class="showme-modal" role="dialog" aria-modal="true" aria-labelledby="showmeTitle">
        <div class="showme-modal-header">
          <span class="showme-modal-title" id="showmeTitle"></span>
          <button class="showme-close" id="showmeClose" aria-label="닫기" type="button">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M4 4L12 12M12 4L4 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>

        <iframe class="showme-iframe" id="showmeIframe"

                title="Show Me Widget"></iframe>
      </div>
    </div>
  </div>

  <script src="assets/showme/_registry.js?v=20260318f"></script>
  <script src="assets/showme/_catalog.js?v=20260318c"></script>

  <script src="assets/showme/_helpers.js?v=20260318s"></script>
<script>
var activeLetter = "all";
var activeWeek = "all";
var showMeLastTrigger = null;
var activeShowMeWidgetId = null;
var lastSectionTargetId = "";
var params = new URLSearchParams(location.search);
var requestedShowMeId = params.get("showme") || "";
var pendingShowMeFromUrl = !!requestedShowMeId;
var FALLBACK_LIBRARY_TEXT = {
  pageTitle: "Show Me 카드 라이브러리 - Blender Archive",
  metaDescription: "Blender Archive 안의 Show Me 카드를 Blender 공식 문서 흐름에 맞춰 찾는 라이브러리",
  backHome: "← Blender Archive",
  title: "Show Me 카드 라이브러리",
  subtitle: "Blender 공식 문서처럼 큰 흐름으로 먼저 보고, 필요하면 검색과 ABC로 바로 좁혀보세요",
  searchAria: "도구 검색",
  searchPlaceholder: "예: Array, Mirror, UV...",
  tocAria: "라이브러리 목차",
  alphabetFilterAria: "ABC 필터",
  contentsLabel: "목차",
  alphabetLabel: "ABC",
  allLetters: "전체",
  sectionGettingStartedTitle: "시작 준비",
  sectionGettingStartedCopy: "환경 설정과 레퍼런스 준비처럼 Blender에 들어가기 전에 먼저 잡아야 하는 시작 단계를 모았습니다.",
  sectionUserInterfaceTitle: "기초 조작과 작업 흐름",
  sectionUserInterfaceCopy: "화면 조작, 축 기준, Pivot, 스냅처럼 Blender 인터페이스를 읽는 법과 기본 조작 감각을 먼저 정리합니다.",
  sectionModelingTitle: "모델링",
  sectionModelingCopy: "형태를 만들고 다듬는 핵심 구간입니다. Edit Mode 도구, Modifier, 정리용 개념을 한 흐름으로 묶었습니다.",
  sectionSculptingPaintingTitle: "스컬프팅 · 페인팅",
  sectionSculptingPaintingCopy: "브러시 기반으로 형태를 밀고 다듬는 흐름을 따로 모았습니다.",
  sectionMaterialsUvTitle: "셰이딩 · 재질 · UV",
  sectionMaterialsUvCopy: "재질 표현과 UV 준비를 함께 보게 해 Shader와 Texture 흐름을 한 번에 찾도록 구성했습니다.",
  sectionRenderingTitle: "렌더링",
  sectionRenderingCopy: "조명 세팅부터 렌더 엔진, 컴포지팅까지 최종 출력 단계에서 필요한 카드를 모았습니다.",
  sectionAnimationRiggingTitle: "애니메이션 · 리깅",
  sectionAnimationRiggingCopy: "키프레임, 그래프 편집, Armature, Weight Paint처럼 움직임과 캐릭터 제어에 필요한 주제를 묶었습니다.",
  modalCloseAria: "닫기",
  showmeFrameTitle: "Show Me Widget",
  emptyResults: "검색 결과가 없습니다"
};
var I18N = (function() {
  if (window.RPDI18n) return window.RPDI18n;
  return {
    getStrings: function() { return FALLBACK_LIBRARY_TEXT; },
    getShowMeLabel: function(id, meta) { return meta && meta.label ? meta.label : id; },
    getLanguage: function() {
      var lang = (document.documentElement && document.documentElement.lang) || "ko";
      return /^en/i.test(lang) ? "en" : "ko";
    },
    getLibraryCategoryLabel: function(value) { return value; },
    mountLanguageSwitcher: function() {},
    onLanguageChange: function() {},
    localizeShowMeIframe: function() {}
  };
})();

function getText() {
  return I18N.getStrings("library");
}

function getLocalizedMeta(id) {
  var meta = getShowMeEntry(id);
  return {
    raw: meta,
    icon: meta.icon,
    label: I18N.getShowMeLabel(id, meta)
  };
}

function getLibrarySections() {
  var text = getText();
  var textMap = {
    "getting-started": {
      title: text.sectionGettingStartedTitle,
      copy: text.sectionGettingStartedCopy
    },
    "user-interface": {
      title: text.sectionUserInterfaceTitle,
      copy: text.sectionUserInterfaceCopy
    },
    "modeling": {
      title: text.sectionModelingTitle,
      copy: text.sectionModelingCopy
    },
    "sculpting-painting": {
      title: text.sectionSculptingPaintingTitle,
      copy: text.sectionSculptingPaintingCopy
    },
    "materials-uv": {
      title: text.sectionMaterialsUvTitle,
      copy: text.sectionMaterialsUvCopy
    },
    "rendering": {
      title: text.sectionRenderingTitle,
      copy: text.sectionRenderingCopy
    },
    "animation-rigging": {
      title: text.sectionAnimationRiggingTitle,
      copy: text.sectionAnimationRiggingCopy
    }
  };

  var order = typeof getShowMeManualSectionOrder === "function"
    ? getShowMeManualSectionOrder()
    : ["getting-started", "user-interface", "modeling", "sculpting-painting", "materials-uv", "rendering", "animation-rigging"];

  return order.map(function(id) {
    return Object.assign({ id: id }, textMap[id] || { title: id, copy: "" });
  });
}

function getSearchQuery() {
  return document.getElementById("libSearch").value.toLowerCase().trim();
}

function getCanonicalLabel(id) {
  return (SHOWME_REGISTRY[id] && SHOWME_REGISTRY[id].label) || id;
}

function getAlphaLabel(id) {
  return String(id || "").replace(/[-_]+/g, " ").trim();
}

function getWeekValue(meta) {
  return meta && typeof meta.week === "number" ? meta.week : 0;
}

function getWeekLabel(week) {
  var isKo = window.RPDI18n.getLanguage() === "ko";
  if (week === 0) return isKo ? "공통" : "Core";
  return "Week " + week;
}

function getLetterKey(label) {
  var upper = (label || "").trim().toUpperCase();
  var first = upper.charAt(0);
  if (/^[A-Z0-9]$/.test(first)) return first;
  return "#";
}

function buildCardData(id) {
  var localized = getLocalizedMeta(id);
  var meta = localized.raw;
  return {
    id: id,
    localizedLabel: localized.label,
    canonicalLabel: getCanonicalLabel(id),
    alphaLabel: getAlphaLabel(id),
    alphaKey: getLetterKey(getAlphaLabel(id)),
    week: getWeekValue(meta),
    sectionId: getSectionIdForCard(id, meta.category || "기타"),
    meta: meta,
    searchText: [
      localized.label,
      getCanonicalLabel(id),
      getAlphaLabel(id),
      meta.label,
      id,
      meta.category,
      meta.stageLabel,
      meta.confusionLabel,
      meta.audienceNeed,
      (meta.keywords || []).join(" "),
      (meta.prerequisites || []).join(" ")
    ].join(" ").toLowerCase()
  };
}

function sortCards(a, b) {
  var primary = a.alphaLabel.localeCompare(b.alphaLabel, "en", { sensitivity: "base" });
  if (primary !== 0) return primary;
  return a.localizedLabel.localeCompare(b.localizedLabel, I18N.getLanguage(), { sensitivity: "base" });
}

function getAllCards() {
  return Object.keys(SHOWME_REGISTRY).map(buildCardData).sort(sortCards);
}

function matchesQuery(card, query) {
  return !query || card.searchText.indexOf(query) !== -1;
}

function matchesLetter(card) {
  return activeLetter === "all" || card.alphaKey === activeLetter;
}

function matchesWeek(card) {
  return activeWeek === "all" || card.week === activeWeek;
}

function getAvailableLetters(cards, query) {
  var seen = {};
  cards.forEach(function(card) {
    if (!matchesQuery(card, query)) return;
    seen[card.alphaKey] = true;
  });

  return Object.keys(seen).sort(function(a, b) {
    if (a === "#") return 1;
    if (b === "#") return -1;
    return a.localeCompare(b, "en");
  });
}

function getAvailableWeeks(cards, query) {
  var seen = {};
  cards.forEach(function(card) {
    if (!matchesQuery(card, query) || !matchesLetter(card)) return;
    seen[card.week] = true;
  });
  return Object.keys(seen).map(function(value) {
    return Number(value);
  }).sort(function(a, b) {
    if (a === 0) return 1;
    if (b === 0) return -1;
    return a - b;
  });
}

function ensureActiveLetter(cards, query) {
  var available = getAvailableLetters(cards, query);
  if (activeLetter !== "all" && available.indexOf(activeLetter) === -1) {
    activeLetter = "all";
  }
  return available;
}

function ensureActiveWeek(cards, query) {
  var available = getAvailableWeeks(cards, query);
  if (activeWeek !== "all" && available.indexOf(activeWeek) === -1) {
    activeWeek = "all";
  }
  return available;
}

function getVisibleCards(cards, query) {
  return cards.filter(function(card) {
    return matchesQuery(card, query) && matchesLetter(card) && matchesWeek(card);
  });
}

function prioritizeActiveCardList(cards) {
  if (!activeShowMeWidgetId) return cards.slice();
  var activeCards = [];
  var otherCards = [];
  cards.forEach(function(card) {
    if (card.id === activeShowMeWidgetId) activeCards.push(card);
    else otherCards.push(card);
  });
  return activeCards.concat(otherCards);
}

function prioritizeActiveSectionList(sections, visibleCards) {
  if (!activeShowMeWidgetId) return sections.slice();
  var activeSectionId = "";
  visibleCards.some(function(card) {
    if (card.id !== activeShowMeWidgetId) return false;
    activeSectionId = card.sectionId;
    return true;
  });
  if (!activeSectionId) return sections.slice();

  var activeSections = [];
  var otherSections = [];
  sections.forEach(function(section) {
    if (section.id === activeSectionId) activeSections.push(section);
    else otherSections.push(section);
  });
  return activeSections.concat(otherSections);
}

function prioritizeActiveCategoryList(categories, sectionCards) {
  if (!activeShowMeWidgetId) return categories.slice();
  var activeCategory = "";
  sectionCards.some(function(card) {
    if (card.id !== activeShowMeWidgetId) return false;
    activeCategory = card.meta.category || "기타";
    return true;
  });
  if (!activeCategory) return categories.slice();

  var activeCategories = [];
  var otherCategories = [];
  categories.forEach(function(category) {
    if (category === activeCategory) activeCategories.push(category);
    else otherCategories.push(category);
  });
  return activeCategories.concat(otherCategories);
}

function countCardsForSection(cards, section) {
  return cards.filter(function(card) { return card.sectionId === section.id; }).length;
}

function getSectionCategories(sectionCards) {
  return getShowMeCategoryOrder().filter(function(category) {
    if (category === "전체") return false;
    return sectionCards.some(function(card) {
      return (card.meta.category || "기타") === category;
    });
  });
}

function createCardButton(card) {
  var btn = document.createElement("button");
  var isActive = card.id === activeShowMeWidgetId;
  btn.className = "lib-card" + (isActive ? " is-active" : "");
  btn.setAttribute("type", "button");
  btn.setAttribute("data-showme-id", card.id);
  btn.setAttribute("aria-label", card.localizedLabel);
  btn.setAttribute("aria-current", isActive ? "true" : "false");
  btn.title = getShowMeTooltipText(card.id);

  var label = document.createElement("span");
  label.className = "lib-card-label";
  label.textContent = card.localizedLabel;
  btn.appendChild(label);

  var week = document.createElement("span");
  week.className = "lib-card-week";
  week.textContent = getWeekLabel(card.week);
  btn.appendChild(week);
  btn.addEventListener("click", function() { openShowMe(card.id); });
  return btn;
}

function renderToc(cards) {
  var text = getText();
  var toc = document.getElementById("libToc");
  var query = getSearchQuery();
  var visibleCards = getVisibleCards(cards, query);
  var orderedSections = prioritizeActiveSectionList(getLibrarySections(), visibleCards);

  toc.textContent = "";
  document.getElementById("libTocLabel").textContent = text.contentsLabel;

  orderedSections.forEach(function(section) {
    var count = countCardsForSection(visibleCards, section);
    if (!count) return;

    var btn = document.createElement("button");
    btn.className = "lib-chip" + (lastSectionTargetId === section.id ? " is-active" : "");
    btn.type = "button";
    btn.innerHTML = "<span>" + section.title + "</span><strong>" + count + "</strong>";
    btn.addEventListener("click", function() {
      var target = document.getElementById("section-" + section.id);
      if (!target) return;
      lastSectionTargetId = section.id;
      renderToc(cards);
      target.scrollIntoView({ behavior: "smooth", block: "start" });
    });
    toc.appendChild(btn);
  });
}

function renderAlphabet(cards, availableLetters) {
  var text = getText();
  var nav = document.getElementById("libAlphabet");
  nav.textContent = "";
  document.getElementById("libAlphaLabel").textContent = text.alphabetLabel;

  var allBtn = document.createElement("button");
  allBtn.type = "button";
  allBtn.className = "lib-chip" + (activeLetter === "all" ? " is-active" : "");
  allBtn.textContent = text.allLetters;
  allBtn.setAttribute("aria-pressed", activeLetter === "all" ? "true" : "false");
  allBtn.addEventListener("click", function() {
    activeLetter = "all";
    renderLibrary();
  });
  nav.appendChild(allBtn);

  availableLetters.forEach(function(letter) {
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "lib-chip" + (activeLetter === letter ? " is-active" : "");
    btn.textContent = letter;
    btn.setAttribute("aria-pressed", activeLetter === letter ? "true" : "false");
    btn.addEventListener("click", function() {
      activeLetter = letter;
      renderLibrary();
    });
    nav.appendChild(btn);
  });
}

function renderWeekFilter(cards, availableWeeks) {
  var nav = document.getElementById("libWeekFilter");
  var isKo = window.RPDI18n.getLanguage() === "ko";
  if (!nav) return;

  nav.textContent = "";
  nav.setAttribute("aria-label", isKo ? "주차 필터" : "Week filter");

  var allBtn = document.createElement("button");
  allBtn.type = "button";
  allBtn.className = "lib-week-chip" + (activeWeek === "all" ? " is-active" : "");
  allBtn.textContent = isKo ? "전체" : "All";
  allBtn.addEventListener("click", function() {
    activeWeek = "all";
    lastSectionTargetId = "";
    renderLibrary();
  });
  nav.appendChild(allBtn);

  availableWeeks.forEach(function(week) {
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "lib-week-chip" + (activeWeek === week ? " is-active" : "");
    btn.textContent = getWeekLabel(week);
    btn.addEventListener("click", function() {
      activeWeek = week;
      lastSectionTargetId = "";
      renderLibrary();
    });
    nav.appendChild(btn);
  });
}

function renderSections(cards) {
  var main = document.getElementById("libMain");
  var query = getSearchQuery();
  var visibleCards = getVisibleCards(cards, query);
  var text = getText();
  var sectionNumber = 0;
  var orderedSections = prioritizeActiveSectionList(getLibrarySections(), visibleCards);

  main.textContent = "";
  updateCount(visibleCards.length);

  if (!visibleCards.length) {
    var empty = document.createElement("p");
    empty.className = "lib-empty";
    empty.textContent = text.emptyResults;
    main.appendChild(empty);
    return;
  }

  orderedSections.forEach(function(section) {
    var sectionCards = prioritizeActiveCardList(visibleCards.filter(function(card) {
      return card.sectionId === section.id;
    }));
    if (!sectionCards.length) return;
    sectionNumber += 1;

    var sectionEl = document.createElement("section");
    sectionEl.className = "lib-section";
    sectionEl.id = "section-" + section.id;

    var head = document.createElement("header");
    head.className = "lib-section-head";

    var eyebrow = document.createElement("div");
    eyebrow.className = "lib-section-eyebrow";
    eyebrow.textContent = String(sectionNumber).padStart(2, "0");
    head.appendChild(eyebrow);

    var titleRow = document.createElement("div");
    titleRow.className = "lib-section-title-row";

    var title = document.createElement("h2");
    title.className = "lib-section-title";
    title.textContent = section.title;
    titleRow.appendChild(title);

    var count = document.createElement("span");
    count.className = "lib-section-count";
    count.textContent = sectionCards.length;
    titleRow.appendChild(count);
    head.appendChild(titleRow);

    var copy = document.createElement("p");
    copy.className = "lib-section-copy";
    copy.textContent = section.copy;
    head.appendChild(copy);

    sectionEl.appendChild(head);

    var body = document.createElement("div");
    body.className = "lib-section-body";

    prioritizeActiveCategoryList(getSectionCategories(sectionCards), sectionCards).forEach(function(category) {
      var groupCards = prioritizeActiveCardList(sectionCards.filter(function(card) {
        return (card.meta.category || "기타") === category;
      }));
      if (!groupCards.length) return;

      var subgroup = document.createElement("div");
      subgroup.className = "lib-subsection";

      var subgroupHead = document.createElement("div");
      subgroupHead.className = "lib-subsection-head";

      var subgroupTitle = document.createElement("h3");
      subgroupTitle.className = "lib-subsection-title";
      subgroupTitle.textContent = I18N.getLibraryCategoryLabel(category);
      subgroupHead.appendChild(subgroupTitle);

      var subgroupMeta = document.createElement("span");
      subgroupMeta.className = "lib-subsection-meta";
      subgroupMeta.textContent = groupCards.length;
      subgroupHead.appendChild(subgroupMeta);
      subgroup.appendChild(subgroupHead);

      var grid = document.createElement("div");
      grid.className = "lib-grid";
      groupCards.forEach(function(card) {
        grid.appendChild(createCardButton(card));
      });
      subgroup.appendChild(grid);

      body.appendChild(subgroup);
    });

    sectionEl.appendChild(body);
    main.appendChild(sectionEl);
  });
}

function updateCount(count) {
  var total = Object.keys(SHOWME_REGISTRY).length;
  var shown = count === undefined ? total : count;
  var lang = I18N.getLanguage();
  document.getElementById("libCount").textContent = shown === total
    ? (lang === "ko" ? total + "개 도구" : total + " tools")
    : (lang === "ko" ? shown + " / " + total + "개" : shown + " / " + total);
}

function renderLibrary() {
  var cards = getAllCards();
  var query = getSearchQuery();
  var availableLetters = ensureActiveLetter(cards, query);
  var availableWeeks = ensureActiveWeek(cards, query);
  renderWeekFilter(cards, availableWeeks);
  renderAlphabet(cards, availableLetters);
  renderSections(cards);
  renderToc(cards);
}

function renderPage() {
  var text = getText();
  document.title = text.pageTitle;
  var meta = document.querySelector('meta[name="description"]');
  if (meta) meta.setAttribute("content", text.metaDescription);
  document.getElementById("libBack").textContent = text.backHome;
  document.getElementById("libTitle").textContent = text.title;
  document.getElementById("libSubtitle").textContent = text.subtitle;
  document.getElementById("libSearch").setAttribute("aria-label", text.searchAria);
  document.getElementById("libSearch").setAttribute("placeholder", text.searchPlaceholder);
  document.getElementById("libToc").setAttribute("aria-label", text.tocAria);
  document.getElementById("libAlphabet").setAttribute("aria-label", text.alphabetFilterAria);
  document.getElementById("showmeClose").setAttribute("aria-label", text.modalCloseAria);
  document.getElementById("showmeIframe").setAttribute("title", text.showmeFrameTitle);
  renderLibrary();
  maybeOpenRequestedShowMe();
}

document.getElementById("libSearch").addEventListener("input", function() {
  lastSectionTargetId = "";
  renderLibrary();
});

function openShowMe(widgetId) {
  var overlay = document.getElementById("showmeOverlay");
  var iframe = document.getElementById("showmeIframe");
  var closeBtn = document.getElementById("showmeClose");
  var meta = getLocalizedMeta(widgetId);
  var cacheBust = String(Date.now());
  var active = document.activeElement;
  showMeLastTrigger = active && active !== document.body ? active : null;
  activeShowMeWidgetId = widgetId;
  syncShowMeQuery(widgetId);
  renderLibrary();
  showMeLastTrigger = document.querySelector('.lib-card[data-showme-id="' + widgetId + '"]') || showMeLastTrigger;
  document.getElementById("showmeTitle").textContent = meta.icon + " " + meta.label;
  iframe.onload = function() {
    normalizeShowMeLayout(this);
    injectShowMeSupplement(this, widgetId);
    I18N.localizeShowMeIframe(this, widgetId);
  };
  iframe.src = "assets/showme/" + widgetId + ".html?wid=" + encodeURIComponent(widgetId) + "&v=" + cacheBust;
  overlay.classList.add("is-open");
  overlay.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
  setTimeout(function() {
    closeBtn.focus({ preventScroll: true });
  }, 50);
}

function closeShowMe() {
  var overlay = document.getElementById("showmeOverlay");
  var iframe = document.getElementById("showmeIframe");
  var lastWidgetId = activeShowMeWidgetId;
  if (!overlay.classList.contains("is-open")) return;
  overlay.classList.remove("is-open");
  overlay.setAttribute("aria-hidden", "true");
  iframe.onload = null;
  iframe.src = "about:blank";
  syncShowMeQuery("");
  document.body.style.overflow = "";
  activeShowMeWidgetId = null;
  renderLibrary();
  var focusTarget = showMeLastTrigger;
  if ((!focusTarget || !document.contains(focusTarget)) && lastWidgetId) {
    focusTarget = document.querySelector('.lib-card[data-showme-id="' + lastWidgetId + '"]');
  }
  if (focusTarget && document.contains(focusTarget)) {
    focusTarget.focus({ preventScroll: true });
  }
  showMeLastTrigger = null;
}

function refreshOpenShowMe() {
  var overlay = document.getElementById("showmeOverlay");
  if (!overlay.classList.contains("is-open") || !activeShowMeWidgetId) return;
  openShowMe(activeShowMeWidgetId);
}

function syncShowMeQuery(widgetId) {
  if (!window.history || typeof window.history.replaceState !== "function") return;
  var url = new URL(window.location.href);
  if (widgetId) url.searchParams.set("showme", widgetId);
  else url.searchParams.delete("showme");
  window.history.replaceState({}, "", url.pathname + url.search + url.hash);
}

function maybeOpenRequestedShowMe() {
  if (!pendingShowMeFromUrl || !requestedShowMeId) return;
  pendingShowMeFromUrl = false;
  if (!SHOWME_REGISTRY[requestedShowMeId]) return;
  setTimeout(function() {
    openShowMe(requestedShowMeId);
  }, 0);
}

document.getElementById("showmeClose").addEventListener("click", closeShowMe);
document.getElementById("showmeOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeShowMe();
});
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeShowMe();
});

I18N.mountLanguageSwitcher(document.getElementById("langSwitcher"));
I18N.onLanguageChange(function() {
  renderPage();
  refreshOpenShowMe();
});
  </script>
</body>

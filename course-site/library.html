<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Show Me 카드 라이브러리 — Blender Archive</title>
  <meta name="description" content="Blender Archive 안의 Show Me 카드를 Blender 공식 문서 흐름에 맞춰 찾는 라이브러리" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="assets/tokens.css" />
  <link rel="stylesheet" href="assets/components.css" />
  <style>
/* ── Layout ── */
.lib-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--topbar-bg);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  padding: 0 20px;
}
.lib-header-inner {
  max-width: calc(var(--max-width) + 120px);
  margin: 0 auto;
  padding: 18px 0 20px;
  display: flex; flex-direction: column; gap: 16px;
}
.lib-back {
  color: var(--muted); font-size: .84rem;
  transition: color .14s;
}
.lib-back:hover { color: var(--text); }
.lib-title {
  margin: 0; font-size: clamp(1.34rem, 2.4vw, 1.94rem);
  font-family: var(--font-display); font-weight: 640;
  letter-spacing: -.032em;
}
.lib-subtitle {
  margin: 6px 0 0; color: var(--muted-strong); font-size: .9rem; line-height: 1.7;
  max-width: 70ch;
}
.lib-search-wrap {
  position: relative;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  align-items: center;
  gap: 12px;
  padding: 18px;
  border-radius: 24px;
  border: 1px solid var(--line);
  background: var(--modal-panel-bg);
  box-shadow: var(--modal-panel-shadow);
  overflow: hidden;
  isolation: isolate;
}
.lib-search-wrap::before {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 1px;
  background: var(--modal-top-line);
  pointer-events: none;
}
.lib-search {
  flex: 1; padding: 12px 14px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: var(--modal-panel-soft-strong-bg);
  box-shadow: var(--modal-card-shadow);
  color: var(--text); font: inherit; font-size: .92rem;
  outline: none; transition: border-color .14s, background .14s;
  position: relative;
  z-index: 1;
}
.lib-search:focus { border-color: rgba(10,132,255,.42); background: var(--modal-hover-bg); }
.lib-search::placeholder { color: var(--muted); }
.lib-count {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.04);
  color: var(--muted-strong);
  font-size: .78rem;
  white-space: nowrap;
  position: relative;
  z-index: 1;
}
.lib-week-filter {
  max-width: calc(var(--max-width) + 120px);
  margin: 0 auto;
  padding: 14px 20px 0;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.lib-week-chip {
  padding: 7px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.03);
  color: var(--muted);
  font-size: .78rem;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color .14s, color .14s, background .14s, transform .14s;
}
.lib-week-chip:hover { color: var(--muted-strong); border-color: var(--line-strong); transform: translateY(-1px); }
.lib-week-chip.is-active {
  border-color: rgba(96,165,250,.34);
  color: var(--text);
  background: var(--modal-nav-active-bg);
  box-shadow: inset 0 0 0 1px rgba(147,197,253,.1);
}
.lib-card-week {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  margin-top: 4px;
  padding: 4px 9px;
  border-radius: 999px;
  border: 1px solid rgba(122,162,247,.18);
  background: rgba(255,255,255,.04);
  font-size: .68rem;
  color: var(--muted-strong);
  flex-shrink: 0;
}
.lib-shell {
  max-width: calc(var(--max-width) + 120px);
  margin: 0 auto;
  padding: 24px 20px 80px;
  display: grid;
  grid-template-columns: 248px minmax(0, 1fr);
  gap: 24px;
  align-items: start;
}
.lib-main {
  min-width: 0;
  padding: 0;
  display: grid;
  gap: 18px;
}
.lib-nav-shell {
  position: sticky;
  top: 106px;
  z-index: 9;
}
.lib-nav-inner {
  position: relative;
  margin: 0;
  padding: 18px;
  display: grid;
  gap: 18px;
  border-radius: 24px;
  border: 1px solid var(--line);
  background: var(--modal-panel-bg);
  box-shadow: var(--modal-panel-shadow);
  overflow: hidden;
  isolation: isolate;
}
.lib-nav-inner::before {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 1px;
  background: var(--modal-top-line);
  pointer-events: none;
}
.lib-nav-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  align-items: start;
  position: relative;
  z-index: 1;
}
.lib-nav-label {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}
.lib-nav-scroller {
  display: grid;
  gap: 6px;
  overflow: visible;
}
.lib-chip {
  display: inline-flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  width: 100%;
  padding: 10px 12px;
  border-radius: 16px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: border-color .14s, color .14s, background .14s, transform .14s;
  white-space: normal;
  font: inherit;
  font-size: .8rem;
  text-align: left;
}
.lib-chip:hover {
  color: var(--text);
  border-color: var(--line);
  background: rgba(255,255,255,.03);
  transform: translateX(2px);
}
.lib-chip.is-active {
  border-color: rgba(96,165,250,.34);
  color: var(--text);
  background: var(--modal-nav-active-bg);
  box-shadow: inset 0 0 0 1px rgba(147,197,253,.1);
}
.lib-chip.is-disabled {
  opacity: .45;
  cursor: default;
}
.lib-chip strong {
  font-size: .74rem;
  color: inherit;
}
.lib-back:focus-visible,
.lib-search:focus-visible,
.lib-chip:focus-visible,
.lib-card:focus-visible,
.showme-browse-toggle:focus-visible,
.showme-close:focus-visible,
#langSwitcher .lang-switcher-btn:focus-visible {
  outline: 2px solid var(--key-soft);
  outline-offset: 2px;
}
.lib-search:focus-visible,
.lib-chip:focus-visible,
.lib-card:focus-visible,
.showme-browse-toggle:focus-visible,
.showme-close:focus-visible,
#langSwitcher .lang-switcher-btn:focus-visible {
  border-color: rgba(10,132,255,.42);
}
.lib-section {
  position: relative;
  display: grid;
  gap: 18px;
  margin-top: 0;
  padding: 24px;
  border-radius: 26px;
  border: 1px solid var(--line);
  background: var(--modal-panel-bg);
  box-shadow: var(--modal-panel-shadow);
  scroll-margin-top: 116px;
  overflow: hidden;
  isolation: isolate;
}
.lib-section::before {
  content: "";
  position: absolute;
  inset: 0 0 auto;
  height: 1px;
  background: var(--modal-top-line);
  pointer-events: none;
}
.lib-section:first-child {
  margin-top: 0;
}
.lib-section-head {
  display: grid;
  gap: 8px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
  position: relative;
  z-index: 1;
}
.lib-section-eyebrow {
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}
.lib-section-title-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.lib-section-title {
  margin: 0;
  font-size: clamp(1.1rem, 2vw, 1.4rem);
  font-weight: 650;
  letter-spacing: -.02em;
}
.lib-section-count {
  flex-shrink: 0;
  font-size: .8rem;
  color: var(--muted);
}
.lib-section-copy {
  margin: 0;
  max-width: 860px;
  color: var(--muted-strong);
  line-height: 1.7;
  font-size: .9rem;
}
.lib-section-body {
  display: grid;
  gap: 18px;
  position: relative;
  z-index: 1;
}
.lib-subsection {
  display: grid;
  gap: 12px;
}
.lib-subsection-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.lib-subsection-title {
  margin: 0;
  font-size: .92rem;
  font-weight: 620;
  color: var(--muted-strong);
}
.lib-subsection-meta {
  font-size: .76rem;
  color: var(--muted);
}
.lib-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}
.lib-card {
  display: flex; align-items: flex-start;
  min-height: 136px;
  padding: 16px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: var(--modal-panel-soft-bg);
  box-shadow: var(--modal-card-shadow);
  cursor: pointer;
  transition: transform .14s, border-color .14s, color .14s, background .14s, box-shadow .14s;
  text-align: left;
  font-family: inherit;
}
.lib-card:hover {
  transform: translateY(-2px);
  border-color: rgba(10,132,255,.34);
  background: var(--modal-hover-bg);
  box-shadow: var(--modal-hover-shadow);
}
.lib-card.is-active {
  border-color: rgba(96,165,250,.38);
  background: var(--modal-accent-bg);
  box-shadow: var(--modal-active-shadow);
}
.lib-card.is-active .lib-card-label {
  color: #f8fbff;
}
.lib-card.is-active .lib-card-week {
  border-color: rgba(10,132,255,.34);
  color: #eef6ff;
  background: rgba(10,132,255,.12);
}
.lib-card-copy {
  min-width: 0;
  flex: 1;
  display: grid;
  gap: 4px;
}
.lib-card-label {
  font-size: .88rem;
  font-weight: 560;
  color: var(--text);
  line-height: 1.45;
  word-break: keep-all;
}
.lib-card-reason {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.07);
  background: rgba(255,255,255,.035);
  font-size: .72rem;
  color: rgba(226,232,240,.72);
  line-height: 1.2;
  word-break: keep-all;
}
.lib-card-reasons {
  display: flex;
  flex-wrap: wrap;
  gap: 7px 6px;
  margin-top: 4px;
}
.lib-card-reason.is-category {
  border-color: rgba(96,165,250,.42);
  background: linear-gradient(135deg, rgba(10,132,255,.18), rgba(59,130,246,.08));
  color: #eff6ff;
  font-weight: 650;
  box-shadow: inset 0 0 0 1px rgba(147,197,253,.14);
}
.lib-card-reason.is-current {
  border-color: rgba(96,165,250,.28);
  background: rgba(96,165,250,.08);
  color: rgba(219,234,254,.96);
}
.lib-card-reason.is-manual,
.lib-card-reason.is-stage,
.lib-card-reason.is-shared {
  color: rgba(226,232,240,.68);
}
.lib-section--focus {
  background:
    radial-gradient(circle at top left, rgba(59,130,246,.08), transparent 34%),
    var(--modal-panel-bg);
}
.lib-section--focus .lib-section-head {
  padding-bottom: 18px;
}
.lib-section--focus .lib-section-body {
  gap: 22px;
}
.lib-section--focus .lib-grid {
  gap: 18px 24px;
}
.lib-section--focus .lib-card {
  padding: 18px 18px 20px;
  border-bottom-color: rgba(255,255,255,.07);
}
.lib-section--focus .lib-card-copy {
  gap: 7px;
}
.lib-section--focus .lib-card-reasons {
  margin-top: 5px;
}
.lib-section.is-focus-highlight .lib-section-head {
  border-bottom-color: rgba(96,165,250,.34);
  box-shadow: inset 0 -1px 0 rgba(96,165,250,.16);
}
.lib-section.is-focus-highlight .lib-section-title {
  color: #dbeafe;
}
.lib-section.is-focus-highlight .lib-section-copy {
  color: rgba(219,234,254,.82);
}
.lib-empty {
  grid-column: 1 / -1;
  padding: 48px 0; text-align: center; color: var(--muted);
  font-size: .9rem;
}
.showme-overlay {
  display: none; position: fixed; inset: 0;
  z-index: 100;
  background: rgba(0,0,0,.72);
  backdrop-filter: blur(8px);
  justify-content: center; align-items: center;
  padding: 20px;
  overscroll-behavior: contain;
}
.showme-overlay.is-open { display: flex; }
.showme-modal {
  width: min(1360px, 96vw);
  height: min(92vh, 920px);
  max-width: 100%;
  max-height: 100%;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(255,255,255,.12);
  background: var(--surface);
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: showme-in .22s ease;
}
@keyframes showme-in {
  from { opacity: 0; transform: scale(.97) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.showme-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  background: var(--surface);
}
.showme-modal-header-copy {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 14px;
}
.showme-modal-card-icon {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  border: 1px solid rgba(122,162,247,.2);
  background: linear-gradient(145deg, rgba(10,132,255,.18), rgba(255,255,255,.04)), rgba(255,255,255,.03);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 14px 32px rgba(0,0,0,.22);
  display: grid;
  place-items: center;
  color: #eaf3ff;
  flex-shrink: 0;
  font-size: 1.25rem;
}
.showme-modal-title-block {
  min-width: 0;
  display: grid;
  gap: 3px;
}
.showme-modal-title {
  font-size: 1.08rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
  min-width: 0;
  letter-spacing: -.02em;
}
.showme-modal-title-meta {
  font-size: .8rem;
  line-height: 1.45;
  color: var(--muted);
}
.showme-header-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.showme-browse-toggle,
.showme-close {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.04);
  color: var(--muted-strong);
  cursor: pointer;
  transition: background .14s, color .14s, border-color .14s;
  flex-shrink: 0;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.showme-browse-toggle:hover,
.showme-close:hover { background: rgba(255,255,255,.09); color: var(--text); }
.showme-browse-toggle.is-active {
  border-color: rgba(10,132,255,.34);
  background: rgba(10,132,255,.1);
  color: var(--key-soft);
}
.showme-modal-body {
  display: grid;
  grid-template-columns: 0 minmax(0, 1fr);
  flex: 1;
  min-height: 0;
  position: relative;
  transition: grid-template-columns .24s ease;
}
.showme-modal.is-browser-open .showme-modal-body {
  grid-template-columns: minmax(300px, 332px) minmax(0, 1fr);
}
.showme-browser {
  min-width: 0;
  border-right: 1px solid var(--line);
  background: var(--surface-strong);
  overflow: hidden auto;
  opacity: 0;
  pointer-events: none;
  transition: opacity .18s ease;
}
.showme-modal.is-browser-open .showme-browser {
  opacity: 1;
  pointer-events: auto;
}
.showme-browser-header {
  display: grid;
  gap: 8px;
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 1;
}
.showme-browser-search {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line-strong);
  background: var(--surface-strong);
  color: var(--text);
  font: inherit;
  font-size: .86rem;
  outline: none;
}
.showme-browser-search:focus { border-color: rgba(10,132,255,.42); }
.showme-browser-search::placeholder { color: var(--muted); }
.showme-browser-hint {
  margin: -2px 0 0;
  font-size: .76rem;
  line-height: 1.55;
  color: var(--muted);
}
.showme-browser-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px 12px;
}
.showme-browser-reset,
.showme-browser-library-link {
  font-size: .78rem;
}
.showme-browser-content {
  display: grid;
  gap: 16px;
  padding: 16px;
}
.showme-browser-section {
  display: grid;
  gap: 8px;
}
.showme-browser-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.showme-browser-section-title {
  font-size: .74rem;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
}
.showme-browser-section-count {
  font-size: .74rem;
  color: var(--muted);
}
.showme-browser-list {
  display: grid;
  gap: 8px;
}
.showme-browser-item {
  position: relative;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: flex-start;
  gap: 10px;
  width: 100%;
  padding: 11px 12px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--text);
  text-align: left;
  cursor: pointer;
  transition: border-color .14s ease, background .14s ease, transform .14s ease;
  font: inherit;
  overflow: hidden;
}
.showme-browser-item:hover {
  border-color: rgba(10,132,255,.34);
  background: rgba(255,255,255,.04);
  transform: translateY(-1px);
}
.showme-browser-item.is-active {
  border-color: rgba(96,165,250,.44);
  background: linear-gradient(135deg, rgba(15,23,42,.94), rgba(18,34,58,.82)), rgba(255,255,255,.04);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.06), inset 0 0 0 1px rgba(96,165,250,.16), 0 18px 36px rgba(0,0,0,.24);
}
.showme-browser-item.is-active::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(10,132,255,.14), transparent 42%);
  pointer-events: none;
}
.showme-browser-item-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.04);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  font-size: 1rem;
}
.showme-browser-item.is-active .showme-browser-item-icon {
  border-color: rgba(122,162,247,.32);
  background: rgba(10,132,255,.12);
}
.showme-browser-item-copy {
  min-width: 0;
  display: grid;
  gap: 4px;
}
.showme-browser-item-kicker-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px 8px;
  margin-top: 2px;
}
.showme-browser-item-kicker {
  display: inline-flex;
  align-items: center;
  padding: 4px 8px;
  border-radius: 999px;
  border: 1px solid rgba(122,162,247,.14);
  background: rgba(255,255,255,.035);
  font-size: .62rem;
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(191,219,254,.72);
}
.showme-browser-item-kicker.is-category {
  border-color: rgba(96,165,250,.4);
  background: linear-gradient(135deg, rgba(10,132,255,.18), rgba(59,130,246,.08));
  color: #eff6ff;
  box-shadow: inset 0 0 0 1px rgba(147,197,253,.12);
}
.showme-browser-item-kicker.is-current {
  border-color: rgba(96,165,250,.26);
  background: rgba(96,165,250,.1);
  color: rgba(219,234,254,.92);
}
.showme-browser-item-kicker.is-manual,
.showme-browser-item-kicker.is-stage,
.showme-browser-item-kicker.is-shared {
  color: rgba(191,219,254,.66);
}
.showme-browser-item-state {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: 999px;
  border: 1px solid rgba(122,162,247,.22);
  background: rgba(255,255,255,.05);
  color: #d7e8ff;
  font-size: .61rem;
  font-weight: 700;
  line-height: 1;
  letter-spacing: .08em;
  text-transform: uppercase;
  white-space: nowrap;
}
.showme-browser-item-label {
  font-size: .85rem;
  font-weight: 590;
  line-height: 1.45;
}
.showme-browser-item-meta {

  if (!activeShowMeWidgetId) return categories.slice();
  var activeCategory = "";
  sectionCards.some(function(card) {
    if (card.id !== activeShowMeWidgetId) return false;
    activeCategory = card.meta.category || "기타";
    return true;
  });
  if (!activeCategory) return categories.slice();

  var activeCategories = [];
  var otherCategories = [];
  categories.forEach(function(category) {
    if (category === activeCategory) activeCategories.push(category);
    else otherCategories.push(category);
  });
  return activeCategories.concat(otherCategories);
}

function getLibraryFocusText() {
  var isKo = I18N.getLanguage() === "ko";
  return {
    eyebrow: isKo ? "현재 기준" : "Now Viewing",
    title: isKo ? "선택 카드와 연관 카드" : "Current + related cards",
    copy: isKo
      ? "지금 보고 있는 카드와 연관도가 높은 카드를 먼저 이어서 보여줍니다."
      : "This keeps the current card followed by the most related cards."
  };
}

function getLibraryReasonText() {
  var isKo = I18N.getLanguage() === "ko";
  return {
    current: isKo ? "현재 보고 있는 카드" : "Current card",
    sameCategory: isKo ? "같은 카테고리" : "Same category",
    sameManualSection: isKo ? "같은 문서 흐름" : "Same manual flow",
    sameStage: isKo ? "같은 작업 단계" : "Same workflow stage",
    sharedTerms: isKo ? "공통 키워드" : "Shared keywords"
  };
}

function buildLibraryReasonTokens(reasonText, relation) {
  var tokens = [];
  if (relation.sharesCategory) tokens.push({ kind: "category", label: reasonText.sameCategory });
  if (relation.sharesManualSection) tokens.push({ kind: "manual", label: reasonText.sameManualSection });
  if (relation.sharesStage) tokens.push({ kind: "stage", label: reasonText.sameStage });
  if (relation.sharedTermScore > 0) tokens.push({ kind: "shared", label: reasonText.sharedTerms });
  return tokens.slice(0, 2);
}

function getSharedLibraryTermScore(baseCard, candidateCard) {
  var score = 0;
  var baseTerms = {};

  []
    .concat(baseCard.keywords || [])
    .concat(baseCard.prerequisites || [])
    .concat((baseCard.canonicalLabel || "").split(/[\s/,-]+/))
    .forEach(function(term) {
      var normalized = String(term || "").trim().toLowerCase();
      if (normalized.length >= 3) baseTerms[normalized] = true;
    });

  []
    .concat(candidateCard.keywords || [])
    .concat(candidateCard.prerequisites || [])
    .concat((candidateCard.canonicalLabel || "").split(/[\s/,-]+/))
    .forEach(function(term) {
      var normalized = String(term || "").trim().toLowerCase();
      if (baseTerms[normalized]) score += 1;
    });

  return score;
}

function getTunedLibraryRelationScore(current, card) {
  var sharesCategory = card.category && current.category && card.category === current.category;
  var sharesManualSection = card.manualSection && current.manualSection && card.manualSection === current.manualSection;
  var sharesStage = card.stageLabel && current.stageLabel && card.stageLabel === current.stageLabel;
  var sharedTermScore = Math.min(getSharedLibraryTermScore(current, card), 3);
  var score = 0;

  if (sharesCategory) score += 7;
  if (sharesManualSection) score += 4;
  if (sharesStage) score += 2;
  if (sharesCategory && sharesManualSection) score += 2;
  if (sharesManualSection && sharesStage) score += 1;
  score += sharedTermScore;

  return {
    score: score,
    sharesCategory: sharesCategory,
    sharesManualSection: sharesManualSection,
    sharesStage: sharesStage,
    sharedTermScore: sharedTermScore
  };
}

function getRelatedLibraryCards(cards, widgetId, limit) {
  var current = null;
  var reasonText = getLibraryReasonText();
  cards.some(function(card) {
    if (card.id !== widgetId) return false;
    current = card;
    return true;
  });
  if (!current) return [];

  return cards
    .filter(function(card) {
      return card.id !== widgetId;
    })
    .map(function(card) {
      var relation = getTunedLibraryRelationScore(current, card);
      var reasonTokens = buildLibraryReasonTokens(reasonText, relation);
      return {
        card: card,
        score: relation.score,
        reason: reasonTokens.map(function(token) { return token.label; }).join(" · "),
        reasonTokens: reasonTokens
      };
    })
    .filter(function(item) { return item.score > 0; })
    .sort(function(a, b) {
      if (b.score !== a.score) return b.score - a.score;
      return a.card.localizedLabel.localeCompare(b.card.localizedLabel, I18N.getLanguage(), { sensitivity: "base" });
    })
    .slice(0, limit || 6);
}

function getLibraryFocusSection(visibleCards) {
  if (!activeShowMeWidgetId) return null;
  var reasonText = getLibraryReasonText();

  var currentCard = null;
  visibleCards.some(function(card) {
    if (card.id !== activeShowMeWidgetId) return false;
    currentCard = card;
    return true;
  });
  if (!currentCard) return null;

  var entries = [{ card: currentCard, reason: reasonText.current, reasonTokens: [{ kind: "current", label: reasonText.current }] }].concat(
    getRelatedLibraryCards(visibleCards, activeShowMeWidgetId, 6)
  );
  var cardSet = {};
  entries.forEach(function(entry) {
    cardSet[entry.card.id] = true;
  });

  return {
    id: "focus-cards",
    cardSet: cardSet,
    entries: entries,
    text: getLibraryFocusText()
  };
}

      reasonLabel.textContent = token.label;

    kickerRow.appendChild(reasonLabel);
    hasKickerRow = true;

function renderShowMeBrowser() {
  var text = getShowMeModalText();
  var container = document.getElementById("showmeBrowserContent");
  var locateButton = document.getElementById("showmeBrowserLibraryLink");
  if (!container || !locateButton) return;

  locateButton.textContent = text.modalBrowseLibraryLink;
  container.textContent = "";

  var allCards = getAllCards();
  var query = String(showMeBrowserQuery || "").trim().toLowerCase();

  if (query) {
    var results = prioritizeActiveCardList(allCards.filter(function(card) {
      return card.searchText.indexOf(query) !== -1;
    })).slice(0, 24).map(function(card) {
      return { card: card, reason: "", reasonTokens: [] };
    });

    if (!appendShowMeBrowserSection(container, text.modalBrowseResults, results)) {
      var empty = document.createElement("div");
      empty.className = "showme-browser-empty";
      empty.textContent = text.modalBrowseEmpty;
      container.appendChild(empty);
    }
    return;
  }

  var currentEntry = null;
  allCards.some(function(card) {
    if (card.id !== activeShowMeWidgetId) return false;
    currentEntry = {
      card: card,
      reason: getLibraryReasonText().current,
      reasonTokens: [{ kind: "current", label: getLibraryReasonText().current }]
    };
    return true;
  });
  var relatedEntries = activeShowMeWidgetId ? getRelatedLibraryCards(allCards, activeShowMeWidgetId, 8) : [];
  var hasContent = false;
  if (currentEntry) hasContent = appendShowMeBrowserSection(container, text.modalBrowseCurrent, [currentEntry]) || hasContent;
  hasContent = appendShowMeBrowserSection(container, text.modalBrowseRelated, relatedEntries) || hasContent;

  if (!hasContent) {
    var fallback = document.createElement("div");
    fallback.className = "showme-browser-empty";
    fallback.textContent = text.modalBrowseEmpty;
    container.appendChild(fallback);
  }

  var activeItem = container.querySelector(".showme-browser-item.is-active");
  if (activeItem) {
    window.requestAnimationFrame(function() {
      activeItem.scrollIntoView({ block: "nearest", inline: "nearest" });
    });
  }
}

function locateCurrentShowMeCard() {
  var widgetId = activeShowMeWidgetId;
  if (!widgetId) return;
  closeShowMe();
  window.requestAnimationFrame(function() {
    var target = document.querySelector('.lib-card[data-showme-id="' + widgetId + '"]');
    if (!target) return;
    target.scrollIntoView({ behavior: "smooth", block: "center" });
    target.focus({ preventScroll: true });
  });
}

    return sectionCards.some(function(card) {

  btn.setAttribute("type", "button");

  btn.title = getShowMeTooltipText(card.id);

  var copy = document.createElement("span");
  copy.className = "lib-card-copy";

function renderToc(cards) {
  var text = getText();
  var toc = document.getElementById("libToc");
  var query = getSearchQuery();
  var visibleCards = getVisibleCards(cards, query);
  var focusSection = getLibraryFocusSection(visibleCards);
  var remainingCards = focusSection
    ? visibleCards.filter(function(card) { return !focusSection.cardSet[card.id]; })
    : visibleCards;
  var orderedSections = prioritizeActiveSectionList(getLibrarySections(), remainingCards);

  toc.textContent = "";
  document.getElementById("libTocLabel").textContent = text.contentsLabel;

  if (focusSection) {
    var focusBtn = document.createElement("button");
    focusBtn.className = "lib-chip" + (lastSectionTargetId === focusSection.id ? " is-active" : "");
    focusBtn.type = "button";
    focusBtn.innerHTML = "<span>" + focusSection.text.title + "</span><strong>" + focusSection.entries.length + "</strong>";
    focusBtn.addEventListener("click", function() {
      var target = document.getElementById("section-" + focusSection.id);
      if (!target) return;
      lastSectionTargetId = focusSection.id;
      renderToc(cards);
      target.scrollIntoView({ behavior: "smooth", block: "start" });
    });
    toc.appendChild(focusBtn);
  }

  orderedSections.forEach(function(section) {
    var count = countCardsForSection(remainingCards, section);
    if (!count) return;

    var btn = document.createElement("button");
    btn.className = "lib-chip" + (lastSectionTargetId === section.id ? " is-active" : "");
    btn.type = "button";
    btn.innerHTML = "<span>" + section.title + "</span><strong>" + count + "</strong>";
    btn.addEventListener("click", function() {
      var target = document.getElementById("section-" + section.id);
      if (!target) return;
      lastSectionTargetId = section.id;
      renderToc(cards);
      target.scrollIntoView({ behavior: "smooth", block: "start" });
    });
    toc.appendChild(btn);
  });
}

function renderSections(cards) {
  var main = document.getElementById("libMain");
  var query = getSearchQuery();
  var visibleCards = getVisibleCards(cards, query);
  var text = getText();
  var sectionNumber = 0;
  var focusSection = getLibraryFocusSection(visibleCards);
  var remainingCards = focusSection
    ? visibleCards.filter(function(card) { return !focusSection.cardSet[card.id]; })
    : visibleCards;
  var orderedSections = prioritizeActiveSectionList(getLibrarySections(), remainingCards);

  main.textContent = "";
  updateCount(visibleCards.length);

  if (!visibleCards.length) {
    var empty = document.createElement("p");
    empty.className = "lib-empty";
    empty.textContent = text.emptyResults;
    main.appendChild(empty);
    return;
  }

  renderLibraryFocusSection(main, focusSection);

  orderedSections.forEach(function(section) {
    var sectionCards = prioritizeActiveCardList(remainingCards.filter(function(card) {
      return card.sectionId === section.id;
    }));
    if (!sectionCards.length) return;
    sectionNumber += 1;

    var sectionEl = document.createElement("section");
    sectionEl.className = "lib-section";
    sectionEl.id = "section-" + section.id;

    var head = document.createElement("header");
    head.className = "lib-section-head";

    var eyebrow = document.createElement("div");
    eyebrow.className = "lib-section-eyebrow";
    eyebrow.textContent = String(sectionNumber).padStart(2, "0");
    head.appendChild(eyebrow);

    var titleRow = document.createElement("div");
    titleRow.className = "lib-section-title-row";

    var title = document.createElement("h2");
    title.className = "lib-section-title";
    title.textContent = section.title;
    titleRow.appendChild(title);

    var count = document.createElement("span");
    count.className = "lib-section-count";
    count.textContent = sectionCards.length;
    titleRow.appendChild(count);
    head.appendChild(titleRow);

    var copy = document.createElement("p");
    copy.className = "lib-section-copy";
    copy.textContent = section.copy;
    head.appendChild(copy);

    sectionEl.appendChild(head);

    var body = document.createElement("div");
    body.className = "lib-section-body";

    prioritizeActiveCategoryList(getSectionCategories(sectionCards), sectionCards).forEach(function(category) {
      var groupCards = prioritizeActiveCardList(sectionCards.filter(function(card) {
        return (card.meta.category || "기타") === category;
      }));
      if (!groupCards.length) return;

      var subgroup = document.createElement("div");
      subgroup.className = "lib-subsection";

      var subgroupHead = document.createElement("div");
      subgroupHead.className = "lib-subsection-head";

      var subgroupTitle = document.createElement("h3");
      subgroupTitle.className = "lib-subsection-title";
      subgroupTitle.textContent = I18N.getLibraryCategoryLabel(category);
      subgroupHead.appendChild(subgroupTitle);

      var subgroupMeta = document.createElement("span");
      subgroupMeta.className = "lib-subsection-meta";
      subgroupMeta.textContent = groupCards.length;
      subgroupHead.appendChild(subgroupMeta);
      subgroup.appendChild(subgroupHead);

      var grid = document.createElement("div");
      grid.className = "lib-grid";
      groupCards.forEach(function(card) {
        grid.appendChild(createCardButton(card));
      });
      subgroup.appendChild(grid);

      body.appendChild(subgroup);
    });

    sectionEl.appendChild(body);
    main.appendChild(sectionEl);
  });
}

  var total = Object.keys(SHOWME_REGISTRY).length;
  var shown = count === undefined ? total : count;
  var lang = I18N.getLanguage();
  document.getElementById("libCount").textContent = shown === total
    ? (lang === "ko" ? total + "개 도구" : total + " tools")

}

function renderLibrary() {
  var cards = getAllCards();

  document.getElementById("libSearch").setAttribute("aria-label", text.searchAria);
  document.getElementById("libSearch").setAttribute("placeholder", text.searchPlaceholder);
  document.getElementById("libToc").setAttribute("aria-label", text.tocAria);
  document.getElementById("libAlphabet").setAttribute("aria-label", text.alphabetFilterAria);
  document.getElementById("showmeBrowseToggle").setAttribute("aria-label", modalText.modalBrowseToggleAria);
  document.getElementById("showmeClose").setAttribute("aria-label", modalText.modalCloseAria || text.modalCloseAria);
  document.getElementById("showmeIframe").setAttribute("title", modalText.showmeFrameTitle || text.showmeFrameTitle);
  document.getElementById("showmeBrowserSearch").setAttribute("aria-label", modalText.modalBrowseSearchAria);
  document.getElementById("showmeBrowserSearch").setAttribute("placeholder", modalText.modalBrowseSearchPlaceholder);
  document.getElementById("showmeBrowserReset").textContent = modalText.modalBrowseResetCta;
  document.getElementById("showmeBrowserLibraryLink").textContent = modalText.modalBrowseLibraryLink;
  document.getElementById("showmeBrowserHint").textContent = modalText.modalBrowseContextHint;
  renderLibrary();
  maybeOpenRequestedShowMe();
}

document.getElementById("libSearch").addEventListener("input", function() {
  lastSectionTargetId = "";
  renderLibrary();
});

function openShowMe(widgetId) {
  var overlay = document.getElementById("showmeOverlay");
  var iframe = document.getElementById("showmeIframe");
  var title = document.getElementById("showmeTitle");
  var titleIcon = document.getElementById("showmeTitleIcon");
  var titleMeta = document.getElementById("showmeTitleMeta");
  var closeBtn = document.getElementById("showmeClose");
  var text = getShowMeModalText();
  var meta = buildCardData(widgetId);
  var cacheBust = String(Date.now());
  var active = document.activeElement;
  var wasOpen = overlay.classList.contains("is-open");
  showMeLastTrigger = active && active !== document.body ? active : null;
  if (!wasOpen) showMeBrowserQuery = "";
  activeShowMeWidgetId = widgetId;
  syncShowMeQuery(widgetId);
  renderLibrary();
  scrollToLibraryFocusContext(pendingShowMeFromUrl ? "auto" : "smooth");
  showMeLastTrigger = document.querySelector('.lib-card[data-showme-id="' + widgetId + '"]') || showMeLastTrigger;
  title.textContent = meta.localizedLabel;
  titleMeta.textContent = getShowMeMetaLine(meta) || text.modalCurrentCardFallbackMeta;
  titleIcon.textContent = meta.icon || (meta.meta && meta.meta.icon) || "📖";
  renderShowMeBrowser();
  setShowMeBrowserOpen(showMeBrowserOpen);
  iframe.onload = function() {
    normalizeShowMeLayout(this);
    injectShowMeSupplement(this, widgetId);
    I18N.localizeShowMeIframe(this, widgetId);
  };
  iframe.src = "assets/showme/" + widgetId + ".html?wid=" + encodeURIComponent(widgetId) + "&v=" + cacheBust;
  overlay.classList.add("is-open");
  overlay.setAttribute("aria-hidden", "false");
  if (wasOpen && window.innerWidth < 980) {
    setShowMeBrowserOpen(false);
  }
  document.body.style.overflow = "hidden";
  if (!wasOpen) {
    setTimeout(function() {
      closeBtn.focus({ preventScroll: true });
    }, 50);
  }
}

function closeShowMe() {
  var overlay = document.getElementById("showmeOverlay");
  var iframe = document.getElementById("showmeIframe");
  var lastWidgetId = activeShowMeWidgetId;
  if (!overlay.classList.contains("is-open")) return;
  overlay.classList.remove("is-open");
  overlay.setAttribute("aria-hidden", "true");
  iframe.onload = null;
  iframe.src = "about:blank";
  syncShowMeQuery("");
  document.body.style.overflow = "";
  renderLibrary();
  scrollToLibraryFocusContext("smooth");
  var focusTarget = showMeLastTrigger;
  if ((!focusTarget || !document.contains(focusTarget)) && lastWidgetId) {
    focusTarget = document.querySelector('.lib-card[data-showme-id="' + lastWidgetId + '"]');
  }
  if (focusTarget && document.contains(focusTarget)) {
    focusTarget.focus({ preventScroll: true });
  }
  showMeLastTrigger = null;
}

function refreshOpenShowMe() {
  var overlay = document.getElementById("showmeOverlay");
  if (!overlay.classList.contains("is-open") || !activeShowMeWidgetId) return;
  openShowMe(activeShowMeWidgetId);
}

function syncShowMeQuery(widgetId) {
  if (!window.history || typeof window.history.replaceState !== "function") return;
  var url = new URL(window.location.href);
  if (widgetId) url.searchParams.set("showme", widgetId);
  else url.searchParams.delete("showme");
  window.history.replaceState({}, "", url.pathname + url.search + url.hash);
}

function maybeOpenRequestedShowMe() {
  if (!pendingShowMeFromUrl || !requestedShowMeId) return;
  pendingShowMeFromUrl = false;
  if (!SHOWME_REGISTRY[requestedShowMeId]) return;
  setTimeout(function() {
    openShowMe(requestedShowMeId);
  }, 0);
}

document.getElementById("showmeClose").addEventListener("click", closeShowMe);
document.getElementById("showmeBrowseToggle").addEventListener("click", function() {
  setShowMeBrowserOpen(!showMeBrowserOpen);
  if (showMeBrowserOpen) {
    var searchInput = document.getElementById("showmeBrowserSearch");
    if (searchInput) searchInput.focus({ preventScroll: true });
  }
});
document.getElementById("showmeBrowserBackdrop").addEventListener("click", function() {
  setShowMeBrowserOpen(false);
});
document.getElementById("showmeBrowserSearch").addEventListener("input", function(e) {
  showMeBrowserQuery = e.target.value || "";
  renderShowMeBrowser();
  if (e.target.value && !showMeBrowserOpen) setShowMeBrowserOpen(true);
});
document.getElementById("showmeBrowserReset").addEventListener("click", function() {
  var search = document.getElementById("showmeBrowserSearch");
  showMeBrowserQuery = "";
  if (search) search.value = "";
  renderShowMeBrowser();
});
document.getElementById("showmeBrowserLibraryLink").addEventListener("click", locateCurrentShowMeCard);
document.getElementById("showmeOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeShowMe();
});
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeShowMe();
});
window.addEventListener("resize", function() {
  if (!document.getElementById("showmeOverlay").classList.contains("is-open")) return;
  if (window.innerWidth >= 1100 && !showMeBrowserQuery) {
    setShowMeBrowserOpen(true);
  } else if (window.innerWidth < 980 && showMeBrowserOpen && !showMeBrowserQuery) {
    setShowMeBrowserOpen(false);
  }
});

I18N.mountLanguageSwitcher(document.getElementById("langSwitcher"));
I18N.onLanguageChange(function() {
  renderPage();
  refreshOpenShowMe();
});
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <script>/* FOUC prevention */ (function(){var t=localStorage.getItem('rpd-theme');if(t)document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('rpd-lang');if(l){document.documentElement.lang=l;document.documentElement.setAttribute('data-lang',l);}})()</script>
  <style>
    /* ── Tab bar (shared with layout.css) ── */
    .app-tabs {
      display: flex; align-items: center; gap: 2px;
      background: var(--surface); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 3px;
    }
    .app-tab {
      padding: 6px 16px; border-radius: calc(var(--radius) - 2px);
      border: none; background: transparent; color: var(--muted);
      font: inherit; font-size: .82rem; font-weight: var(--fw-medium);
      cursor: pointer; transition: color .14s, background .14s;
      text-decoration: none; white-space: nowrap;
    }
    .app-tab:hover { color: var(--text); background: var(--overlay-white-hover); }
    .app-tab.is-active { color: var(--text); background: var(--overlay-white); box-shadow: 0 1px 2px rgba(0,0,0,.12); }

    .page-shell {
      --course-shell-radius: 26px;
      --course-card-radius: 20px;
      --course-chip-radius: var(--pill-radius);
      --course-control-radius: var(--pill-radius);
      --course-panel-pad-x: 24px;
      --course-accent: #2a7b6f;
      --course-accent-strong: #205f56;
      --course-accent-soft: #a7ddd4;
      --course-accent-rgb: 42, 123, 111;
    }
    .topbar .brand-badge,
    .topbar .btn,
    .topbar .lang-switcher,
    .topbar .lang-switcher-btn,
    .topbar .theme-toggle,
    .hero-actions .btn,
    .hero-meta-chip,
    .overview-card-meta,
    .cw-active-label,
    .week-badge,
    .topic-chip,
    .week-metric,
    .go-arrow {
      border-radius: var(--course-chip-radius);
    }
    .topbar .brand-badge,
    .topbar .btn,
    .topbar .theme-toggle,
    .topbar .lang-switcher {
      border-radius: var(--course-control-radius);
    }
    .hero-card,
    .content-block {
      border-radius: var(--course-shell-radius);
    }
    .hero-meta-wrap,
    .program-stat,
    .overview-card,
    .week-card {
      border-radius: var(--course-card-radius);
    }
    .topbar .btn-primary {
      padding: 8px 16px;
      border-color: var(--course-accent-strong);
      background: var(--course-accent);
    }
    .brand-lockup {
      max-width: 304px;
    }
    .brand-lockup > div:last-child {
      min-width: 0;
    }
    .brand-lockup strong {
      letter-spacing: -.02em;
    }
    .topbar-meta {
      color: var(--muted);
    }
    .inha-topbar-inner.rpd-topbar-3col {
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 18px;
    }
    .inha-topbar-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      justify-self: center;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
      width: max-content;
    }
    .inha-topbar-nav .btn {
      min-height: var(--pill-control-height);
      padding: 8px 15px;
      justify-content: center;
      font-size: .8rem;
      line-height: 1;
      white-space: nowrap;
      color: var(--muted);
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }
    .inha-topbar-utils {
      gap: 8px;
      justify-self: end;
    }
    .inha-topbar-utils #langSwitcher {
      display: inline-flex;
      align-items: center;
      margin-left: 2px;
    }
    .inha-topbar-utils #langSwitcher .lang-switcher {
      padding: 2px;
      border-radius: var(--course-control-radius);
      background: rgba(255,255,255,.03);
    }
    .inha-topbar-utils #langSwitcher .lang-switcher-btn {
      min-width: 30px;
      padding: 5px 10px;
      border-radius: var(--pill-inner-radius);
      font-size: .7rem;
      letter-spacing: .02em;
    }
    .hero-actions .btn-primary:hover {
      background: var(--course-accent-strong);
    }
    .course-layout {
      width: min(var(--max-width), calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 72px;
      display: grid;
      gap: 18px;
    }
    .course-layout > section,
    .course-layout > nav {
      width: 100%;
      max-width: 100%;
      margin: 0;
    }
    .hero-card {
      position: relative;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 286px);
      align-items: start;
      width: 100%;
      border: 1px solid var(--line-strong);
      background:
        radial-gradient(circle at top left, rgba(var(--course-accent-rgb), .14), transparent 34%),
        linear-gradient(180deg, var(--surface-tint), transparent 72%),
        var(--surface);
      box-shadow:
        0 24px 64px rgba(0,0,0,.2),
        inset 0 1px 0 rgba(255,255,255,.05);
      overflow: hidden;
      isolation: isolate;
    }
    .course-main {
      min-width: 0;
      display: grid;
      gap: 0;
    }
    .course-main > section {
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 28px 0 30px;
      border-top: 1px solid var(--line);
    }
    .course-main > section:first-child {
      padding-top: 6px;
      border-top: 0;
    }
    .course-sidebar-summary {
      display: grid;
      gap: 0;
    }
    .course-sidebar-summary-line {
      padding: 10px 4px;
      color: var(--muted-strong);
      font-size: .8rem;
      line-height: 1.55;
    }
    .course-sidebar-summary-line + .course-sidebar-summary-line {
      border-top: 1px solid var(--rpd-page-rail-divider-soft);
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 280px);
      gap: 26px;
      align-items: start;
    }
    .hero-copy,
    .hero-meta-wrap {
      position: relative;
      z-index: 1;
      min-width: 0;
    }
    .hero h1 {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0 8px;
      text-wrap: initial;
    }
    .hero-title-line {
      display: inline-flex;
      align-items: baseline;
    }
    .hero-title-school {
      color: var(--muted-strong);
      font-size: .86em;
      font-weight: 600;
      letter-spacing: -.025em;
    }
    .hero-title-divider {
      color: var(--muted);
      font-size: .72em;
      font-weight: 600;
    }
    .hero-title-program {
      color: var(--text);
      font-weight: 680;
      letter-spacing: -.038em;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 12px;
      margin-top: 4px;
    }
    .hero-actions .btn-primary {
      border-color: var(--course-accent-strong);
      background: var(--course-accent);
      box-shadow: 0 14px 28px rgba(var(--course-accent-rgb), .24);
    }
    .hero-actions .btn-ghost {
      border-color: var(--line-strong);
      background: rgba(255,255,255,.05);
    }
    .hero-actions .btn-link {
      color: var(--course-accent-soft);
    }
    .hero-actions .btn-link:hover {
      color: var(--text);
    }
    .hero-meta-wrap {
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), transparent 78%),
        rgba(255,255,255,.02);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }
    .hero-meta-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .hero-meta {
      display: grid;
      gap: 8px;
    }
    .hero-snapshot-item {
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,.06);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 72%),
        rgba(255,255,255,.02);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .hero-snapshot-item.is-emphasis {
      border-color: rgba(var(--course-accent-rgb), .3);
      background:
        linear-gradient(135deg, rgba(var(--course-accent-rgb), .16), rgba(255,255,255,.02)),
        rgba(255,255,255,.03);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        inset 0 0 0 1px rgba(var(--course-accent-rgb), .08);
    }
    .hero-snapshot-value {
      color: var(--text);
      font-size: .98rem;
      font-weight: 640;
      letter-spacing: -.02em;
      line-height: 1.2;
    }
    .hero-snapshot-key {
      color: var(--muted);
      font-size: .72rem;
      line-height: 1.25;
    }
    .content-block {
      position: relative;
      padding: 24px var(--course-panel-pad-x);
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, var(--surface-tint), transparent 72%),
        var(--surface);
      box-shadow:
        0 22px 54px rgba(0,0,0,.18),
        inset 0 1px 0 rgba(255,255,255,.04);
      overflow: hidden;
      isolation: isolate;
    }
    .content-block::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(var(--course-accent-rgb), .34), transparent);
      pointer-events: none;
    }
    .content-block.is-hidden {
      display: none;
    }
    .overview-note {
      margin: 0;
      position: relative;
      z-index: 1;
      color: var(--muted-strong);
      font-size: .94rem;
      line-height: 1.74;
    }
    .section-intro {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    .section-title {
      margin: 0;
      font-size: var(--type-section);
      font-weight: 630;
      letter-spacing: -.028em;
    }
    .section-copy {
      margin: 0;
      max-width: 760px;
      color: var(--muted-strong);
      line-height: 1.72;
      font-size: .93rem;
    }
    .week-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .week-card {
      position: relative;
      overflow: hidden;
      min-height: 194px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 62%),
        rgba(255,255,255,.015);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
      padding: 15px 15px 13px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }
    .week-card:hover {
      transform: translateY(-1px);
      border-color: rgba(var(--course-accent-rgb), .26);
      background:
        linear-gradient(180deg, rgba(var(--course-accent-rgb), .06), transparent 76%),
        var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-panel-shadow);
    }
    .week-card.is-locked {
      cursor: not-allowed;
      opacity: .56;
    }
    .week-card.is-locked:hover {
      transform: none;
      border-color: var(--line);
      background: var(--modal-panel-soft-bg);
      box-shadow: var(--modal-card-shadow);
    }
    .week-card.is-active {
      grid-column: 1 / -1;
      min-height: 0;
      padding: 18px;
      gap: 12px;
      border-left: 1px solid rgba(var(--course-accent-rgb), .34);
      background:
        linear-gradient(135deg, rgba(var(--course-accent-rgb), .16), rgba(255,255,255,.03) 56%),
        rgba(255,255,255,.03);
      border-color: rgba(var(--course-accent-rgb), .34);
      background:
        linear-gradient(135deg, rgba(var(--course-accent-rgb), .12), rgba(255,255,255,.03)),
        var(--modal-panel-soft-bg);
      box-shadow:
        inset 0 0 0 1px rgba(var(--course-accent-rgb), .1),
        var(--modal-card-shadow);
    }
    .cw-active-label {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 6px 10px;
      border: 1px solid rgba(var(--course-accent-rgb), .22);
      background: rgba(var(--course-accent-rgb), .08);
      color: var(--course-accent-soft);
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .week-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .week-num {
      font-size: .71rem;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .week-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
    }
    .badge-done     { color: var(--success-soft); border-color: rgba(16,185,129,.22); background: rgba(16,185,129,.08); }
    .badge-active   { color: var(--course-accent-soft); border-color: rgba(var(--course-accent-rgb), .24); background: rgba(var(--course-accent-rgb), .08); }
    .badge-upcoming { color: var(--muted); }
    .badge-exam     { color: #fbbf24; border-color: rgba(251,191,36,.24); background: rgba(251,191,36,.08); }
    .week-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 620;
      line-height: 1.34;
    }
    .week-subtitle {
      margin: 0;
      font-size: .82rem;
      color: var(--muted-strong);
      line-height: 1.54;
    }
    .week-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 0;
    }
    .topic-chip,
    .week-metric {
      padding: 5px 9px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--muted-strong);
      font-size: .69rem;
      line-height: 1.2;
      box-shadow: none;
    }
    .week-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: auto;
      padding-top: 4px;
      border-top: 1px solid rgba(255,255,255,.04);
    }
    .week-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .go-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--muted-strong);
      font-size: .84rem;
      transition: transform .16s ease;
    }
    .week-card:hover .go-arrow,
    .week-card.is-active .go-arrow {
      transform: translateX(2px);
      color: var(--text);
      border-color: rgba(var(--course-accent-rgb), .22);
    }
    @media (max-width: 980px) {
      .course-layout {
        width: calc(100% - 24px);
        grid-template-columns: 1fr;
        gap: 18px;
      }
      .course-rail.rpd-page-rail {
        position: static;
        top: auto;
        padding: 0;
        border-right: none;
      }
      .hero {
        grid-template-columns: 1fr;
        gap: 18px;
      }
      .hero-meta-wrap {
        padding: 14px 0 0;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
      .week-grid {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 720px) {
      .page-shell {
        --course-panel-pad-x: 18px;
      }
      .course-layout {
        width: calc(100% - 20px);
      }
      .brand-lockup {
        gap: 12px;
        max-width: none;
      }
      .brand-lockup strong {
        font-size: clamp(1rem, 5.6vw, 1.12rem);
      }
      .topbar-meta {
        margin-top: 4px;
      }
      .inha-topbar-nav {
        justify-content: flex-start;
      }
      .inha-topbar-nav .btn {
        padding: 8px 12px;
      }
      .course-layout > section,
      .course-layout > nav {
        width: 100%;
      }
      .hero-card,
      .content-block {
        padding: 20px var(--course-panel-pad-x);
      }
      .hero h1 {
        font-size: var(--type-section);
      }
      .week-card {
        padding: 14px;
      }
    }
  </style>
</head>

  <script>
    function getPageStrings() {
      return window.RPDI18n.getStrings("index");
    }

    function getUiPreset() {
      return window.RPDWeekUI ? window.RPDWeekUI.getPreset() : {};
    }

    function localizeUiLabel(value, fallback) {
      return window.RPDWeekUI
        ? window.RPDWeekUI.localize(value, window.RPDI18n.getLanguage(), fallback)
        : fallback;
    }

    function withPresetHref(href) {
      return window.RPDWeekUI ? window.RPDWeekUI.withPreset(href) : href;
    }

    function getPresetProgramTitle(text) {
      var preset = getUiPreset();
      var labels = preset.labels || {};
      var school = localizeUiLabel(labels.school, "");
      var program = localizeUiLabel(labels.program, "");
      if (!school && !program) return text.programTitle;
      return [school, program].filter(Boolean).join(" · ") || text.programTitle;
    }

    function getPresetProgramParts(text) {
      var preset = getUiPreset();
      var labels = preset.labels || {};
      var school = localizeUiLabel(labels.school, "");
      var program = localizeUiLabel(labels.program, "");
      if (school || program) {
        return {
          school: school || text.programTitle,
          program: program || ""
        };
      }
      var title = String(text.programTitle || "");
      var parts = title.split(" · ");
      return {
        school: parts[0] || title,
        program: parts.slice(1).join(" · ")
      };
    }

    function renderHeroTitle(text) {
      var parts = getPresetProgramParts(text);
      var titleEl = document.getElementById("heroTitle");
      titleEl.textContent = "";

      var schoolLine = document.createElement("span");
      schoolLine.className = "hero-title-line hero-title-school";
      schoolLine.textContent = parts.school;
      titleEl.appendChild(schoolLine);

      if (parts.program) {
        var divider = document.createElement("span");
        divider.className = "hero-title-line hero-title-divider";
        divider.setAttribute("aria-hidden", "true");
        divider.textContent = "·";
        titleEl.appendChild(divider);

        var programLine = document.createElement("span");
        programLine.className = "hero-title-line hero-title-program";
        programLine.textContent = parts.program;
        titleEl.appendChild(programLine);
      }
    }

    function getWeekCardPreviewItems(localizedWeek, preset) {
      var source = preset.weekCard && preset.weekCard.previewSource;
      if (source === "steps") {
        return (localizedWeek.steps || []).map(function(step) { return step.title; }).filter(Boolean);
      }
      return Array.isArray(localizedWeek.topics) ? localizedWeek.topics.slice() : [];
    }

    function collectArchiveCardIds(week) {
      var ids = {};
      (week.steps || []).forEach(function(step) {
        if (step.showme) {
          (Array.isArray(step.showme) ? step.showme : [step.showme]).forEach(function(id) {
            if (id) ids[id] = true;
          });
        }
        if (Array.isArray(step.widgets)) {
          step.widgets.forEach(function(widget) {
            if (widget && widget.type === "showme" && widget.id) ids[widget.id] = true;
          });
        }
      });
      return Object.keys(ids);
    }

    function countTasks(week) {
      return (week.steps || []).reduce(function(total, step) {
        return total + ((step.tasks || []).length || 0);
      }, 0);
    }

    function countReferences(week) {
      return (week.docs || []).length + (week.shortcuts || []).length + (week.explore || []).length;
    }

    function countProgramArchiveCards() {
      var ids = {};
      CURRICULUM.forEach(function(week) {
        collectArchiveCardIds(week).forEach(function(id) {
          ids[id] = true;
        });
      });
      return Object.keys(ids).length;
    }

    function getBadge(week) {
      if (String(week.title).indexOf("⭐") >= 0) return ["badge-exam", window.RPDI18n.getLanguage() === "ko" ? "Exam" : "Exam"];
      if (week.status === "done") return ["badge-done", window.RPDI18n.getLanguage() === "ko" ? "Done" : "Done"];
      if (week.status === "active") return ["badge-active", window.RPDI18n.getLanguage() === "ko" ? "In Progress" : "In Progress"];
      return ["badge-upcoming", window.RPDI18n.getLanguage() === "ko" ? "Upcoming" : "Upcoming"];
    }

    function isExamWeek(week) {
      return String(week.title).indexOf("⭐") >= 0;
    }

    function getCardClass(week) {
      if (isExamWeek(week)) return "is-exam";
      if (week.status === "done") return "is-done";
      if (week.status === "active") return "is-active";
      return "is-upcoming";
    }

    function getWeekCardMetricLabel(key, text, preset) {
      var labels = preset.labels || {};
      var isKo = window.RPDI18n.getLanguage() === "ko";
      if (key === "practice") return localizeUiLabel(labels.metricPractice, isKo ? "실습" : "practice");
      if (key === "showme") return localizeUiLabel(labels.metricShowMe, "Show Me");
      if (key === "tasks") return localizeUiLabel(labels.metricTasks, text.weekMetricTasks);
      if (key === "refs") return localizeUiLabel(labels.metricRefs, text.weekMetricRefs);
      if (key === "cards") return text.weekMetricCards;
      return "";
    }

    function buildWeekCardMetrics(week, text, preset) {
      var practiceCount = (week.steps || []).length;
      var showMeCount = collectArchiveCardIds(week).length;
      var taskCount = countTasks(week);
      var referenceCount = countReferences(week);
      var metricValues = {
        practice: practiceCount,
        showme: showMeCount,
        tasks: taskCount,
        refs: referenceCount,
        cards: showMeCount
      };
      var metricKeys = (preset.weekCard && Array.isArray(preset.weekCard.metrics) && preset.weekCard.metrics.length)
        ? preset.weekCard.metrics
        : ["practice", "showme", "tasks"];

      return metricKeys.map(function(key) {
        if (!Object.prototype.hasOwnProperty.call(metricValues, key)) return "";
        var label = getWeekCardMetricLabel(key, text, preset);
        if (!label) return "";
        return metricValues[key] + " " + label;
      }).filter(Boolean);
    }

    function buildHeroMeta(text) {
      var preset = getUiPreset();
      var labels = preset.labels || {};
      var courseHero = preset.courseHero || {};
      var activeWeek = CURRICULUM.find(function(week) { return week.status === "active"; });
      var snapshotItems = Array.isArray(courseHero.snapshotItems) && courseHero.snapshotItems.length
        ? courseHero.snapshotItems
        : ["weeks", "active"];
      var emphasisKey = courseHero.emphasis || "active";
      var definitions = {
        weeks: {
          key: "weeks",
          label: localizeUiLabel(labels.courseSnapshotWeeks, "Weeks"),
          value: window.RPDI18n.getLanguage() === "ko" ? (CURRICULUM.length + "주") : (CURRICULUM.length + " weeks")
        },
        active: {
          key: "active",
          label: localizeUiLabel(labels.courseSnapshotActive, "Current week"),
          value: activeWeek ? ("Week " + String(activeWeek.week).padStart(2, "0")) : "—"
        }
      };
      return snapshotItems.map(function(key) {
        var item = definitions[key];
        if (!item) return null;
        return {
          key: item.key,
          label: item.label,
          value: item.value,
          emphasis: item.key === emphasisKey
        };
      }).filter(Boolean);
    }

    function buildHeroActions(text) {
      var activeWeek = CURRICULUM.find(function(week) { return week.status === "active"; }) || CURRICULUM[0];
      var activeHref = activeWeek ? withPresetHref("week.html?week=" + activeWeek.week) : withPresetHref("inha.html");
      return '<a class="btn btn-primary" href="' + activeHref + '">' + text.heroPrimaryCta + '</a>';
    }

    function renderWeeks(text, preset) {
      var grid = document.getElementById("weekGrid");
      grid.textContent = "";
      CURRICULUM.forEach(function(w) {
        var localized = window.RPDI18n.localizeWeekData(w);
        var badgeInfo = getBadge(w);
        var badgeClass = badgeInfo[0];
        var badgeText = badgeInfo[1];
        var isActive = w.status === "active";
        var weekCardPreset = preset.weekCard || {};
        var maxChips = isActive
          ? (weekCardPreset.activePreviewMaxItems || weekCardPreset.previewMaxItems || 5)
          : (weekCardPreset.previewMaxItems || 3);
        var pageUrl = withPresetHref("week.html?week=" + w.week);
        var previewItems = getWeekCardPreviewItems(localized, preset);
        var isUpcoming = w.status !== "done" && w.status !== "active" && !isExamWeek(w);

        var card = document.createElement("a");
        card.className = "week-card " + getCardClass(w) + (isUpcoming ? " is-locked" : "");
        if (!isUpcoming) card.href = pageUrl;

        if (isActive) {
          var activeLabel = document.createElement("div");
          activeLabel.className = "cw-active-label";
          activeLabel.textContent = text.activeLabel;
          card.appendChild(activeLabel);
        }

        var header = document.createElement("div");
        header.className = "week-card-header";
        var num = document.createElement("span");
        num.className = "week-num";
        num.textContent = "Week " + String(w.week).padStart(2, "0");
        var badge = document.createElement("span");
        badge.className = "week-badge " + badgeClass;
        badge.textContent = badgeText;
        header.appendChild(num);
        header.appendChild(badge);
        card.appendChild(header);

        var title = document.createElement("p");
        title.className = "week-title";
        title.textContent = localized.title;
        card.appendChild(title);

        var sub = document.createElement("p");
        sub.className = "week-subtitle";
        sub.textContent = localized.subtitle;
        card.appendChild(sub);

        var topics = document.createElement("div");
        topics.className = "week-topics";
        previewItems.slice(0, maxChips).forEach(function(topic) {
          var chip = document.createElement("span");
          chip.className = "topic-chip";
          chip.textContent = topic;
          topics.appendChild(chip);
        });
        if (previewItems.length > maxChips) {
          var more = document.createElement("span");
          more.className = "topic-chip";
          more.textContent = "+" + (previewItems.length - maxChips);
          topics.appendChild(more);
        }
        card.appendChild(topics);

        var footer = document.createElement("div");
        footer.className = "week-footer";
        var metrics = document.createElement("div");
        metrics.className = "week-metrics";
        buildWeekCardMetrics(w, text, preset).forEach(function(label) {
          var metric = document.createElement("span");
          metric.className = "week-metric";
          metric.textContent = label;
          metrics.appendChild(metric);
        });
        var arrow = document.createElement("span");
        arrow.className = "go-arrow";
        arrow.textContent = "\u2192";
        footer.appendChild(metrics);
        footer.appendChild(arrow);
        card.appendChild(footer);

        grid.appendChild(card);
      });
    }

    function renderPage() {
      var text = getPageStrings();
      var preset = getUiPreset();
      var isKo = window.RPDI18n.getLanguage() === "ko";
      var publicLinks = window.RPDAppShell
        ? window.RPDAppShell.getPublicLinks({ lang: isKo ? "ko" : "en", presetName: preset })
        : null;
      var activeWeek = CURRICULUM.find(function(week) { return week.status === "active"; }) || CURRICULUM[0];
      document.title = getPresetProgramTitle(text) + " — Blender Archive";
      var meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute("content", isKo ? "인하대학교 RPD 실제 수업 페이지" : "Inha University RPD course page");

      document.getElementById("topbarTitle").textContent = text.topbarTitle;
      document.getElementById("topbarMeta").textContent = text.topbarMeta;
      document.getElementById("homeLink").textContent = publicLinks ? publicLinks.home.label : (isKo ? "홈" : "Home");
      document.getElementById("homeLink").setAttribute("href", publicLinks ? publicLinks.home.href : withPresetHref("index.html"));
      document.getElementById("inhaLink").textContent = publicLinks ? publicLinks.collection.label : (isKo ? "인하대 수업" : "Inha RPD");
      document.getElementById("inhaLink").setAttribute("href", publicLinks ? publicLinks.collection.href : withPresetHref("inha.html"));
      document.getElementById("libraryLink").textContent = publicLinks ? publicLinks.library.label : (isKo ? "카드 라이브러리" : "Card Library");
      document.getElementById("libraryLink").setAttribute("href", publicLinks ? publicLinks.library.href : withPresetHref("library.html"));
      document.getElementById("shortcutsLink").textContent = publicLinks ? publicLinks.shortcuts.label : (isKo ? "단축키 DB" : "Shortcut DB");
      document.getElementById("shortcutsLink").setAttribute("href", publicLinks ? publicLinks.shortcuts.href : withPresetHref("shortcuts.html"));
      document.getElementById("sidebarPagesLabel").textContent = isKo ? "공개 페이지" : "Public pages";
      document.getElementById("sidebarPagesTitle").textContent = isKo ? "수업 바로가기" : "Course pages";
      document.getElementById("sidebarPagesMeta").textContent = isKo
        ? "아카이브와 실제 수업 화면을 빠르게 오갑니다."
        : "Move quickly between the archive and the live course pages.";
      document.getElementById("sidebarHomeLink").textContent = publicLinks ? publicLinks.home.label : (isKo ? "홈" : "Home");
      document.getElementById("sidebarHomeLink").setAttribute("href", publicLinks ? publicLinks.home.href : withPresetHref("index.html"));
      document.getElementById("sidebarCollectionLink").textContent = publicLinks ? publicLinks.collection.label : (isKo ? "인하대 수업" : "Inha RPD");
      document.getElementById("sidebarCollectionLink").setAttribute("href", publicLinks ? publicLinks.collection.href : withPresetHref("inha.html"));
      document.getElementById("sidebarLibraryLink").textContent = publicLinks ? publicLinks.library.label : (isKo ? "카드 라이브러리" : "Card Library");
      document.getElementById("sidebarLibraryLink").setAttribute("href", publicLinks ? publicLinks.library.href : withPresetHref("library.html"));
      document.getElementById("sidebarShortcutsLink").textContent = publicLinks ? publicLinks.shortcuts.label : (isKo ? "단축키 DB" : "Shortcut DB");
      document.getElementById("sidebarShortcutsLink").setAttribute("href", publicLinks ? publicLinks.shortcuts.href : withPresetHref("shortcuts.html"));
      document.getElementById("sidebarSnapshotLabel").textContent = isKo ? "운영 스냅샷" : "Course snapshot";
      document.getElementById("sidebarSnapshotTitle").textContent = isKo ? "현재 운영 상태" : "Current course state";
      document.getElementById("sidebarSummaryWeeks").textContent = isKo
        ? (CURRICULUM.length + "주 커리큘럼")
        : (CURRICULUM.length + "-week curriculum");
      document.getElementById("sidebarSummaryCards").textContent = isKo
        ? (countProgramArchiveCards() + "개 아카이브 카드")
        : (countProgramArchiveCards() + " archive cards");
      document.getElementById("sidebarSummaryCurrent").textContent = activeWeek
        ? (isKo ? ("현재 Week " + String(activeWeek.week).padStart(2, "0") + " 운영") : ("Running Week " + String(activeWeek.week).padStart(2, "0")))
        : (isKo ? "현재 운영 주차 없음" : "No active week");
      document.getElementById("themeToggle").setAttribute("aria-label", text.themeToggleAria);

      document.getElementById("heroEyebrow").textContent = isKo ? "실제 수업 페이지" : "Built course page";
      renderHeroTitle(text);
      document.getElementById("heroDescription").innerHTML = isKo
        ? "인하대학교 Robot Product Design 수업 페이지입니다.<wbr> <span class=\"rpd-phrase-keep\">필요한 주차만</span> 바로 열어볼 수 있습니다."
        : "This is the Inha University Robot Product Design course page.<wbr> Open only the weeks you need.";
      document.getElementById("heroMetaLabel").textContent = localizeUiLabel((preset.labels || {}).courseSnapshotTitle, isKo ? "수업 스냅샷" : "Course snapshot");
      document.getElementById("heroActions").innerHTML = buildHeroActions(text);
      document.getElementById("heroMeta").innerHTML = buildHeroMeta(text).map(function(item) {
        return "<div class=\"hero-snapshot-item" + (item.emphasis ? " is-emphasis" : "") + "\"><strong class=\"hero-snapshot-value\">" + item.value + "</strong><span class=\"hero-snapshot-key\">" + item.label + "</span></div>";
      }).join("");

      document.getElementById("weekSectionEyebrow").textContent = text.weekSectionEyebrow;
      document.getElementById("weekSectionTitle").textContent = isKo ? "주차별 수업" : "Weekly lessons";
      document.getElementById("footerLabel").textContent = text.footerLabel;

      renderWeeks(text, preset);
    }

    window.RPDWeekUI.init({ url: "data/week-ui.json?v=20260318a" }).finally(function() {
      window.RPDI18n.mountLanguageSwitcher(document.getElementById("langSwitcher"));
      window.RPDI18n.onLanguageChange(renderPage);
    });

    document.getElementById("themeToggle").addEventListener("click", function() {
      var current = document.documentElement.getAttribute("data-theme");
      var next = current === "light" ? "" : "light";
      if (next) {
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("rpd-theme", next);
      } else {
        document.documentElement.removeAttribute("data-theme");
        localStorage.removeItem("rpd-theme");
      }
    });
  </script>
</body>
</html>

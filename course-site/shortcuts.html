<html lang="ko">
<head>

  <script>/* FOUC prevention */ (function(){var t=localStorage.getItem('rpd-theme');if(t)document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('rpd-lang');if(l){document.documentElement.lang=l;document.documentElement.setAttribute('data-lang',l);}})()</script>
  <style>
    .shortcuts-page {
      --shortcuts-shell-radius: 26px;
      --shortcuts-card-radius: 20px;
      --shortcuts-chip-radius: var(--pill-radius);
      --shortcuts-control-radius: var(--pill-radius);
      --shortcuts-accent: #2f7489;
      --shortcuts-accent-strong: #255f70;
      --shortcuts-accent-soft: #d3edf4;
      --shortcuts-accent-rgb: 47, 116, 137;
      --shortcuts-panel-bg: var(--modal-panel-bg);
      --shortcuts-panel-soft-bg:
        linear-gradient(180deg, rgba(255,255,255,.02), transparent 72%),
        rgba(255,255,255,.014);
      --shortcuts-panel-strong-bg:
        linear-gradient(180deg, rgba(255,255,255,.034), transparent 72%),
        rgba(255,255,255,.02);
      --shortcuts-top-line: linear-gradient(90deg, transparent, rgba(var(--shortcuts-accent-rgb), .18), transparent);
    }
    .shortcuts-page .topbar .btn,
    .shortcuts-page .theme-toggle,
    .shortcuts-page #langSwitcher .lang-switcher {
      border-radius: var(--shortcuts-control-radius);
    }
    .shortcuts-brand {
      max-width: 316px;
    }
    .shortcuts-brand strong {
      letter-spacing: -.02em;
    }
    .shortcuts-brand .topbar-meta {
      color: var(--muted);
    }
    .shortcuts-page .topbar .btn-primary {
      border-color: rgba(var(--shortcuts-accent-rgb), .46);
      background: rgba(255,255,255,.03);
      color: #f7fbfc;
      box-shadow:
        inset 0 0 0 1px rgba(var(--shortcuts-accent-rgb), .12),
        0 10px 20px rgba(0,0,0,.14);
    }
    .shortcuts-topbar-inner.rpd-topbar-3col {
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 18px;
    }
    .hero {
      padding: 24px 0 14px;
      text-align: left;
    }
    .hero-card {
      position: relative;
      grid-template-columns: minmax(0, 1fr) minmax(210px, .56fr);
      align-items: start;
      width: 100%;
      border-radius: var(--shortcuts-shell-radius);
      border: 1px solid var(--line);
      background: var(--shortcuts-panel-bg);
      box-shadow: var(--modal-panel-shadow);
      overflow: hidden;
      isolation: isolate;
    }
    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: var(--shortcuts-top-line);
      pointer-events: none;
    }
    .hero-copy,
    .hero-meta-wrap {
      position: relative;
      z-index: 1;
    }
    .hero h1 {
      max-width: 14ch;
      text-wrap: balance;
    }
    .hero p {
      max-width: 54ch;
    }
    .hero-meta-wrap {
      background: var(--modal-panel-soft-bg);
    }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .shortcuts-page .topbar .btn-primary:hover {
      border-color: rgba(var(--shortcuts-accent-rgb), .58);
      background:
        linear-gradient(180deg, rgba(var(--shortcuts-accent-rgb), .08), rgba(255,255,255,.02)),
        rgba(255,255,255,.04);
    }

    /* Search bar */
    .search-wrap {
      position: sticky; top: 60px; z-index: 40;
      padding: 10px 0 16px;
      background: linear-gradient(180deg, rgba(10,10,10,.92), rgba(10,10,10,.72));
      backdrop-filter: blur(18px);
    }
    .search-inner {
      width: min(var(--max-width), calc(100% - 32px));
      margin: 0 auto;
      display: grid;
      gap: 10px;
      padding: 16px;
      border-radius: var(--shortcuts-shell-radius);
      border: 1px solid var(--line);
      background: var(--shortcuts-panel-bg);
      box-shadow: var(--modal-panel-shadow);
      overflow: hidden;
      isolation: isolate;
      position: relative;
    }
    .search-inner::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: var(--shortcuts-top-line);
      pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 12px 18px 12px 44px;
      border-radius: var(--shortcuts-card-radius);
      border: 1px solid var(--line);
      background: var(--shortcuts-panel-strong-bg);
      box-shadow: var(--modal-card-shadow);
      color: var(--text); font-family: var(--font-body); font-size: .94rem;
      outline: none;
      transition: border-color .18s, background .18s;
    }
    .search-input:focus { border-color: rgba(var(--shortcuts-accent-rgb), .42); background: rgba(255,255,255,.04); }
    .search-input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 1rem;
    }
    .search-field { position: relative; }
    .search-meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px 16px;
    }
    .results-meta {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 7px 12px;
      border-radius: var(--shortcuts-chip-radius);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      font-size: .78rem;
      color: var(--muted-strong);
    }

    /* Category filter chips */
    .filter-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .filter-chip {
      padding: 7px 12px;
      border-radius: var(--shortcuts-chip-radius);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--muted); font-size: .82rem; font-weight: 500;
      cursor: pointer;
      transition: border-color .14s, color .14s, background .14s, transform .14s;
    }
    .filter-chip:hover {
      color: var(--text);
      transform: translateY(-1px);
    }
    .filter-chip.is-active {
      border-color: rgba(var(--shortcuts-accent-rgb), .32);
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(var(--shortcuts-accent-rgb), .07), rgba(255,255,255,.02)),
        rgba(255,255,255,.03);
      box-shadow: inset 0 0 0 1px rgba(var(--shortcuts-accent-rgb), .1);
    }

    /* View toggle */
    .view-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border-radius: var(--shortcuts-control-radius);
      border: 1px solid var(--line);
      background: var(--shortcuts-panel-strong-bg);
      box-shadow: var(--modal-card-shadow);
    }
    .view-btn {
      min-height: calc(var(--pill-control-height) - 6px);
      padding: 7px 14px;
      border-radius: calc(var(--shortcuts-control-radius) - 4px);
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .14s, border-color .14s, color .14s, transform .14s;
    }
    .view-btn:hover {
      color: var(--text);
      transform: translateY(-1px);
    }
    .view-btn.is-active {
      background:
        linear-gradient(135deg, rgba(var(--shortcuts-accent-rgb), .14), rgba(255,255,255,.04)),
        rgba(255,255,255,.04);
      border-color: rgba(var(--shortcuts-accent-rgb), .36);
      color: #fff;
      box-shadow:
        inset 0 0 0 1px rgba(var(--shortcuts-accent-rgb), .12),
        0 10px 22px rgba(0,0,0,.18);
      transform: none;
    }

    /* Category groups */
    .content-block {
      position: relative;
      padding: 24px;
      border-radius: var(--shortcuts-shell-radius);
      border: 1px solid var(--line);
      background: var(--shortcuts-panel-bg);
      box-shadow: var(--modal-panel-shadow);
      overflow: hidden;
      isolation: isolate;
    }
    .content-block::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: var(--shortcuts-top-line);
      pointer-events: none;
    }
    .cat-group {
      margin-bottom: 18px;
      padding: 20px;
      border-radius: var(--shortcuts-card-radius);
      border: 1px solid var(--line);
      background: var(--shortcuts-panel-soft-bg);
      box-shadow: var(--modal-card-shadow);
    }
    .cat-group:last-child { margin-bottom: 0; }
    .cat-group-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }
    .cat-group-label {
      font-size: 1.1rem; font-weight: 620;
      color: var(--text); font-family: var(--font-display);
    }
    .cat-group-count {
      font-size: .76rem; color: var(--muted);
      padding: 4px 10px; border-radius: var(--shortcuts-chip-radius);
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line);
    }

    /* Shortcut rows */
    .shortcut-row {
      display: flex; align-items: center; gap: 14px;
      flex-wrap: wrap;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--shortcuts-card-radius);
      background: rgba(255,255,255,.018);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
      transition: transform .12s, border-color .12s, background .12s;
      margin-top: 10px;
    }
    .shortcut-row:hover {
      transform: translateY(-1px);
      border-color: rgba(var(--shortcuts-accent-rgb), .3);
      background: var(--modal-hover-bg);
    }
    .shortcut-row-keys { min-width: 160px; flex-shrink: 0; }
    .shortcut-row-action {
      flex: 1; color: rgba(245,245,247,.94); font-size: .9rem; line-height: 1.5;
    }
    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: .94rem;
    }

    /* ── Keyboard view ────────────────────────────── */
    .page-shell { overflow: visible !important; }
    .kbd-svg-wrap { overflow-x: auto; padding: 8px 0 16px; }

    /* Key detail panel */
    .kbd-detail-panel {
      margin-top: 20px;
      background: var(--modal-panel-soft-bg);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--modal-card-shadow);
      padding: 20px 24px;
    }
    .kbd-detail-title {
      font-size: .9rem; font-weight: 620; color: var(--text);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .kbd-detail-key-badge {
      font-family: var(--font-mono, monospace);
      background: rgba(var(--shortcuts-accent-rgb), .1);
      border: 1px solid rgba(var(--shortcuts-accent-rgb), .24);
      color: var(--shortcuts-accent-soft);
      padding: 2px 10px; border-radius: 6px; font-size: .9rem;
    }
    .kbd-toast {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
      padding: 13px 14px;
      border-radius: var(--shortcuts-card-radius);
      border: 1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 72%),
        rgba(255,255,255,.022);
      box-shadow: var(--modal-card-shadow);
    }
    .kbd-toast.is-selected {
      border-color: rgba(var(--shortcuts-accent-rgb), .24);
      background:
        linear-gradient(180deg, rgba(var(--shortcuts-accent-rgb), .07), transparent 76%),
        rgba(255,255,255,.022);
      box-shadow:
        inset 0 0 0 1px rgba(var(--shortcuts-accent-rgb), .06),
        var(--modal-card-shadow);
    }
    .kbd-toast-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border-radius: 12px;
      border: 1px solid rgba(var(--shortcuts-accent-rgb), .18);
      background: rgba(var(--shortcuts-accent-rgb), .08);
      color: var(--shortcuts-accent-soft);
      font-size: .78rem;
      font-weight: 620;
      line-height: 1;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
      white-space: nowrap;
    }
    .kbd-toast-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }
    .kbd-toast-title {
      color: var(--text);
      font-size: .84rem;
      font-weight: 620;
      line-height: 1.35;
    }
    .kbd-toast-body {
      color: var(--muted-strong);
      font-size: .78rem;
      line-height: 1.55;
    }

    .shortcut-row-detail {
      flex-basis: 100%;
      font-size: .82rem; color: var(--muted);
      line-height: 1.6;
      padding: 6px 0 2px 0;
    }
    .shortcut-related {
      display: flex;
      flex-basis: 100%;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 2px;
    }
    .shortcut-related-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: var(--shortcuts-chip-radius);
      border: 1px solid rgba(var(--shortcuts-accent-rgb), .22);
      background:
        linear-gradient(135deg, rgba(var(--shortcuts-accent-rgb), .06), rgba(255,255,255,.02)),
        rgba(255,255,255,.03);
      color: rgba(245,245,247,.96);
      font-size: .76rem;
      font-weight: 600;
      line-height: 1.2;
      text-decoration: none;
      box-shadow: inset 0 0 0 1px rgba(var(--shortcuts-accent-rgb), .06);
      transition: transform .14s, border-color .14s, background .14s;
    }
    .shortcut-related-link:hover {
      transform: translateY(-1px);
      border-color: rgba(var(--shortcuts-accent-rgb), .3);
      background:
        linear-gradient(135deg, rgba(var(--shortcuts-accent-rgb), .08), rgba(255,255,255,.02)),
        rgba(34,47,55,.92);
    }
    .shortcut-related-icon {
      font-size: .88rem;
      line-height: 1;
    }

    @media (max-width: 720px) {
      .hero-card,
      .search-inner,
      .content-block {
        padding: 20px;
      }
      .hero-card {
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .shortcut-row { flex-wrap: wrap; gap: 8px; }
      .shortcut-row-keys { min-width: unset; }
      .kbd-svg-wrap { overflow-x: scroll; -webkit-overflow-scrolling: touch; cursor: grab; }
      .kbd-svg-wrap svg { min-width: 780px; }
      .search-meta-row {
        align-items: start;
      }
      .view-toggle {
        width: 100%;
      }
      .results-meta {
        order: 2;
      }
    }
  </style>

  <script>
    var SHORTCUT_CATEGORIES = {
      general: { label: "General", order: 0 },
      navigation: { label: "Navigation", order: 1 },
      transform: { label: "Transforms", order: 2 },
      modeling: { label: "Modeling", order: 3 },
      modifier: { label: "Modifier", order: 4 },
      object: { label: "Object", order: 5 },
      sculpt: { label: "Sculpt", order: 6 },
      material: { label: "Material", order: 7 },
      uv: { label: "UV", order: 8 },
      rigging: { label: "Rigging", order: 9 },
      render: { label: "Rendering", order: 10 }
    };

    function getText() {
      return window.RPDI18n.getStrings("shortcuts");
    }

    function withPresetHref(href) {
      return window.RPDAppShell ? window.RPDAppShell.withPreset(href) : href;
    }

    function formatCount(count, nounKo, nounEn) {
      return window.RPDI18n.getLanguage() === "ko"
        ? count + "개 " + nounKo
        : count + " " + nounEn;
    }

    function normalizeMatchText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[−–—]/g, "-")
        .replace(/[^a-z0-9가-힣+]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function collectWeekShowMeIds(week) {
      var ids = {};
      (week.steps || []).forEach(function(step) {
        if (step.showme) {
          (Array.isArray(step.showme) ? step.showme : [step.showme]).forEach(function(id) {
            if (id) ids[id] = true;
          });
        }
        (step.widgets || []).forEach(function(widget) {
          if (widget && widget.type === "showme" && widget.id) ids[widget.id] = true;
        });
      });
      return Object.keys(ids);
    }

    function buildWeekShowMeMap() {
      var map = {};
      CURRICULUM.forEach(function(week) {
        map[week.week] = collectWeekShowMeIds(week);
      });
      return map;
    }

    var SHOWME_SHORTCUT_HINTS = {

    function normalizeShortcutValue(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[−–—]/g, "-")
        .replace(/\s+/g, " ")
        .trim();
    }

    function buildShortcutIdentity(shortcut) {
      return [
        normalizeShortcutValue(shortcut.keys),
        normalizeShortcutValue(shortcut.action),
        normalizeShortcutValue(shortcut.detail),
        normalizeShortcutValue(shortcut.category || "general"),
      ].join("||");
    }

    function canonicalizeShortcutAction(action) {
      var normalized = normalizeShortcutValue(action);
      var aliasMatchers = [
        [/^되돌리기(?:\s*\(undo\))?$/, "undo"],
        [/^bevel(?:\s*\(.+\))?$/, "bevel"],
        [/^apply all transforms(?:\s*\(.+\))?$/, "apply-all-transforms"],
        [/^(?:join\s*\(오브젝트 합치기\)|오브젝트 합치기\s*\(join\))$/, "join-object"],
        [/^(?:실시간\s*)?렌더 미리보기$/, "render-preview"],
        [/^(?:애니메이션\s*)?재생\/정지$/, "play-pause"]
      ];
      for (var i = 0; i < aliasMatchers.length; i++) {
        if (aliasMatchers[i][0].test(normalized)) return aliasMatchers[i][1];
      }
      return normalized;
    }

    function buildShortcutMergeIdentity(shortcut) {
      return [
        normalizeShortcutValue(shortcut.keys),
        canonicalizeShortcutAction(shortcut.action),
        normalizeShortcutValue(shortcut.category || "general")
      ].join("||");
    }

    function scoreShortcutCopy(shortcut) {
      var action = String(shortcut.action || "");
      var score = action.length;
      if (/[A-Za-z]/.test(action)) score += 12;
      if (/[가-힣]/.test(action)) score += 12;
      if (/\(/.test(action)) score += 6;
      if (shortcut.detail) score += 10 + String(shortcut.detail).length;
      return score;
    }

    function buildDB() {
      var db = [];
      var seen = {};
      var mergedSeen = {};
      CURRICULUM.forEach(function(week) {
        if (!week.shortcuts || !week.shortcuts.length) return;
        week.shortcuts.forEach(function(shortcut) {
          var entry = {
            keys: shortcut.keys,
            action: shortcut.action,
            detail: shortcut.detail || "",
            category: shortcut.category || "general",
            weeks: [week.week]
          };
          var identity = buildShortcutIdentity(entry);
          if (seen[identity]) {
            if (seen[identity].weeks.indexOf(week.week) === -1) {
              seen[identity].weeks.push(week.week);
            }
            return;
          }

          var mergeIdentity = buildShortcutMergeIdentity(entry);
          if (mergedSeen[mergeIdentity]) {
            var existing = mergedSeen[mergeIdentity];
            seen[identity] = existing;
            if (existing.weeks.indexOf(week.week) === -1) {
              existing.weeks.push(week.week);
            }
            if (!existing.detail && entry.detail) {
              existing.detail = entry.detail;
            }
            if (scoreShortcutCopy(entry) > scoreShortcutCopy(existing)) {
              existing.action = entry.action;
              if (entry.detail) existing.detail = entry.detail;
            }
            return;
          }

          seen[identity] = entry;
          mergedSeen[mergeIdentity] = entry;
          db.push(entry);
        });
      });
      return db;
    }

    function getRelatedShowMeIds(shortcut, limit) {
      if (typeof SHOWME_REGISTRY === "undefined") return [];
      var candidateSet = {};
      (shortcut.weeks || []).forEach(function(week) {

        });
      });
      var text = normalizeMatchText([shortcut.keys, shortcut.action, shortcut.detail].join(" "));
      return Object.keys(candidateSet).map(function(id) {
        var meta = SHOWME_REGISTRY[id] || {};
        var score = 0;
        var hints = SHOWME_SHORTCUT_HINTS[id] || [];
        hints.forEach(function(hint) {
          if (text.indexOf(normalizeMatchText(hint)) !== -1) score += 100;
        });
        getShowMeMatchTokens(id, meta).forEach(function(token) {
          if (text.indexOf(token) !== -1) {
            score += token.indexOf(" ") !== -1 ? 56 : 28;
          }
        });
        if (meta.week && shortcut.weeks && shortcut.weeks.indexOf(meta.week) !== -1) {
          score += 6;
        }
        return { id: id, score: score };
      }).filter(function(item) {
        return item.score > 0;
      }).sort(function(a, b) {
        return b.score - a.score;
      }).slice(0, limit || 1).map(function(item) {
        return item.id;
      });
    }

    function getShowMeMatchTokens(id, meta) {
      if (SHOWME_MATCH_TOKEN_CACHE[id]) return SHOWME_MATCH_TOKEN_CACHE[id];
      var values = [

        meta && meta.label,
        id ? id.replace(/-/g, " ") : "",

      var tokens = {};

    function rawKeyToId(key) {
      if (!key) return null;
      var upper = key.toUpperCase().trim();
      if (upper.startsWith("NUMPAD ")) {
        var numpadKey = upper.slice(7).trim();
        if (numpadKey === "." || numpadKey === "DOT" || numpadKey === "PERIOD") return "NPDOT";
        if (numpadKey === "+" || numpadKey === "PLUS") return "NPPLUS";
        if (numpadKey === "-" || numpadKey === "MINUS" || numpadKey === "−") return "NPMINUS";
        return "NP" + numpadKey;
      }
      if (key === "←" || upper === "LEFT") return "LARROW";
      if (key === "→" || upper === "RIGHT") return "RARROW";
      if (upper.includes("MMB")) return "MMB";
      if (upper.includes("RMB") || upper.includes("RIGHT CLICK")) return "RMB";
      if (upper === "스크롤" || upper === "SCROLL") return "SCROLL";
      if (upper.includes("클릭") || upper === "LMB" || upper.includes("LEFT CLICK") || upper === "CLICK") return "LMB";
      if (upper === "CTRL") return "CTRL";
      if (upper === "SHIFT") return "SHIFT";
      if (upper === "ALT") return "ALT";
      if (upper === "TAB") return "TAB";
      if (upper === "SPACE") return "SPACE";
      if (upper === "ESC" || upper === "ESCAPE") return "ESC";
      if (/^F\d{1,2}$/.test(upper)) return upper;
      if (/^[A-Z0-9]$/.test(upper)) return upper;
      return null;
    }

    function shortcutToKeyIds(keysStr) {
      var cleaned = keysStr.replace(/\s*\([^)]*\)/g, "").trim();
      cleaned = cleaned.replace(/\s+→\s+(?=[A-Za-z가-힣]).*$/, "").trim();
      var parts = cleaned.split(/\s*\+\s*/);
      var ids = [];
      var seenIds = {};

      parts.forEach(function(part) {
        var variants = part.trim().split(/\s*\/\s*/);
        var numpadPrefix = /^numpad\s+/i.test(variants[0]) ? "Numpad " : "";
        variants.forEach(function(variant, index) {
          var raw = variant.trim();
          if (index > 0 && numpadPrefix && /^\d+$/.test(raw)) raw = numpadPrefix + raw;
          var id = rawKeyToId(raw);
          if (id && !seenIds[id]) {
            seenIds[id] = true;
            ids.push(id);
          }
        });
      });

      if (ids.length === 0) {
        var fallback = rawKeyToId(cleaned);
        if (fallback) ids.push(fallback);
      }
      return ids;
    }

    function buildKeyMap(db) {

      });
      return map;
    }

      renderResultsMeta(filtered.length);

      kbdEl.textContent = "";

      kbdEl.appendChild(makeKeyboardToast(selectedKeyId && kmap[selectedKeyId] ? selectedKeyId : null, kmap));

      var svg = svgEl("svg", {
        viewBox: "0 0 764 258",
        width: "100%",
        style: "max-width:764px;display:block",
        "aria-label": getText().keyboardMapAria,
      });

      svg.appendChild(svgEl("rect", { x: 4, y: 4, width: 576, height: 246, rx: 12, fill: "rgba(255,255,255,0.025)", stroke: "rgba(255,255,255,0.07)", "stroke-width": 1 }));
      svg.appendChild(svgEl("rect", { x: 590, y: 38, width: 170, height: 214, rx: 10, fill: "rgba(255,255,255,0.025)", stroke: "rgba(255,255,255,0.07)", "stroke-width": 1 }));

      function addSvgLabel(text, x, y) {
        var t = svgEl("text", {
          x: x,
          y: y,
          "text-anchor": "middle",
          fill: "rgba(255,255,255,0.22)",
          "font-size": "8",
          "font-family": "var(--font-body,sans-serif)",
          "letter-spacing": "0.07em"
        });
        t.textContent = text;
        svg.appendChild(t);
      }

      addSvgLabel(getText().numpadLabel, NP_X0 + 59, NP_Y0 - 8);
      addSvgLabel(getText().mouseLabel, MOUSE_X0 + 58, MOUSE_Y0 - 8);

      function renderRows(rows, x0) {
        rows.forEach(function(row) {
          var rowY = row[0];
          var rowHeight = row[1];
          var keys = row[2];
          var cursorX = x0;
          keys.forEach(function(keyData) {
            var keyId = keyData[0];
            var label = keyData[1];
            var units = keyData[2];
            var width = units * U - G;
            var x = cursorX;
            cursorX += units * U;
            if (!keyId) return;

            var shortcuts = kmap[keyId];
            var hasShortcut = !!(shortcuts && shortcuts.length);
            var isSelected = selectedKeyId === keyId;
            var fill = isSelected ? "rgba(" + shortcutsAccentRgb + ",0.42)" : hasShortcut ? "rgba(" + shortcutsAccentRgb + ",0.16)" : "rgba(255,255,255,0.055)";
            var stroke = isSelected ? "rgba(" + shortcutsAccentRgb + ",0.95)" : hasShortcut ? "rgba(" + shortcutsAccentRgb + ",0.55)" : "rgba(255,255,255,0.11)";
            var textFill = isSelected ? "#ffffff" : hasShortcut ? "rgba(" + shortcutsAccentRgb + ",0.98)" : "rgba(255,255,255,0.40)";
            var fontSize = rowHeight <= FH ? 8 : 9;

            svg.appendChild(svgEl("rect", { x: x, y: rowY, width: width, height: rowHeight, rx: 5, fill: fill, stroke: stroke, "stroke-width": 1 }));

            var keyText = svgEl("text", { x: x + width / 2, y: rowY + rowHeight / 2 + 3.5, "text-anchor": "middle", fill: textFill, "font-size": fontSize, "font-family": "var(--font-mono,monospace)" });
            keyText.textContent = label;
            svg.appendChild(keyText);

            if (hasShortcut) {
              var badgeX = x + width - 5;
              var badgeY = rowY + 5;
              svg.appendChild(svgEl("circle", { cx: badgeX, cy: badgeY, r: 6.5, fill: "rgba(10,132,255,0.95)" }));
              var badgeText = svgEl("text", { x: badgeX, y: badgeY + 3.5, "text-anchor": "middle", fill: "#fff", "font-size": "6.5", "font-weight": "700", "font-family": "var(--font-body,sans-serif)" });
              badgeText.textContent = shortcuts.length;
              svg.appendChild(badgeText);

              var hit = svgEl("rect", { x: x, y: rowY, width: width, height: rowHeight, rx: 5, fill: "transparent", cursor: "pointer", "data-kid": keyId });
              (function(selectedId) {
                hit.addEventListener("click", function() {
                  var wasSelected = selectedKeyId === selectedId;
                  selectedKeyId = wasSelected ? null : selectedId;
                  renderKeyboard();
                });
              }(keyId));
              svg.appendChild(hit);
            }
          });
        });
      }

      renderRows(KBD_SVG, 10);
      renderRows(NP_SVG, NP_X0);
      renderRows(MOUSE_SVG, MOUSE_X0);

      var wrap = document.createElement("div");
      wrap.className = "kbd-svg-wrap";
      wrap.appendChild(svg);
      kbdEl.appendChild(wrap);

      var detailHolder = document.getElementById("kbdDetailSection");
      detailHolder.textContent = "";

      if (selectedKeyId && kmap[selectedKeyId]) {
        renderKeyDetail(selectedKeyId, kmap);
      } else if (!kmap[selectedKeyId]) {
        selectedKeyId = null;
      }
    }

    function keyIdToLabel(keyId) {
      var found = keyId;
      KBD_SVG.concat(NP_SVG).concat(MOUSE_SVG).forEach(function(row) {
        row[2].forEach(function(keyData) {
          if (keyData[0] === keyId) found = keyData[1];
        });
      });
      return found;
    }

    function makeKeyboardToast(keyId, kmap) {
      var isKo = window.RPDI18n.getLanguage() === "ko";
      var toast = document.createElement("div");
      toast.className = "kbd-toast" + (keyId ? " is-selected" : "");
      toast.setAttribute("role", "status");
      toast.setAttribute("aria-live", "polite");

      var icon = document.createElement("div");
      icon.className = "kbd-toast-icon";
      icon.setAttribute("aria-hidden", "true");
      icon.textContent = keyId ? keyIdToLabel(keyId) : "⌨";
      toast.appendChild(icon);

      var copy = document.createElement("div");
      copy.className = "kbd-toast-copy";

      var title = document.createElement("div");
      title.className = "kbd-toast-title";

      var body = document.createElement("div");
      body.className = "kbd-toast-body";

      if (keyId && kmap[keyId]) {
        var shortcuts = kmap[keyId];
        var relatedIds = collectRelatedShowMeIds(shortcuts);
        title.textContent = isKo
          ? keyIdToLabel(keyId) + " 키 설명을 아래에 바로 열었습니다."
          : "Opened the " + keyIdToLabel(keyId) + " key details below.";
        body.textContent = isKo
          ? shortcuts.length + "개 단축키를 확인할 수 있고" + (relatedIds.length ? ", 관련 Show Me 카드 " + relatedIds.length + "개도 함께 연결했습니다." : " 관련 카드가 있으면 함께 연결됩니다.")
          : shortcuts.length + " shortcuts are listed below" + (relatedIds.length ? ", including " + relatedIds.length + " related Show Me cards." : ", and related cards appear when available.");
      } else {
        title.textContent = isKo
          ? "강조된 키를 클릭하면 설명이 바로 나옵니다."
          : "Click any highlighted key to open its explanation.";
        body.textContent = isKo
          ? "선택한 키에 연결된 단축키를 아래에서 보고, 맞는 Show Me 카드가 있으면 바로 이동할 수 있습니다."
          : "See the shortcuts tied to that key below, then jump straight to a matching Show Me card when one exists.";
      }

      copy.appendChild(title);
      copy.appendChild(body);
      toast.appendChild(copy);
      return toast;
    }

    function renderKeyDetail(keyId, kmap) {
      var detailHolder = document.getElementById("kbdDetailSection");
      if (!detailHolder) return;
      detailHolder.textContent = "";
      detailHolder.style.display = "none";

      var shortcuts = kmap[keyId];
      if (!shortcuts || shortcuts.length === 0) return;

      detailHolder.style.display = "";
      var panel = document.createElement("div");
      panel.className = "kbd-detail-panel";

      var title = document.createElement("div");
      title.className = "kbd-detail-title";
      var badge = document.createElement("span");
      badge.className = "kbd-detail-key-badge";
      badge.textContent = keyIdToLabel(keyId);
      title.appendChild(badge);
      title.appendChild(document.createTextNode(
        window.RPDI18n.getLanguage() === "ko"
          ? "가 사용된 단축키 (" + shortcuts.length + "개)"
          : " shortcuts on this key (" + shortcuts.length + ")"
      ));
      panel.appendChild(title);

      shortcuts.forEach(function(shortcut) {
        panel.appendChild(makeShortcutRow(shortcut));
      });

      detailHolder.appendChild(panel);
      panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function switchView(view) {
      currentView = view;
      var listEl = document.getElementById("shortcutsContent");
      document.querySelectorAll(".view-btn").forEach(function(btn) {
        var isActive = btn.dataset.view === view;
        btn.classList.toggle("is-active", isActive);
        btn.setAttribute("aria-pressed", isActive ? "true" : "false");
      });
      var detailSection = document.getElementById("kbdDetailSection");
      if (view === "kbd") {
        listEl.style.display = "none";
        kbdEl.style.display = "";
        renderKeyboard();
      } else {
        kbdEl.style.display = "none";
        detailSection.style.display = "none";
        listEl.style.display = "";
        renderShortcuts();
      }
    }

    function renderPage() {
      renderStaticText();
      renderChips();
      if (currentView === "kbd") renderKeyboard();
      else renderShortcuts();
    }

    document.getElementById("viewToggle").addEventListener("click", function(e) {
      var btn = e.target.closest(".view-btn");
      if (btn && btn.dataset.view && btn.dataset.view !== currentView) {
        switchView(btn.dataset.view);
      }
    });

    document.getElementById("searchInput").addEventListener("input", function() {
      if (currentView === "kbd") renderKeyboard();
      else renderShortcuts();
    });

    window.RPDI18n.mountLanguageSwitcher(document.getElementById("langSwitcher"));
    window.RPDI18n.onLanguageChange(renderPage);
    window.RPDAppShell.bindThemeToggle(document.getElementById("themeToggle"));
  </script>
</body>
</html>

  <script>
    // curriculum.js CURRICULUM array is a static trusted source with no user input.
    // All innerHTML assignments below use only static string literals and numeric counts — no user input.
    var SHORTCUT_CATEGORIES = {
      general: { label: "General", order: 0 },
      navigation: { label: "Navigation", order: 1 },
      transform: { label: "Transforms", order: 2 },
      modeling: { label: "Modeling", order: 3 },
      modifier: { label: "Modifier", order: 4 },
      object: { label: "Object", order: 5 },
      sculpt: { label: "Sculpt", order: 6 },
      material: { label: "Material", order: 7 },
      uv: { label: "UV", order: 8 },
      rigging: { label: "Rigging", order: 9 },
      render: { label: "Rendering", order: 10 }
    };

    function getText() {
      return window.RPDI18n.getStrings("shortcuts");
    }

    function withPresetHref(href) {
      return window.RPDAppShell ? window.RPDAppShell.withPreset(href) : href;
    }

    function formatCount(count, nounKo, nounEn) {
      return window.RPDI18n.getLanguage() === "ko"
        ? count + "개 " + nounKo
        : count + " " + nounEn;
    }

    function normalizeMatchText(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[−–—]/g, "-")
        .replace(/[^a-z0-9가-힣+]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function collectWeekShowMeIds(week) {
      var ids = {};
      (week.steps || []).forEach(function(step) {
        if (step.showme) {
          (Array.isArray(step.showme) ? step.showme : [step.showme]).forEach(function(id) {
            if (id) ids[id] = true;
          });
        }
        (step.widgets || []).forEach(function(widget) {
          if (widget && widget.type === "showme" && widget.id) ids[widget.id] = true;
        });
      });
      return Object.keys(ids);
    }

    function buildWeekShowMeMap() {
      var map = {};
      CURRICULUM.forEach(function(week) {
        map[week.week] = collectWeekShowMeIds(week);
      });
      return map;
    }

    var SHOWME_SHORTCUT_HINTS = {
      "blender-preferences": ["preferences", "프리퍼런스", "ctrl + ,", "ctrl ,"],
      "viewport-navigation": ["orbit", "pan", "zoom", "view", "시점", "화면 조작", "numpad", "orthographic", "perspective", "frame selected", "mmb", "scroll"],
      "transform-grs": ["grab", "move", "이동", "rotate", "회전", "scale", "크기 조절", "축 고정", "g r s"],
      "transform-orientation": ["orientation", "로컬", "global", "local"],
      "pivot-point": ["pivot"],
      "snap": ["snap", "snapping"],
      "viewport-shading": ["shading", "rendered", "solid", "wireframe", "matcap", "viewport"],
      "xray-opacity": ["x ray", "xray"],
      "edit-mode": ["edit mode", "tab"],
      "image-reference": ["reference", "image reference", "레퍼런스", "참고 이미지"],
      "extrude": ["extrude"],
      "loop-cut": ["loop cut", "ctrl + r", "ctrl r", "루프 분할"],
      "inset": ["inset"],
      "bevel-tool": ["bevel", "ctrl + b", "ctrl b"],
      "mirror-modifier": ["mirror", "대칭"],
      "subdivision-surface": ["subdivision", "ctrl + 1", "ctrl + 2", "ctrl + 3", "level"],
      "solidify-modifier": ["solidify"],
      "array-modifier": ["array"],
      "boolean-modifier": ["boolean"],
      "weighted-normal": ["weighted normal"],
      "transform-apply": ["apply all transforms", "apply transform", "ctrl + a", "ctrl a"],
      "join-separate": ["join", "separate", "ctrl + j", "ctrl j", "선택 파츠 분리", "오브젝트 합치기"],
      "sculpt-basics": ["sculpt", "조각"],
      "remesh-modifier": ["remesh", "voxel remesh"],
      "material-basics": ["material", "재질"],
      "principled-bsdf": ["principled"],
      "shader-editor": ["shader editor", "node", "노드"],
      "uv-unwrapping": ["uv unwrap", "unwrap", "seam", "mark seam", "clear seam"],
      "uv-editor": ["uv editor", "island", "uv pin", "pin"],
      "light-types": ["light", "조명"],
      "hdri-lighting": ["hdri"],
      "keyframe-basics": ["keyframe", "insert keyframe", "delete keyframe"],
      "graph-editor": ["graph editor"],
      "armature-basics": ["armature", "bone", "뼈대"],
      "weight-paint": ["weight paint"],
      "render-settings": ["render", "rendered", "eevee", "cycles", "카메라 뷰"],
      "compositing-basics": ["compositing", "컴포지팅"]
    };
    var SHOWME_MATCH_TOKEN_CACHE = {};

    function normalizeShortcutValue(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[−–—]/g, "-")
        .replace(/\s+/g, " ")
        .trim();
    }

    function buildShortcutIdentity(shortcut) {
      return [
        normalizeShortcutValue(shortcut.keys),
        normalizeShortcutValue(shortcut.action),
        normalizeShortcutValue(shortcut.detail),
        normalizeShortcutValue(shortcut.category || "general"),
      ].join("||");
    }

    function canonicalizeShortcutAction(action) {
      var normalized = normalizeShortcutValue(action);
      var aliasMatchers = [
        [/^되돌리기(?:\s*\(undo\))?$/, "undo"],
        [/^bevel(?:\s*\(.+\))?$/, "bevel"],
        [/^apply all transforms(?:\s*\(.+\))?$/, "apply-all-transforms"],
        [/^(?:join\s*\(오브젝트 합치기\)|오브젝트 합치기\s*\(join\))$/, "join-object"],
        [/^(?:실시간\s*)?렌더 미리보기$/, "render-preview"],
        [/^(?:애니메이션\s*)?재생\/정지$/, "play-pause"]
      ];
      for (var i = 0; i < aliasMatchers.length; i++) {
        if (aliasMatchers[i][0].test(normalized)) return aliasMatchers[i][1];
      }
      return normalized;
    }

    function buildShortcutMergeIdentity(shortcut) {
      return [
        normalizeShortcutValue(shortcut.keys),
        canonicalizeShortcutAction(shortcut.action),
        normalizeShortcutValue(shortcut.category || "general")
      ].join("||");
    }

    function scoreShortcutCopy(shortcut) {
      var action = String(shortcut.action || "");
      var score = action.length;
      if (/[A-Za-z]/.test(action)) score += 12;
      if (/[가-힣]/.test(action)) score += 12;
      if (/\(/.test(action)) score += 6;
      if (shortcut.detail) score += 10 + String(shortcut.detail).length;
      return score;
    }

    function buildDB() {
      var db = [];
      var seen = {};
      var mergedSeen = {};
      CURRICULUM.forEach(function(week) {
        if (!week.shortcuts || !week.shortcuts.length) return;
        week.shortcuts.forEach(function(shortcut) {
          var entry = {
            keys: shortcut.keys,
            action: shortcut.action,
            detail: shortcut.detail || "",
            category: shortcut.category || "general",
            weeks: [week.week]
          };
          var identity = buildShortcutIdentity(entry);
          if (seen[identity]) {
            if (seen[identity].weeks.indexOf(week.week) === -1) {
              seen[identity].weeks.push(week.week);
            }
            return;
          }

          var mergeIdentity = buildShortcutMergeIdentity(entry);
          if (mergedSeen[mergeIdentity]) {
            var existing = mergedSeen[mergeIdentity];
            seen[identity] = existing;
            if (existing.weeks.indexOf(week.week) === -1) {
              existing.weeks.push(week.week);
            }
            if (!existing.detail && entry.detail) {
              existing.detail = entry.detail;
            }
            if (scoreShortcutCopy(entry) > scoreShortcutCopy(existing)) {
              existing.action = entry.action;
              if (entry.detail) existing.detail = entry.detail;
            }
            return;
          }

          seen[identity] = entry;
          mergedSeen[mergeIdentity] = entry;
          db.push(entry);
        });
      });
      return db;
    }

    var weekShowMeMap = buildWeekShowMeMap();

    function getLocalizedShowMeLabel(id) {
      var meta = (typeof SHOWME_REGISTRY !== "undefined" && SHOWME_REGISTRY[id]) ? SHOWME_REGISTRY[id] : null;
      return window.RPDI18n.getShowMeLabel(id, meta || { label: id });
    }

    function getRelatedShowMeIds(shortcut, limit) {
      if (typeof SHOWME_REGISTRY === "undefined") return [];
      var candidateSet = {};
      (shortcut.weeks || []).forEach(function(week) {
        (weekShowMeMap[week] || []).forEach(function(id) {
          candidateSet[id] = true;
        });
      });
      var text = normalizeMatchText([shortcut.keys, shortcut.action, shortcut.detail].join(" "));
      return Object.keys(candidateSet).map(function(id) {
        var meta = SHOWME_REGISTRY[id] || {};
        var score = 0;
        var hints = SHOWME_SHORTCUT_HINTS[id] || [];
        hints.forEach(function(hint) {
          if (text.indexOf(normalizeMatchText(hint)) !== -1) score += 100;
        });
        getShowMeMatchTokens(id, meta).forEach(function(token) {
          if (text.indexOf(token) !== -1) {
            score += token.indexOf(" ") !== -1 ? 56 : 28;
          }
        });
        if (meta.week && shortcut.weeks && shortcut.weeks.indexOf(meta.week) !== -1) {
          score += 6;
        }
        return { id: id, score: score };
      }).filter(function(item) {
        return item.score >= 84;
      }).sort(function(a, b) {
        return b.score - a.score;
      }).slice(0, limit || 1).map(function(item) {
        return item.id;
      });
    }

    function getShowMeMatchTokens(id, meta) {
      if (SHOWME_MATCH_TOKEN_CACHE[id]) return SHOWME_MATCH_TOKEN_CACHE[id];
      var values = [
        meta && meta.toolName,
        meta && meta.label,
        id ? id.replace(/-/g, " ") : "",
        meta && meta.iconKey ? String(meta.iconKey).replace(/-/g, " ") : ""
      ];
      var tokens = {};
      values.forEach(function(value) {
        var normalized = normalizeMatchText(value);
        if (!normalized || normalized.length < 3) return;
        tokens[normalized] = true;
      });
      SHOWME_MATCH_TOKEN_CACHE[id] = Object.keys(tokens);
      return SHOWME_MATCH_TOKEN_CACHE[id];
    }

    function collectRelatedShowMeIds(shortcuts) {
      var ids = {};
      (shortcuts || []).forEach(function(shortcut) {
        (shortcut.relatedShowMeIds || []).forEach(function(id) {
          ids[id] = true;
        });
      });
      return Object.keys(ids);
    }

    var fullDB = buildDB();
    fullDB.forEach(function(shortcut) {
      shortcut.relatedShowMeIds = getRelatedShowMeIds(shortcut, 1);
    });
    var shortcutsPageStyles = window.getComputedStyle(document.querySelector(".shortcuts-page"));
    var shortcutsAccentRgb = (shortcutsPageStyles.getPropertyValue("--shortcuts-accent-rgb") || "").trim() || "59, 152, 184";
    var chipContainer = document.getElementById("filterChips");
    var contentEl = document.getElementById("shortcutsContent");
    var kbdEl = document.getElementById("kbdView");
    var resultsMetaEl = document.getElementById("resultsMeta");
    var modeToastEl = document.getElementById("modeToast");
    var heroMetaLabelEl = document.getElementById("heroMetaLabel");
    var heroMetaEl = document.getElementById("heroMeta");
    var statsEl = document.getElementById("statsBar");
    var activeFilter = "all";
    var currentView = "list";
    var selectedKeyId = null;

    var catCounts = {};
    fullDB.forEach(function(shortcut) {
      catCounts[shortcut.category] = (catCounts[shortcut.category] || 0) + 1;
    });
    var weekSet = {};
    fullDB.forEach(function(shortcut) {
      (shortcut.weeks || []).forEach(function(week) {
        weekSet[week] = true;
      });
    });
    var weekCount = Object.keys(weekSet).length;

    function buildHeroActions(text) {
      var activeWeek = CURRICULUM.find(function(week) { return week.status === "active"; }) || CURRICULUM[0];
      var weekHref = activeWeek ? ("week.html?week=" + activeWeek.week) : "index.html";
      return [
        '<button class="btn btn-primary" type="button" id="heroKeyboardCta">' + text.heroPrimaryCta + '</button>',
        '<a class="btn btn-ghost" href="' + weekHref + '">' + text.heroSecondaryCta + '</a>',
        '<a class="btn-link" href="library.html">' + text.heroTertiaryCta + ' <span aria-hidden="true">\u2192</span></a>'
      ].join("");
    }

    function renderResultsMeta(count) {
      if (!resultsMetaEl) return;
      resultsMetaEl.textContent = "";
    }

    function renderStaticText() {
      var text = getText();
      var isKo = window.RPDI18n.getLanguage() === "ko";
      var publicLinks = window.RPDAppShell
        ? window.RPDAppShell.getPublicLinks({ lang: isKo ? "ko" : "en" })
        : null;
      document.title = text.pageTitle;
      var meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute("content", text.metaDescription);
      document.getElementById("heroEyebrow").textContent = text.heroEyebrow;
      document.getElementById("heroTitle").textContent = text.heroTitle;
      document.getElementById("heroDescription").textContent = text.heroDescription;
      if (heroMetaLabelEl && heroMetaLabelEl.parentElement) heroMetaLabelEl.parentElement.style.display = "none";
      if (heroMetaEl) heroMetaEl.textContent = "";
      document.getElementById("searchInput").setAttribute("placeholder", text.searchPlaceholder);
      document.getElementById("searchInput").setAttribute("aria-label", text.searchAria);
      document.getElementById("filterChips").setAttribute("aria-label", text.categoryFilterAria);
      document.getElementById("viewToggle").setAttribute("aria-label", text.viewModeAria);
      document.getElementById("viewListBtn").textContent = text.viewList;
      document.getElementById("viewKeyboardBtn").textContent = text.viewKeyboard;
      document.getElementById("footerBackLink").textContent = text.footerBack;

      var themeBtn = document.getElementById("themeToggle");
      if (themeBtn && text.themeToggleAria) themeBtn.setAttribute("aria-label", text.themeToggleAria);

      statsEl.textContent = "";
      [
        formatCount(fullDB.length, "단축키", "shortcuts"),
        formatCount(Object.keys(catCounts).length, "카테고리", "categories"),
        formatCount(weekCount, "주차", "weeks")
      ].forEach(function(label) {
        var span = document.createElement("span");
        span.className = "stat-chip";
        span.textContent = label;
        statsEl.appendChild(span);
      });

      var heroKeyboardCta = document.getElementById("heroKeyboardCta");
      if (heroKeyboardCta) {
        heroKeyboardCta.addEventListener("click", function() {
          switchView("kbd");
          document.getElementById("searchInput").focus({ preventScroll: true });
        });
      }
    }

    function renderChips() {
      var sorted = Object.keys(SHORTCUT_CATEGORIES).sort(function(a, b) {
        return SHORTCUT_CATEGORIES[a].order - SHORTCUT_CATEGORIES[b].order;
      });

      chipContainer.textContent = "";

      var allBtn = document.createElement("button");
      allBtn.className = "rpd-filter-chip" + (activeFilter === "all" ? " is-active" : "");
      allBtn.dataset.cat = "all";
      allBtn.textContent = getText().allFilter;
      chipContainer.appendChild(allBtn);

      sorted.forEach(function(cat) {
        if (!catCounts[cat]) return;
        var btn = document.createElement("button");
        btn.className = "rpd-filter-chip" + (activeFilter === cat ? " is-active" : "");
        btn.dataset.cat = cat;
        btn.textContent = window.RPDI18n.getShortcutCategoryLabel(cat, SHORTCUT_CATEGORIES[cat].label);
        chipContainer.appendChild(btn);
      });

      chipContainer.querySelectorAll(".filter-chip").forEach(function(btn) {
        btn.addEventListener("click", function() {
          activeFilter = this.dataset.cat;
          renderChips();
          if (currentView === "kbd") renderKeyboard();
          else renderShortcuts();
        });
      });
    }

    function filterDB(db, query, cat) {
      var filtered = db;
      if (cat && cat !== "all") {
        filtered = filtered.filter(function(shortcut) { return shortcut.category === cat; });
      }
      if (query) {
        var q = query.toLowerCase();
        filtered = filtered.filter(function(shortcut) {
          return shortcut.keys.toLowerCase().includes(q) || shortcut.action.toLowerCase().includes(q);
        });
      }
      return filtered;
    }

    function groupByCategory(items) {
      var groups = {};
      var order = [];
      items.forEach(function(shortcut) {
        if (!groups[shortcut.category]) {
          groups[shortcut.category] = [];
          order.push(shortcut.category);
        }
        groups[shortcut.category].push(shortcut);
      });
      order.sort(function(a, b) {
        var oa = SHORTCUT_CATEGORIES[a] ? SHORTCUT_CATEGORIES[a].order : 99;
        var ob = SHORTCUT_CATEGORIES[b] ? SHORTCUT_CATEGORIES[b].order : 99;
        return oa - ob;
      });
      return { groups: groups, order: order };
    }

    function makeShortcutRow(shortcut) {
      var row = document.createElement("div");
      row.className = "shortcut-row";

      var keysDiv = document.createElement("div");
      keysDiv.className = "shortcut-row-keys";
      var kbd = document.createElement("kbd");
      kbd.className = "shortcut-key";
      kbd.textContent = shortcut.keys;
      keysDiv.appendChild(kbd);

      var actionDiv = document.createElement("div");
      actionDiv.className = "shortcut-row-action";
      actionDiv.textContent = shortcut.action;

      row.appendChild(keysDiv);
      row.appendChild(actionDiv);

      if (shortcut.detail) {
        var detailDiv = document.createElement("div");
        detailDiv.className = "shortcut-row-detail";
        detailDiv.textContent = shortcut.detail;
        row.appendChild(detailDiv);
      }

      if (shortcut.relatedShowMeIds && shortcut.relatedShowMeIds.length) {
        var related = document.createElement("div");
        related.className = "shortcut-related";
        shortcut.relatedShowMeIds.forEach(function(id) {
          var meta = SHOWME_REGISTRY[id] || {};
          var link = document.createElement("a");
          link.className = "shortcut-related-link";
          link.href = withPresetHref("library.html?showme=" + encodeURIComponent(id));
          link.setAttribute("aria-label", (window.RPDI18n.getLanguage() === "ko" ? "관련 카드 열기: " : "Open related card: ") + getLocalizedShowMeLabel(id));
          link.innerHTML = '<span class="shortcut-related-icon" aria-hidden="true">' + (meta.icon || "◫") + '</span><span>' + getLocalizedShowMeLabel(id) + '</span>';
          related.appendChild(link);
        });
        row.appendChild(related);
      }

      return row;
    }

    function renderShortcuts() {
      var query = document.getElementById("searchInput").value.trim();
      var filtered = filterDB(fullDB, query, activeFilter);

      contentEl.textContent = "";

      if (filtered.length === 0) {
        renderResultsMeta(0);
        var empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = getText().emptyResults;
        contentEl.appendChild(empty);
        return;
      }

      renderResultsMeta(filtered.length);

      var result = groupByCategory(filtered);
      result.order.forEach(function(cat) {
        var items = result.groups[cat];
        var catInfo = SHORTCUT_CATEGORIES[cat] || { label: cat, order: 99 };

        var group = document.createElement("div");
        group.className = "cat-group";

        var header = document.createElement("div");
        header.className = "cat-group-header";
        var label = document.createElement("span");
        label.className = "cat-group-label";
        label.textContent = window.RPDI18n.getShortcutCategoryLabel(cat, catInfo.label);
        header.appendChild(label);
        group.appendChild(header);

        items.forEach(function(shortcut) {
          group.appendChild(makeShortcutRow(shortcut));
        });

        contentEl.appendChild(group);
      });
    }

    var U = 40, KH = 34, FH = 28, G = 4;
    var NP_X0 = 598, NP_Y0 = 46;
    var MOUSE_X0 = 598, MOUSE_Y0 = 210;
    var NS = "http://www.w3.org/2000/svg";

    var KBD_SVG = [
      [10, FH, [["ESC", "Esc", 1.5], [null, "", 0.5], ["F1", "F1", 1], ["F2", "F2", 1], ["F3", "F3", 1], ["F4", "F4", 1], [null, "", 0.25], ["F5", "F5", 1], ["F6", "F6", 1], ["F7", "F7", 1], ["F8", "F8", 1], [null, "", 0.25], ["F9", "F9", 1], ["F10", "F10", 1], ["F11", "F11", 1], ["F12", "F12", 1]]],
      [46, KH, [["TILDE", "`", 1], ["1", "1", 1], ["2", "2", 1], ["3", "3", 1], ["4", "4", 1], ["5", "5", 1], ["6", "6", 1], ["7", "7", 1], ["8", "8", 1], ["9", "9", 1], ["0", "0", 1], ["MINUS", "-", 1], ["EQ", "=", 1]]],
      [84, KH, [["TAB", "Tab", 1.5], ["Q", "Q", 1], ["W", "W", 1], ["E", "E", 1], ["R", "R", 1], ["T", "T", 1], ["Y", "Y", 1], ["U", "U", 1], ["I", "I", 1], ["O", "O", 1], ["P", "P", 1], ["LBRACKET", "[", 1], ["RBRACKET", "]", 1]]],
      [122, KH, [["A", "A", 1], ["S", "S", 1], ["D", "D", 1], ["F", "F", 1], ["G", "G", 1], ["H", "H", 1], ["J", "J", 1], ["K", "K", 1], ["L", "L", 1], ["SEMI", ";", 1], ["QUOTE", "'", 1]]],
      [160, KH, [["Z", "Z", 1], ["X", "X", 1], ["C", "C", 1], ["V", "V", 1], ["B", "B", 1], ["N", "N", 1], ["M", "M", 1], ["COMMA", ",", 1], ["DOT", ".", 1], ["SLASH", "/", 1]]],
      [198, KH, [["CTRL", "Ctrl", 1.5], ["ALT", "Alt", 1.25], ["SPACE", "Space", 6.5], ["ALT", "Alt", 1.25], ["CTRL", "Ctrl", 1.5]]],
    ];

    var NP_SVG = [
      [NP_Y0, KH, [["NP7", "7", 1], ["NP8", "8", 1], ["NP9", "9", 1], ["NPMINUS", "−", 1]]],
      [NP_Y0 + 38, KH, [["NP4", "4", 1], ["NP5", "5", 1], ["NP6", "6", 1], ["NPPLUS", "+", 1]]],
      [NP_Y0 + 38 * 2, KH, [["NP1", "1", 1], ["NP2", "2", 1], ["NP3", "3", 1]]],
      [NP_Y0 + 38 * 3, KH, [["NP0", "0", 2], ["NPDOT", ".", 1]]],
    ];

    var MOUSE_SVG = [
      [MOUSE_Y0, KH, [["LMB", "LMB", 1], ["MMB", "MMB", 1], ["RMB", "RMB", 1], ["SCROLL", "⇕", 1.25]]],
    ];

    function rawKeyToId(key) {
      if (!key) return null;
      var upper = key.toUpperCase().trim();
      if (upper.startsWith("NUMPAD ")) {
        var numpadKey = upper.slice(7).trim();
        if (numpadKey === "." || numpadKey === "DOT" || numpadKey === "PERIOD") return "NPDOT";
        if (numpadKey === "+" || numpadKey === "PLUS") return "NPPLUS";
        if (numpadKey === "-" || numpadKey === "MINUS" || numpadKey === "−") return "NPMINUS";
        return "NP" + numpadKey;
      }
      if (key === "←" || upper === "LEFT") return "LARROW";
      if (key === "→" || upper === "RIGHT") return "RARROW";
      if (upper.includes("MMB")) return "MMB";
      if (upper.includes("RMB") || upper.includes("RIGHT CLICK")) return "RMB";
      if (upper === "스크롤" || upper === "SCROLL") return "SCROLL";
      if (upper.includes("클릭") || upper === "LMB" || upper.includes("LEFT CLICK") || upper === "CLICK") return "LMB";
      if (upper === "CTRL") return "CTRL";
      if (upper === "SHIFT") return "SHIFT";
      if (upper === "ALT") return "ALT";
      if (upper === "TAB") return "TAB";
      if (upper === "SPACE") return "SPACE";
      if (upper === "ESC" || upper === "ESCAPE") return "ESC";
      if (/^F\d{1,2}$/.test(upper)) return upper;
      if (/^[A-Z0-9]$/.test(upper)) return upper;
      return null;
    }

    function shortcutToKeyIds(keysStr) {
      var cleaned = keysStr.replace(/\s*\([^)]*\)/g, "").trim();
      cleaned = cleaned.replace(/\s+→\s+(?=[A-Za-z가-힣]).*$/, "").trim();
      var parts = cleaned.split(/\s*\+\s*/);
      var ids = [];
      var seenIds = {};

      parts.forEach(function(part) {
        var variants = part.trim().split(/\s*\/\s*/);
        var numpadPrefix = /^numpad\s+/i.test(variants[0]) ? "Numpad " : "";
        variants.forEach(function(variant, index) {
          var raw = variant.trim();
          if (index > 0 && numpadPrefix && /^\d+$/.test(raw)) raw = numpadPrefix + raw;
          var id = rawKeyToId(raw);
          if (id && !seenIds[id]) {
            seenIds[id] = true;
            ids.push(id);
          }
        });
      });

      if (ids.length === 0) {
        var fallback = rawKeyToId(cleaned);
        if (fallback) ids.push(fallback);
      }
      return ids;
    }

    function buildKeyMap(db) {
      var map = {};
      db.forEach(function(shortcut) {
        shortcutToKeyIds(shortcut.keys).forEach(function(id) {
          if (!map[id]) map[id] = [];
          map[id].push(shortcut);
        });
      });
      return map;
    }

    function svgEl(tag, attrs) {
      var el = document.createElementNS(NS, tag);
      Object.keys(attrs).forEach(function(key) { el.setAttribute(key, attrs[key]); });
      return el;
    }

    function renderKeyboard() {
      var query = document.getElementById("searchInput").value.trim();
      var filtered = filterDB(fullDB, query, activeFilter);
      var kmap = buildKeyMap(filtered);
      var activeKeyId = selectedKeyId && kmap[selectedKeyId] ? selectedKeyId : null;

      renderResultsMeta(filtered.length);
      renderModeToast(activeKeyId, kmap);

      kbdEl.textContent = "";

      var svg = svgEl("svg", {
        viewBox: "0 0 764 258",
        width: "100%",
        style: "max-width:764px;display:block",
        "aria-label": getText().keyboardMapAria,
      });

      svg.appendChild(svgEl("rect", { x: 4, y: 4, width: 576, height: 246, rx: 12, fill: "rgba(255,255,255,0.025)", stroke: "rgba(255,255,255,0.07)", "stroke-width": 1 }));
      svg.appendChild(svgEl("rect", { x: 590, y: 38, width: 170, height: 214, rx: 10, fill: "rgba(255,255,255,0.025)", stroke: "rgba(255,255,255,0.07)", "stroke-width": 1 }));

      function addSvgLabel(text, x, y) {
        var t = svgEl("text", {
          x: x,
          y: y,
          "text-anchor": "middle",
          fill: "rgba(255,255,255,0.22)",
          "font-size": "8",
          "font-family": "var(--font-body,sans-serif)",
          "letter-spacing": "0.07em"
        });
        t.textContent = text;
        svg.appendChild(t);
      }

      addSvgLabel(getText().numpadLabel, NP_X0 + 59, NP_Y0 - 8);
      addSvgLabel(getText().mouseLabel, MOUSE_X0 + 58, MOUSE_Y0 - 8);

      function renderRows(rows, x0) {
        rows.forEach(function(row) {
          var rowY = row[0];
          var rowHeight = row[1];
          var keys = row[2];
          var cursorX = x0;
          keys.forEach(function(keyData) {
            var keyId = keyData[0];
            var label = keyData[1];
            var units = keyData[2];
            var width = units * U - G;
            var x = cursorX;
            cursorX += units * U;
            if (!keyId) return;

            var shortcuts = kmap[keyId];
            var hasShortcut = !!(shortcuts && shortcuts.length);
            var isSelected = selectedKeyId === keyId;
            var fill = isSelected ? "rgba(" + shortcutsAccentRgb + ",0.42)" : hasShortcut ? "rgba(" + shortcutsAccentRgb + ",0.16)" : "rgba(255,255,255,0.055)";
            var stroke = isSelected ? "rgba(" + shortcutsAccentRgb + ",0.95)" : hasShortcut ? "rgba(" + shortcutsAccentRgb + ",0.55)" : "rgba(255,255,255,0.11)";
            var textFill = isSelected ? "#ffffff" : hasShortcut ? "rgba(" + shortcutsAccentRgb + ",0.98)" : "rgba(255,255,255,0.40)";
            var fontSize = rowHeight <= FH ? 8 : 9;

            svg.appendChild(svgEl("rect", { x: x, y: rowY, width: width, height: rowHeight, rx: 5, fill: fill, stroke: stroke, "stroke-width": 1 }));

            var keyText = svgEl("text", { x: x + width / 2, y: rowY + rowHeight / 2 + 3.5, "text-anchor": "middle", fill: textFill, "font-size": fontSize, "font-family": "var(--font-mono,monospace)" });
            keyText.textContent = label;
            svg.appendChild(keyText);

            if (hasShortcut) {
              var badgeX = x + width - 5;
              var badgeY = rowY + 5;
              svg.appendChild(svgEl("circle", { cx: badgeX, cy: badgeY, r: 6.5, fill: "rgba(10,132,255,0.95)" }));
              var badgeText = svgEl("text", { x: badgeX, y: badgeY + 3.5, "text-anchor": "middle", fill: "#fff", "font-size": "6.5", "font-weight": "700", "font-family": "var(--font-body,sans-serif)" });
              badgeText.textContent = shortcuts.length;
              svg.appendChild(badgeText);

              var hit = svgEl("rect", { x: x, y: rowY, width: width, height: rowHeight, rx: 5, fill: "transparent", cursor: "pointer", "data-kid": keyId });
              (function(selectedId) {
                hit.addEventListener("click", function() {
                  var wasSelected = selectedKeyId === selectedId;
                  selectedKeyId = wasSelected ? null : selectedId;
                  renderKeyboard();
                });
              }(keyId));
              svg.appendChild(hit);
            }
          });
        });
      }

      renderRows(KBD_SVG, 10);
      renderRows(NP_SVG, NP_X0);
      renderRows(MOUSE_SVG, MOUSE_X0);

      var wrap = document.createElement("div");
      wrap.className = "kbd-svg-wrap";
      wrap.appendChild(svg);
      kbdEl.appendChild(wrap);

      var detailHolder = document.getElementById("kbdDetailSection");
      detailHolder.textContent = "";

      if (selectedKeyId && kmap[selectedKeyId]) {
        renderKeyDetail(selectedKeyId, kmap);
      } else if (!kmap[selectedKeyId]) {
        selectedKeyId = null;
      }
    }

    function keyIdToLabel(keyId) {
      var found = keyId;
      KBD_SVG.concat(NP_SVG).concat(MOUSE_SVG).forEach(function(row) {
        row[2].forEach(function(keyData) {
          if (keyData[0] === keyId) found = keyData[1];
        });
      });
      return found;
    }

    function makeKeyboardToast(keyId, kmap) {
      var isKo = window.RPDI18n.getLanguage() === "ko";
      var toast = document.createElement("div");
      toast.className = "kbd-toast" + (keyId ? " is-selected" : "");
      toast.setAttribute("role", "status");
      toast.setAttribute("aria-live", "polite");

      var icon = document.createElement("div");
      icon.className = "kbd-toast-icon";
      icon.setAttribute("aria-hidden", "true");
      icon.textContent = keyId ? keyIdToLabel(keyId) : "⌨";
      toast.appendChild(icon);

      var copy = document.createElement("div");
      copy.className = "kbd-toast-copy";

      var title = document.createElement("div");
      title.className = "kbd-toast-title";

      var body = document.createElement("div");
      body.className = "kbd-toast-body";

      if (keyId && kmap[keyId]) {
        var shortcuts = kmap[keyId];
        var relatedIds = collectRelatedShowMeIds(shortcuts);
        title.textContent = isKo
          ? keyIdToLabel(keyId) + " 키 설명을 아래에 바로 열었습니다."
          : "Opened the " + keyIdToLabel(keyId) + " key details below.";
        body.textContent = isKo
          ? shortcuts.length + "개 단축키를 확인할 수 있고" + (relatedIds.length ? ", 관련 Show Me 카드 " + relatedIds.length + "개도 함께 연결했습니다." : " 관련 카드가 있으면 함께 연결됩니다.")
          : shortcuts.length + " shortcuts are listed below" + (relatedIds.length ? ", including " + relatedIds.length + " related Show Me cards." : ", and related cards appear when available.");
      } else {
        title.textContent = isKo
          ? "강조된 키를 클릭하면 설명이 바로 나옵니다."
          : "Click any highlighted key to open its explanation.";
        body.textContent = isKo
          ? "선택한 키에 연결된 단축키를 아래에서 보고, 맞는 Show Me 카드가 있으면 바로 이동할 수 있습니다."
          : "See the shortcuts tied to that key below, then jump straight to a matching Show Me card when one exists.";
      }

      copy.appendChild(title);
      copy.appendChild(body);
      toast.appendChild(copy);
      return toast;
    }

    function renderModeToast(keyId, kmap) {
      if (!modeToastEl) return;
      if (currentView !== "kbd") {
        modeToastEl.style.display = "none";
        modeToastEl.textContent = "";
        return;
      }
      modeToastEl.style.display = "";
      modeToastEl.textContent = "";
      modeToastEl.appendChild(makeKeyboardToast(keyId, kmap || {}));
    }

    function renderKeyDetail(keyId, kmap) {
      var detailHolder = document.getElementById("kbdDetailSection");
      if (!detailHolder) return;
      detailHolder.textContent = "";
      detailHolder.style.display = "none";

      var shortcuts = kmap[keyId];
      if (!shortcuts || shortcuts.length === 0) return;

      detailHolder.style.display = "";
      var panel = document.createElement("div");
      panel.className = "kbd-detail-panel";

      var title = document.createElement("div");
      title.className = "kbd-detail-title";
      var badge = document.createElement("span");
      badge.className = "kbd-detail-key-badge";
      badge.textContent = keyIdToLabel(keyId);
      title.appendChild(badge);
      title.appendChild(document.createTextNode(
        window.RPDI18n.getLanguage() === "ko"
          ? "가 사용된 단축키 (" + shortcuts.length + "개)"
          : " shortcuts on this key (" + shortcuts.length + ")"
      ));
      panel.appendChild(title);

      shortcuts.forEach(function(shortcut) {
        panel.appendChild(makeShortcutRow(shortcut));
      });

      detailHolder.appendChild(panel);
      panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function switchView(view) {
      currentView = view;
      var listEl = document.getElementById("shortcutsContent");
      document.querySelectorAll(".view-btn").forEach(function(btn) {
        var isActive = btn.dataset.view === view;
        btn.classList.toggle("is-active", isActive);
        btn.setAttribute("aria-pressed", isActive ? "true" : "false");
      });
      var detailSection = document.getElementById("kbdDetailSection");
      if (view === "kbd") {
        listEl.style.display = "none";
        kbdEl.style.display = "";
        renderKeyboard();
      } else {
        kbdEl.style.display = "none";
        detailSection.style.display = "none";
        renderModeToast(null, null);
        listEl.style.display = "";
        renderShortcuts();
      }
    }

    function renderPage() {
      renderStaticText();
      renderChips();
      if (currentView === "kbd") renderKeyboard();
      else renderShortcuts();
    }

    document.getElementById("viewToggle").addEventListener("click", function(e) {
      var btn = e.target.closest(".view-btn");
      if (btn && btn.dataset.view && btn.dataset.view !== currentView) {
        switchView(btn.dataset.view);
      }
    });

    document.getElementById("searchInput").addEventListener("input", function() {
      if (currentView === "kbd") renderKeyboard();
      else renderShortcuts();
    });

    window.RPDI18n.mountLanguageSwitcher(document.getElementById("langSwitcher"));
    window.RPDI18n.onLanguageChange(renderPage);
    renderPage();

    // Theme toggle
    window.RPDAppShell.bindThemeToggle(document.getElementById("themeToggle"));
  </script>
</body>
</html>

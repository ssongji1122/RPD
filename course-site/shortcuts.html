<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단축키 DB — RPD</title>
  <meta name="description" content="Blender 단축키 전체 검색 — Robot Product Design" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="stylesheet" href="assets/tokens.css" />
  <link rel="stylesheet" href="assets/components.css" />
  <style>
    .hero {
      padding: 28px 0 18px;
      text-align: left;
    }
    .hero-card {
      position: relative;
      display: grid;
      gap: 14px;
      justify-items: start;
      width: 100%;
      padding: 28px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--modal-panel-bg);
      box-shadow: var(--modal-panel-shadow);
      overflow: hidden;
      isolation: isolate;
    }
    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: var(--modal-top-line);
      pointer-events: none;
    }
    .hero h1 {
      margin: 0; font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 650; letter-spacing: -.05em; line-height: 1.04;
    }
    .hero p {
      max-width: 620px; margin: 0;
      color: var(--muted-strong); font-size: clamp(.94rem, 1.5vw, 1rem);
      line-height: 1.74;
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 12px;
      margin-top: 4px;
    }
    .hero-actions .btn-primary {
      box-shadow: 0 16px 32px rgba(10,132,255,.26);
    }
    .hero-actions .btn-ghost {
      border-color: var(--line-strong);
      background: rgba(255,255,255,.05);
    }

    /* Search bar */
    .search-wrap {
      position: sticky; top: 60px; z-index: 40;
      padding: 14px 0 18px;
      background: linear-gradient(180deg, rgba(10,10,10,.92), rgba(10,10,10,.72));
      backdrop-filter: blur(18px);
    }
    .search-inner {
      width: min(var(--max-width), calc(100% - 32px));
      margin: 0 auto;
      display: grid;
      gap: 12px;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--modal-panel-bg);
      box-shadow: var(--modal-panel-shadow);
      overflow: hidden;
      isolation: isolate;
      position: relative;
    }
    .search-inner::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: var(--modal-top-line);
      pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 12px 18px 12px 44px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      box-shadow: var(--modal-card-shadow);
      color: var(--text); font-family: var(--font-body); font-size: .94rem;
      outline: none;
      transition: border-color .18s, background .18s;
    }
    .search-input:focus { border-color: rgba(10,132,255,.5); background: var(--modal-hover-bg); }
    .search-input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 1rem;
    }
    .search-field { position: relative; }
    .search-meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px 16px;
    }
    .results-meta {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      font-size: .78rem;
      color: var(--muted-strong);
    }

    /* Category filter chips */
    .filter-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .filter-chip {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--muted); font-size: .82rem; font-weight: 500;
      cursor: pointer;
      transition: border-color .14s, color .14s, background .14s, transform .14s;
    }
    .filter-chip:hover {
      color: var(--text);
      transform: translateY(-1px);
    }
    .filter-chip.is-active {
      border-color: rgba(96,165,250,.34);
      color: var(--text);
      background: var(--modal-nav-active-bg);
      box-shadow: inset 0 0 0 1px rgba(147,197,253,.1);
    }

    /* View toggle */
    .view-toggle {
      display: flex; gap: 8px;
    }
    .view-btn {
      padding: 7px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-strong-bg);
      color: var(--muted-strong); font-size: .82rem; font-weight: 500;
      cursor: pointer;
      transition: background .14s, border-color .14s, color .14s;
    }
    .view-btn:hover { background: var(--overlay-white-hover); border-color: var(--line-strong); }
    .view-btn.is-active {
      background: var(--modal-nav-active-bg);
      border-color: rgba(10,132,255,.24);
      color: #fff;
    }

    /* Category groups */
    .content-block {
      position: relative;
      padding: 24px;
      border-radius: 26px;
      border: 1px solid var(--line);
      background: var(--modal-panel-bg);
      box-shadow: var(--modal-panel-shadow);
      overflow: hidden;
      isolation: isolate;
    }
    .content-block::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background: var(--modal-top-line);
      pointer-events: none;
    }
    .cat-group {
      margin-bottom: 18px;
      padding: 20px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--modal-panel-soft-bg);
      box-shadow: var(--modal-card-shadow);
    }
    .cat-group:last-child { margin-bottom: 0; }
    .cat-group-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }
    .cat-group-label {
      font-size: 1.1rem; font-weight: 620;
      color: var(--text); font-family: var(--font-display);
    }
    .cat-group-count {
      font-size: .76rem; color: var(--muted);
      padding: 4px 10px; border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line);
    }

    /* Shortcut rows */
    .shortcut-row {
      display: flex; align-items: center; gap: 14px;
      flex-wrap: wrap;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.03);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
      transition: transform .12s, border-color .12s, background .12s;
      margin-top: 10px;
    }
    .shortcut-row:hover {
      transform: translateY(-1px);
      border-color: rgba(10,132,255,.28);
      background: var(--modal-hover-bg);
    }
    .shortcut-row-keys { min-width: 160px; flex-shrink: 0; }
    .shortcut-row-action {
      flex: 1; color: var(--muted-strong); font-size: .9rem; line-height: 1.5;
    }
    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: .94rem;
    }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: flex-start; margin-top: 4px;
    }
    .stat-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 11px; border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(122,162,247,.18);
      color: var(--muted-strong); font-size: .78rem;
    }

    /* ── Keyboard view ────────────────────────────── */
    .page-shell { overflow: visible !important; }
    .kbd-svg-wrap { overflow-x: auto; padding: 8px 0 16px; }

    /* Key detail panel */
    .kbd-detail-panel {
      margin-top: 20px;
      background: var(--modal-panel-soft-bg);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--modal-card-shadow);
      padding: 20px 24px;
    }
    .kbd-detail-title {
      font-size: .9rem; font-weight: 620; color: var(--text);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .kbd-detail-key-badge {
      font-family: var(--font-mono, monospace);
      background: rgba(10,132,255,.15);
      border: 1px solid rgba(10,132,255,.35);
      color: var(--key-soft);
      padding: 2px 10px; border-radius: 6px; font-size: .9rem;
    }

    .shortcut-row-detail {
      flex-basis: 100%;
      font-size: .82rem; color: var(--muted);
      line-height: 1.6;
      padding: 6px 0 2px 0;
    }

    @media (max-width: 720px) {
      .hero-card,
      .search-inner,
      .content-block {
        padding: 20px;
      }
      .shortcut-row { flex-wrap: wrap; gap: 8px; }
      .shortcut-row-keys { min-width: unset; }
      .kbd-svg-wrap { overflow-x: scroll; -webkit-overflow-scrolling: touch; cursor: grab; }
      .kbd-svg-wrap svg { min-width: 780px; }
      .search-meta-row {
        align-items: start;
      }
      .view-toggle {
        width: 100%;
      }
      .results-meta {
        order: 2;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-badge">R</div>
          <div class="brand-copy">
            <strong id="brandTitle">Blender Shortcuts DB</strong>
            <span id="brandMeta">Robot Product Design · 2026</span>
          </div>
        </div>
        <div class="topbar-actions">
          <div id="langSwitcher"></div>
          <a href="index.html" class="btn btn-ghost" id="backToList" style="font-size:.84rem">&larr; 전체 목록</a>
        </div>
      </div>
    </header>

    <!-- Hero -->
    <section class="hero">
      <div class="hero-card">
        <div class="eyebrow" id="heroEyebrow">Blender Shortcuts</div>
        <h1 id="heroTitle">단축키 DB</h1>
        <p id="heroDescription">수업에서 다루는 모든 Blender 단축키를 한 곳에서 검색하세요.</p>
        <div class="hero-actions cta-group" id="heroActions"></div>
        <div class="stats-bar" id="statsBar"></div>
      </div>
    </section>

    <!-- Search + View Toggle -->
    <div class="search-wrap">
      <div class="search-inner">
        <div class="search-field">
          <span class="search-icon" aria-hidden="true">&#x1F50D;</span>
          <input type="text" class="search-input" id="searchInput"
                 placeholder="단축키 또는 기능 검색... (예: Ctrl+R, Extrude, 이동)"
                 autocomplete="off" aria-label="단축키 검색" />
        </div>
        <div class="search-meta-row">
          <div class="results-meta" id="resultsMeta"></div>
          <div class="view-toggle" id="viewToggle" role="group" aria-label="보기 방식">
            <button class="view-btn is-active" id="viewListBtn" data-view="list">목록</button>
            <button class="view-btn" id="viewKeyboardBtn" data-view="kbd">&#x2328; 키보드</button>
          </div>
        </div>
        <div class="filter-chips" id="filterChips" role="group" aria-label="카테고리 필터"></div>
      </div>
    </div>

    <!-- Keyboard view (hidden by default) -->
    <section class="content-block kbd-view-section" id="kbdView" style="display:none"></section>
    <!-- Key detail panel (below keyboard) -->
    <section class="content-block" id="kbdDetailSection" style="display:none"></section>

    <!-- List view -->
    <section class="content-block" id="shortcutsContent"></section>

    <!-- Footer -->
    <footer class="page-footer">
      <div>Robot Product Design 2026 · <a href="index.html" id="footerBackLink" style="color:var(--key-soft)">&larr; 전체 목록</a></div>
    </footer>

  </div>

  <script src="assets/i18n.js"></script>
  <script src="data/curriculum.js"></script>
  <script>
    var SHORTCUT_CATEGORIES = {
      general: { label: "General", order: 0 },
      navigation: { label: "Navigation", order: 1 },
      transform: { label: "Transforms", order: 2 },
      modeling: { label: "Modeling", order: 3 },
      modifier: { label: "Modifier", order: 4 },
      object: { label: "Object", order: 5 },
      sculpt: { label: "Sculpt", order: 6 },
      material: { label: "Material", order: 7 },
      uv: { label: "UV", order: 8 },
      rigging: { label: "Rigging", order: 9 },
      render: { label: "Rendering", order: 10 }
    };

    function getText() {
      return window.RPDI18n.getStrings("shortcuts");
    }

    function formatCount(count, nounKo, nounEn) {
      return window.RPDI18n.getLanguage() === "ko"
        ? count + "개 " + nounKo
        : count + " " + nounEn;
    }

    function normalizeShortcutValue(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[−–—]/g, "-")
        .replace(/\s+/g, " ")
        .trim();
    }

    function buildShortcutIdentity(shortcut) {
      return [
        normalizeShortcutValue(shortcut.keys),
        normalizeShortcutValue(shortcut.action),
        normalizeShortcutValue(shortcut.detail),
        normalizeShortcutValue(shortcut.category || "general"),
      ].join("||");
    }

    function buildDB() {
      var db = [];
      var seen = {};
      CURRICULUM.forEach(function(week) {
        if (!week.shortcuts || !week.shortcuts.length) return;
        week.shortcuts.forEach(function(shortcut) {
          var entry = {
            keys: shortcut.keys,
            action: shortcut.action,
            detail: shortcut.detail || "",
            category: shortcut.category || "general",
            weeks: [week.week]
          };
          var identity = buildShortcutIdentity(entry);
          if (seen[identity]) {
            if (seen[identity].weeks.indexOf(week.week) === -1) {
              seen[identity].weeks.push(week.week);
            }
            return;
          }
          seen[identity] = entry;
          db.push(entry);
        });
      });
      return db;
    }

    var fullDB = buildDB();
    var statsEl = document.getElementById("statsBar");
    var chipContainer = document.getElementById("filterChips");
    var contentEl = document.getElementById("shortcutsContent");
    var kbdEl = document.getElementById("kbdView");
    var resultsMetaEl = document.getElementById("resultsMeta");
    var activeFilter = "all";
    var currentView = "list";
    var selectedKeyId = null;

    var catCounts = {};
    fullDB.forEach(function(shortcut) {
      catCounts[shortcut.category] = (catCounts[shortcut.category] || 0) + 1;
    });
    var weekSet = {};
    fullDB.forEach(function(shortcut) {
      (shortcut.weeks || []).forEach(function(week) {
        weekSet[week] = true;
      });
    });
    var weekCount = Object.keys(weekSet).length;

    function buildHeroActions(text) {
      var activeWeek = CURRICULUM.find(function(week) { return week.status === "active"; }) || CURRICULUM[0];
      var weekHref = activeWeek ? ("week.html?week=" + activeWeek.week) : "index.html";
      return [
        '<button class="btn btn-primary" type="button" id="heroKeyboardCta">' + text.heroPrimaryCta + '</button>',
        '<a class="btn btn-ghost" href="' + weekHref + '">' + text.heroSecondaryCta + '</a>',
        '<a class="btn-link" href="library.html">' + text.heroTertiaryCta + ' <span aria-hidden="true">→</span></a>'
      ].join("");
    }

    function renderResultsMeta(count) {
      if (!resultsMetaEl) return;
      resultsMetaEl.textContent = formatCount(count, "단축키", "shortcuts");
    }

    function renderStaticText() {
      var text = getText();
      document.title = text.pageTitle;
      var meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute("content", text.metaDescription);
      document.getElementById("brandTitle").textContent = text.brandTitle;
      document.getElementById("brandMeta").textContent = text.brandMeta;
      document.getElementById("backToList").textContent = text.backToList;
      document.getElementById("heroEyebrow").textContent = text.heroEyebrow;
      document.getElementById("heroTitle").textContent = text.heroTitle;
      document.getElementById("heroDescription").textContent = text.heroDescription;
      document.getElementById("heroActions").innerHTML = buildHeroActions(text);
      document.getElementById("searchInput").setAttribute("placeholder", text.searchPlaceholder);
      document.getElementById("searchInput").setAttribute("aria-label", text.searchAria);
      document.getElementById("filterChips").setAttribute("aria-label", text.categoryFilterAria);
      document.getElementById("viewToggle").setAttribute("aria-label", text.viewModeAria);
      document.getElementById("viewListBtn").textContent = text.viewList;
      document.getElementById("viewKeyboardBtn").textContent = text.viewKeyboard;
      document.getElementById("footerBackLink").textContent = text.footerBack;

      statsEl.textContent = "";
      [
        formatCount(fullDB.length, "단축키", "shortcuts"),
        formatCount(Object.keys(catCounts).length, "카테고리", "categories"),
        formatCount(weekCount, "주차", "weeks")
      ].forEach(function(label) {
        var span = document.createElement("span");
        span.className = "stat-chip";
        span.textContent = label;
        statsEl.appendChild(span);
      });

      var heroKeyboardCta = document.getElementById("heroKeyboardCta");
      if (heroKeyboardCta) {
        heroKeyboardCta.addEventListener("click", function() {
          switchView("kbd");
          document.getElementById("searchInput").focus({ preventScroll: true });
        });
      }
    }

    function renderChips() {
      var sorted = Object.keys(SHORTCUT_CATEGORIES).sort(function(a, b) {
        return SHORTCUT_CATEGORIES[a].order - SHORTCUT_CATEGORIES[b].order;
      });

      chipContainer.textContent = "";

      var allBtn = document.createElement("button");
      allBtn.className = "filter-chip" + (activeFilter === "all" ? " is-active" : "");
      allBtn.dataset.cat = "all";
      allBtn.textContent = getText().allFilter;
      chipContainer.appendChild(allBtn);

      sorted.forEach(function(cat) {
        if (!catCounts[cat]) return;
        var btn = document.createElement("button");
        btn.className = "filter-chip" + (activeFilter === cat ? " is-active" : "");
        btn.dataset.cat = cat;
        btn.textContent = window.RPDI18n.getShortcutCategoryLabel(cat, SHORTCUT_CATEGORIES[cat].label) + " (" + catCounts[cat] + ")";
        chipContainer.appendChild(btn);
      });

      chipContainer.querySelectorAll(".filter-chip").forEach(function(btn) {
        btn.addEventListener("click", function() {
          activeFilter = this.dataset.cat;
          renderChips();
          if (currentView === "kbd") renderKeyboard();
          else renderShortcuts();
        });
      });
    }

    function filterDB(db, query, cat) {
      var filtered = db;
      if (cat && cat !== "all") {
        filtered = filtered.filter(function(shortcut) { return shortcut.category === cat; });
      }
      if (query) {
        var q = query.toLowerCase();
        filtered = filtered.filter(function(shortcut) {
          return shortcut.keys.toLowerCase().includes(q) || shortcut.action.toLowerCase().includes(q);
        });
      }
      return filtered;
    }

    function groupByCategory(items) {
      var groups = {};
      var order = [];
      items.forEach(function(shortcut) {
        if (!groups[shortcut.category]) {
          groups[shortcut.category] = [];
          order.push(shortcut.category);
        }
        groups[shortcut.category].push(shortcut);
      });
      order.sort(function(a, b) {
        var oa = SHORTCUT_CATEGORIES[a] ? SHORTCUT_CATEGORIES[a].order : 99;
        var ob = SHORTCUT_CATEGORIES[b] ? SHORTCUT_CATEGORIES[b].order : 99;
        return oa - ob;
      });
      return { groups: groups, order: order };
    }

    function makeShortcutRow(shortcut) {
      var row = document.createElement("div");
      row.className = "shortcut-row";

      var keysDiv = document.createElement("div");
      keysDiv.className = "shortcut-row-keys";
      var kbd = document.createElement("kbd");
      kbd.className = "shortcut-key";
      kbd.textContent = shortcut.keys;
      keysDiv.appendChild(kbd);

      var actionDiv = document.createElement("div");
      actionDiv.className = "shortcut-row-action";
      actionDiv.textContent = shortcut.action;

      row.appendChild(keysDiv);
      row.appendChild(actionDiv);

      if (shortcut.detail) {
        var detailDiv = document.createElement("div");
        detailDiv.className = "shortcut-row-detail";
        detailDiv.textContent = shortcut.detail;
        row.appendChild(detailDiv);
      }

      return row;
    }

    function renderShortcuts() {
      var query = document.getElementById("searchInput").value.trim();
      var filtered = filterDB(fullDB, query, activeFilter);

      contentEl.textContent = "";

      if (filtered.length === 0) {
        renderResultsMeta(0);
        var empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = getText().emptyResults;
        contentEl.appendChild(empty);
        return;
      }

      renderResultsMeta(filtered.length);

      var result = groupByCategory(filtered);
      result.order.forEach(function(cat) {
        var items = result.groups[cat];
        var catInfo = SHORTCUT_CATEGORIES[cat] || { label: cat, order: 99 };

        var group = document.createElement("div");
        group.className = "cat-group";

        var header = document.createElement("div");
        header.className = "cat-group-header";
        var label = document.createElement("span");
        label.className = "cat-group-label";
        label.textContent = window.RPDI18n.getShortcutCategoryLabel(cat, catInfo.label);
        var count = document.createElement("span");
        count.className = "cat-group-count";
        count.textContent = window.RPDI18n.getLanguage() === "ko" ? items.length + "개" : String(items.length);
        header.appendChild(label);
        header.appendChild(count);
        group.appendChild(header);

        items.forEach(function(shortcut) {
          group.appendChild(makeShortcutRow(shortcut));
        });

        contentEl.appendChild(group);
      });
    }

    var U = 40, KH = 34, FH = 28, G = 4;
    var NP_X0 = 598, NP_Y0 = 46;
    var MOUSE_X0 = 598, MOUSE_Y0 = 210;
    var NS = "http://www.w3.org/2000/svg";

    var KBD_SVG = [
      [10, FH, [["ESC", "Esc", 1.5], [null, "", 0.5], ["F1", "F1", 1], ["F2", "F2", 1], ["F3", "F3", 1], ["F4", "F4", 1], [null, "", 0.25], ["F5", "F5", 1], ["F6", "F6", 1], ["F7", "F7", 1], ["F8", "F8", 1], [null, "", 0.25], ["F9", "F9", 1], ["F10", "F10", 1], ["F11", "F11", 1], ["F12", "F12", 1]]],
      [46, KH, [["TILDE", "`", 1], ["1", "1", 1], ["2", "2", 1], ["3", "3", 1], ["4", "4", 1], ["5", "5", 1], ["6", "6", 1], ["7", "7", 1], ["8", "8", 1], ["9", "9", 1], ["0", "0", 1], ["MINUS", "-", 1], ["EQ", "=", 1]]],
      [84, KH, [["TAB", "Tab", 1.5], ["Q", "Q", 1], ["W", "W", 1], ["E", "E", 1], ["R", "R", 1], ["T", "T", 1], ["Y", "Y", 1], ["U", "U", 1], ["I", "I", 1], ["O", "O", 1], ["P", "P", 1], ["LBRACKET", "[", 1], ["RBRACKET", "]", 1]]],
      [122, KH, [["A", "A", 1], ["S", "S", 1], ["D", "D", 1], ["F", "F", 1], ["G", "G", 1], ["H", "H", 1], ["J", "J", 1], ["K", "K", 1], ["L", "L", 1], ["SEMI", ";", 1], ["QUOTE", "'", 1]]],
      [160, KH, [["Z", "Z", 1], ["X", "X", 1], ["C", "C", 1], ["V", "V", 1], ["B", "B", 1], ["N", "N", 1], ["M", "M", 1], ["COMMA", ",", 1], ["DOT", ".", 1], ["SLASH", "/", 1]]],
      [198, KH, [["CTRL", "Ctrl", 1.5], ["ALT", "Alt", 1.25], ["SPACE", "Space", 6.5], ["ALT", "Alt", 1.25], ["CTRL", "Ctrl", 1.5]]],
    ];

    var NP_SVG = [
      [NP_Y0, KH, [["NP7", "7", 1], ["NP8", "8", 1], ["NP9", "9", 1], ["NPMINUS", "−", 1]]],
      [NP_Y0 + 38, KH, [["NP4", "4", 1], ["NP5", "5", 1], ["NP6", "6", 1], ["NPPLUS", "+", 1]]],
      [NP_Y0 + 38 * 2, KH, [["NP1", "1", 1], ["NP2", "2", 1], ["NP3", "3", 1]]],
      [NP_Y0 + 38 * 3, KH, [["NP0", "0", 2], ["NPDOT", ".", 1]]],
    ];

    var MOUSE_SVG = [
      [MOUSE_Y0, KH, [["LMB", "LMB", 1], ["MMB", "MMB", 1], ["RMB", "RMB", 1], ["SCROLL", "⇕", 1.25]]],
    ];

    function rawKeyToId(key) {
      if (!key) return null;
      var upper = key.toUpperCase().trim();
      if (upper.startsWith("NUMPAD ")) {
        var numpadKey = upper.slice(7).trim();
        if (numpadKey === "." || numpadKey === "DOT" || numpadKey === "PERIOD") return "NPDOT";
        if (numpadKey === "+" || numpadKey === "PLUS") return "NPPLUS";
        if (numpadKey === "-" || numpadKey === "MINUS" || numpadKey === "−") return "NPMINUS";
        return "NP" + numpadKey;
      }
      if (key === "←" || upper === "LEFT") return "LARROW";
      if (key === "→" || upper === "RIGHT") return "RARROW";
      if (upper.includes("MMB")) return "MMB";
      if (upper.includes("RMB") || upper.includes("RIGHT CLICK")) return "RMB";
      if (upper === "스크롤" || upper === "SCROLL") return "SCROLL";
      if (upper.includes("클릭") || upper === "LMB" || upper.includes("LEFT CLICK") || upper === "CLICK") return "LMB";
      if (upper === "CTRL") return "CTRL";
      if (upper === "SHIFT") return "SHIFT";
      if (upper === "ALT") return "ALT";
      if (upper === "TAB") return "TAB";
      if (upper === "SPACE") return "SPACE";
      if (upper === "ESC" || upper === "ESCAPE") return "ESC";
      if (/^F\d{1,2}$/.test(upper)) return upper;
      if (/^[A-Z0-9]$/.test(upper)) return upper;
      return null;
    }

    function shortcutToKeyIds(keysStr) {
      var cleaned = keysStr.replace(/\s*\([^)]*\)/g, "").trim();
      cleaned = cleaned.replace(/\s+→\s+(?=[A-Za-z가-힣]).*$/, "").trim();
      var parts = cleaned.split(/\s*\+\s*/);
      var ids = [];
      var seenIds = {};

      parts.forEach(function(part) {
        var variants = part.trim().split(/\s*\/\s*/);
        var numpadPrefix = /^numpad\s+/i.test(variants[0]) ? "Numpad " : "";
        variants.forEach(function(variant, index) {
          var raw = variant.trim();
          if (index > 0 && numpadPrefix && /^\d+$/.test(raw)) raw = numpadPrefix + raw;
          var id = rawKeyToId(raw);
          if (id && !seenIds[id]) {
            seenIds[id] = true;
            ids.push(id);
          }
        });
      });

      if (ids.length === 0) {
        var fallback = rawKeyToId(cleaned);
        if (fallback) ids.push(fallback);
      }
      return ids;
    }

    function buildKeyMap(db) {
      var map = {};
      db.forEach(function(shortcut) {
        shortcutToKeyIds(shortcut.keys).forEach(function(id) {
          if (!map[id]) map[id] = [];
          map[id].push(shortcut);
        });
      });
      return map;
    }

    function svgEl(tag, attrs) {
      var el = document.createElementNS(NS, tag);
      Object.keys(attrs).forEach(function(key) { el.setAttribute(key, attrs[key]); });
      return el;
    }

    function renderKeyboard() {
      var query = document.getElementById("searchInput").value.trim();
      var filtered = filterDB(fullDB, query, activeFilter);
      var kmap = buildKeyMap(filtered);

      renderResultsMeta(filtered.length);

      kbdEl.textContent = "";

      var svg = svgEl("svg", {
        viewBox: "0 0 764 258",
        width: "100%",
        style: "max-width:764px;display:block",
        "aria-label": getText().keyboardMapAria,
      });

      svg.appendChild(svgEl("rect", { x: 4, y: 4, width: 576, height: 246, rx: 12, fill: "rgba(255,255,255,0.025)", stroke: "rgba(255,255,255,0.07)", "stroke-width": 1 }));
      svg.appendChild(svgEl("rect", { x: 590, y: 38, width: 170, height: 214, rx: 10, fill: "rgba(255,255,255,0.025)", stroke: "rgba(255,255,255,0.07)", "stroke-width": 1 }));

      function addSvgLabel(text, x, y) {
        var t = svgEl("text", {
          x: x,
          y: y,
          "text-anchor": "middle",
          fill: "rgba(255,255,255,0.22)",
          "font-size": "8",
          "font-family": "var(--font-body,sans-serif)",
          "letter-spacing": "0.07em"
        });
        t.textContent = text;
        svg.appendChild(t);
      }

      addSvgLabel(getText().numpadLabel, NP_X0 + 59, NP_Y0 - 8);
      addSvgLabel(getText().mouseLabel, MOUSE_X0 + 58, MOUSE_Y0 - 8);

      function renderRows(rows, x0) {
        rows.forEach(function(row) {
          var rowY = row[0];
          var rowHeight = row[1];
          var keys = row[2];
          var cursorX = x0;
          keys.forEach(function(keyData) {
            var keyId = keyData[0];
            var label = keyData[1];
            var units = keyData[2];
            var width = units * U - G;
            var x = cursorX;
            cursorX += units * U;
            if (!keyId) return;

            var shortcuts = kmap[keyId];
            var hasShortcut = !!(shortcuts && shortcuts.length);
            var isSelected = selectedKeyId === keyId;
            var fill = isSelected ? "rgba(10,132,255,0.42)" : hasShortcut ? "rgba(10,132,255,0.16)" : "rgba(255,255,255,0.055)";
            var stroke = isSelected ? "rgba(10,132,255,0.95)" : hasShortcut ? "rgba(10,132,255,0.55)" : "rgba(255,255,255,0.11)";
            var textFill = isSelected ? "#ffffff" : hasShortcut ? "rgba(100,178,255,1)" : "rgba(255,255,255,0.40)";
            var fontSize = rowHeight <= FH ? 8 : 9;

            svg.appendChild(svgEl("rect", { x: x, y: rowY, width: width, height: rowHeight, rx: 5, fill: fill, stroke: stroke, "stroke-width": 1 }));

            var keyText = svgEl("text", { x: x + width / 2, y: rowY + rowHeight / 2 + 3.5, "text-anchor": "middle", fill: textFill, "font-size": fontSize, "font-family": "var(--font-mono,monospace)" });
            keyText.textContent = label;
            svg.appendChild(keyText);

            if (hasShortcut) {
              var badgeX = x + width - 5;
              var badgeY = rowY + 5;
              svg.appendChild(svgEl("circle", { cx: badgeX, cy: badgeY, r: 6.5, fill: "rgba(10,132,255,0.95)" }));
              var badgeText = svgEl("text", { x: badgeX, y: badgeY + 3.5, "text-anchor": "middle", fill: "#fff", "font-size": "6.5", "font-weight": "700", "font-family": "var(--font-body,sans-serif)" });
              badgeText.textContent = shortcuts.length;
              svg.appendChild(badgeText);

              var hit = svgEl("rect", { x: x, y: rowY, width: width, height: rowHeight, rx: 5, fill: "transparent", cursor: "pointer", "data-kid": keyId });
              (function(selectedId) {
                hit.addEventListener("click", function() {
                  var wasSelected = selectedKeyId === selectedId;
                  selectedKeyId = wasSelected ? null : selectedId;
                  renderKeyboard();
                });
              }(keyId));
              svg.appendChild(hit);
            }
          });
        });
      }

      renderRows(KBD_SVG, 10);
      renderRows(NP_SVG, NP_X0);
      renderRows(MOUSE_SVG, MOUSE_X0);

      var wrap = document.createElement("div");
      wrap.className = "kbd-svg-wrap";
      wrap.appendChild(svg);
      kbdEl.appendChild(wrap);

      var detailHolder = document.getElementById("kbdDetailSection");
      detailHolder.textContent = "";

      if (selectedKeyId && kmap[selectedKeyId]) {
        renderKeyDetail(selectedKeyId, kmap);
      } else if (!kmap[selectedKeyId]) {
        selectedKeyId = null;
      }
    }

    function keyIdToLabel(keyId) {
      var found = keyId;
      KBD_SVG.concat(NP_SVG).concat(MOUSE_SVG).forEach(function(row) {
        row[2].forEach(function(keyData) {
          if (keyData[0] === keyId) found = keyData[1];
        });
      });
      return found;
    }

    function renderKeyDetail(keyId, kmap) {
      var detailHolder = document.getElementById("kbdDetailSection");
      if (!detailHolder) return;
      detailHolder.textContent = "";
      detailHolder.style.display = "none";

      var shortcuts = kmap[keyId];
      if (!shortcuts || shortcuts.length === 0) return;

      detailHolder.style.display = "";
      var panel = document.createElement("div");
      panel.className = "kbd-detail-panel";

      var title = document.createElement("div");
      title.className = "kbd-detail-title";
      var badge = document.createElement("span");
      badge.className = "kbd-detail-key-badge";
      badge.textContent = keyIdToLabel(keyId);
      title.appendChild(badge);
      title.appendChild(document.createTextNode(
        window.RPDI18n.getLanguage() === "ko"
          ? "가 사용된 단축키 (" + shortcuts.length + "개)"
          : " shortcuts on this key (" + shortcuts.length + ")"
      ));
      panel.appendChild(title);

      shortcuts.forEach(function(shortcut) {
        panel.appendChild(makeShortcutRow(shortcut));
      });

      detailHolder.appendChild(panel);
      panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function switchView(view) {
      currentView = view;
      var listEl = document.getElementById("shortcutsContent");
      document.querySelectorAll(".view-btn").forEach(function(btn) {
        btn.classList.toggle("is-active", btn.dataset.view === view);
      });
      var detailSection = document.getElementById("kbdDetailSection");
      if (view === "kbd") {
        listEl.style.display = "none";
        kbdEl.style.display = "";
        renderKeyboard();
      } else {
        kbdEl.style.display = "none";
        detailSection.style.display = "none";
        listEl.style.display = "";
        renderShortcuts();
      }
    }

    function renderPage() {
      renderStaticText();
      renderChips();
      if (currentView === "kbd") renderKeyboard();
      else renderShortcuts();
    }

    document.getElementById("viewToggle").addEventListener("click", function(e) {
      var btn = e.target.closest(".view-btn");
      if (btn && btn.dataset.view && btn.dataset.view !== currentView) {
        switchView(btn.dataset.view);
      }
    });

    document.getElementById("searchInput").addEventListener("input", function() {
      if (currentView === "kbd") renderKeyboard();
      else renderShortcuts();
    });

    window.RPDI18n.mountLanguageSwitcher(document.getElementById("langSwitcher"));
    window.RPDI18n.onLanguageChange(renderPage);
  </script>
</body>
</html>

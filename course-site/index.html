<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPD — Robot Product Design</title>
  <meta name="description" content="Robot Product Design 15주 수업 자료" />
  <link rel="stylesheet" href="assets/tokens.css" />
  <script>/* FOUC prevention */ (function(){var t=localStorage.getItem('rpd-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
  <style>
    /* ── Index-specific styles ── */
    .hero {
      padding: 56px 0 40px;
      text-align: center;
    }
    .hero-card { display: grid; gap: 10px; justify-items: center; width: 100%; }
    .hero h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 660; letter-spacing: -.028em; line-height: 1.12;
    }
    .hero p {
      max-width: 560px; margin: 0;
      color: var(--muted); font-size: clamp(.92rem, 1.5vw, 1rem);
      line-height: 1.7;
    }

    /* Week grid */
    .week-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .week-card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow-card);
      padding: 18px 20px;
      display: flex; flex-direction: column; gap: 10px;
      text-decoration: none; color: inherit;
      transition: border-color .18s, transform .18s;
      position: relative; overflow: hidden;
    }
    .week-card:hover {
      border-color: rgba(147,197,253,.28);
      transform: translateY(-2px);
    }
    .week-card.is-done   { border-color: rgba(16,185,129,.25); }
    .week-card.is-exam   { border-color: rgba(245,158,11,.3); }

    /* ── Featured: active week card ── */
    .week-card.is-active {
      grid-column: 1 / -1;
      order: -1;
      padding: 28px 32px;
      gap: 14px;
      border-color: rgba(10,132,255,.42);
      background: linear-gradient(180deg, rgba(10,132,255,.07), var(--surface));
    }
    .week-card.is-active:hover {
      border-color: rgba(10,132,255,.6);
      background: linear-gradient(180deg, rgba(10,132,255,.11), var(--surface));
    }
    .week-card.is-active .cw-active-label {
      font-size: .73rem; font-weight: 600; color: var(--key-soft);
      letter-spacing: .06em; text-transform: uppercase;
      margin-bottom: -4px;
    }
    .week-card.is-active .week-title {
      font-size: 1.28rem;
    }
    .week-card.is-active .week-subtitle {
      font-size: .92rem;
    }
    .week-card.is-active .topic-chip {
      padding: 5px 11px;
      font-size: .78rem;
    }
    @media (min-width: 721px) {
      .week-card.is-active .week-card-inner {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 20px;
        align-items: start;
      }
      .week-card.is-active .week-footer {
        border-top: none; padding-top: 0; margin-top: 0;
        align-self: end;
      }
    }

    .week-card-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .week-num {
      font-size: .73rem; font-weight: 600; letter-spacing: .06em;
      color: var(--muted); text-transform: uppercase;
    }
    .week-badge {
      padding: 3px 9px; border-radius: 999px;
      font-size: .7rem; font-weight: 600;
    }
    .badge-done     { background: rgba(16,185,129,.14); color: var(--success-soft); }
    .badge-active   { background: rgba(10,132,255,.14);  color: var(--key-soft); }
    .badge-upcoming { background: rgba(255,255,255,.06);  color: var(--muted); }
    .badge-exam     { background: rgba(245,158,11,.14);   color: #fbbf24; }

    .week-title { font-size: 1rem; font-weight: 620; line-height: 1.38; margin: 0; }
    .week-subtitle { font-size: .82rem; color: var(--muted); margin: 0; line-height: 1.5; }

    .week-topics { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
    .topic-chip {
      padding: 3px 8px; border-radius: 999px;
      background: var(--overlay-white); border: 1px solid var(--line);
      color: var(--muted); font-size: .7rem;
    }
    .week-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto; padding-top: 10px;
      border-top: 1px solid rgba(147,197,253,.07);
    }
    .week-duration { color: var(--muted); font-size: .78rem; }
    .go-arrow { color: var(--key-soft); font-size: .9rem; }

    /* Responsive */
    @media (max-width: 720px) {
      .week-grid { grid-template-columns: 1fr; }
      .week-card.is-active { padding: 22px; }
    }
  </style>
</head>
<body>
  <div class="page-shell">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-badge">R</div>
          <div class="brand-copy">
            <strong>Robot Product Design</strong>
            <span>2026 Spring · 15주</span>
          </div>
        </div>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="테마 전환">
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </header>

    <!-- Hero -->
    <section class="hero">
      <div class="hero-card">
        <div class="eyebrow">2026 Spring · 15주</div>
        <h1>Robot Product Design</h1>
        <p>Blender와 AI로 로봇을 설계하는 수업이에요.</p>
      </div>
    </section>

    <!-- Week grid -->
    <section class="content-block">
      <div class="week-grid" id="weekGrid">
        <!-- JS로 채워짐 -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="page-footer">
      <div>Robot Product Design 2026</div>
    </footer>

  </div>

  <script src="data/curriculum.js"></script>
  <script>
    // curriculum.js의 CURRICULUM 배열은 정적 파일로 사용자 입력이 없는 신뢰된 소스입니다.
    // ─── Week grid ───────────────────────────────────────
    function getBadge(w) {
      if (w.title.includes("⭐")) return ["badge-exam",     "시험 주차"];
      if (w.status === "done")    return ["badge-done",     "완료"];
      if (w.status === "active")  return ["badge-active",   "진행 중"];
      return                             ["badge-upcoming",  "예정"];
    }

    function getCardClass(w) {
      if (w.title.includes("⭐")) return "is-exam";
      if (w.status === "done")    return "is-done";
      if (w.status === "active")  return "is-active";
      return "";
    }

    const grid = document.getElementById("weekGrid");
    grid.textContent = "";
    CURRICULUM.forEach(function(w) {
      var badgeInfo = getBadge(w);
      var badgeClass = badgeInfo[0];
      var badgeText = badgeInfo[1];
      var isActive = w.status === "active";
      var maxChips = isActive ? 5 : 3;
      var pageUrl = "week.html?week=" + w.week;

      var a = document.createElement("a");
      a.className = "week-card " + getCardClass(w);
      a.href = pageUrl;

      // Active label
      if (isActive) {
        var lbl = document.createElement("div");
        lbl.className = "cw-active-label";
        lbl.textContent = "지금 진행 중";
        a.appendChild(lbl);
      }

      // Header
      var header = document.createElement("div");
      header.className = "week-card-header";
      var num = document.createElement("span");
      num.className = "week-num";
      num.textContent = "Week " + String(w.week).padStart(2, "0");
      var badge = document.createElement("span");
      badge.className = "week-badge " + badgeClass;
      badge.textContent = badgeText;
      header.appendChild(num);
      header.appendChild(badge);
      a.appendChild(header);

      // Title & subtitle
      var title = document.createElement("p");
      title.className = "week-title";
      title.textContent = w.title;
      a.appendChild(title);

      var sub = document.createElement("p");
      sub.className = "week-subtitle";
      sub.textContent = w.subtitle;
      a.appendChild(sub);

      // Topics
      var topics = document.createElement("div");
      topics.className = "week-topics";
      w.topics.slice(0, maxChips).forEach(function(t) {
        var chip = document.createElement("span");
        chip.className = "topic-chip";
        chip.textContent = t;
        topics.appendChild(chip);
      });
      if (w.topics.length > maxChips) {
        var more = document.createElement("span");
        more.className = "topic-chip";
        more.textContent = "+" + (w.topics.length - maxChips);
        topics.appendChild(more);
      }
      a.appendChild(topics);

      // Footer
      var footer = document.createElement("div");
      footer.className = "week-footer";
      var dur = document.createElement("span");
      dur.className = "week-duration";
      dur.textContent = "\u23F1 " + w.duration;
      var arrow = document.createElement("span");
      arrow.className = "go-arrow";
      arrow.textContent = "\u2192";
      footer.appendChild(dur);
      footer.appendChild(arrow);
      a.appendChild(footer);

      grid.appendChild(a);
    });

    // Theme toggle
    document.getElementById("themeToggle").addEventListener("click", function() {
      var current = document.documentElement.getAttribute("data-theme");
      var next = current === "light" ? "" : "light";
      if (next) {
        document.documentElement.setAttribute("data-theme", next);
        localStorage.setItem("rpd-theme", next);
      } else {
        document.documentElement.removeAttribute("data-theme");
        localStorage.removeItem("rpd-theme");
      }
    });
  </script>
</body>
</html>

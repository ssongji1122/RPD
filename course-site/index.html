<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edu Home — RPD</title>
  <meta name="description" content="RPD 학습 허브 — 인하대학교 RPD 수업의 통합 진입점" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <script>/* FOUC prevention */ (function(){var t=localStorage.getItem('rpd-theme');if(t)document.documentElement.setAttribute('data-theme',t);var l=localStorage.getItem('rpd-lang');if(l){document.documentElement.lang=l;document.documentElement.setAttribute('data-lang',l);}})()</script>
</head>
<body data-tab="archive">
  <a href="#main-content" class="skip-link">본문으로 건너뛰기</a>
  <div class="app" data-shell>
    <!-- Main Content -->
    <main class="main" id="main-content">
      <div class="main-inner">
        <!-- SECTION 1: Hero -->
        <section class="hero" id="heroSection">
          <div class="hero-card">
            <div class="hero-mesh" aria-hidden="true"></div>
            <div class="hero-copy">
              <div class="eyebrow" id="heroEyebrow">Blender Archive</div>
              <h1 id="heroTitle">블렌더 아카이브</h1>
              <p id="heroDescription">도구 설명 카드, 단축키, 실습 자료를 한곳에 모아뒀어요. 필요한 주차만 골라서 볼 수 있어요.</p>
              <div class="hero-actions cta-group" id="heroActions"></div>
            </div>
            <div class="hero-meta-wrap">
              <div class="hero-meta-label" id="heroMetaLabel">Current Structure</div>
              <div class="hero-meta" id="heroMeta"></div>
            </div>
          </div>
        </section>

        <!-- SECTION 2: Featured Active Week ("NOW") -->
        <section class="week-featured" id="weekFeatured" aria-label="현재 진행 주차"></section>

        <!-- SECTION 3: Phase Journey Timeline -->
        <section class="content-block rpd-glass-surface" id="programSection">
          <div class="program-shell" id="programCollection">
            <div class="program-head">
              <div class="eyebrow" id="programEyebrow">Custom Course Collection</div>
              <h2 class="program-title" id="programTitle">인하대학교 · Robot Product Design</h2>
              <p class="program-copy" id="programDescription">15주 RPD 수업은 Blender Archive의 카드 조합으로 보이는 인하대학교 맞춤 페이지예요.</p>
              <div class="program-stats" id="programStats"></div>
            </div>


            <!-- Phase groups rendered by JS -->
            <div class="journey-phases" id="journeyPhases"></div>
          </div>
        </section>

        <!-- SECTION 4: Archive Quick Links -->
        <nav class="archive-quick-links" id="archiveQuickLinks" aria-label="아카이브 바로가기"></nav>

        <!-- SECTION 5: Current Week References (Edu Home) -->
        <section class="edu-references" id="eduReferences" aria-label="이번 주 참고자료" hidden>
          <div class="edu-refs-inner">
            <div class="edu-refs-header">
              <div class="eyebrow" id="eduRefsEyebrow">이번 주 참고자료</div>
              <h2 class="edu-refs-title" id="eduRefsTitle">Notion 튜토리얼</h2>
            </div>
            <div class="edu-refs-grid" id="eduRefsGrid"></div>
            <a class="edu-refs-more" id="eduRefsMore" href="#" hidden>이 주차 전체 참고자료 보기 →</a>
          </div>
        </section>

        <!-- Footer -->
        <footer class="page-footer">
          <div id="footerLabel">Blender Archive · RPD 2026</div>
        </footer>
      </div>
    </main>
  </div>

  <script src="assets/nav-config.js"></script>
  <script src="assets/shell.js"></script>
  <script src="assets/tab-system.js"></script>
  <script src="assets/user-profile.js"></script>
  <script src="data/i18n-content.js?v=20260318e"></script>
  <script src="assets/i18n.js?v=20260330a"></script>
  <script src="assets/site-shell.js?v=20260318a"></script>
  <script src="assets/week-ui.js?v=20260318a"></script>
  <script src="assets/showme/_registry.js?v=20260318f"></script>
  <script src="assets/showme/_catalog.js"></script>
  <script src="data/curriculum.js"></script>
  <script src="assets/layout.js"></script>
  <script src="assets/topbar-search.js"></script>
  <script>
    /**
     * Index page rendering — Immersive Journey redesign
     *
     * Data sources are static trusted arrays (CURRICULUM, SHOWME_REGISTRY)
     * with no user input. All rendered content comes from i18n strings or
     * these static sources, so innerHTML usage here is safe from XSS.
     */
    var PHASES = [
      { id: "basics", weeks: [1,2,3] },
      { id: "modeling", weeks: [4,5] },
      { id: "shading", weeks: [6,7] },
      { id: "midterm", weeks: [8] },
      { id: "animation", weeks: [9,10,11,12] },
      { id: "final", weeks: [13,14,15] }
    ];

    function getPageStrings() {
      return window.RPDI18n.getStrings("index");
    }

    function getUiPreset() {
      return window.RPDWeekUI ? window.RPDWeekUI.getPreset() : {};
    }

    function localizeUiLabel(value, fallback) {
      return window.RPDWeekUI
        ? window.RPDWeekUI.localize(value, window.RPDI18n.getLanguage(), fallback)
        : fallback;
    }

    function withPresetHref(href) {
      return window.RPDAppShell ? window.RPDAppShell.withPreset(href) : href;
    }

    function getPresetProgramTitle(text) {
      var preset = getUiPreset();
      var labels = preset.labels || {};
      var school = localizeUiLabel(labels.school, "");
      var program = localizeUiLabel(labels.program, "");
      if (!school && !program) return text.programTitle;
      return [school, program].filter(Boolean).join(" \u00b7 ") || text.programTitle;
    }

    function getWeekCardPreviewItems(localizedWeek, preset) {
      var source = preset.weekCard && preset.weekCard.previewSource;
      if (source === "steps") {
        return (localizedWeek.steps || []).map(function(step) { return step.title; }).filter(Boolean);
      }
      return Array.isArray(localizedWeek.topics) ? localizedWeek.topics.slice() : [];
    }

    function getWeekCardMetricLabel(key, text, preset) {
      var labels = (preset.labels || {});
      if (key === "practice") return localizeUiLabel(labels.metricPractice, window.RPDI18n.getLanguage() === "ko" ? "\uc2e4\uc2b5" : "practice");
      if (key === "showme") return localizeUiLabel(labels.metricShowMe, "Show Me");
      if (key === "tasks") return localizeUiLabel(labels.metricTasks, text.weekMetricTasks);
      if (key === "refs") return localizeUiLabel(labels.metricRefs, text.weekMetricRefs);
      if (key === "cards") return text.weekMetricCards;
      return "";
    }

    function buildWeekCardMetrics(week, text, preset) {
      var practiceCount = (week.steps || []).length;
      var showMeCount = collectArchiveCardIds(week).length;
      var taskCount = countTasks(week);
      var referenceCount = countReferences(week);
      var metricValues = {
        practice: practiceCount,
        showme: showMeCount,
        tasks: taskCount,
        refs: referenceCount,
        cards: showMeCount
      };
      var metricKeys = (preset.weekCard && Array.isArray(preset.weekCard.metrics) && preset.weekCard.metrics.length)
        ? preset.weekCard.metrics
        : ["practice", "showme", "tasks"];

      return metricKeys.map(function(key) {
        if (!Object.prototype.hasOwnProperty.call(metricValues, key)) return "";
        var label = getWeekCardMetricLabel(key, text, preset);
        if (!label) return "";
        return metricValues[key] + " " + label;
      }).filter(Boolean);
    }

    function isExamWeek(w) {
      return String(w.title).includes("\u2b50");
    }

    function getBadge(w) {
      var text = getPageStrings();
      if (isExamWeek(w))        return ["badge-exam", text.badgeExam];
      if (w.status === "done")   return ["badge-done", text.badgeDone];
      if (w.status === "active") return ["badge-active", text.badgeActive];
      return                           ["badge-upcoming", text.badgeUpcoming];
    }

    function collectArchiveCardIds(week) {
      var ids = {};
      (week.steps || []).forEach(function(step) {
        if (step.showme) {
          (Array.isArray(step.showme) ? step.showme : [step.showme]).forEach(function(id) {
            if (id) ids[id] = true;
          });
        }
        if (Array.isArray(step.widgets)) {
          step.widgets.forEach(function(widget) {
            if (widget && widget.type === "showme" && widget.id) ids[widget.id] = true;
          });
        }
      });
      return Object.keys(ids);
    }

    function countTasks(week) {
      return (week.steps || []).reduce(function(total, step) {
        return total + ((step.tasks || []).length);
      }, 0);
    }

    function countReferences(week) {
      return (week.docs || []).length + (week.videos || []).length + (week.shortcuts || []).length;
    }

    function sumAllShortcuts() {
      return CURRICULUM.reduce(function(total, week) {
        return total + ((week.shortcuts || []).length);
      }, 0);
    }

    function countProgramArchiveCards() {
      var ids = {};
      CURRICULUM.forEach(function(week) {
        collectArchiveCardIds(week).forEach(function(id) {
          ids[id] = true;
        });
      });
      return Object.keys(ids).length;
    }

    function buildHeroMeta(text) {
      var activeWeek = CURRICULUM.find(function(week) { return week.status === "active"; });
      return [
        text.heroMetaArchive,
        text.heroMetaProgram,
        activeWeek ? text.heroMetaActivePrefix + " Week " + String(activeWeek.week).padStart(2, "0") : text.heroMetaActiveFallback
      ];
    }

    function buildHeroActions(text) {
      var activeWeek = CURRICULUM.find(function(week) { return week.status === "active"; }) || CURRICULUM[0];
      var activeHref = activeWeek ? withPresetHref("week.html?week=" + activeWeek.week) : "#programSection";
      return '<a class="btn btn-primary" href="' + activeHref + '">' + text.heroPrimaryCta + '</a>'
        + '<a class="btn btn-ghost" href="' + withPresetHref("library.html") + '">' + text.heroSecondaryCta + '</a>';
    }

    function getPhaseLabel(phaseId, text) {
      var map = {
        basics: text.phaseBasics || "\uae30\ucd08",
        modeling: text.phaseModeling || "\ubaa8\ub378\ub9c1",
        shading: text.phaseShading || "\uc170\uc774\ub529",
        midterm: text.phaseMidterm || "\uc911\uac04\ud3c9\uac00",
        animation: text.phaseAnimation || "\uc560\ub2c8\uba54\uc774\uc158",
        final: text.phaseFinal || "\ub9c8\ubb34\ub9ac"
      };
      return map[phaseId] || phaseId;
    }

    // Lucide SVG icons (stroke, no fill)
    var LUCIDE_ICONS = {
      layers: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>',
      keyboard: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="M6 8h.001"/><path d="M10 8h.001"/><path d="M14 8h.001"/><path d="M18 8h.001"/><path d="M8 12h.001"/><path d="M12 12h.001"/><path d="M16 12h.001"/><path d="M7 16h10"/></svg>',
      target: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
      checkCircle: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>'
    };

    // All rendered content below comes from static trusted sources
    // (CURRICULUM array, SHOWME_REGISTRY, i18n strings) — no user input.

    function buildArchiveQuickLinks(text) {
      var libraryCount = typeof SHOWME_REGISTRY !== "undefined" ? Object.keys(SHOWME_REGISTRY).length : 0;
      var items = [
        { href: withPresetHref("library.html"), icon: LUCIDE_ICONS.layers, label: text.archiveCardLibraryTitle, count: libraryCount + " " + text.archiveCardLibraryMeta },
        { href: withPresetHref("shortcuts.html"), icon: LUCIDE_ICONS.keyboard, label: text.archiveCardShortcutTitle, count: sumAllShortcuts() + " " + text.archiveCardShortcutMeta },
        { href: "#programCollection", icon: LUCIDE_ICONS.target, label: text.archiveCardAssemblyTitle, count: CURRICULUM.length + " " + text.archiveCardAssemblyMeta }
      ];
      return items.map(function(item) {
        return '<a class="archive-quick-link" href="' + item.href + '">'
          + item.icon
          + '<span>' + item.label + '</span>'
          + '<span class="quick-link-count">' + item.count + '</span>'
          + '</a>';
      }).join("");
    }

    function renderFeaturedWeek(text, preset) {
      var el = document.getElementById("weekFeatured");
      var activeWeek = CURRICULUM.find(function(w) { return w.status === "active"; });

      if (!activeWeek) {
        el.textContent = "";
        var empty = document.createElement("div");
        empty.className = "week-featured-empty";
        empty.textContent = text.featuredEmpty || "\uc9c4\ud589 \uc911\uc778 \uc8fc\ucc28\uac00 \uc5c6\uc5b4\uc694";
        el.appendChild(empty);
        return;
      }

      var localized = window.RPDI18n.localizeWeekData(activeWeek);
      var previewItems = getWeekCardPreviewItems(localized, preset);
      var weekCardPreset = preset.weekCard || {};
      var maxChips = weekCardPreset.activePreviewMaxItems || 5;
      var pageUrl = withPresetHref("week.html?week=" + activeWeek.week);

      // Build with DOM methods for safety
      el.textContent = "";
      var inner = document.createElement("div");
      inner.className = "week-featured-inner";

      var lbl = document.createElement("div");
      lbl.className = "cw-active-label";
      lbl.textContent = text.activeLabel;
      inner.appendChild(lbl);

      var header = document.createElement("div");
      header.className = "week-featured-header";
      var num = document.createElement("span");
      num.className = "week-num";
      num.textContent = "Week " + String(activeWeek.week).padStart(2, "0");
      header.appendChild(num);
      inner.appendChild(header);

      var title = document.createElement("p");
      title.className = "week-title";
      title.textContent = localized.title;
      inner.appendChild(title);

      var sub = document.createElement("p");
      sub.className = "week-subtitle";
      sub.textContent = localized.subtitle;
      inner.appendChild(sub);

      var topics = document.createElement("div");
      topics.className = "week-topics";
      previewItems.slice(0, maxChips).forEach(function(t) {
        var chip = document.createElement("span");
        chip.className = "topic-chip";
        chip.textContent = t;
        topics.appendChild(chip);
      });
      if (previewItems.length > maxChips) {
        var more = document.createElement("span");
        more.className = "topic-chip";
        more.textContent = "+" + (previewItems.length - maxChips);
        topics.appendChild(more);
      }
      inner.appendChild(topics);

      var footer = document.createElement("div");
      footer.className = "week-footer";
      var metrics = document.createElement("div");
      metrics.className = "week-metrics";
      buildWeekCardMetrics(activeWeek, text, preset).forEach(function(label) {
        var m = document.createElement("span");
        m.className = "week-metric";
        m.textContent = label;
        metrics.appendChild(m);
      });
      var arrow = document.createElement("a");
      arrow.className = "go-arrow";
      arrow.href = pageUrl;
      arrow.setAttribute("aria-label", "Week " + activeWeek.week + " \uc5f4\uae30");
      arrow.textContent = "\u2192";
      footer.appendChild(metrics);
      footer.appendChild(arrow);
      inner.appendChild(footer);

      el.appendChild(inner);
    }

    function renderJourneyPhases(text, preset) {
      var container = document.getElementById("journeyPhases");
      container.textContent = "";
      var activeWeekNum = null;
      var activeWeek = CURRICULUM.find(function(w) { return w.status === "active"; });
      if (activeWeek) activeWeekNum = activeWeek.week;

      PHASES.forEach(function(phase) {
        var phaseWeeks = phase.weeks.map(function(num) {
          return CURRICULUM.find(function(w) { return w.week === num; });
        }).filter(Boolean);

        var displayWeeks = phaseWeeks.filter(function(w) {
          return w.week !== activeWeekNum;
        });

        var doneCount = phaseWeeks.filter(function(w) { return w.status === "done"; }).length;
        var totalCount = phaseWeeks.length;
        var progressPercent = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;

        var phaseEl = document.createElement("div");
        phaseEl.className = "journey-phase";

        // Header
        var headerEl = document.createElement("div");
        headerEl.className = "journey-phase-header";
        var labelEl = document.createElement("span");
        labelEl.className = "journey-phase-label";
        labelEl.textContent = getPhaseLabel(phase.id, text);
        var progressText = document.createElement("span");
        progressText.className = "journey-phase-progress";
        progressText.textContent = doneCount + "/" + totalCount;
        headerEl.appendChild(labelEl);
        headerEl.appendChild(progressText);
        phaseEl.appendChild(headerEl);

        // Progress bar
        var track = document.createElement("div");
        track.className = "journey-progress-track";
        track.setAttribute("role", "progressbar");
        track.setAttribute("aria-valuenow", String(doneCount));
        track.setAttribute("aria-valuemin", "0");
        track.setAttribute("aria-valuemax", String(totalCount));
        track.setAttribute("aria-label", getPhaseLabel(phase.id, text) + " \uc9c4\ud589\ub960");
        var fill = document.createElement("div");
        fill.className = "journey-progress-fill";
        fill.style.width = progressPercent + "%";
        track.appendChild(fill);
        phaseEl.appendChild(track);

        // Cards
        if (displayWeeks.length > 0) {
          var gridEl = document.createElement("div");
          gridEl.className = "journey-phase-grid";

          displayWeeks.forEach(function(w) {
            var localized = window.RPDI18n.localizeWeekData(w);
            var badgeInfo = getBadge(w);
            var isUpcoming = w.status !== "done" && w.status !== "active" && !isExamWeek(w);
            var pageUrl = withPresetHref("week.html?week=" + w.week);

            var card = document.createElement(isUpcoming ? "div" : "a");
            card.className = "journey-week-card";
            if (w.status === "done") card.className += " is-done";
            else if (isExamWeek(w)) card.className += " is-exam";
            else if (isUpcoming) card.className += " is-upcoming";
            if (!isUpcoming) card.href = pageUrl;

            var cardHeader = document.createElement("div");
            cardHeader.className = "journey-card-header";
            var cardNum = document.createElement("span");
            cardNum.className = "journey-card-num";
            cardNum.textContent = "Week " + String(w.week).padStart(2, "0");
            cardHeader.appendChild(cardNum);

            if (w.status === "done") {
              var checkEl = document.createElement("span");
              checkEl.className = "journey-card-done-icon";
              // Static SVG from trusted constant — safe to set
              checkEl.insertAdjacentHTML("afterbegin", LUCIDE_ICONS.checkCircle);
              cardHeader.appendChild(checkEl);
            } else {
              var badgeEl = document.createElement("span");
              badgeEl.className = "journey-card-badge " + badgeInfo[0];
              badgeEl.textContent = badgeInfo[1];
              cardHeader.appendChild(badgeEl);
            }
            card.appendChild(cardHeader);

            var cardTitle = document.createElement("p");
            cardTitle.className = "journey-card-title";
            cardTitle.textContent = localized.title;
            card.appendChild(cardTitle);

            var cardMetrics = buildWeekCardMetrics(w, text, preset);
            if (cardMetrics.length) {
              var metricsEl = document.createElement("div");
              metricsEl.className = "journey-card-metrics";
              cardMetrics.forEach(function(label) {
                var m = document.createElement("span");
                m.className = "journey-card-metric";
                m.textContent = label;
                metricsEl.appendChild(m);
              });
              card.appendChild(metricsEl);
            }

            gridEl.appendChild(card);
          });

          phaseEl.appendChild(gridEl);
        }

        container.appendChild(phaseEl);
      });
    }

    function renderPage() {
      var text = getPageStrings();
      var preset = getUiPreset();
      var labels = preset.labels || {};

      // Meta
      document.title = text.pageTitle;
      var meta = document.querySelector('meta[name="description"]');
      if (meta) meta.setAttribute("content", text.metaDescription);

      // Theme toggle
      var themeToggle = document.getElementById("themeToggle");
      if (themeToggle) themeToggle.setAttribute("aria-label", text.themeToggleAria);

      // Hero
      document.getElementById("heroEyebrow").textContent = localizeUiLabel(labels.heroEyebrow, text.heroEyebrow);
      document.getElementById("heroTitle").textContent = text.heroTitle;
      document.getElementById("heroDescription").textContent = text.heroDescription;
      document.getElementById("heroMetaLabel").textContent = text.heroMetaLabel;

      // Hero actions (static trusted strings only)
      var actionsEl = document.getElementById("heroActions");
      actionsEl.textContent = "";
      var activeWeekForCta = CURRICULUM.find(function(week) { return week.status === "active"; }) || CURRICULUM[0];
      var activeHref = activeWeekForCta ? withPresetHref("week.html?week=" + activeWeekForCta.week) : "#programSection";
      var primaryBtn = document.createElement("a");
      primaryBtn.className = "btn btn-primary";
      primaryBtn.href = activeHref;
      primaryBtn.textContent = text.heroPrimaryCta;
      var ghostBtn = document.createElement("a");
      ghostBtn.className = "btn btn-ghost";
      ghostBtn.href = withPresetHref("library.html");
      ghostBtn.textContent = text.heroSecondaryCta;
      actionsEl.appendChild(primaryBtn);
      actionsEl.appendChild(ghostBtn);

      // Hero meta chips
      var heroMetaEl = document.getElementById("heroMeta");
      heroMetaEl.textContent = "";
      buildHeroMeta(text).forEach(function(item) {
        var chip = document.createElement("span");
        chip.className = "hero-meta-chip";
        chip.textContent = item;
        heroMetaEl.appendChild(chip);
      });

      // Featured active week
      renderFeaturedWeek(text, preset);

      // Program section
      document.getElementById("programEyebrow").textContent = text.programEyebrow;
      document.getElementById("programTitle").textContent = getPresetProgramTitle(text);
      document.getElementById("programDescription").textContent = text.programDescription;
      document.getElementById("footerLabel").textContent = text.footerLabel;

      // Program stats (inline pills)
      var statsEl = document.getElementById("programStats");
      statsEl.textContent = "";
      var activeWeek = CURRICULUM.find(function(w) { return w.status === "active"; });
      [
        { value: CURRICULUM.length, label: text.programStatWeeks },
        { value: countProgramArchiveCards(), label: text.programStatCards },
        { value: activeWeek ? "Week " + String(activeWeek.week).padStart(2, "0") : "\u2014", label: text.programStatActive }
      ].forEach(function(item) {
        var stat = document.createElement("div");
        stat.className = "program-stat";
        var strong = document.createElement("strong");
        strong.textContent = item.value;
        var span = document.createElement("span");
        span.textContent = item.label;
        stat.appendChild(strong);
        stat.appendChild(span);
        statsEl.appendChild(stat);
      });

      // Journey phases
      renderJourneyPhases(text, preset);

      // Archive quick links
      var linksEl = document.getElementById("archiveQuickLinks");
      linksEl.textContent = "";
      var libraryCount = typeof SHOWME_REGISTRY !== "undefined" ? Object.keys(SHOWME_REGISTRY).length : 0;
      var quickItems = [
        { href: withPresetHref("library.html"), iconKey: "layers", label: text.archiveCardLibraryTitle, count: libraryCount + " " + text.archiveCardLibraryMeta },
        { href: withPresetHref("shortcuts.html"), iconKey: "keyboard", label: text.archiveCardShortcutTitle, count: sumAllShortcuts() + " " + text.archiveCardShortcutMeta },
        { href: "#programCollection", iconKey: "target", label: text.archiveCardAssemblyTitle, count: CURRICULUM.length + " " + text.archiveCardAssemblyMeta }
      ];
      quickItems.forEach(function(item) {
        var a = document.createElement("a");
        a.className = "archive-quick-link";
        a.href = item.href;
        // Static SVG from trusted constant
        a.insertAdjacentHTML("afterbegin", LUCIDE_ICONS[item.iconKey]);
        var labelSpan = document.createElement("span");
        labelSpan.textContent = item.label;
        a.appendChild(labelSpan);
        var countSpan = document.createElement("span");
        countSpan.className = "quick-link-count";
        countSpan.textContent = item.count;
        a.appendChild(countSpan);
        linksEl.appendChild(a);
      });
    }

    // Notion icon SVG (static constant — safe to use with insertAdjacentHTML)
    var NOTION_ICON_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 22h14a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v4"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M2 15h10"/><path d="M9 18l3-3-3-3"/></svg>';

    function renderEduReferences() {
      var activeWeek = CURRICULUM.find(function(w) { return w.status === "active"; });
      if (!activeWeek) return;

      var text = getPageStrings();
      var weekNum = activeWeek.week;

      fetch("data/references.json")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var sections = (data.sections || []).filter(function(s) {
            return Array.isArray(s.weeks) && s.weeks.indexOf(weekNum) !== -1;
          });
          var tutorials = sections.reduce(function(acc, s) {
            return acc.concat(s.tutorials || []);
          }, []).slice(0, 4);

          if (!tutorials.length) return;

          var grid = document.getElementById("eduRefsGrid");
          if (!grid) return;
          grid.textContent = "";
          tutorials.forEach(function(t) {
            var card = document.createElement("a");
            card.className = "edu-ref-card";
            card.href = t.notion_url;
            card.target = "_blank";
            card.rel = "noopener noreferrer";

            var iconEl = document.createElement("span");
            iconEl.className = "edu-ref-icon";
            // Static SVG constant — safe
            iconEl.insertAdjacentHTML("afterbegin", NOTION_ICON_SVG);

            var titleEl = document.createElement("span");
            titleEl.className = "edu-ref-title";
            titleEl.textContent = t.title;

            var ctaEl = document.createElement("span");
            ctaEl.className = "edu-ref-cta";
            ctaEl.textContent = text.eduRefsOpenLabel || "Notion에서 열기";

            card.appendChild(iconEl);
            card.appendChild(titleEl);
            card.appendChild(ctaEl);
            grid.appendChild(card);
          });

          // Update eyebrow/title
          var eyebrow = document.getElementById("eduRefsEyebrow");
          if (eyebrow) eyebrow.textContent = text.eduRefsEyebrow || "이번 주 참고자료";
          var title = document.getElementById("eduRefsTitle");
          if (title) title.textContent = text.eduRefsTitle || "Notion 튜토리얼";

          // Show "more" link
          var moreEl = document.getElementById("eduRefsMore");
          if (moreEl) {
            moreEl.href = withPresetHref("week.html?week=" + weekNum + "#references");
            moreEl.textContent = text.eduRefsMore || "이 주차 전체 참고자료 보기 →";
            moreEl.removeAttribute("hidden");
          }

          // Reveal section
          var section = document.getElementById("eduReferences");
          if (section) section.removeAttribute("hidden");
        })
        .catch(function() { /* silently skip if references unavailable */ });
    }

    window.RPDWeekUI.init({ url: "data/week-ui.json?v=20260318a" }).finally(function() {
      window.RPDI18n.mountLanguageSwitcher(document.getElementById("langSwitcher"));
      window.RPDI18n.onLanguageChange(function() {
        renderPage();
        renderEduReferences();
      });
      renderEduReferences();
    });

    // Theme toggle
    window.RPDAppShell.bindThemeToggle(document.getElementById("themeToggle"));
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="assets/supabase-config.js"></script>
  <script src="assets/auth.js"></script>
  <script src="assets/sync.js"></script>
  <script src="assets/admin-role.js"></script>
</body>

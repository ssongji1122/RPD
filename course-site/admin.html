  <script>
  // ════════════════════════════════════════════════════════
  //  RPD Admin — Curriculum Editor
  //  All rendered content uses esc() for XSS-safe escaping.
  //  Data source: same-origin admin API (trusted).
  // ════════════════════════════════════════════════════════

  (function() {
    "use strict";

    // ─── State ───────────────────────────────────────────
    var curriculum = [];
    var selectedIdx = 0;
    var dirty = false;
    var dirtyWeeks = {};
    var weekUiConfig = null;
    var weekUiVersion = "";
    var weekUiDirty = false;
    var notionConfigured = false;
    var currentVersion = "";

    // ─── DOM refs ────────────────────────────────────────
    var sidebarList    = document.getElementById("sidebarList");
    var editorInner    = document.getElementById("editorInner");
    var dirtyIndicator = document.getElementById("dirtyIndicator");
    var versionBadge   = document.getElementById("versionBadge");
    var saveBtn        = document.getElementById("saveBtn");
    var diffBtn        = document.getElementById("diffBtn");
    var previewBtn     = document.getElementById("previewBtn");
    var topbarHomeLink = document.getElementById("topbarHomeLink");
    var adminBrandLink = document.getElementById("adminBrandLink");
    var logoutBtn      = document.getElementById("logoutBtn");
    var toastContainer = document.getElementById("toastContainer");
    var authOverlay    = document.getElementById("authOverlay");
    var authInput      = document.getElementById("authInput");
    var authSubmit     = document.getElementById("authSubmit");
    var authError      = document.getElementById("authError");
    var hamburgerBtn   = document.getElementById("hamburgerBtn");
    var sidebarEl      = document.getElementById("sidebar");
    var sidebarOverlay = document.getElementById("sidebarOverlay");
    var sectionNavLinks = Array.from(document.querySelectorAll(".sidebar-link[data-nav-target]"));
    var notionGroup    = document.getElementById("notionGroup");
    var notionPushAllBtn = document.getElementById("notionPushAllBtn");
    var pushAllOverlay   = document.getElementById("pushAllOverlay");
    var pushAllLog       = document.getElementById("pushAllLog");
    var pushAllCloseBtn  = document.getElementById("pushAllCloseBtn");
    var diffOverlay      = document.getElementById("diffOverlay");
    var diffMeta         = document.getElementById("diffMeta");
    var diffLog          = document.getElementById("diffLog");
    var diffCloseBtn     = document.getElementById("diffCloseBtn");
    var heroPreviewBtn   = document.getElementById("heroPreviewBtn");
    var adminHeroEyebrow = document.getElementById("adminHeroEyebrow");
    var adminHeroTitle   = document.getElementById("adminHeroTitle");
    var adminHeroDescription = document.getElementById("adminHeroDescription");
    var adminHeroWeek    = document.getElementById("adminHeroWeek");
    var adminHeroState   = document.getElementById("adminHeroState");
    var adminHeroVersion = document.getElementById("adminHeroVersion");
    var sidebarMeta      = document.getElementById("sidebarMeta");
    var workspaceTitle   = document.getElementById("workspaceTitle");
    var workspaceDescription = document.getElementById("workspaceDescription");
    var sidebarHomeLink = document.getElementById("sidebarHomeLink");
    var sidebarCourseLink = document.getElementById("sidebarCourseLink");
    var sidebarLibraryLink = document.getElementById("sidebarLibraryLink");
    var sidebarShortcutsLink = document.getElementById("sidebarShortcutsLink");

    // ─── Helpers ─────────────────────────────────────────

    /** HTML-escape a string using the DOM textContent trick. */
    function esc(str) {
      if (str == null) return "";
      var d = document.createElement("div");
      d.textContent = String(str);
      return d.innerHTML;
    }

    function getSelectedWeek() {
      return curriculum[selectedIdx] || curriculum[0] || null;
    }

    function formatWeekLabel(week) {
      return week ? "Week " + String(week.week).padStart(2, "0") : "—";
    }

    function buildAdminStateView(options) {
      var metaItems = (options.meta || []).map(function(item) {
        return '<span class="rpd-meta-chip"><strong>' + esc(item.value) + '</strong><span>' + esc(item.label) + '</span></span>';
      }).join("");

      var actions = (options.actions || []).map(function(action) {
        if (action.type === "button") {
          return '<button class="btn ' + esc(action.className || "btn-ghost") + '" type="button" ' +
            (action.dataAction ? 'data-admin-action="' + esc(action.dataAction) + '"' : "") + '>' +
            esc(action.label) + '</button>';
        }
        return '<a class="btn ' + esc(action.className || "btn-ghost") + '" href="' + esc(action.href || "#") + '">' +
          esc(action.label) + '</a>';
      }).join("");

      var steps = (options.steps || []).map(function(step, index) {
        return [
          '<div class="admin-state-step rpd-surface-item">',
          '<span class="admin-state-step-index">', esc(String(index + 1)), '</span>',
          '<div class="admin-state-step-copy">',
          '<strong>', esc(step.title), '</strong>',
          '<p>', esc(step.body), '</p>',
          step.code ? '<code class="admin-state-code">' + esc(step.code) + '</code>' : "",
          '</div>',
          '</div>'
        ].join("");
      }).join("");

      var links = (options.links || []).map(function(link) {
        return [
          '<a class="admin-state-link rpd-surface-item" href="', esc(link.href), '">',
          '<span class="rpd-icon-well" style="width:38px;height:38px">', esc(link.icon || "R"), '</span>',
          '<span class="admin-state-link-copy">',
          '<span class="admin-state-link-label">', esc(link.label), '</span>',
          '<span class="admin-state-link-meta">', esc(link.meta), '</span>',
          '</span>',
          '<span class="admin-state-link-arrow">&#8599;</span>',
          '</a>'
        ].join("");
      }).join("");

      return [
        '<div class="admin-state-shell">',
        '<section class="admin-hero">',
        '<div class="admin-hero-card">',
        '<div class="admin-hero-copy">',
        '<span class="hero-meta-label">', esc(options.eyebrow || "Admin workspace"), '</span>',
        '<h1>', esc(options.title), '</h1>',
        '<p>', esc(options.description), '</p>',
        actions ? '<div class="admin-hero-actions admin-state-actions">' + actions + '</div>' : "",
        '</div>',
        '<div class="admin-hero-meta-wrap">',
        '<div class="hero-meta-label">Current mode</div>',
        '<div class="admin-state-meta admin-hero-meta">', metaItems, '</div>',
        '</div>',
        '</div>',
        '</section>',
        '<section class="admin-workspace-panel admin-state-panel">',
        '<div class="admin-section-intro">',
        '<h2 class="admin-section-title">', esc(options.panelTitle), '</h2>',
        '<p class="admin-section-copy">', esc(options.panelDescription), '</p>',
        '</div>',
        steps ? '<div class="admin-state-steps">' + steps + '</div>' : "",
        links ? '<div class="admin-state-grid">' + links + '</div>' : "",
        options.note ? '<p class="admin-state-note">' + esc(options.note) + '</p>' : "",
        '</section>',
        '</div>'
      ].join("");
    }

    function renderAdminStateView(options) {
      editorInner.innerHTML = buildAdminStateView(options);

      editorInner.querySelectorAll("[data-admin-action]").forEach(function(button) {
        button.addEventListener("click", function() {
          var action = button.getAttribute("data-admin-action");
          if (action === "retry") {
            loadCurriculum();
          } else if (action === "auth") {
            showAuth();
          }
        });
      });
    }

    function renderAdminServerFallback(error) {
      renderAdminStateView({
        eyebrow: "Admin fallback",
        title: "관리 서버에 연결할 수 없습니다",
        description: "정적 파일만으로는 편집용 curriculum API가 없어 화면이 비어 보일 수 있습니다. 서버를 실행한 뒤 다시 시도하거나, 아래 공개 페이지로 이동해 현재 톤을 계속 확인하세요.",
        actions: [
          { type: "button", className: "btn-primary", dataAction: "retry", label: "다시 시도" },
          { type: "link", className: "btn-ghost", href: "index.html", label: "홈 보기 ↗" }
        ],
        meta: [
          { value: "API unavailable", label: "연결 상태" },
          { value: "Static preview", label: "현재 모드" },
          { value: error && error.message ? error.message : "unknown", label: "응답" }
        ],
        panelTitle: "다음 단계",
        panelDescription: "편집 화면과 공개 페이지가 같은 제품군으로 보이도록, 관리 모드도 실제 웹페이지 흐름을 그대로 따라갑니다.",
        steps: [
          {
            title: "관리 서버 실행",
            body: "저장, diff, Notion push 같은 편집 기능은 admin server가 응답할 때만 활성화됩니다.",
            code: "python3 tools/admin-server.py --host 127.0.0.1 --port 4180"
          },
          {
            title: "실행 후 다시 연결",
            body: "서버가 켜지면 이 화면에서 다시 시도를 눌러 같은 레이아웃 안에서 편집 상태를 바로 불러옵니다."
          }
        ],
        links: [
          { href: "index.html", icon: "H", label: "홈 허브", meta: "아카이브와 실제 수업 페이지 흐름 확인" },
          { href: "inha.html?panel=weeks", icon: "C", label: "인하대 수업", meta: "공개 주차 카드와 curriculum 결과 확인" },
          { href: "library.html", icon: "L", label: "카드 라이브러리", meta: "Show Me 카드 브라우저 톤 확인" },
          { href: "shortcuts.html", icon: "K", label: "단축키 DB", meta: "검색 rail과 리스트 카드 밀도 확인" }
        ],
        note: "정상 서버에서는 로그인 후 preview hero, 단계 카드, 참고 자료, 과제 카드가 이 영역에 그대로 나타납니다."
      });
    }

    function renderAdminChrome() {
      var selectedWeek = getSelectedWeek();
      var draftLabel = dirty && weekUiDirty
        ? "저장 상태 · 주차 + UI 초안 있음"
        : (weekUiDirty ? "저장 상태 · UI preset 초안 있음" : (dirty ? "저장 상태 · 초안 있음" : "저장 상태 · 동기화됨"));

      if (sidebarMeta) {
        sidebarMeta.textContent = selectedWeek
          ? curriculum.length + "주 커리큘럼 · " + formatWeekLabel(selectedWeek) + " 편집 중"
          : "커리큘럼 구조를 웹페이지 흐름 그대로 편집합니다.";
      }
      if (adminHeroEyebrow) {
        adminHeroEyebrow.textContent = selectedWeek ? formatWeekLabel(selectedWeek) + " Editor" : "Curriculum Editor";
      }
      if (adminHeroTitle) {
        adminHeroTitle.textContent = selectedWeek
          ? formatWeekLabel(selectedWeek) + " · " + (selectedWeek.title || "제목 없음")
          : "원래 웹 구조를 유지하는 RPD Admin";
      }
      if (adminHeroDescription) {
        adminHeroDescription.textContent = selectedWeek
          ? ((selectedWeek.subtitle || "").trim() || "공개 주차 페이지의 순서와 카드 구조를 유지한 채 내용을 수정하고 미리볼 수 있습니다.")
          : "홈과 주차 페이지의 흐름 그대로, 선택한 주차를 편집하고 바로 공개 페이지로 미리볼 수 있습니다.";
      }
      if (adminHeroWeek) {
        adminHeroWeek.textContent = "선택된 주차 · " + formatWeekLabel(selectedWeek);
      }
      if (adminHeroState) {
        adminHeroState.textContent = draftLabel;
      }
      if (adminHeroVersion) {
        adminHeroVersion.textContent = currentVersion ? "버전 · " + currentVersion : "버전 · —";
      }
      if (workspaceTitle) {
        workspaceTitle.textContent = selectedWeek
          ? formatWeekLabel(selectedWeek) + " · " + (selectedWeek.title || "제목 없음") + " 편집"
          : "선택한 주차를 실제 페이지 구조 그대로 편집합니다";
      }
      if (workspaceDescription) {
        workspaceDescription.textContent = selectedWeek
          ? "현재 선택된 주차를 공개 페이지와 같은 섹션 순서로 수정합니다. 저장 전까지는 관리자 화면에서만 반영됩니다."
          : "이 영역은 공개 주차 페이지의 정보 순서를 따라가는 편집 캔버스입니다.";
      }
    }

    var editorNavObserver = null;

    function setActiveSectionLink(targetId) {
      sectionNavLinks.forEach(function(link) {
        link.classList.toggle("is-active", link.dataset.navTarget === targetId);
      });
    }

    function initEditorNav() {
      if (editorNavObserver) {
        editorNavObserver.disconnect();
        editorNavObserver = null;
      }

      var observedTargets = sectionNavLinks.map(function(link) {
        return document.getElementById(link.dataset.navTarget);
      }).filter(Boolean);

      if (!observedTargets.length) return;

      setActiveSectionLink(observedTargets[0].id);

      editorNavObserver = new IntersectionObserver(function(entries) {
        var visible = entries
          .filter(function(entry) { return entry.isIntersecting; })
          .sort(function(a, b) { return a.boundingClientRect.top - b.boundingClientRect.top; });
        if (!visible.length) return;
        setActiveSectionLink(visible[0].target.id);
      }, {
        root: null,
        rootMargin: "-24% 0px -58% 0px",
        threshold: [0.05, 0.2, 0.4]
      });

      observedTargets.forEach(function(target) {
        editorNavObserver.observe(target);
      });
    }

    function deepClone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function mergeWeekUiPreset(base, extra) {
      var result = deepClone(base || {});
      Object.keys(extra || {}).forEach(function(key) {
        var nextValue = extra[key];
        if (Array.isArray(nextValue)) {
          result[key] = nextValue.slice();
          return;
        }
        if (nextValue && typeof nextValue === "object" && !Array.isArray(nextValue) && result[key] && typeof result[key] === "object" && !Array.isArray(result[key])) {
          result[key] = mergeWeekUiPreset(result[key], nextValue);
          return;
        }
        result[key] = nextValue;
      });
      return result;
    }

    function resolveWeekUiPreset(config, presetName, seen) {
      var presets = (config && config.presets) || {};
      var name = presetName && presets[presetName] ? presetName : ((config && config.defaultPreset) || "inha-rpd");
      var preset = presets[name] || {};
      var nextSeen = seen || {};
      if (!preset.extends || nextSeen[name]) return deepClone(preset);
      nextSeen[name] = true;
      var parent = resolveWeekUiPreset(config, preset.extends, nextSeen);
      var child = deepClone(preset);
      delete child.extends;
      return mergeWeekUiPreset(parent, child);
    }

    function getWeekUiPresetTarget() {
      if (!weekUiConfig) {
        weekUiConfig = { version: 1, defaultPreset: "inha-rpd", presets: { "inha-rpd": {} } };
      }
      if (!weekUiConfig.presets || typeof weekUiConfig.presets !== "object") {
        weekUiConfig.presets = {};
      }
      var presetName = weekUiConfig.defaultPreset || "inha-rpd";
      if (!weekUiConfig.presets[presetName]) weekUiConfig.presets[presetName] = {};
      return {
        name: presetName,
        raw: weekUiConfig.presets[presetName],
        resolved: resolveWeekUiPreset(weekUiConfig, presetName)
      };
    }

    function setWeekUiValue(path, value) {
      var targetInfo = getWeekUiPresetTarget();
      var cursor = targetInfo.raw;
      path.slice(0, -1).forEach(function(key) {
        if (!cursor[key] || typeof cursor[key] !== "object" || Array.isArray(cursor[key])) {
          cursor[key] = {};
        }
        cursor = cursor[key];
      });
      cursor[path[path.length - 1]] = value;
    }

    function buildWeekUiSummary(targetInfo) {
      var preset = targetInfo.resolved || {};
      var weekCard = preset.weekCard || {};
      var weekHero = preset.weekHero || {};
      var weekSummary = preset.weekSummary || {};
      var metrics = Array.isArray(weekCard.metrics) ? weekCard.metrics.join("/") : "practice/showme/tasks";
      return "Week cards show " + metrics + ". Hero uses " + (weekHero.subtitleMode || "subtitle") + ". Summary uses " + (weekSummary.itemSource || "topics") + " in " + (weekSummary.desktopColumns || 2) + " columns and " + (weekSummary.maxItems || 8) + " items.";
    }

    function buildWeekUiJson() {
      return JSON.stringify(weekUiConfig || {}, null, 2);
    }

    function updateWeekUiPanelMeta() {
      var targetInfo = getWeekUiPresetTarget();
      var presetName = document.getElementById("uiPresetName");
      var presetVersion = document.getElementById("uiPresetVersion");
      var presetCount = document.getElementById("uiPresetCount");
      var summaryText = document.getElementById("uiPresetSummary");
      var jsonView = document.getElementById("uiPresetJson");

      if (presetName) presetName.textContent = targetInfo.name;
      if (presetVersion) presetVersion.textContent = weekUiVersion || "—";
      if (presetCount) presetCount.textContent = String(Object.keys((weekUiConfig && weekUiConfig.presets) || {}).length);
      if (summaryText) summaryText.textContent = buildWeekUiSummary(targetInfo);
      if (jsonView) jsonView.value = buildWeekUiJson();
    }

    function loadWeekUiIntoPanel() {
      var targetInfo = getWeekUiPresetTarget();
      var preset = targetInfo.resolved || {};

      var weekCard = preset.weekCard || {};
      var weekHero = preset.weekHero || {};

      var programEn = document.getElementById("uiProgramEn");

      var subtitleMode = document.getElementById("uiSubtitleMode");

      var summaryMax = document.getElementById("uiSummaryMax");
      var summaryProgress = document.getElementById("uiSummaryProgress");
      if (schoolKo) schoolKo.value = (labels.school && labels.school.ko) || "";
      if (schoolEn) schoolEn.value = (labels.school && labels.school.en) || "";
      if (programKo) programKo.value = (labels.program && labels.program.ko) || "";
      if (programEn) programEn.value = (labels.program && labels.program.en) || "";
      if (previewSource) previewSource.value = weekCard.previewSource || "topics";

    function renderDiffOverlay(diff) {
      diffMeta.textContent =
        "현재 " + diff.version_from + " → 저장 예정 " + diff.version_to +
        " · 변경 주차 " + diff.changed_count + "개";

      if (!diff.changed_weeks.length) {
        diffLog.innerHTML = "<div class=\"diff-week\">변경된 주차가 없습니다.</div>";
        return;
      }

      diffLog.innerHTML = diff.changed_weeks.map(function(week) {
        var fields = week.changed_fields.map(esc).join(", ");
        return [
          "<div class=\"diff-week\">",
          "<strong>Week ", esc(String(week.week).padStart(2, "0")), " · ", esc(week.title || ""), "</strong>",
          "<div class=\"diff-fields\">변경 필드: ", fields, " · 단계 ", esc(String(week.step_count)), "개</div>",
          "</div>"
        ].join("");
      }).join("");
    }


    async function performCurriculumSave() {
      saveBtn.disabled = true;
      saveBtn.textContent = "\uC800\uC7A5 \uC911...";
      try {
        var saved = [];
        if (dirty) {
          var res = await apiFetch("/api/curriculum", {
            method: "PUT",
            headers: apiHeaders(),
            body: JSON.stringify(curriculum),
          });
          if (res.status === 401 || res.status === 403) return;
          if (!res.ok) throw new Error("HTTP " + res.status);
          var result = await res.json();
          setCurrentVersion(result.version);
          dirty = false;
          dirtyWeeks = {};
          saved.push("커리큘럼 " + result.version);
        }
        if (weekUiDirty) {
          var weekUiRes = await apiFetch("/api/week-ui", {
            method: "PUT",
            headers: apiHeaders(),
            body: JSON.stringify(weekUiConfig),
          });
          if (weekUiRes.status === 401 || weekUiRes.status === 403) return;
          if (!weekUiRes.ok) throw new Error("HTTP " + weekUiRes.status);
          var weekUiResult = await weekUiRes.json();
          weekUiVersion = weekUiResult.version || "";
          weekUiDirty = false;
          saved.push("UI preset " + weekUiVersion);
        }
        dirtyIndicator.classList.toggle("visible", dirty || weekUiDirty);
        renderAdminChrome();
        loadWeekUiIntoPanel();
        toast("\uC800\uC7A5 \uC644\uB8CC (" + saved.join(" · ") + ")", "success");
      } catch (e) {
        toast("\uC800\uC7A5 \uC2E4\uD328: " + e.message, "error");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "\uD83D\uDCBE \uC800\uC7A5";
      }
    }

          '<label class="video-upload-btn">',

          '<input type="file" accept="video/*" data-upload-video="', i, '" data-week="', w.week, '" />',

    function buildStepCard(parts, step, si, weekNum) {
      // Render each step as a visual lab-step card (matching week.html layout)
      parts.push(
        '<article class="lab-step" data-step-idx="', si, '">'
      );

      // Step header: number + title/copy (editable) + admin move/delete
      var titleCopyHTML =
        '<div style="flex:1;min-width:0">' +
        '<strong style="display:block"><input class="edit-inline" data-step-field="title" data-step="' + si + '" value="' + esc(step.title || "") + '" placeholder="단계 제목" style="width:100%;font-size:1.02rem;font-weight:600" /></strong>' +
        '<p style="margin:5px 0 0"><textarea class="edit-inline" data-step-field="copy" data-step="' + si + '" rows="2" placeholder="단계 설명" style="width:100%;color:var(--muted);line-height:1.66;font-size:.94rem">' + esc(step.copy || "") + '</textarea></p>' +
        '</div>';

      parts.push(
        '<div class="step-header">',
        '<div class="step-title-group">',
        '<div class="step-number">', (si + 1), '</div>',
        titleCopyHTML,
        '</div>',
        '<div class="step-header-admin">',
        '<button class="btn-icon" data-move-step="up" data-idx="', si, '" type="button" title="위로">&#8593;</button>',
        '<button class="btn-icon" data-move-step="down" data-idx="', si, '" type="button" title="아래로">&#8595;</button>',
        '<button class="btn-icon danger" data-remove-step="', si, '" type="button" title="삭제">&times;</button>',
        '</div>',
        '</div>'
      );

      // Step image (shown like student page + click shows link)
      if (step.image) {
        parts.push(
          step.link ? '<a href="' + esc(step.link) + '" target="_blank" rel="noopener noreferrer">' : '',
          '<img src="', esc(step.image), '" alt="', esc(step.title || ""), '" class="step-image" loading="lazy" />',
          step.link ? '</a>' : ''
        );
      } else {
        parts.push('<div class="preview-no-image">이미지 없음</div>');
      }

      // Admin row: image upload + link URL
      parts.push(
        '<div class="preview-admin-row">',
        '<label class="image-upload-btn">',
        '&#128247; 이미지 업로드',
        '<input type="file" accept="image/*" data-upload-step="', si, '" data-week="', weekNum, '" />',
        '</label>',
        '<input class="edit-inline" data-step-field="link" data-step="', si, '" value="', esc(step.link || ""), '" placeholder="공식 페이지 URL (이미지 클릭 링크)" style="flex:1;font-size:.82rem;color:var(--muted);min-width:180px" />',
        '</div>'
      );

      // Tasks (Notion-owned at step level)
      var tasksHTML = [];
      tasksHTML.push('<div class="task-list" style="gap:8px">');
      (step.tasks || []).forEach(function(t, ti) {
        tasksHTML.push(
          '<div class="admin-task-edit">',
          '<div class="admin-task-fields">',
          '<input class="edit-inline" data-task-field="label" data-step="', si, '" data-idx="', ti, '" value="', esc(t.label), '" placeholder="작업 이름" style="font-size:.94rem;font-weight:600;width:100%" />',
          '<input class="edit-inline" data-task-field="detail" data-step="', si, '" data-idx="', ti, '" value="', esc(t.detail || ""), '" placeholder="세부 사항 (선택)" style="font-size:.82rem;color:var(--muted);width:100%" />',
          '</div>',
          '<button class="btn-icon danger" data-task-remove data-step="', si, '" data-idx="', ti, '" type="button">&times;</button>',
          '</div>'
        );
      });
      tasksHTML.push(
        '</div>',
        '<button class="btn-add" data-task-add data-step="', si, '" type="button" style="margin-top:6px">+ 작업 추가</button>'
      );
      parts.push(tasksHTML.join(""));

      parts.push('</article>');
    }

    function buildSidebarHTML() {
      var parts = [];
      curriculum.forEach(function(w, i) {
        var dotClass = w.status === "done" ? "done" : w.status === "active" ? "active" : "upcoming";
        var activeClass = i === selectedIdx ? " active" : "";
        parts.push(
          '<div class="sidebar-item rpd-rail-item', activeClass, '" data-idx="', i, '">',
          '<span class="sidebar-dot ', dotClass, '"></span>',
          '<span class="sidebar-week-num">', String(w.week).padStart(2, "0"), '</span>',
          '<span class="sidebar-week-title">', esc(w.title), '</span>',
          '</div>'
        );
      });
      return parts.join("");
    }

    // ─── Auth ────────────────────────────────────────────
    function showAuth() {
      authOverlay.style.display = "";
      authInput.value = "";
      authError.textContent = "";
      authInput.focus();
    }

    authSubmit.addEventListener("click", async function() {
      var pw = authInput.value.trim();
      if (!pw) { authError.textContent = "비밀번호를 입력하세요."; return; }
      try {
        authSubmit.disabled = true;
        var res = await apiFetch("/api/admin/login", {
          method: "POST",
          headers: apiHeaders(),
          body: JSON.stringify({ password: pw })
        });
        if (res.status === 401 || res.status === 403) {
          authError.textContent = "인증 실패. 다시 시도하세요.";
          return;
        }
        if (!res.ok) throw new Error("HTTP " + res.status);
        authOverlay.style.display = "none";
        logoutBtn.style.display = "";
        notionPushAllBtn.style.display = "";
        await loadCurriculum();
      } catch (e) {
        authError.textContent = "서버 연결 실패: " + e.message;
      } finally {
        authSubmit.disabled = false;
      }
    });

    authInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") authSubmit.click();
    });

    // Sync review event listeners removed (save flow simplified)

    // ─── Mobile sidebar ──────────────────────────────────
    hamburgerBtn.addEventListener("click", function() {
      sidebarEl.classList.toggle("open");
      sidebarOverlay.classList.toggle("visible");
    });
    sidebarOverlay.addEventListener("click", function() {
      sidebarEl.classList.remove("open");
      sidebarOverlay.classList.remove("visible");
    });
    sectionNavLinks.forEach(function(link) {
      link.addEventListener("click", function() {
        setActiveSectionLink(link.dataset.navTarget);
        if (window.matchMedia("(max-width: 800px)").matches) {
          sidebarEl.classList.remove("open");
          sidebarOverlay.classList.remove("visible");
        }
      });
    });

    // ─── Data loading ────────────────────────────────────
    /** Parse API response: supports both bare array and { data } envelope */
    function parseCurriculumResponse(result) {
      curriculum = Array.isArray(result) ? result : (result.data || result);
      setCurrentVersion(Array.isArray(result) ? "" : result.version);
    }

    function parseWeekUiResponse(result) {
      weekUiConfig = result && result.data ? result.data : result;
      weekUiVersion = result && result.version ? result.version : "";
      syncPublicPageLinks();
    }

    async function loadWeekUi() {
      var res = await apiFetch("/api/week-ui");
      if (res.status === 401 || res.status === 403) {
        showAuth();
        return;
      }
      if (!res.ok) throw new Error("HTTP " + res.status);
      var result = await res.json();
      parseWeekUiResponse(result);
    }

    async function loadCurriculum() {
      try {
        var res = await apiFetch("/api/curriculum");
        if (res.status === 401 || res.status === 403) {
          showAuth();
          return;
        }
        if (!res.ok) throw new Error("HTTP " + res.status);
        var result = await res.json();
        parseCurriculumResponse(result);
        await loadWeekUi();
        renderSidebar();
        selectWeek(0);
        logoutBtn.style.display = "";
        notionPushAllBtn.style.display = "";
        await checkNotionStatus();
      } catch (e) {
        curriculum = [];
        sidebarList.innerHTML = "";
        weekSelectTopbar.innerHTML = "";
        weekSelectTopbar.style.display = "none";
        renderAdminServerFallback(e);
        renderAdminChrome();
        if (sidebarMeta) sidebarMeta.textContent = "API 연결이 필요합니다.";
      }
    }

    // ─── Saving ──────────────────────────────────────────
    saveBtn.addEventListener("click", async function() {
      if (!dirty && !weekUiDirty) {
        toast("\uBCC0\uACBD\uC0AC\uD56D\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.", "success");
        return;
      }
      await performCurriculumSave();
    });

    diffBtn.addEventListener("click", async function() {
      if (!curriculum.length) return;
      diffBtn.disabled = true;
      diffMeta.textContent = "검증 중...";
      diffLog.innerHTML = "";
      diffOverlay.style.display = "flex";
      try {
        var res = await apiFetch("/api/curriculum/diff", {
          method: "POST",
          headers: apiHeaders(),
          body: JSON.stringify(curriculum),
        });
        if (res.status === 401 || res.status === 403) return;
        if (!res.ok) throw new Error("HTTP " + res.status);
        var data = await res.json();
        renderDiffOverlay(data.diff);
      } catch (e) {
        diffMeta.textContent = "변경 미리보기를 불러오지 못했습니다.";
        diffLog.innerHTML = "<div class=\"diff-week\" style=\"color:#f66\">오류: " + esc(e.message) + "</div>";
      } finally {
        diffBtn.disabled = false;
      }
    });

    // ─── Preview ─────────────────────────────────────────
    previewBtn.addEventListener("click", function() {
      if (!curriculum.length) return;
      var weekNum = curriculum[selectedIdx].week;
      var defaultPreset = weekUiConfig && weekUiConfig.defaultPreset ? "&preset=" + encodeURIComponent(weekUiConfig.defaultPreset) : "";
      window.open("week.html?week=" + weekNum + defaultPreset, "_blank");
    });
    if (heroPreviewBtn) {
      heroPreviewBtn.addEventListener("click", function() {
        previewBtn.click();
      });
    }

    // ─── Unsaved changes warning ─────────────────────────
    window.addEventListener("beforeunload", function(e) {
      if (dirty || weekUiDirty) {
        e.preventDefault();
        e.returnValue = "";
      }
    });

    // ─── Sidebar rendering ───────────────────────────────
    var weekSelectTopbar = document.getElementById("weekSelectTopbar");

    function renderSidebar() {
      // Safe: buildSidebarHTML uses esc() on all dynamic content
      sidebarList.innerHTML = buildSidebarHTML();
      // Sync topbar week selector
      var opts = [];
      curriculum.forEach(function(w, i) {
        opts.push(
          '<option value="', i, '"', (i === selectedIdx ? ' selected' : ''), '>',
          'Week ', esc(String(w.week).padStart(2,"0")), ' · ', esc(w.title),
          '</option>'
        );
      });
      weekSelectTopbar.innerHTML = opts.join("");
      weekSelectTopbar.style.display = curriculum.length ? "" : "none";
      renderAdminChrome();
    }

    weekSelectTopbar.addEventListener("change", function() {
      selectWeek(parseInt(this.value, 10));
    });

    sidebarList.addEventListener("click", function(e) {
      var item = e.target.closest(".sidebar-item");
      if (!item) return;
      selectWeek(parseInt(item.dataset.idx, 10));
      sidebarEl.classList.remove("open");
      sidebarOverlay.classList.remove("visible");
    });

    // ─── Select week ─────────────────────────────────────
    function selectWeek(idx) {
      selectedIdx = idx;
      var items = sidebarList.querySelectorAll(".sidebar-item");
      for (var i = 0; i < items.length; i++) {
        items[i].classList.toggle("active", i === idx);
      }
      weekSelectTopbar.value = String(idx);
      renderEditor();
      renderAdminChrome();
    }

    // ─── Editor rendering ────────────────────────────────
    function renderEditor() {
      var w = curriculum[selectedIdx];
      if (!w) {
        renderAdminStateView({
          eyebrow: "Editor state",
          title: "편집할 주차를 선택하세요",
          description: "좌측 주차 목록에서 원하는 week를 고르면, 아래 편집 영역이 공개 수업 페이지 흐름 그대로 채워집니다.",
          actions: [
            { type: "button", className: "btn-primary", dataAction: "retry", label: "주차 다시 불러오기" },
            { type: "link", className: "btn-ghost", href: "inha.html?panel=weeks", label: "수업 페이지 보기 ↗" }
          ],
          meta: [
            { value: "No week", label: "선택 상태" },
            { value: "Sidebar", label: "다음 위치" },
            { value: "Preview ready", label: "작업 영역" }
          ],
          panelTitle: "작업 흐름",
          panelDescription: "관리 모드도 별도 콘솔이 아니라 실제 공개 페이지 구조를 유지한 편집 레이어로 동작합니다.",
          steps: [
            { title: "왼쪽에서 주차 선택", body: "원하는 주차를 고르면 hero, 실습, 참고 자료, 과제 섹션이 순서대로 열립니다." },
            { title: "필드 수정 후 저장", body: "제목, 카드, 링크, UI preset이 모두 같은 화면 안에서 바로 이어집니다." }
          ]
        });
        return;
      }
      // Safe: buildEditorHTML uses esc() on every dynamic value
      editorInner.innerHTML = buildEditorHTML(w);
      loadWeekUiIntoPanel();
      initEditorNav();
    }

    // ─── Event delegation ────────────────────────────────
    editorInner.addEventListener("input", function(e) {
      var el = e.target;
      var w = curriculum[selectedIdx];

      if (el.dataset.uiField) {
        if (!weekUiConfig) return;
        if (el.dataset.uiField === "school-ko") setWeekUiValue(["labels", "school", "ko"], el.value);
        if (el.dataset.uiField === "school-en") setWeekUiValue(["labels", "school", "en"], el.value);
        if (el.dataset.uiField === "program-ko") setWeekUiValue(["labels", "program", "ko"], el.value);
        if (el.dataset.uiField === "program-en") setWeekUiValue(["labels", "program", "en"], el.value);
        if (el.dataset.uiField === "metrics-order") {
          setWeekUiValue(["weekCard", "metrics"], el.value.split(",").map(function(item) {
            return item.trim();
          }).filter(Boolean));
        }
        if (el.dataset.uiField === "summary-max") {
          setWeekUiValue(["weekSummary", "maxItems"], Math.max(1, parseInt(el.value || "1", 10) || 1));
        }
        markWeekUiDirty();
        updateWeekUiPanelMeta();
        return;
      }

      // Top-level fields
      if (el.dataset.field) {
        w[el.dataset.field] = el.value;
        markDirty();
        if (el.dataset.field === "title" || el.dataset.field === "status") {
          renderSidebar();
        }
        return;
      }

      // Top-level lists (topics, mistakes, checklist)
      if (el.dataset.list) {
        var key = el.dataset.list;
        var idx = parseInt(el.dataset.idx, 10);
        if (key === "checklist") {
          w.assignment.checklist[idx] = el.value;
        } else {
          w[key][idx] = el.value;
        }
        markDirty();
        return;
      }

      // Assignment fields
      if (el.dataset.assignment) {
        w.assignment = w.assignment || { title: "", description: "", checklist: [] };
        w.assignment[el.dataset.assignment] = el.value;
        markDirty();
        return;
      }

      // Shortcut fields
      if (el.dataset.shortcutField) {
        w.shortcuts = w.shortcuts || [];
        var sIdx = parseInt(el.dataset.idx, 10);
        w.shortcuts[sIdx][el.dataset.shortcutField] = el.value;
        markDirty();
        return;
      }

      // Explore fields
      if (el.dataset.exploreField) {
        w.explore = w.explore || [];
        var eIdx = parseInt(el.dataset.idx, 10);
        w.explore[eIdx][el.dataset.exploreField] = el.value;
        markDirty();
        return;
      }

      // Video fields
      if (el.dataset.videoField) {
        w.videos = w.videos || [];
        var vIdx = parseInt(el.dataset.idx, 10);
        w.videos[vIdx][el.dataset.videoField] = el.value;
        markDirty();
        return;
      }

      // Doc fields
      if (el.dataset.docField) {
        w.docs = w.docs || [];
        var dIdx = parseInt(el.dataset.idx, 10);
        w.docs[dIdx][el.dataset.docField] = el.value;
        markDirty();
        return;
      }

      // Step fields
      if (el.dataset.stepField) {
        var si = parseInt(el.dataset.step, 10);
        w.steps[si][el.dataset.stepField] = el.value;
        markDirty();
        if (el.dataset.stepField === "title") {
          var card = el.closest(".step-card");
          if (card) {
            var titleSpan = card.querySelector(".step-card-title");
            if (titleSpan) titleSpan.textContent = el.value || "새 단계";
          }
        }
        return;
      }

      // Task fields
      if (el.dataset.taskField) {
        var tStep = parseInt(el.dataset.step, 10);
        var tIdx = parseInt(el.dataset.idx, 10);
        w.steps[tStep].tasks[tIdx][el.dataset.taskField] = el.value;
        markDirty();
        return;
      }
    });

    editorInner.addEventListener("change", function(e) {
      var el = e.target;
      var w = curriculum[selectedIdx];

      if (el.dataset.uiField) {
        if (!weekUiConfig) return;
        if (el.dataset.uiField === "preview-source") setWeekUiValue(["weekCard", "previewSource"], el.value);
        if (el.dataset.uiField === "subtitle-mode") setWeekUiValue(["weekHero", "subtitleMode"], el.value);
        if (el.dataset.uiField === "summary-source") setWeekUiValue(["weekSummary", "itemSource"], el.value);
        if (el.dataset.uiField === "summary-progress") setWeekUiValue(["weekSummary", "showProgress"], !!el.checked);
        markWeekUiDirty();
        updateWeekUiPanelMeta();
        return;
      }

      // Select fields (status)
      if (el.dataset.field === "status") {
        w.status = el.value;
        markDirty();
        renderSidebar();
        return;
      }

      // Image upload
      if (el.dataset.uploadStep !== undefined) {
        var si = parseInt(el.dataset.uploadStep, 10);
        var weekNum = parseInt(el.dataset.week, 10);
        var file = el.files[0];
        if (file) uploadImage(weekNum, si, file);
        return;
      }

      // Video upload
      if (el.dataset.uploadVideo !== undefined) {
        var vi = parseInt(el.dataset.uploadVideo, 10);
        var weekNum = parseInt(el.dataset.week, 10);
        var file = el.files[0];
        if (file) uploadVideo(weekNum, vi, file);
        return;
      }
    });

    editorInner.addEventListener("click", function(e) {
      var btn = e.target.closest("button");
      if (!btn) return;
      var w = curriculum[selectedIdx];

      if (btn.hasAttribute("data-ui-reset")) {
        var targetInfo = getWeekUiPresetTarget();
        var resetPreset = {};
        if (targetInfo.raw && targetInfo.raw.extends) resetPreset.extends = targetInfo.raw.extends;
        weekUiConfig.presets[targetInfo.name] = resetPreset;
        markWeekUiDirty();
        renderEditor();
        return;
      }

      // Remove from top-level list
      if (btn.dataset.remove) {
        var key = btn.dataset.remove;
        var idx = parseInt(btn.dataset.idx, 10);
        if (key === "checklist") {
          w.assignment.checklist.splice(idx, 1);
        } else if (key === "shortcuts") {
          w.shortcuts = w.shortcuts || [];
          w.shortcuts.splice(idx, 1);
        } else if (key === "explore") {
          w.explore = w.explore || [];
          w.explore.splice(idx, 1);
        } else if (key === "videos") {
          w.videos = w.videos || [];
          w.videos.splice(idx, 1);
        } else if (key === "docs") {
          w.docs = w.docs || [];
          w.docs.splice(idx, 1);
        } else {
          w[key].splice(idx, 1);
        }
        markDirty();
        renderEditor();
        return;
      }

      // Add to top-level list
      if (btn.dataset.add) {
        var addKey = btn.dataset.add;
        if (addKey === "topics") {
          w.topics = w.topics || [];
          w.topics.push("");
        } else if (addKey === "mistakes") {
          w.mistakes = w.mistakes || [];
          w.mistakes.push("");
        } else if (addKey === "checklist") {
          w.assignment = w.assignment || { title: "", description: "", checklist: [] };
          w.assignment.checklist.push("");
        } else if (addKey === "shortcuts") {
          w.shortcuts = w.shortcuts || [];
          w.shortcuts.push({ keys: "", action: "" });
        } else if (addKey === "explore") {
          w.explore = w.explore || [];
          w.explore.push({ title: "", hint: "" });
        } else if (addKey === "videos") {
          w.videos = w.videos || [];
          w.videos.push({ title: "", url: "" });
        } else if (addKey === "docs") {
          w.docs = w.docs || [];
          w.docs.push({ title: "", url: "" });
        }
        markDirty();
        renderEditor();
        requestAnimationFrame(function() {
          var selectors = {
            topics: '[data-list="topics"]',
            mistakes: '[data-list="mistakes"]',
            checklist: '[data-list="checklist"]',
            shortcuts: '[data-shortcut-field="keys"]',
            explore: '[data-explore-field="title"]',
            videos: '[data-video-field="title"]',
            docs: '[data-doc-field="title"]'
          };
          var inputs = editorInner.querySelectorAll(selectors[addKey]);
          var last = inputs[inputs.length - 1];
          if (last) last.focus();
        });
        return;
      }

      // Add step
      if (btn.hasAttribute("data-add-step")) {
        var newId = "w" + w.week + "-t" + (Date.now() % 10000);
        w.steps.push({
          title: "",
          copy: "",
          tasks: [{ id: newId, label: "", detail: "" }],
        });
        markDirty();
        renderEditor();
        return;
      }

      // Remove step
      if (btn.dataset.removeStep !== undefined) {
        var rsi = parseInt(btn.dataset.removeStep, 10);
        if (w.steps.length <= 1) {
          toast("최소 1개의 단계가 필요합니다.", "error");
          return;
        }
        w.steps.splice(rsi, 1);
        markDirty();
        renderEditor();
        return;
      }

      // Move step
      if (btn.dataset.moveStep) {
        var msi = parseInt(btn.dataset.idx, 10);
        var dir = btn.dataset.moveStep;
        if (dir === "up" && msi > 0) {
          var tmp = w.steps[msi - 1];
          w.steps[msi - 1] = w.steps[msi];
          w.steps[msi] = tmp;
          markDirty();
          renderEditor();
        } else if (dir === "down" && msi < w.steps.length - 1) {
          var tmp2 = w.steps[msi];
          w.steps[msi] = w.steps[msi + 1];
          w.steps[msi + 1] = tmp2;
          markDirty();
          renderEditor();
        }
        return;
      }

      // Task add
      if (btn.hasAttribute("data-task-add")) {
        var taSi = parseInt(btn.dataset.step, 10);
        var taId = "w" + w.week + "-t" + (Date.now() % 10000);
        w.steps[taSi].tasks = w.steps[taSi].tasks || [];
        w.steps[taSi].tasks.push({ id: taId, label: "", detail: "" });
        markDirty();
        renderEditor();
        return;
      }

      // Task remove
      if (btn.hasAttribute("data-task-remove")) {
        var trSi = parseInt(btn.dataset.step, 10);
        var trIdx = parseInt(btn.dataset.idx, 10);
        w.steps[trSi].tasks.splice(trIdx, 1);
        markDirty();
        renderEditor();
        return;
      }
    });

    // ─── Image upload ────────────────────────────────────
    async function uploadImage(weekNum, stepIdx, file) {
      var form = new FormData();
      form.append("image", file);
      try {
        var res = await apiFetch("/api/upload/" + weekNum + "/" + stepIdx, {
          method: "POST",
          body: form,
        });
        if (res.status === 401 || res.status === 403) return;
        if (!res.ok) throw new Error("HTTP " + res.status);
        var data = await res.json();
        curriculum[selectedIdx].steps[stepIdx].image = data.path;
        markDirty();
        renderEditor();
        toast("이미지 업로드 완료", "success");
      } catch (e) {
        toast("이미지 업로드 실패: " + e.message, "error");
      }
    }

    // ─── Video upload ────────────────────────────────────
    async function uploadVideo(weekNum, videoIdx, file) {
      var form = new FormData();
      form.append("video", file);
      try {
        var res = await apiFetch("/api/upload-video/" + weekNum + "/" + videoIdx, {
          method: "POST",
          body: form,
        });
        if (res.status === 401 || res.status === 403) return;
        if (!res.ok) throw new Error("HTTP " + res.status);
        var data = await res.json();
        curriculum[selectedIdx].videos[videoIdx].url = data.path;
        markDirty();
        renderEditor();
        toast("영상 업로드 완료", "success");
      } catch (e) {
        toast("영상 업로드 실패: " + e.message, "error");
      }
    }

    // ─── Keyboard shortcut: Ctrl/Cmd+S to save ───────────
    document.addEventListener("keydown", function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === "s") {
        e.preventDefault();
        saveBtn.click();
      }
    });

    // ─── Notion integration ──────────────────────────────
    async function checkNotionStatus() {
      try {
        var res = await apiFetch("/api/notion-status");
        if (res.status === 401 || res.status === 403) {
          notionConfigured = false;
          notionGroup.style.display = "none";
          return;
        }
        var data = await res.json();
        notionConfigured = !!(data.configured && data.mapping_loaded);
        notionGroup.style.display = notionConfigured ? "flex" : "none";
      } catch(e) {
        notionConfigured = false;
        notionGroup.style.display = "none";
      }
    }

    notionPushAllBtn.addEventListener("click", async function() {
      pushAllOverlay.style.display = "flex";
      notionPushAllBtn.disabled = true;
      notionPushAllBtn.textContent = "\u23F3 Push \uc911...";

      try {
        pushAllLog.innerHTML = "<span style='color:#aaa'>사전 검증 중...</span>";
        var statusRes = await apiFetch("/api/notion-status");
        if (statusRes.status === 401 || statusRes.status === 403) return;
        if (!statusRes.ok) throw new Error("Notion status HTTP " + statusRes.status);
        var statusData = await statusRes.json();

        if (!(statusData.configured && statusData.mapping_loaded)) {
          pushAllLog.innerHTML = "<span style='color:#f66'>검증 실패: NOTION_TOKEN 또는 notion-mapping.json 설정을 확인하세요.</span>";
          return;
        }

        pushAllLog.innerHTML =
          "<span style='color:#aaa'>검증 완료</span><br>" +
          "현재 버전: <strong>" + esc(currentVersion || "-") + "</strong><br>" +
          "매핑된 주차: <strong>" + esc(String(statusData.weeks_mapped)) + "</strong><br><br>" +
          "<span style='color:#aaa'>전체 push 중...</span>";

        var res = await apiFetch("/api/notion-push-all", {
          method: "POST",
          headers: apiHeaders(),
        });
        if (res.status === 401 || res.status === 403) return;
        var data = await res.json();

        if (!res.ok) {
          pushAllLog.innerHTML = "<span style='color:#f66'>오류: " + esc(data.error || "Unknown") + "</span>";
          return;
        }

        var lines = data.results.map(function(r) {
          var icon = r.ok ? "✓" : "✗";
          var color = r.ok ? "#6f6" : "#f66";
          var detail = r.ok ? "" : " — " + esc(r.error || "");
          return "<span style='color:" + color + "'>" + icon + " Week " +
            esc(String(r.week).padStart(2, "0")) + ": " + esc(r.title) + detail + "</span>";
        });
        lines.push("");
        lines.push("<strong>완료: " + esc(String(data.success_count)) + "/" + esc(String(data.total)) + " 성공</strong>");
        pushAllLog.innerHTML = lines.join("<br>");
      } catch(e) {
        pushAllLog.innerHTML = "<span style='color:#f66'>연결 실패: " + esc(e.message) + "</span>";
      } finally {
        notionPushAllBtn.disabled = false;
        notionPushAllBtn.textContent = "\uD83D\uDE80 \uc804\uccb4 Push";
      }
    });

    pushAllCloseBtn.addEventListener("click", function() {
      pushAllOverlay.style.display = "none";
    });
    diffCloseBtn.addEventListener("click", function() {
      diffOverlay.style.display = "none";
    });
    logoutBtn.addEventListener("click", async function() {
      try {
        await apiFetch("/api/admin/logout", { method: "POST" });
      } catch (e) {
        // Ignore logout network failures and still reset the UI.
      }
      curriculum = [];
      clearDirty();
      notionConfigured = false;
      notionGroup.style.display = "none";
      logoutBtn.style.display = "none";
      notionPushAllBtn.style.display = "none";
      setCurrentVersion("");
      renderAdminStateView({
        eyebrow: "Session closed",
        title: "로그아웃되었습니다",
        description: "관리 세션을 닫았습니다. 다시 인증하면 현재 톤과 동일한 편집 화면으로 돌아옵니다.",
        actions: [
          { type: "button", className: "btn-primary", dataAction: "auth", label: "다시 인증" },
          { type: "link", className: "btn-ghost", href: "index.html", label: "홈 보기 ↗" }
        ],
        meta: [
          { value: "Logged out", label: "세션 상태" },
          { value: "Read-only", label: "현재 모드" },
          { value: "Auth required", label: "다음 단계" }
        ],
        panelTitle: "다음에 할 일",
        panelDescription: "재인증 후에는 주차 미리보기, diff, 저장, Notion push까지 같은 workspace 안에서 이어서 사용할 수 있습니다.",
        steps: [
          { title: "관리자 인증", body: "비밀번호를 다시 입력하면 주차 데이터와 UI preset을 함께 불러옵니다." },
          { title: "편집 계속하기", body: "로그인 후에는 좌측 rail과 preview 카드가 다시 활성화됩니다." }
        ]
      });
      sidebarList.innerHTML = "";
      weekSelectTopbar.innerHTML = "";
      weekSelectTopbar.style.display = "none";
      renderAdminChrome();
      showAuth();
    });
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape" && diffOverlay.style.display !== "none") {
        diffOverlay.style.display = "none";
      }
      if (e.key === "Escape" && pushAllOverlay.style.display !== "none") {
        pushAllOverlay.style.display = "none";
      }
    });

    // ─── Init ────────────────────────────────────────────
    renderAdminChrome();
    loadCurriculum();

  })();
  </script>
<script>
(function() {
  var WEEKS = [];
  for (var i = 1; i <= 15; i++) WEEKS.push(String(i).padStart(2, '0'));

  function calcGrade(total) {
    if (total >= 95) return 'A+';
    if (total >= 90) return 'A';
    if (total >= 85) return 'B+';
    if (total >= 80) return 'B';
    if (total >= 75) return 'C+';
    if (total >= 70) return 'C';
    if (total >= 65) return 'D+';
    if (total >= 60) return 'D';
    return 'F';
  }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k) {
      if (k === 'className') node.className = attrs[k];
      else if (k === 'textContent') node.textContent = attrs[k];
      else node.setAttribute(k, attrs[k]);
    });
    if (children) children.forEach(function(c) { node.appendChild(c); });
    return node;
  }

  function clearChildren(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  async function fetchJSON(url) {
    var res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    return res.json();
  }

  function renderHeatmap(submissions) {
    var thead = document.querySelector('#grading-heatmap thead tr');
    var tbody = document.querySelector('#grading-heatmap tbody');
    clearChildren(thead);
    clearChildren(tbody);

    // Header
    thead.appendChild(el('th', {className: 'heatmap-student', textContent: '학생'}));
    WEEKS.forEach(function(w) {
      thead.appendChild(el('th', {className: 'heatmap-week', textContent: 'W' + parseInt(w)}));
    });

    // Group by student
    var byStudent = {};
    submissions.forEach(function(s) {
      if (!byStudent[s.student_id]) byStudent[s.student_id] = {name: s.student_name, weeks: {}};
      var wn = s.week.replace('Week ', '');
      byStudent[s.student_id].weeks[wn] = s.submitted;
    });

    Object.keys(byStudent).forEach(function(sid) {
      var student = byStudent[sid];
      var cells = [el('td', {className: 'heatmap-student', textContent: student.name})];
      WEEKS.forEach(function(w) {
        var sub = student.weeks[w];
        var cls = sub === true ? 'hm-yes' : sub === false ? 'hm-no' : 'hm-na';
        cells.push(el('td', {className: cls}));
      });
      tbody.appendChild(el('tr', null, cells));
    });

    // Summary
    var total = submissions.length;
    var submitted = submissions.filter(function(s) { return s.submitted; }).length;
    var pct = total ? Math.round(submitted / total * 100) : 0;
    var summary = document.getElementById('grading-summary');
    clearChildren(summary);
    var span = el('span', {className: 'grading-stat'});
    span.textContent = 'Total: ' + pct + '% (' + submitted + '/' + total + ')';
    summary.appendChild(span);
  }

  function renderGrades(grades) {
    var tbody = document.querySelector('#grading-grades tbody');
    clearChildren(tbody);

    grades.forEach(function(g) {
      var assignPct = g.submissions / 15 * 100;
      var total = (g.attendance || 0) * 0.1 + assignPct * 0.2 + (g.midterm || 0) * 0.35 + (g.final || 0) * 0.35;
      var grade = calcGrade(total);
      var cells = [
        el('td', {textContent: g.student_name}),
        el('td', {textContent: g.class_num}),
        el('td', {textContent: String(g.attendance || 0)}),
        el('td', {textContent: g.submissions + '/15'}),
        el('td', {textContent: String(g.midterm || 0)}),
        el('td', {textContent: String(g.final || 0)}),
        el('td', null, [el('strong', {textContent: total.toFixed(1)})]),
        el('td', null, [el('strong', {textContent: grade})]),
      ];
      tbody.appendChild(el('tr', null, cells));
    });
  }

  async function loadGradingPanel() {
    var classNum = document.getElementById('grading-class-filter').value;
    var params = classNum ? '?class=' + encodeURIComponent(classNum) : '';
    try {
      var results = await Promise.all([
        fetchJSON('/api/submissions' + params),
        fetchJSON('/api/grades' + params),
      ]);
      renderHeatmap(results[0]);
      renderGrades(results[1]);
    } catch (e) {
      var summary = document.getElementById('grading-summary');
      clearChildren(summary);
      summary.appendChild(el('span', {
        className: 'grading-error',
        textContent: 'Data unavailable. Run init_grading_db.py first.',
      }));
    }
  }

  var classFilter = document.getElementById('grading-class-filter');
  if (classFilter) classFilter.addEventListener('change', loadGradingPanel);

  var refreshBtn = document.getElementById('grading-refresh-btn');
  if (refreshBtn) refreshBtn.addEventListener('click', loadGradingPanel);

  // Tab switching
  var tabBtns = document.querySelectorAll('.tab-btn[data-tab]');
  tabBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var target = btn.getAttribute('data-tab');
      tabBtns.forEach(function(b) {
        b.classList.remove('is-active');
        b.setAttribute('aria-selected', 'false');
      });
      btn.classList.add('is-active');
      btn.setAttribute('aria-selected', 'true');

      // Show/hide panels
      var editorPanel = document.getElementById('panel-editor');
      var gradingPanel = document.getElementById('panel-grading');
      if (target === 'editor') {
        if (editorPanel) editorPanel.removeAttribute('hidden');
        if (gradingPanel) gradingPanel.setAttribute('hidden', '');
      } else if (target === 'grading') {
        if (editorPanel) editorPanel.setAttribute('hidden', '');
        if (gradingPanel) gradingPanel.removeAttribute('hidden');
        setTimeout(loadGradingPanel, 100);
      }
    });
  });
})();
</script>
</body>
</html>
